/* 새 훈련 진입점 (Stub - 구현 예정) */
function openWordLearn(mode){
    state.vocabLearnMode=mode;
    state.vocabLearnIdx=0;state.vocabLearnFlipped=false;
    state.flashKnown=new Set();state.flashUnknown=new Set();state.flashReviewMode=false;
    if(mode==='grid'){
        // 진행 중인 매칭게임이 있으면 LocalStorage에서 복원
        const uid=getUser().id;
        const key='inprog_'+uid+'_'+state.unit+'_match';
        const saved=LS.g(key);
        console.log('[매칭게임 복원 시도]', 'key:', key, 'saved:', saved, 'isPreview:', isPreview());
        if(saved&&saved.rounds&&saved.matchedAll<saved.totalWords){
            // matchedByRound Set 복원
            state.matchGame={
                ...saved,
                matchedByRound:(saved.matchedByRound||[]).map(arr=>new Set(arr)),
                selectedLeft:null,selectedRight:null,wrongPair:null
            };
            console.log('[매칭게임 복원 성공]', 'matchedAll:', saved.matchedAll, '/', saved.totalWords);
        } else {
            console.log('[매칭게임 새 게임 시작]');

        }
    }
    state.view='vocabLearn';render();
}
function startWordSelfCheck(){
    // TODO: 새 단어 셀프체크 (비율 기반) — 임시로 기존 startSelfcheck 호출
    startSelfcheck();
}
function openSentTrain(step){
    const data=collectUnitData();
    const vsList=data.allVocabSentences||[];
    if(vsList.length===0){alert('본문 문장이 없습니다.\n관리자에서 단어리스트와 sentenceList가 생성된 article을 만들어주세요.');return;}
    state.sentTrainStep=step;
    const sets=getSettings();
    if(step===1||step===2){
        // 영어↔한국어 스페이스 토글 학습 (학습용, 점수 없음)
        // inprog 복원
        const uid=getUser().id;
        const ipKey='inprog_'+uid+'_'+state.unit+'_sentTrain'+step;
        const ip=LS.g(ipKey);
        state.sentTrainIdx=(ip&&typeof ip.idx==='number')?ip.idx:0;
        state.sentTrainShow=false;
        state.sentTrainList=vsList;
        state.view='sentTrain';render();
    } else if(step===3){
        // 어순배열 + 틀린 입력 차단
        const cnt=Math.min(sets.sentTrain.s3Count,vsList.length);
        // 청크가 있는 문장만 필터링
        const eligible=vsList.filter(s=>Array.isArray(s.chunks)&&s.chunks.length>=2);
        if(eligible.length===0){alert('어순배열할 청크 문장이 없습니다.\n청크 모드를 Normal/Easy로 설정해서 article을 재생성해주세요.');return;}
        // 셔플 후 cnt개 추출
        const shuffle=(a)=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
        const selected=shuffle(eligible).slice(0,Math.min(cnt,eligible.length));
        // inprog 복원
        const uid=getUser().id;
        const ipKey='inprog_'+uid+'_'+state.unit+'_sentTrain3';
        const ip=LS.g(ipKey);
        if(ip&&ip.sentences&&ip.sentences.length>0){
            state.sentTrainList=ip.sentences;
            state.sentTrainIdx=ip.idx||0;
            state.sentTrainPlaced=ip.placed||[];
            state.sentTrainScores=ip.scores||[];
            state.sentTrainStartTime=ip.startTime||Date.now();
        } else {
            state.sentTrainList=selected;
            state.sentTrainIdx=0;
            state.sentTrainPlaced=[];
            state.sentTrainScores=[]; // 각 문장당 시도 횟수/완료 여부
            state.sentTrainStartTime=Date.now();
        }
        state.view='sentTrain';render();
    } else if(step===4){
        // 틀린문장 고르기 + 즉시 해설
        // wrongEn이 있는 문장만 필터
        const eligible=vsList.filter(s=>s.wrongEn&&s.wrongEn.trim());
        if(eligible.length<sets.sentTrain.s4Choices){
            alert('틀린문장 문제를 만들 수 없습니다.\n관리자에서 새 article을 생성해 wrongEn 데이터를 채워주세요.');
            return;
        }
        // 문항 생성: 각 문항당 (보기수)개 문장 중 1개만 wrongEn (틀린버전), 나머지는 정상 en
        const shuffle=(a)=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
        const cnt=Math.min(sets.sentTrain.s4Count,eligible.length);
        const choices=sets.sentTrain.s4Choices;
        const questions=[];
        const usedAsWrong=new Set();
        const allEligibleShuffled=shuffle(eligible);
        for(let i=0;i<cnt;i++){
            // 이번 문항의 정답(틀린 버전 문장) 선택
            const wrongIdx=(i)%allEligibleShuffled.length;
            const wrongSent=allEligibleShuffled[wrongIdx];
            // 정상 문장 (보기수-1)개 선택 (해당 wrongSent 제외)
            const others=eligible.filter(s=>s.en!==wrongSent.en);
            const normals=shuffle(others).slice(0,choices-1);
            // 위치 셔플
            const opts=shuffle([{text:wrongSent.wrongEn,isWrong:true,reason:wrongSent.wrongReason||'어법 오류',originalEn:wrongSent.en},
                                ...normals.map(s=>({text:s.en,isWrong:false,reason:'',originalEn:s.en}))]);
            const answerIdx=opts.findIndex(o=>o.isWrong);
            questions.push({opts,answerIdx,wrongSent});
        }
        // inprog 복원
        const uid=getUser().id;
        const ipKey='inprog_'+uid+'_'+state.unit+'_sentTrain4';
        const ip=LS.g(ipKey);
        if(ip&&ip.qs&&ip.qs.length>0){
            state.sentTrainList=ip.qs;
            state.sentTrainIdx=ip.idx||0;
            state.sentTrainAnswers=ip.answers||[];
            state.sentTrainShowReason=ip.showReason||false;
            state.sentTrainStartTime=ip.startTime||Date.now();
        } else {
            state.sentTrainList=questions;
            state.sentTrainIdx=0;
            state.sentTrainAnswers=[]; // {idx, isCorrect, showed}
            state.sentTrainShowReason=false;
            state.sentTrainStartTime=Date.now();
        }
        state.view='sentTrain';render();
    }
}
// 진행 저장
function saveSentTrainProgress(){
    const step=state.sentTrainStep;if(!step)return;
    const uid=getUser().id;
    const key='inprog_'+uid+'_'+state.unit+'_sentTrain'+step;
    if(step===1||step===2){
        LS.s(key,{idx:state.sentTrainIdx});
    } else if(step===3){
        LS.s(key,{sentences:state.sentTrainList,idx:state.sentTrainIdx,placed:state.sentTrainPlaced,scores:state.sentTrainScores,startTime:state.sentTrainStartTime});
    } else if(step===4){
        LS.s(key,{qs:state.sentTrainList,idx:state.sentTrainIdx,answers:state.sentTrainAnswers,showReason:state.sentTrainShowReason,startTime:state.sentTrainStartTime});
    }
}
function clearSentTrainProgress(step){
    const uid=getUser().id;
    LS.del('inprog_'+uid+'_'+state.unit+'_sentTrain'+step);
}
// 1·2단계: 스페이스 토글
function sentTrainToggle(){state.sentTrainShow=!state.sentTrainShow;saveSentTrainProgress();render();}
function sentTrainNext(){
    if(state.sentTrainIdx<state.sentTrainList.length-1){
        state.sentTrainIdx++;state.sentTrainShow=false;saveSentTrainProgress();render();
    } else {
        // 끝 — 완료 처리
        const uid=getUser().id;const step=state.sentTrainStep;
        LS.s('trtype_'+uid+'_'+state.unit+'_sentTrain'+step,{passed:true,timestamp:Date.now()});
        clearSentTrainProgress(step);
        alert('✅ '+step+'단계 학습 완료!');
        state.view='trainHub';render();

}
function sentTrainPrev(){
    if(state.sentTrainIdx>0){state.sentTrainIdx--;state.sentTrainShow=false;saveSentTrainProgress();render();}
}
// 3단계: 어순배열 청크 클릭 (정답 위치만 허용)
function sentTrainPlaceChunk(ci){
    const q=state.sentTrainList[state.sentTrainIdx];
    const chunks=q.chunks;
    const expectedIdx=state.sentTrainPlaced.length; // 다음에 와야 할 청크 위치
    if(ci===expectedIdx){
        // 정답
        state.sentTrainPlaced.push(ci);
        // 모두 배치하면 다음 문장
        if(state.sentTrainPlaced.length>=chunks.length){
            const scores=state.sentTrainScores;
            scores[state.sentTrainIdx]={done:true};
            state.sentTrainPlaced=[];
            saveSentTrainProgress();
            // 잠시 후 다음으로
            setTimeout(()=>{
                if(state.sentTrainIdx<state.sentTrainList.length-1){
                    state.sentTrainIdx++;state.sentTrainPlaced=[];saveSentTrainProgress();render();
                } else {
                    // 끝 - 결과 저장
                    sentTrainFinish3();
                }
            },800);
        } else {
            saveSentTrainProgress();
        }
        render();
    } else {
        // 오답 - 흔들림
        state.sentTrainWrongChunk=ci;
        render();
        setTimeout(()=>{state.sentTrainWrongChunk=null;render();},600);
    }
}
function sentTrainFinish3(){
    const uid=getUser().id;
    const total=state.sentTrainList.length;
    const done=state.sentTrainScores.filter(s=>s&&s.done).length;
    LS.s('trtype_'+uid+'_'+state.unit+'_sentTrain3',{passed:true,total,done,timestamp:Date.now()});
    clearSentTrainProgress(3);
    console.log('[3단계 어순배열 완료]', done+'/'+total, '저장됨');
    alert('🎉 3단계 어순배열 완료!\n'+done+'/'+total+' 문장 완성');
    state.view='trainHub';render();
}
// 4단계: 틀린문장 선택
function sentTrainSelectOpt(oi){
    if(state.sentTrainShowReason)return; // 해설 보는 중에는 입력 차단
    const idx=state.sentTrainIdx;
    const q=state.sentTrainList[idx];
    const isCorrect=oi===q.answerIdx;
    state.sentTrainAnswers[idx]={picked:oi,isCorrect};
    state.sentTrainShowReason=true; // 해설 표시
    saveSentTrainProgress();render();
}
function sentTrainNext4(){
    if(state.sentTrainIdx<state.sentTrainList.length-1){
        state.sentTrainIdx++;state.sentTrainShowReason=false;saveSentTrainProgress();render();
    } else {
        // 완료
        const uid=getUser().id;
        const total=state.sentTrainList.length;
        const correct=state.sentTrainAnswers.filter(a=>a&&a.isCorrect).length;
        const score=total>0?Math.round(correct/total*100):0;
        const rec={passed:true,score,correct,total,timestamp:Date.now()};
        LS.s('trtype_'+uid+'_'+state.unit+'_sentTrain4',rec);
        clearSentTrainProgress(4);
        console.log('[4단계 틀린문장 완료]', correct+'/'+total, '점수:', score, '저장됨', rec);
        alert('🎉 4단계 틀린문장 고르기 완료!\n'+correct+'/'+total+' 정답');
        state.view='trainHub';render();
    }
}
/* ========== 4단계 문장 셀프체크 — 통합 시험 (실전평가와 동일 구조) ========== */
// phase 1 → 2 → 3 → 4 순차 진행, 마지막에 채점 + 오답 확인
function openSentSelf(){
    const data=collectUnitData();
    const vsList=data.allVocabSentences||[];
    if(vsList.length===0){alert('본문 문장이 없습니다. 관리자에서 article을 생성해주세요.');return;}
    const sets=getSettings();
    const uid=getUser().id;
    const ipKey='inprog_'+uid+'_'+state.unit+'_sentSelf';
    // 진행 중인 시험 복원
    const ip=LS.g(ipKey);
    if(ip&&ip.list&&ip.list.phase1){
        state.sentSelfList=ip.list;
        state.sentSelfAnswers=ip.answers||{phase1:[],phase2:[],phase3:[],phase4:[]};
        state.sentSelfPhase=ip.phase||1;
        state.sentSelfPhaseIdx=ip.phaseIdx||0;
        state.sentSelfPlaced=ip.placed||[];
        state.sentSelfStartTime=ip.startTime||Date.now();
        state.sentSelfResult=null;
        state.view='sentSelf';render();return;
    }
    const shuffle=(a)=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;};
    
    // ─── Phase 1: 영어 → 해석 ───
    let phase1=[];
    if(vsList.length>=4){
        const cnt=Math.min(sets.sentSelfCheck.s1Count,vsList.length);
        const targets=shuffle(vsList).slice(0,cnt);
        phase1=targets.map(t=>{
            const distractors=shuffle(vsList.filter(s=>s.en!==t.en)).slice(0,3);
            const opts=shuffle([t,...distractors]);
            return {prompt:t.en,options:opts.map(o=>o.ko),answer:opts.findIndex(o=>o.en===t.en),target:t};
        });
    }
    // ─── Phase 2: 해석 → 영어 ───
    let phase2=[];
    if(vsList.length>=4){
        const cnt=Math.min(sets.sentSelfCheck.s2Count,vsList.length);
        const targets=shuffle(vsList).slice(0,cnt);
        phase2=targets.map(t=>{
            const distractors=shuffle(vsList.filter(s=>s.en!==t.en)).slice(0,3);
            const opts=shuffle([t,...distractors]);
            return {prompt:t.ko,options:opts.map(o=>o.en),answer:opts.findIndex(o=>o.en===t.en),target:t};
        });
    }
    // ─── Phase 3: 어순배열 ───
    let phase3=[];
    const eligibleChunks=vsList.filter(s=>Array.isArray(s.chunks)&&s.chunks.length>=2);
    if(eligibleChunks.length>0){
        const cnt=Math.min(sets.sentSelfCheck.s3Count,eligibleChunks.length);
        phase3=shuffle(eligibleChunks).slice(0,cnt).map(s=>{
            const order=s.chunks.map((_,i)=>i);
            const shuffleOrder=shuffle(order);
            return {...s,shuffleOrder};
        });
    }
    // ─── Phase 4: 어법 틀린문장 ───
    let phase4=[];
    const eligibleWrong=vsList.filter(s=>s.wrongEn&&s.wrongEn.trim());
    if(eligibleWrong.length>=4){
        const cnt=Math.min(sets.sentSelfCheck.s4Count,eligibleWrong.length);
        phase4=shuffle(eligibleWrong).slice(0,cnt).map(wrongSent=>{
            const others=eligibleWrong.filter(s=>s.en!==wrongSent.en);
            const normals=shuffle(others).slice(0,3);
            const opts=shuffle([{text:wrongSent.wrongEn,isWrong:true,reason:wrongSent.wrongReason||'어법 오류',originalEn:wrongSent.en},
                                ...normals.map(s=>({text:s.en,isWrong:false,reason:'',originalEn:s.en}))]);
            return {opts,answerIdx:opts.findIndex(o=>o.isWrong),wrongSent};
        });
    }
    if(phase1.length+phase2.length+phase3.length+phase4.length===0){alert('출제할 문제가 부족합니다. 관리자에서 article을 생성/보완해주세요.');return;}
    state.sentSelfList={phase1,phase2,phase3,phase4};
    state.sentSelfAnswers={phase1:[],phase2:[],phase3:[],phase4:[]};
    state.sentSelfPhase=phase1.length>0?1:phase2.length>0?2:phase3.length>0?3:4;
    state.sentSelfPhaseIdx=0;
    state.sentSelfPlaced=[];
    state.sentSelfStartTime=Date.now();
    state.sentSelfResult=null;
    saveSentSelfProgress();
    state.view='sentSelf';render();
}
// 진행 저장/삭제
function saveSentSelfProgress(){
    if(!state.sentSelfList)return;
    const uid=getUser().id;
    LS.s('inprog_'+uid+'_'+state.unit+'_sentSelf',{
        list:state.sentSelfList,
        answers:state.sentSelfAnswers,
        phase:state.sentSelfPhase,
        phaseIdx:state.sentSelfPhaseIdx,
        placed:state.sentSelfPlaced,
        startTime:state.sentSelfStartTime||Date.now()
    });
}
function clearSentSelfProgress(){
    const uid=getUser().id;
    LS.del('inprog_'+uid+'_'+state.unit+'_sentSelf');
}
// 현재 phase의 문제 배열
function _phaseList(){
    const p=state.sentSelfPhase;
    return state.sentSelfList['phase'+p]||[];
}
function _phaseAnsArr(){
    const p=state.sentSelfPhase;
    return state.sentSelfAnswers['phase'+p]||[];
}
// 다음 phase 찾기 (빈 phase 건너뛰기)
function _nextPhaseAfter(p){
    for(let i=p+1;i<=4;i++){
        if((state.sentSelfList['phase'+i]||[]).length>0)return i;
    }
    return null;
}
// 전체 진행률
function _sentSelfProgress(){
    let total=0,done=0;
    [1,2,3,4].forEach(p=>{
        const ln=(state.sentSelfList['phase'+p]||[]).length;
        total+=ln;
        if(p<state.sentSelfPhase){done+=ln;}
        else if(p===state.sentSelfPhase){done+=state.sentSelfPhaseIdx;}
    });
    return {done,total};
}
// Phase 1·2: 객관식 답안
function sentSelfPickOpt(oi){
    const arr=_phaseAnsArr();
    arr[state.sentSelfPhaseIdx]=oi;
    saveSentSelfProgress();render();
}
// Phase 3: 청크 자유 배치 (틀려도 추가 가능)
function sentSelfPlace(ci){
    if(state.sentSelfPlaced.includes(ci))return;
    state.sentSelfPlaced.push(ci);
    saveSentSelfProgress();render();
}
function sentSelfUnplace(at){
    state.sentSelfPlaced.splice(at,1);
    saveSentSelfProgress();render();
}
// Phase 3: 현재 문장 답안 확정 후 다음
function sentSelfSubmitArrange(){
    const arr=_phaseAnsArr();
    arr[state.sentSelfPhaseIdx]=[...state.sentSelfPlaced];
    state.sentSelfPlaced=[];
    saveSentSelfProgress();
    _sentSelfAdvance();
}
// Phase 4: 답 선택 후 바로 다음 (즉시 해설 없음)
function sentSelfPickWrong(oi){
    const arr=_phaseAnsArr();
    arr[state.sentSelfPhaseIdx]=oi;
    saveSentSelfProgress();render();
}
// 공통: 다음 문항 또는 다음 phase
function sentSelfNext(){
    const list=_phaseList();
    // Phase 3에서 다음 문항으로 갈 때 다음 문항의 저장된 placed 복원
    if(state.sentSelfPhaseIdx<list.length-1){
        state.sentSelfPhaseIdx++;
        if(state.sentSelfPhase===3){
            const arr=_phaseAnsArr();
            const savedPlaced=arr[state.sentSelfPhaseIdx];
            state.sentSelfPlaced=Array.isArray(savedPlaced)?[...savedPlaced]:[];
        }
        saveSentSelfProgress();render();
    } else {
        _sentSelfAdvance();
    }
}
function sentSelfPrev(){
    if(state.sentSelfPhaseIdx>0){
        state.sentSelfPhaseIdx--;
        if(state.sentSelfPhase===3){
            const arr=_phaseAnsArr();
            const savedPlaced=arr[state.sentSelfPhaseIdx];
            state.sentSelfPlaced=Array.isArray(savedPlaced)?[...savedPlaced]:[];
        }
        saveSentSelfProgress();render();
    } else {
        // 이전 phase의 마지막으로
        for(let i=state.sentSelfPhase-1;i>=1;i--){
            const ln=(state.sentSelfList['phase'+i]||[]).length;
            if(ln>0){
                state.sentSelfPhase=i;
                state.sentSelfPhaseIdx=ln-1;
                if(i===3){
                    const arr=_phaseAnsArr();
                    const savedPlaced=arr[state.sentSelfPhaseIdx];
                    state.sentSelfPlaced=Array.isArray(savedPlaced)?[...savedPlaced]:[];
                }
                saveSentSelfProgress();render();return;
            }
        }
    }
}
function _sentSelfAdvance(){
    const next=_nextPhaseAfter(state.sentSelfPhase);
    if(next===null){
        // 모든 phase 끝 → 최종 채점
        submitSentSelfAll();
    } else {
        state.sentSelfPhase=next;
        state.sentSelfPhaseIdx=0;
        state.sentSelfPlaced=[];
        saveSentSelfProgress();render();
    }
}
// 최종 채점
function submitSentSelfAll(){
    const lst=state.sentSelfList;
    const ans=state.sentSelfAnswers;
    // Phase 1·2 채점 (객관식)
    const grade=(qs,as)=>{
        let correct=0;const detail=[];
        qs.forEach((q,i)=>{
            const userAns=as[i];
            const isRight=userAns===q.answer;
            if(isRight)correct++;
            detail.push({q,userAns,isRight});
        });
        return {correct,total:qs.length,score:qs.length?Math.round(correct/qs.length*100):0,detail};
    };
    // Phase 3 채점 (어순배열): 사용자 배치 순서가 0,1,2,... 와 일치하면 정답
    const grade3=(qs,as)=>{
        let correct=0;const detail=[];
        qs.forEach((q,i)=>{
            const userOrder=as[i]||[];
            const expected=q.chunks.map((_,k)=>k);
            const isRight=userOrder.length===expected.length&&userOrder.every((v,k)=>v===expected[k]);
            if(isRight)correct++;
            detail.push({q,userOrder,isRight});
        });
        return {correct,total:qs.length,score:qs.length?Math.round(correct/qs.length*100):0,detail};
    };
    // Phase 4 채점 (틀린문장)
    const grade4=(qs,as)=>{
        let correct=0;const detail=[];
        qs.forEach((q,i)=>{
            const userAns=as[i];
            const isRight=userAns===q.answerIdx;
            if(isRight)correct++;
            detail.push({q,userAns,isRight});
        });
        return {correct,total:qs.length,score:qs.length?Math.round(correct/qs.length*100):0,detail};
    };
    const r1=grade(lst.phase1,ans.phase1||[]);
    const r2=grade(lst.phase2,ans.phase2||[]);
    const r3=grade3(lst.phase3,ans.phase3||[]);
    const r4=grade4(lst.phase4,ans.phase4||[]);
    // 통합 점수: 전체 정답 / 전체 문항
    const totalCorrect=r1.correct+r2.correct+r3.correct+r4.correct;
    const totalQ=r1.total+r2.total+r3.total+r4.total;
    const score=totalQ?Math.round(totalCorrect/totalQ*100):0;
    const sets=getSettings();
    const target=sets.sentSelfCheck?.target||80;
    const passed=score>=target;
    const result={score,target,passed,totalCorrect,totalQ,r1,r2,r3,r4};
    state.sentSelfResult=result;
    // LS 저장
    const uid=getUser().id;
    LS.s('trtype_'+uid+'_'+state.unit+'_sentSelf',{score,passed,totalCorrect,totalQ,target,r1,r2,r3,r4,timestamp:Date.now()});
    // 학습 기록(progress)에도 저장
    {
        const pr=LS.g('progress')||{};if(!pr[uid])pr[uid]=[];
        pr[uid].push({unit:state.unit,title:'문장 셀프체크',timeSpent:Math.floor((Date.now()-(state.sentSelfStartTime||Date.now()))/1000),correctAnswers:totalCorrect,totalQuestions:totalQ,timestamp:Date.now()});
        LS.s('progress',pr);
    }
    clearSentSelfProgress();
    // 통과 + 다른 모든 단계 통과 시 trainRec 자동 저장 (실전평가 자동 해제)
    if(passed){
        const tk=(k)=>'trtype_'+uid+'_'+state.unit+'_'+k;
        const wl1=LS.g(tk('wordLearn1'));const wl2=LS.g(tk('wordLearn2'));
        const wSelf=LS.g(tk('wordSelf'));
        const st1=LS.g(tk('sentTrain1'));const st2=LS.g(tk('sentTrain2'));
        const st3=LS.g(tk('sentTrain3'));const st4=LS.g(tk('sentTrain4'));
        const wordLearnDone=wl1&&wl2;
        const wordSelfPassed=wSelf&&wSelf.passed;
        const sentTrainDone=st1&&st2&&st3&&st4&&(st3.passed!==false)&&(st4.passed!==false);
        if(wordLearnDone&&wordSelfPassed&&sentTrainDone){
            try{
                const sd=getStudentData();
                LS.s('train_'+uid+'_'+(sd.textbooks?.reading||'')+'_'+state.unit,{passed:true,timestamp:Date.now()});
                console.log('[훈련모드 전체 완료] trainRec 자동 저장 — 실전평가 잠금 해제');
            }catch(e){console.error(e);}
        }
    }
    console.log('[문장 셀프체크 완료]', totalCorrect+'/'+totalQ, '점수:', score, '통과:', passed);
    state.view='sentSelfResult';render();
}
function sentSelfRetry(){
    clearSentSelfProgress();
    state.sentSelfList=null;state.sentSelfResult=null;
    openSentSelf();
}
function sentSelfBackHub(){
    state.sentSelfList=null;state.sentSelfResult=null;state.view='trainHub';render();

    if(confirm('진행 중인 시험을 중단하시겠습니까?\n\n현재까지의 답안은 저장되며, 나중에 이어풀 수 있습니다.')){

            </div>
            <div class="match-grid">
                <div class="match-col">
                    ${roundLeft.map((idx)=>{
                        const w=roundWords[idx];

                        const wrong=mg.wrongPair&&mg.wrongPair.left===idx;
                        return `<div class="match-card match-en ${isMatched?'matched':''} ${isSelected?'selected':''} ${wrong?'wrong':''}" onclick="${isMatched?'':`selectMatchLeft(${idx})`}">${escU(w.word)}${isMatched?'<span class="match-check">✓</span>':''}</div>`;
                    }).join('')}
                </div>
                <div class="match-col">
                    ${roundRight.map((idx)=>{
                        const w=roundWords[idx];

                        return `<div class="match-card match-ko ${isMatched?'matched':''} ${isSelected?'selected':''} ${wrong?'wrong':''}" onclick="${isMatched?'':`selectMatchRight(${idx})`}">${escU(w.meaning)}${isMatched?'<span class="match-check">✓</span>':''}</div>`;
                    }).join('')}

            </div>
            ${allMatchedInRound?`<button class="btn-primary" onclick="nextMatchRound()" style="width:100%;justify-content:center;padding:13px;margin-top:14px">${mg.currentRound+1<totalRounds?'다음 라운드 →':'완료 →'}</button>`:''}
        </div>`;
    }
}

/* 매칭게임 로직 */
function initMatchGame(words){
    const sets=getSettings();
    const configured=sets.wordTrain?.matchPairsPerRound||6;
    const pairsPerRound=Math.min(configured,words.length);
    const shuffleArr=(arr)=>{const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
    const indices=words.map((_,i)=>i);
    const shuffledIdx=shuffleArr(indices);
    const rounds=[],leftShuffled=[],rightShuffled=[];
    for(let i=0;i<shuffledIdx.length;i+=pairsPerRound){
        const chunk=shuffledIdx.slice(i,i+pairsPerRound);
        const roundWords=chunk.map(gi=>words[gi]);
        rounds.push(roundWords);
        const localIdx=roundWords.map((_,j)=>j);
        leftShuffled.push(shuffleArr(localIdx));
        rightShuffled.push(shuffleArr(localIdx));
    }
    state.matchGame={
        totalWords:words.length,pairsPerRound,rounds,leftShuffled,rightShuffled,
        matchedByRound:rounds.map(()=>new Set()),
        currentRound:0,selectedLeft:null,selectedRight:null,wrongPair:null,
        matchedAll:0,attempts:0
    };
    saveMatchGame();
}
// 매칭게임 LocalStorage 저장 (Set → array 변환)
function saveMatchGame(){
    const mg=state.matchGame;if(!mg)return;
    const uid=getUser().id;
    const key='inprog_'+uid+'_'+state.unit+'_match';
    LS.s(key,{
        totalWords:mg.totalWords,pairsPerRound:mg.pairsPerRound,
        rounds:mg.rounds,leftShuffled:mg.leftShuffled,rightShuffled:mg.rightShuffled,
        matchedByRound:mg.matchedByRound.map(s=>[...s]),
        currentRound:mg.currentRound,matchedAll:mg.matchedAll,attempts:mg.attempts
    });
    console.log('[매칭게임 저장]', 'key:', key, 'matchedAll:', mg.matchedAll, 'currentRound:', mg.currentRound, 'isPreview:', isPreview());
}
function clearMatchGame(){
    const uid=getUser().id;
    LS.del('inprog_'+uid+'_'+state.unit+'_match');
}
function selectMatchLeft(idx){
    const mg=state.matchGame;if(!mg)return;
    if(mg.matchedByRound[mg.currentRound].has(idx))return;
    if(mg.wrongPair)return; // 오답 흔들림 중에는 입력 차단
    mg.selectedLeft=idx;
    checkMatchPair();render();
}
function selectMatchRight(idx){
    const mg=state.matchGame;if(!mg)return;
    if(mg.matchedByRound[mg.currentRound].has(idx))return;
    if(mg.wrongPair)return;
    mg.selectedRight=idx;
    checkMatchPair();render();
}
function checkMatchPair(){
    const mg=state.matchGame;
    if(mg.selectedLeft===null||mg.selectedRight===null)return;
    mg.attempts++;
    if(mg.selectedLeft===mg.selectedRight){
        mg.matchedByRound[mg.currentRound].add(mg.selectedLeft);
        mg.matchedAll++;
        mg.selectedLeft=null;mg.selectedRight=null;
        saveMatchGame();
    } else {
        mg.wrongPair={left:mg.selectedLeft,right:mg.selectedRight};
        saveMatchGame();
        setTimeout(()=>{
            const mg2=state.matchGame;if(!mg2||!mg2.wrongPair)return;
            mg2.selectedLeft=null;mg2.selectedRight=null;mg2.wrongPair=null;
            render();
        },700);
    }
}
function nextMatchRound(){
    const mg=state.matchGame;if(!mg)return;
    mg.currentRound++;
    mg.selectedLeft=null;mg.selectedRight=null;mg.wrongPair=null;
    saveMatchGame();
    render();
}
function restartMatchGame(){
    clearMatchGame();
    const data=collectUnitData();

}

/* ========== 데이터 수집 ========== */
function collectUnitData(){
    const s=getStudentData();const bookName=s.textbooks?.reading;
    const articles=getArticles();const unit=articles[bookName]?.[state.unit];
    const allVocab=[];const allSentences=[];const allChunkSentences=[];const allKeySentences=[];const seen=new Set();
    // 새: vocab과 1:1 대응되는 본문문장 (en, ko, chunks, wrongEn, wrongReason, vocabWord)
    const allVocabSentences=[];
    (unit?.articles||[]).forEach(art=>{
        const sList=art.sentenceList||art.keySentences||[];
        (art.vocabulary||[]).forEach((v,vi)=>{
            if(!seen.has(v.word)){
                allVocab.push(v);seen.add(v.word);
                if(v.example_en){allSentences.push({en:v.example_en,ko:v.example_ko||'',word:v.word});}
                // 같은 인덱스 sentenceList 매칭 (AI가 1:1 매핑되도록 생성)
                const matchedSent=sList[vi];
                if(matchedSent&&matchedSent.en){
                    allVocabSentences.push({
                        en:matchedSent.en,
                        ko:matchedSent.ko||v.example_ko||'',
                        chunks:matchedSent.chunks||[],
                        wrongEn:matchedSent.wrongEn||'',
                        wrongReason:matchedSent.wrongReason||'',
                        vocabWord:v.word
                    });
                } else if(v.example_en){
                    // fallback: example_en만 있고 sentenceList 없을 때 (기존 데이터 호환)
                    allVocabSentences.push({en:v.example_en,ko:v.example_ko||'',chunks:[],wrongEn:'',wrongReason:'',vocabWord:v.word});
                }
            }
        });
        // 주요 문장 (en + ko 있는 모든 문장)
        if(Array.isArray(art.keySentences)){
            art.keySentences.forEach(ks=>{
                if(ks.en){
                    allKeySentences.push({en:ks.en,ko:ks.ko||''});
                    if(ks.chunks&&ks.chunks.length>=2){
                        allChunkSentences.push({en:ks.en,ko:ks.ko,chunks:ks.chunks});
                    }
                }
            });
        }
        // 추가: article content에서 적당한 문장 추출
        if(art.content){
            const sents=art.content.split(/(?<=[.!?])\s+/).map(x=>x.trim()).filter(x=>{
                const wc=x.split(/\s+/).length;return wc>=4&&wc<=14;
            });
            sents.slice(0,4).forEach(s=>{
                const containedVocab=allVocab.find(v=>new RegExp('\\b'+v.word+'\\b','i').test(s));
                if(containedVocab&&!allSentences.some(x=>x.en===s)){
                    allSentences.push({en:s,ko:'',word:containedVocab.word});
                }
            });
        }
    });
    // 중복 제거 (같은 영어 문장이 여러 단어에 매핑되거나 fallback 경로로 중복 push되는 경우 차단)
    const dedupByEn=(arr)=>{
        const out=[];const seenEn=new Set();
        for(const item of arr){
            const key=(item.en||'').trim().replace(/\s+/g,' ').toLowerCase();
            if(key&&!seenEn.has(key)){seenEn.add(key);out.push(item);}
        }
        return out;
    };
    return {
        allVocab,
        allSentences:dedupByEn(allSentences),
        allChunkSentences:dedupByEn(allChunkSentences),
        allKeySentences:dedupByEn(allKeySentences),
        allVocabSentences:dedupByEn(allVocabSentences)
    };
}

/* ========== 🟠 주간평가 데이터 수집 ========== */
// 한 주의 월요일 반환
function getWeekMondayFor(d){
    const dt=new Date(d);
    const day=dt.getDay();
    const diff=(day===0?-6:1-day);
    dt.setDate(dt.getDate()+diff);
    dt.setHours(0,0,0,0);
    return dt;
}
// 특정 weekId(주간평가일 YYYY-MM-DD)에 해당하는 주의 unit들 통합 수집
// 약점(틀린 단어/문장)도 함께 추출
function collectWeeklyData(weekId){
    const s=getStudentData();
    const bookName=s.textbooks?.reading;
    const days=s.days||[];
    const dayKor=['일','월','화','수','목','금','토'];
    const dayOrder=['일','월','화','수','목','금','토'];
    const sortedDays=days.slice().sort((a,b)=>dayOrder.indexOf(a)-dayOrder.indexOf(b));
    const weeklyTestDay=sortedDays[sortedDays.length-1];
    
    const startDate=s.startDate?new Date(s.startDate+'T00:00:00'):new Date();
    const wkDate=new Date(weekId+'T00:00:00');
    const weekMon=getWeekMondayFor(wkDate);
    
    // 해당 주의 학습일(주간평가 제외)을 unit번호와 매핑
    // 학생 시작일부터 weekId까지 전체 sessions를 만들고 weekMon~weekId 범위 학습일만
    const allSessions=[];
    const cur=new Date(startDate);
    let learningUnitIdx=0;
    while(cur<=wkDate){
        const dk=dayKor[cur.getDay()];
        if(days.includes(dk)){
            if(dk===weeklyTestDay){
                allSessions.push({date:new Date(cur),unitNum:null,isWeeklyTest:true});
            } else {
                allSessions.push({date:new Date(cur),unitNum:(s.startUnit||1)+learningUnitIdx,isWeeklyTest:false});
                learningUnitIdx++;
            }
        }
        cur.setDate(cur.getDate()+1);
    }
    // 그 주의 학습 세션만
    const weekLearnSessions=allSessions.filter(x=>!x.isWeeklyTest&&getWeekMondayFor(x.date).getTime()===weekMon.getTime()&&x.date<wkDate);
    const unitNums=weekLearnSessions.map(x=>x.unitNum);
    const unitKeys=unitNums.map(n=>'unit'+n);
    
    // 그 unit들의 단어/문장 통합 수집
    const articles=getArticles();
    const ba=articles[bookName]||{};
    const allVocab=[];const allVocabSentences=[];const allChunkSentences=[];const allKeySentences=[];
    const seenWord=new Set();
    unitKeys.forEach(uk=>{
        const unit=ba[uk];if(!unit)return;
        (unit.articles||[]).forEach(art=>{
            const sList=art.sentenceList||art.keySentences||[];
            (art.vocabulary||[]).forEach((v,vi)=>{
                if(!seenWord.has(v.word)){
                    allVocab.push(v);seenWord.add(v.word);
                    const matchedSent=sList[vi];
                    if(matchedSent&&matchedSent.en){
                        allVocabSentences.push({en:matchedSent.en,ko:matchedSent.ko||v.example_ko||'',chunks:matchedSent.chunks||[],wrongEn:matchedSent.wrongEn||'',wrongReason:matchedSent.wrongReason||'',vocabWord:v.word,unitKey:uk});
                    } else if(v.example_en){
                        allVocabSentences.push({en:v.example_en,ko:v.example_ko||'',chunks:[],wrongEn:'',wrongReason:'',vocabWord:v.word,unitKey:uk});
                    }
                }
            });
            if(Array.isArray(art.keySentences)){
                art.keySentences.forEach(ks=>{
                    if(ks.en){
                        allKeySentences.push({en:ks.en,ko:ks.ko||'',unitKey:uk});
                        if(ks.chunks&&ks.chunks.length>=2){
                            allChunkSentences.push({en:ks.en,ko:ks.ko,chunks:ks.chunks,unitKey:uk});
                        }
                    }
                });
            }
        });
    });
    // dedup
    const dedupByEn=(arr)=>{const out=[];const seen=new Set();for(const i of arr){const k=(i.en||'').trim().replace(/\s+/g,' ').toLowerCase();if(k&&!seen.has(k)){seen.add(k);out.push(i);}}return out;};
    
    // 약점 추출: 그 주의 단어셀프/문장셀프에서 틀린 항목
    const uid=getUser().id;
    const wrongWords=new Set();   // 틀린 단어 (word string)
    const wrongSentEn=new Set();  // 틀린 문장 (en string)
    unitKeys.forEach(uk=>{
        const ws=LS.g('trtype_'+uid+'_'+uk+'_wordSelf');
        if(ws&&Array.isArray(ws.detail)){
            ws.detail.forEach(d=>{
                if(!d.isRight){
                    // q.prompt에서 단어 추출이 어려워서, q.options[q.answer] 사용
                    const ans=d.q?.options?.[d.q?.answer];
                    if(ans)wrongWords.add(ans);
                }
            });
        }
        const ss=LS.g('trtype_'+uid+'_'+uk+'_sentSelf');
        if(ss){
            ['r1','r2','r3','r4'].forEach(rk=>{
                const r=ss[rk];
                if(r&&Array.isArray(r.detail)){
                    r.detail.forEach(d=>{
                        if(!d.isRight){
                            const en=d.q?.answerStr||d.q?.q?.en||d.q?.en||'';
                            if(en)wrongSentEn.add(en);
                        }
                    });
                }
            });
        }
    });
    
    return {
        weekId,weekMon,unitKeys,unitNums,bookName,
        allVocab,
        allVocabSentences:dedupByEn(allVocabSentences),
        allChunkSentences:dedupByEn(allChunkSentences),
        allKeySentences:dedupByEn(allKeySentences),
        wrongWords,wrongSentEn
    };
}

/* ========== 주간평가 훈련 모드 (옵션 B) ========== */
function startWeeklyTrain(startSection){
    const wd=state.weeklyData;
    const settings=getSettings();
    const wkSet=settings.weeklyTest;
    
    // Phase 1: 단어 플래시 (그 주 전체)
    const wordCards=wd.allVocab.map(v=>({...v,isWeak:wd.wrongWords.has(v.word)}));
    
    // Phase 2: 어순배열 N문항 (틀린 문장 우선)
    const chunkSents=wd.allChunkSentences.filter(x=>x.chunks&&x.chunks.length>=2);
    chunkSents.sort((a,b)=>(wd.wrongSentEn.has(b.en)?1:0)-(wd.wrongSentEn.has(a.en)?1:0));
    const arrSents=chunkSents.slice(0,wkSet.trainArrangeCount);
    const arrQs=arrSents.map(s=>{
        const chunks=s.chunks;
        const shuffled=shuffle(chunks.map((c,i)=>({en:c.en,ko:c.ko,i})));
        return {chunks,shuffled,answerStr:chunks.map(c=>c.en).join(' '),ko:s.ko||'',en:s.en,isWeak:wd.wrongSentEn.has(s.en)};
    });
    
    // Phase 3: 어법 N문항 빠른풀이
    const grSents=wd.allVocabSentences.filter(x=>x.wrongEn&&x.wrongEn.trim());
    const grPicked=shuffle(grSents).slice(0,wkSet.trainGrammarCount);
    const grQs=grPicked.map(s=>{
        const choices=shuffle([{en:s.en,isRight:true},{en:s.wrongEn,isRight:false}]);
        return {choices,answer:choices.findIndex(c=>c.isRight),ko:s.ko||'',explanation:s.wrongReason||'어법상 올바른 문장을 골랐습니다.',correctEn:s.en};
    });
    
    // 단일 섹션 모드 (메뉴에서 선택해 들어옴)
    const isSingleSection=startSection==='word'||startSection==='arrange'||startSection==='grammar';
    const initialPhase=startSection||'word';
    
    state.weeklyTrain={
        phase:initialPhase,
        singleSection:isSingleSection?startSection:null,  // 단일 섹션 끝나면 done 대신 메뉴로
        wordCards, wordIdx:0, wordSeen:new Set(),
        arrQs, arrIdx:0, arrPlaced:[], arrPool:[], arrResults:[],
        grQs, grIdx:0, grSel:null, grResults:[]
    };
    state.view='weeklyTrain';render();
}

function viewWeeklyTrain(){
    const wt=state.weeklyTrain;const wd=state.weeklyData;

    const settings=getSettings();
    
    const headerBar=`<div class="flex flex-between mb-16">
        <h2 style="margin:0">🟠 주간평가 — 훈련 모드 <span style="font-size:13px;color:var(--text3);font-weight:500">(${wd.unitKeys.length}개 unit 복습)</span></h2>

    const phaseNav=`<div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">

                <div style="font-weight:700;margin-top:3px">${label}</div>

    // === Phase 1: 단어 플래시 ===
    if(wt.phase==='word'){
        if(wt.wordCards.length===0){

            wt.phase='arrange';return viewWeeklyTrain();
        }
        const v=wt.wordCards[wt.wordIdx];
        const isLast=wt.wordIdx===wt.wordCards.length-1;
        const showOnlyWeak=wt.showOnlyWeak;
        const weakCount=wt.wordCards.filter(c=>c.isWeak).length;
        return `${headerBar}${phaseNav}

                </div>
            </div>
        </div>`;
    }
    
    // === Phase 2: 어순배열 ===
    if(wt.phase==='arrange'){
        if(wt.arrQs.length===0){wt.phase='grammar';return viewWeeklyTrain();}
        const q=wt.arrQs[wt.arrIdx];
        if(!wt.arrInit){
            wt.arrPool=q.shuffled.map(c=>({...c,used:false}));
            wt.arrPlaced=[];
            wt.arrInit=true;
            wt.arrShowResult=false;
        }
        const isLast=wt.arrIdx===wt.arrQs.length-1;
        return `${headerBar}${phaseNav}
        <div style="max-width:720px;margin:0 auto">
            <div class="flex flex-between mb-12">
                <div style="font-size:13px;color:var(--text3);font-weight:600">어순배열 ${wt.arrIdx+1} / ${wt.arrQs.length} ${q.isWeak?'<span style="background:#FEE2E2;color:#991B1B;padding:2px 7px;border-radius:6px;font-size:11px;margin-left:4px;font-weight:700">🔴 약점</span>':''}</div>

            ${wt.arrShowResult?`
                <div class="card" style="padding:18px;background:${wt.arrLastRight?'#D1FAE5':'#FEE2E2'};border:1.5px solid ${wt.arrLastRight?'#10B981':'#EF4444'};margin-bottom:12px">

                </div>

                <div style="min-height:60px;padding:14px;background:#FAFBFC;border:2px dashed #CBD5E1;border-radius:10px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:8px">
                    ${wt.arrPlaced.length===0?'<div style="color:var(--text3);font-size:13px">아래 청크를 순서대로 클릭하세요</div>':wt.arrPlaced.map((p,i)=>`<button class="chunk-chip placed" onclick="weeklyTrainArrRemove(${i})">${escU(p.en)}</button>`).join('')}
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
                    ${wt.arrPool.map((p,i)=>p.used?'':`<button class="chunk-chip" onclick="weeklyTrainArrPlace(${i})">${escU(p.en)}</button>`).join('')}
                </div>
            `}
            <div style="display:flex;justify-content:flex-end;gap:8px">
                ${wt.arrShowResult?`<button class="btn-primary" onclick="weeklyTrainArrNext()" style="background:#F97316">${isLast?'어순배열 완료 → 어법으로 ▶':'다음 →'}</button>`:`<button class="btn-primary" onclick="weeklyTrainArrSubmit()" ${wt.arrPlaced.length!==q.chunks.length?'disabled':''} style="background:#F97316">확인</button>`}
            </div>
        </div>`;
    }
    
    // === Phase 3: 어법 ===
    if(wt.phase==='grammar'){
        if(wt.grQs.length===0){wt.phase='done';return viewWeeklyTrain();}
        const q=wt.grQs[wt.grIdx];
        const isLast=wt.grIdx===wt.grQs.length-1;
        return `${headerBar}${phaseNav}
        <div style="max-width:720px;margin:0 auto">
            <div class="flex flex-between mb-12">
                <div style="font-size:13px;color:var(--text3);font-weight:600">어법 ${wt.grIdx+1} / ${wt.grQs.length}</div>

            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
                ${q.choices.map((c,i)=>{
                    const isSel=wt.grSel===i;
                    const showRight=wt.grShowResult&&c.isRight;
                    const showWrong=wt.grShowResult&&isSel&&!c.isRight;
                    return `<button class="q-option" onclick="weeklyTrainGrSelect(${i})" ${wt.grShowResult?'disabled':''} style="${showRight?'background:#D1FAE5;border-color:#10B981':showWrong?'background:#FEE2E2;border-color:#EF4444':isSel?'background:#FFEDD5;border-color:#F97316':''}">
                        <span style="font-weight:700;margin-right:8px">${['①','②','③','④'][i]}</span>${escU(c.en)}

                ${wt.grShowResult?`<button class="btn-primary" onclick="weeklyTrainGrNext()" style="background:#F97316">${isLast?'어법 완료 → 훈련 종료 ▶':'다음 →'}</button>`:`<button class="btn-primary" onclick="weeklyTrainGrSubmit()" ${wt.grSel===null?'disabled':''} style="background:#F97316">확인</button>`}
            </div>
        </div>`;
    }
    
    // === Done ===
    if(wt.phase==='done'){
        const correctArr=wt.arrResults.filter(x=>x).length;
        const correctGr=wt.grResults.filter(x=>x).length;
        return `${headerBar}${phaseNav}
        <div style="max-width:600px;margin:0 auto">
            <div class="card" style="padding:36px 28px;text-align:center;border:2px solid #F97316;background:linear-gradient(135deg,#FFF7ED,#FFEDD5)">
                <div style="font-size:48px;margin-bottom:12px">🎉</div>
                <h2 style="color:#9A3412;margin:0 0 8px">훈련 완료!</h2>
                <p style="color:var(--text2);margin:0 0 22px">이제 주간평가 시험을 보러 가세요</p>
                <div style="display:flex;gap:16px;justify-content:center;margin-bottom:22px;flex-wrap:wrap">
                    <div style="padding:14px 20px;background:#fff;border-radius:10px;border:1px solid #FED7AA">
                        <div style="font-size:11px;color:var(--text3);font-weight:600">단어 플래시</div>
                        <div style="font-size:18px;font-weight:800;color:#F97316">${wt.wordCards.length}개</div>
                    </div>
                    <div style="padding:14px 20px;background:#fff;border-radius:10px;border:1px solid #FED7AA">
                        <div style="font-size:11px;color:var(--text3);font-weight:600">어순배열</div>
                        <div style="font-size:18px;font-weight:800;color:#F97316">${correctArr} / ${wt.arrQs.length}</div>
                    </div>
                    <div style="padding:14px 20px;background:#fff;border-radius:10px;border:1px solid #FED7AA">
                        <div style="font-size:11px;color:var(--text3);font-weight:600">어법</div>
                        <div style="font-size:18px;font-weight:800;color:#F97316">${correctGr} / ${wt.grQs.length}</div>
                    </div>
                </div>
                <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
                    <button class="btn-ghost" onclick="exitWeeklyTrain()">일정표로</button>

                </div>
            </div>
        </div>`;
    }
    
    return '';
}

// === 훈련 모드 액션들 ===
function toggleWeakWordsOnly(){
    const wt=state.weeklyTrain;
    wt.showOnlyWeak=!wt.showOnlyWeak;
    if(wt.showOnlyWeak){
        wt._fullCards=wt.wordCards;
        wt.wordCards=wt._fullCards.filter(c=>c.isWeak);
        wt.wordIdx=0;wt.showMeaning=false;
        if(wt.wordCards.length===0){alert('약점 단어가 없습니다');wt.wordCards=wt._fullCards;wt.showOnlyWeak=false;}
    } else {
        wt.wordCards=wt._fullCards||wt.wordCards;
        wt.wordIdx=0;wt.showMeaning=false;
    }
    render();
}
function weeklyTrainWordToggle(){state.weeklyTrain.showMeaning=!state.weeklyTrain.showMeaning;render();}
function weeklyTrainWordPrev(){const wt=state.weeklyTrain;if(wt.wordIdx>0){wt.wordIdx--;wt.showMeaning=false;render();}}
function weeklyTrainWordNext(){
    const wt=state.weeklyTrain;
    if(wt.wordIdx<wt.wordCards.length-1){wt.wordIdx++;wt.showMeaning=false;render();}
    else if(wt.singleSection==='word'){
        // 단일 섹션 모드 — 메뉴로
        _completeWeeklyTrainOnce();
        state.weeklyTrain=null;
        state.view='weeklyTrainMenu';render();
    }
    else{wt.phase='arrange';wt.arrInit=false;render();}
}
function weeklyTrainArrPlace(i){
    const wt=state.weeklyTrain;
    wt.arrPool[i].used=true;
    wt.arrPlaced.push({...wt.arrPool[i],poolIdx:i});
    render();
}
function weeklyTrainArrRemove(i){
    const wt=state.weeklyTrain;
    const p=wt.arrPlaced[i];
    if(p.poolIdx!==undefined)wt.arrPool[p.poolIdx].used=false;
    wt.arrPlaced.splice(i,1);
    render();
}
function weeklyTrainArrSubmit(){
    const wt=state.weeklyTrain;
    const q=wt.arrQs[wt.arrIdx];
    const userStr=wt.arrPlaced.map(p=>p.en).join(' ');
    const isRight=userStr===q.answerStr;
    wt.arrResults[wt.arrIdx]=isRight;
    wt.arrShowResult=true;wt.arrLastRight=isRight;
    render();
}
function weeklyTrainArrNext(){
    const wt=state.weeklyTrain;
    if(wt.arrIdx<wt.arrQs.length-1){
        wt.arrIdx++;wt.arrInit=false;wt.arrShowResult=false;render();
    } else if(wt.singleSection==='arrange'){
        _completeWeeklyTrainOnce();
        state.weeklyTrain=null;
        state.view='weeklyTrainMenu';render();
    } else {
        wt.phase='grammar';render();
    }
}
function weeklyTrainGrSelect(i){state.weeklyTrain.grSel=i;render();}
function weeklyTrainGrSubmit(){
    const wt=state.weeklyTrain;
    const q=wt.grQs[wt.grIdx];
    const isRight=wt.grSel===q.answer;
    wt.grResults[wt.grIdx]=isRight;
    wt.grShowResult=true;wt.grLastRight=isRight;
    render();
}
function weeklyTrainGrNext(){
    const wt=state.weeklyTrain;
    if(wt.grIdx<wt.grQs.length-1){
        wt.grIdx++;wt.grSel=null;wt.grShowResult=false;render();
    } else if(wt.singleSection==='grammar'){
        _completeWeeklyTrainOnce();
        state.weeklyTrain=null;
        state.view='weeklyTrainMenu';render();
    } else {
        wt.phase='done';
        _completeWeeklyTrainOnce();
        render();
    }
}
function _completeWeeklyTrainOnce(){
    const wd=state.weeklyData;if(!wd)return;
    const uid=getUser().id;
    const key='weekly_'+uid+'_'+wd.bookName+'_'+wd.weekId;
    const rec=LS.g(key)||{};
    if(!rec.trainDone){
        rec.trainDone=true;rec.trainTimestamp=Date.now();
        LS.s(key,rec);
        console.log('[주간평가 훈련 완료]',key);
    }
}
function exitWeeklyTrain(){state.weeklyTrain=null;state.view='dashboard';render();}
function weeklyTrainToExam(){state.weeklyMode='exam';startWeeklyExam();}

/* ========== 🟠 주간평가 실전 시험 ========== */
function startWeeklyExam(){
    const wd=state.weeklyData;
    const settings=getSettings();
    const wkSet=settings.weeklyTest;
    const uid=getUser().id;
    const inprogKey='inprog_'+uid+'_weekly_'+wd.weekId+'_exam';
    
    // 이전 진행 상태 복원 시도
    const saved=LS.g(inprogKey);
    if(saved&&saved.wordQs&&saved.arrQs&&saved.grQs){
        // 문제 풀에 chunks 정보 등은 그대로 사용 (랜덤 시드 일관성)
        state.weeklyExam={
            wkSet:saved.wkSet||wkSet,
            phase:saved.phase||'word',
            wordQs:saved.wordQs, wordIdx:saved.wordIdx||0, wordSel:saved.wordSel===undefined?null:saved.wordSel, wordDetail:saved.wordDetail||[],
            arrQs:saved.arrQs, arrIdx:saved.arrIdx||0, arrPlaced:saved.arrPlaced||[], arrPool:saved.arrPool||[], arrInit:!!saved.arrInit, arrDetail:saved.arrDetail||[],
            grQs:saved.grQs, grIdx:saved.grIdx||0, grSel:saved.grSel===undefined?null:saved.grSel, grDetail:saved.grDetail||[],
            startTime:saved.startTime||Date.now(),
            _resumed:true
        };
        console.log('[🔄 주간평가 이어풀기]','phase:',saved.phase,'word:'+(saved.wordIdx||0)+'/'+saved.wordQs.length,'arr:'+(saved.arrIdx||0)+'/'+saved.arrQs.length,'gr:'+(saved.grIdx||0)+'/'+saved.grQs.length);
        state.view='weeklyExam';render();return;
    }
    
    // 단어 문제 생성 (비율 적용, 중복 없음)
    const wordQs=genWeeklyWordQuestions(wd.allVocab,wkSet.wordCount,wkSet.wordRatio);
    
    // 어순배열 문제 생성
    const chunkSents=wd.allChunkSentences.filter(x=>x.chunks&&x.chunks.length>=2);
    const arrPicked=shuffle(chunkSents).slice(0,wkSet.arrangeCount);
    const arrQs=arrPicked.map(s=>{
        const chunks=s.chunks;
        const shuffled=shuffle(chunks.map((c,i)=>({en:c.en,ko:c.ko,i})));
        return {type:'arrange',prompt:'다음 해석을 보고 청크를 순서대로 배열하세요',translation:s.ko||'',chunks,shuffled,answerStr:chunks.map(c=>c.en).join(' '),explanation:`정답: ${s.en}`};
    });
    
    // 어법 문제 생성
    const grSents=wd.allVocabSentences.filter(x=>x.wrongEn&&x.wrongEn.trim());
    const grPicked=shuffle(grSents).slice(0,wkSet.grammarCount);
    const grQs=grPicked.map(s=>{
        const choices=shuffle([{en:s.en,isRight:true},{en:s.wrongEn,isRight:false}]);
        return {type:'grammar',prompt:'다음 중 어법상 옳은 문장을 고르세요',translation:s.ko||'',options:choices.map(c=>c.en),answer:choices.findIndex(c=>c.isRight),explanation:s.wrongReason||`정답: ${s.en}`,correctEn:s.en};
    });
    
    state.weeklyExam={
        wkSet,
        phase:'word',  // word -> arrange -> grammar -> done
        wordQs, wordIdx:0, wordSel:null, wordDetail:[],
        arrQs, arrIdx:0, arrPlaced:[], arrPool:[], arrInit:false, arrDetail:[],
        grQs, grIdx:0, grSel:null, grDetail:[],
        startTime:Date.now()
    };
    saveWeeklyExamProgress();
    state.view='weeklyExam';render();
}

// 단어 문제 생성 (비율 적용 + 단어 중복 차단)
function genWeeklyWordQuestions(vocab,count,ratio){
    if(vocab.length<4)return [];
    const n1=Math.round(count*(ratio.meaning||30)/100);
    const n2=Math.round(count*(ratio.word||30)/100);
    const n3=count-n1-n2;
    const all=[];
    const usedWord=new Set();
    const usedKey=new Set();
    // 뜻 고르기
    for(const v of shuffle(vocab)){
        if(all.filter(x=>x.subtype==='word2kor').length>=n1)break;
        if(usedWord.has(v.word))continue;
        usedWord.add(v.word);usedKey.add('word2kor:'+v.word);
        const others=shuffle(vocab.filter(x=>x.meaning!==v.meaning&&x.word!==v.word)).slice(0,3);
        const opts=shuffle([v.meaning,...others.map(o=>o.meaning)]);
        all.push({subtype:'word2kor',prompt:`"${escU(v.word)}"의 뜻으로 알맞은 것은?`,options:opts,answer:opts.indexOf(v.meaning),explanation:`'${v.word}' = '${v.meaning}'${v.example_en?`<br>예문: ${escU(v.example_en)}`:''}`});
    }
    // 단어 고르기
    for(const v of shuffle(vocab)){
        if(all.filter(x=>x.subtype==='kor2word').length>=n2)break;
        if(usedWord.has(v.word))continue;
        usedWord.add(v.word);usedKey.add('kor2word:'+v.word);
        const others=shuffle(vocab.filter(x=>x.word!==v.word&&x.meaning!==v.meaning)).slice(0,3);
        const opts=shuffle([v.word,...others.map(o=>o.word)]);
        all.push({subtype:'kor2word',prompt:`"${escU(v.meaning)}"에 해당하는 영어 단어는?`,options:opts,answer:opts.indexOf(v.word),explanation:`'${v.meaning}' = '${v.word}'${v.example_en?`<br>예문: ${escU(v.example_en)}`:''}`});
    }
    // 빈칸
    for(const v of shuffle(vocab.filter(v=>v.example_en))){
        if(all.filter(x=>x.subtype==='blank').length>=n3)break;
        if(usedWord.has(v.word))continue;
        const sent=v.example_en.replace(new RegExp('\\b'+v.word+'\\b','i'),'_____');
        if(sent===v.example_en)continue;
        usedWord.add(v.word);usedKey.add('blank:'+v.word);
        const others=shuffle(vocab.filter(x=>x.word!==v.word)).slice(0,3);
        const opts=shuffle([v.word,...others.map(o=>o.word)]);
        all.push({subtype:'blank',prompt:`다음 빈칸에 들어갈 알맞은 단어는?<div class="pres-box" style="margin:10px 0;margin-left:0">${escU(sent)}${v.example_ko?`<div style="font-size:12px;color:var(--text2);margin-top:6px">↳ ${escU(v.example_ko)}</div>`:''}</div>`,options:opts,answer:opts.indexOf(v.word),explanation:`정답: ${v.word} (${v.meaning})`});
    }
    // 단어 수가 부족한 경우만 type 교체로 채우기
    while(all.length<count){
        let filled=false;
        for(const v of shuffle(vocab)){
            for(const t of ['word2kor','kor2word','blank']){
                const k=t+':'+v.word;
                if(usedKey.has(k))continue;
                if(t==='blank'&&!v.example_en)continue;
                if(t==='blank'){
                    const sent=v.example_en.replace(new RegExp('\\b'+v.word+'\\b','i'),'_____');
                    if(sent===v.example_en)continue;
                    usedKey.add(k);
                    const others=shuffle(vocab.filter(x=>x.word!==v.word)).slice(0,3);
                    const opts=shuffle([v.word,...others.map(o=>o.word)]);
                    all.push({subtype:'blank',prompt:`다음 빈칸에 들어갈 알맞은 단어는?<div class="pres-box" style="margin:10px 0;margin-left:0">${escU(sent)}</div>`,options:opts,answer:opts.indexOf(v.word),explanation:`정답: ${v.word} (${v.meaning})`});
                } else if(t==='word2kor'){
                    usedKey.add(k);
                    const others=shuffle(vocab.filter(x=>x.meaning!==v.meaning&&x.word!==v.word)).slice(0,3);
                    const opts=shuffle([v.meaning,...others.map(o=>o.meaning)]);
                    all.push({subtype:'word2kor',prompt:`"${escU(v.word)}"의 뜻으로 알맞은 것은?`,options:opts,answer:opts.indexOf(v.meaning),explanation:`'${v.word}' = '${v.meaning}'`});
                } else {
                    usedKey.add(k);
                    const others=shuffle(vocab.filter(x=>x.word!==v.word&&x.meaning!==v.meaning)).slice(0,3);
                    const opts=shuffle([v.word,...others.map(o=>o.word)]);
                    all.push({subtype:'kor2word',prompt:`"${escU(v.meaning)}"에 해당하는 영어 단어는?`,options:opts,answer:opts.indexOf(v.word),explanation:`'${v.meaning}' = '${v.word}'`});
                }
                filled=true;break;
            }
            if(filled||all.length>=count)break;
        }
        if(!filled)break;
    }
    return shuffle(all);
}

    const phaseNav=`<div style="display:flex;gap:8px;margin-bottom:18px">
        ${[['word','📝 단어',we.wordQs.length],['arrange','🧩 어순배열',we.arrQs.length],['grammar','❌ 어법',we.grQs.length]].map(([k,label,n])=>{

            return `<div style="flex:1;padding:10px;border-radius:8px;background:${we.phase===k?'#FFEDD5':done?'#D1FAE5':'#F3F4F6'};border:1.5px solid ${we.phase===k?'#F97316':'transparent'};text-align:center">

        }).join('')}
    </div>`;
    
    // === Phase 1: 단어 ===
    if(we.phase==='word'){
        const q=we.wordQs[we.wordIdx];
        const isLast=we.wordIdx===we.wordQs.length-1;
        return `${headerBar}${phaseNav}
        <div style="max-width:720px;margin:0 auto">

                    <span style="font-weight:700;margin-right:8px">${['①','②','③','④'][i]}</span>${escU(o)}
                </button>`).join('')}
            </div>
            <div style="display:flex;justify-content:space-between;gap:10px">
                ${we.wordIdx>0?`<button class="btn-ghost" onclick="weeklyExamWordPrev()" style="padding:13px 18px">← 이전</button>`:'<div></div>'}
                <button class="btn-primary" onclick="weeklyExamWordNext()" ${we.wordSel===null?'disabled':''} style="background:#F97316">${isLast?'단어 완료 →':'다음 →'}</button>
            </div>
        </div>`;
    }
    
    // === Phase 2: 어순배열 ===
    if(we.phase==='arrange'){
        const q=we.arrQs[we.arrIdx];
        if(!we.arrInit){
            // 이전 답 복원 시도
            const savedDetail=we.arrDetail[we.arrIdx];
            if(savedDetail&&typeof savedDetail.userAnswer==='string'){
                const tokens=savedDetail.userAnswer.split(' ');
                const pool=q.shuffled.map(c=>({...c,used:false}));
                const placed=[];
                const usedSi=new Set();
                let ok=true;
                for(const tok of tokens){
                    const si=pool.findIndex((it,i)=>!usedSi.has(i)&&it.en===tok);
                    if(si<0){ok=false;break;}
                    usedSi.add(si);pool[si].used=true;
                    placed.push({...pool[si],poolIdx:si});
                }
                if(ok){we.arrPool=pool;we.arrPlaced=placed;}
                else{we.arrPool=q.shuffled.map(c=>({...c,used:false}));we.arrPlaced=[];}
            } else {
                we.arrPool=q.shuffled.map(c=>({...c,used:false}));

                ${we.arrPlaced.length===0?'<div style="color:var(--text3);font-size:13px">아래 청크를 순서대로 클릭하세요</div>':we.arrPlaced.map((p,i)=>`<button class="chunk-chip placed" onclick="weeklyExamArrRemove(${i})">${escU(p.en)}</button>`).join('')}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
                ${we.arrPool.map((p,i)=>p.used?'':`<button class="chunk-chip" onclick="weeklyExamArrPlace(${i})">${escU(p.en)}</button>`).join('')}
            </div>
            <div style="display:flex;justify-content:space-between;gap:10px">
                ${we.arrIdx>0?`<button class="btn-ghost" onclick="weeklyExamArrPrev()" style="padding:13px 18px">← 이전</button>`:'<button class="btn-ghost" onclick="weeklyExamBackToWord()" style="padding:13px 18px">← 단어로</button>'}
                <button class="btn-primary" onclick="weeklyExamArrNext()" ${we.arrPlaced.length!==q.chunks.length?'disabled':''} style="background:#F97316">${isLast?'어순배열 완료 →':'다음 →'}</button>
            </div>
        </div>`;
    }
    
    // === Phase 3: 어법 ===
    if(we.phase==='grammar'){
        const q=we.grQs[we.grIdx];
        const isLast=we.grIdx===we.grQs.length-1;
        return `${headerBar}${phaseNav}
        <div style="max-width:720px;margin:0 auto">
            <div style="font-size:13px;color:var(--text3);font-weight:600;margin-bottom:8px">어법 ${we.grIdx+1} / ${we.grQs.length}</div>
            <div class="progress-bar" style="height:6px;margin-bottom:16px"><div class="progress-fill" style="width:${(we.grIdx+1)/we.grQs.length*100}%;background:#F97316"></div></div>
            <div class="pres-box" style="margin-left:0;margin-bottom:16px"><strong>${q.prompt}</strong>${q.translation?`<div style="font-size:13px;color:var(--text2);margin-top:6px">한국어: ${escU(q.translation)}</div>`:''}</div>
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
                ${q.options.map((o,i)=>`<button class="q-option" onclick="weeklyExamGrSelect(${i})" style="${we.grSel===i?'background:#FFEDD5;border-color:#F97316':''}">
                    <span style="font-weight:700;margin-right:8px">${['①','②','③','④'][i]}</span>${escU(o)}
                </button>`).join('')}
            </div>
            <div style="display:flex;justify-content:space-between;gap:10px">
                ${we.grIdx>0?`<button class="btn-ghost" onclick="weeklyExamGrPrev()" style="padding:13px 18px">← 이전</button>`:'<button class="btn-ghost" onclick="weeklyExamBackToArr()" style="padding:13px 18px">← 어순배열로</button>'}
                <button class="btn-primary" onclick="weeklyExamGrNext()" ${we.grSel===null?'disabled':''} style="background:#F97316">${isLast?'시험 종료 → 결과 보기':'다음 →'}</button>
            </div>
        </div>`;
    }
    
    return '';
}

// 시험 액션
function weeklyExamWordSelect(i){state.weeklyExam.wordSel=i;saveWeeklyExamProgress();render();}
function weeklyExamWordNext(){
    const we=state.weeklyExam;
    const q=we.wordQs[we.wordIdx];
    const isRight=we.wordSel===q.answer;
    we.wordDetail[we.wordIdx]={q,userAnswer:we.wordSel,isRight};
    if(we.wordIdx<we.wordQs.length-1){
        we.wordIdx++;
        const next=we.wordDetail[we.wordIdx];
        we.wordSel=next?next.userAnswer:null;
    } else {
        we.phase='arrange';we.arrInit=false;
    }
    we._resumed=false;
    saveWeeklyExamProgress();render();
}
function weeklyExamWordPrev(){
    const we=state.weeklyExam;
    // 현재 답 저장
    if(we.wordSel!==null){
        const q=we.wordQs[we.wordIdx];
        we.wordDetail[we.wordIdx]={q,userAnswer:we.wordSel,isRight:we.wordSel===q.answer};
    }
    if(we.wordIdx>0){
        we.wordIdx--;
        const prev=we.wordDetail[we.wordIdx];
        we.wordSel=prev?prev.userAnswer:null;
        we._resumed=false;
        saveWeeklyExamProgress();render();
    }
}
function weeklyExamArrPlace(i){const we=state.weeklyExam;we.arrPool[i].used=true;we.arrPlaced.push({...we.arrPool[i],poolIdx:i});we._resumed=false;saveWeeklyExamProgress();render();}
function weeklyExamArrRemove(i){const we=state.weeklyExam;const p=we.arrPlaced[i];if(p.poolIdx!==undefined)we.arrPool[p.poolIdx].used=false;we.arrPlaced.splice(i,1);saveWeeklyExamProgress();render();}
function weeklyExamArrNext(){
    const we=state.weeklyExam;
    const q=we.arrQs[we.arrIdx];
    const userStr=we.arrPlaced.map(p=>p.en).join(' ');
    const isRight=userStr===q.answerStr;
    we.arrDetail[we.arrIdx]={q,userAnswer:userStr,isRight};
    if(we.arrIdx<we.arrQs.length-1){
        we.arrIdx++;we.arrInit=false;
    } else {
        we.phase='grammar';
    }
    we._resumed=false;
    saveWeeklyExamProgress();render();
}
function weeklyExamArrPrev(){
    const we=state.weeklyExam;
    // 현재 답 저장
    if(we.arrPlaced.length>0){
        const q=we.arrQs[we.arrIdx];
        const userStr=we.arrPlaced.map(p=>p.en).join(' ');
        we.arrDetail[we.arrIdx]={q,userAnswer:userStr,isRight:userStr===q.answerStr};
    }
    if(we.arrIdx>0){
        we.arrIdx--;we.arrInit=false;
        we._resumed=false;
        saveWeeklyExamProgress();render();
    }
}
function weeklyExamBackToWord(){
    const we=state.weeklyExam;
    we.phase='word';
    we.wordIdx=we.wordQs.length-1;
    const last=we.wordDetail[we.wordIdx];
    we.wordSel=last?last.userAnswer:null;
    we._resumed=false;
    saveWeeklyExamProgress();render();
}
function weeklyExamBackToArr(){
    const we=state.weeklyExam;
    we.phase='arrange';
    we.arrIdx=we.arrQs.length-1;we.arrInit=false;
    we._resumed=false;
    saveWeeklyExamProgress();render();
}
function weeklyExamGrSelect(i){state.weeklyExam.grSel=i;saveWeeklyExamProgress();render();}
function weeklyExamGrNext(){
    const we=state.weeklyExam;
    const q=we.grQs[we.grIdx];
    const isRight=we.grSel===q.answer;
    we.grDetail[we.grIdx]={q,userAnswer:we.grSel,isRight};
    if(we.grIdx<we.grQs.length-1){
        we.grIdx++;
        const next=we.grDetail[we.grIdx];
        we.grSel=next?next.userAnswer:null;
        we._resumed=false;
        saveWeeklyExamProgress();render();
    } else {
        finalizeWeeklyExam();
    }
}
function weeklyExamGrPrev(){
    const we=state.weeklyExam;
    if(we.grSel!==null){
        const q=we.grQs[we.grIdx];
        we.grDetail[we.grIdx]={q,userAnswer:we.grSel,isRight:we.grSel===q.answer};
    }
    if(we.grIdx>0){
        we.grIdx--;
        const prev=we.grDetail[we.grIdx];
        we.grSel=prev?prev.userAnswer:null;
        we._resumed=false;
        saveWeeklyExamProgress();render();
    }
}
function finalizeWeeklyExam(){
    const we=state.weeklyExam;const wd=state.weeklyData;
    const wkSet=we.wkSet;
    const wordCorrect=we.wordDetail.filter(d=>d.isRight).length;
    const arrCorrect=we.arrDetail.filter(d=>d.isRight).length;
    const grCorrect=we.grDetail.filter(d=>d.isRight).length;
    const wordScore=wordCorrect*wkSet.wordPoints;
    const arrScore=arrCorrect*wkSet.arrangePoints;
    const grScore=grCorrect*wkSet.grammarPoints;
    const totalMax=we.wordQs.length*wkSet.wordPoints+we.arrQs.length*wkSet.arrangePoints+we.grQs.length*wkSet.grammarPoints;
    const score=Math.round((wordScore+arrScore+grScore)/totalMax*100);
    const grade=score>=wkSet.gradeA?'A':score>=wkSet.gradeB?'B':'C';
    
    const uid=getUser().id;
    const key='weekly_'+uid+'_'+wd.bookName+'_'+wd.weekId;
    const prev=LS.g(key)||{};
    const history=Array.isArray(prev.history)?prev.history.slice():[];
    // 이전 응시가 있었다면 history에 누적
    if(prev.examDone&&prev.score!==undefined){
        history.push({
            score:prev.score, grade:prev.grade,
            parts:prev.parts, detail:prev.detail,
            timestamp:prev.examTimestamp||Date.now()
        });
    }
    const rec={
        ...prev,
        examDone:true,
        score, grade,
        parts:{word:{correct:wordCorrect,total:we.wordQs.length,score:wordScore},arrange:{correct:arrCorrect,total:we.arrQs.length,score:arrScore},grammar:{correct:grCorrect,total:we.grQs.length,score:grScore}},
        detail:{word:we.wordDetail,arrange:we.arrDetail,grammar:we.grDetail},
        units:wd.unitKeys,
        timeSpent:Math.floor((Date.now()-we.startTime)/1000),
        examTimestamp:Date.now(),
        attemptCount:(prev.attemptCount||0)+1
    };
    // 현재 응시도 history 마지막에 (재시험 후 결과 보기에서 모두 표시)
    history.push({score,grade,parts:rec.parts,detail:rec.detail,timestamp:rec.examTimestamp});
    rec.history=history;
    LS.s(key,rec);
    console.log('[주간평가 완료]',key,'점수:',score,'등급:',grade,'회차:',rec.attemptCount);
    
    we.phase='done';
    we.finalResult={score,grade,wordCorrect,arrCorrect,grCorrect,wordScore,arrScore,grScore};
    clearWeeklyExamProgress(); // 완료되었으니 이어풀기 데이터 정리
    state.view='weeklyResult';render();
}

function startTest(type,forceNew){
    const uid=getUser().id;
    const inprogKey='inprog_'+uid+'_'+state.unit+'_test_'+type;
    // 진행 중인 시험이 있으면 이어서 진행 (forceNew=true면 무시하고 새로)
    if(!forceNew){
        const ip=LS.g(inprogKey);
        if(ip&&ip.qs&&ip.qs.length>0){
            state.testType=type;state.testQuestions=ip.qs;state.testAnswers=ip.answers||{};
            state.testStepIdx=ip.stepIdx||0;state.testArrangePlaced=ip.placed||[];
            state.testStartTime=ip.startTime||Date.now();state.testResult=null;
            state.testTargetKey=ip.targetKey||(type==='selfcheck'?'selfcheck':type==='arrange'?'sentArrange':'sentGrammar');
            state.view='test';render();return;
        }
    }
    const data=collectUnitData();
    const sets=getSettings();
    let qs=[],setKey='';
    if(type==='selfcheck'){
        setKey='selfcheck';
        // 새 설정 우선: wordSelfCheck.total (관리자 설정값) 적용
        const cnt=sets.wordSelfCheck?.total||sets.selfcheck.count;
        qs=genSelfcheckQuestions(data,cnt);
    }
    else if(type==='arrange'){setKey='sentArrange';qs=genArrangeQuestions(data,sets.sentArrange.count);}
    else if(type==='grammar'){setKey='sentGrammar';qs=genGrammarQuestions(data,sets.sentGrammar.count);}
    if(qs.length===0){alert('출제할 문제가 부족합니다. 선생님께 문의해주세요.');return;}
    state.testType=type;state.testQuestions=qs;state.testAnswers={};state.testStepIdx=0;state.testArrangePlaced=[];state.testStartTime=Date.now();state.testResult=null;
    state.testTargetKey=setKey;
    saveTestProgress();
    state.view='test';render();
}

/* ========== 셀프체크 문제 생성 (#11 — 40/40/20) ========== */
function genSelfcheckQuestions(data,count){
    const vocab=data.allVocab;if(vocab.length<4)return [];
    // 단어 단위 중복 차단 — 한 시험에 같은 단어는 어떤 type으로도 한 번만 출제
    // 단어 수가 부족할 때만 type 조합으로 fallback
    const usedWord=new Set();
    const usedKey=new Set();
    const blockWord=(w)=>usedWord.has(w);
    const useWord=(w,t)=>{usedWord.add(w);usedKey.add(t+':'+w);};
    const n1=Math.round(count*0.4); // 뜻 고르기 (영→한)
    const n2=Math.round(count*0.4); // 단어 고르기 (한→영)
    const n3=count-n1-n2;            // 빈칸 단어 고르기
    const all=[];
    const pool=shuffle(vocab);
    // 뜻 고르기 — 영어 단어 보여주고 한국어 뜻 고르기
    for(const v of pool){
        if(all.filter(x=>x.type==='word2kor').length>=n1)break;
        if(blockWord(v.word))continue;
        useWord(v.word,'word2kor');
        const others=shuffle(vocab.filter(x=>x.meaning!==v.meaning&&x.word!==v.word)).slice(0,3);
        const opts=shuffle([v.meaning,...others.map(o=>o.meaning)]);
        all.push({type:'word2kor',prompt:`"${v.word}"의 뜻으로 알맞은 것은?`,options:opts,answer:opts.indexOf(v.meaning),explanation:`'${v.word}'의 뜻은 '${v.meaning}'입니다.${v.example_en?' 예문: '+v.example_en:''}`});
    }
    // 단어 고르기 — 한국어 뜻 보여주고 영어 단어 고르기
    const pool2=shuffle(vocab);
    for(const v of pool2){
        if(all.filter(x=>x.type==='kor2word').length>=n2)break;
        if(blockWord(v.word))continue;
        useWord(v.word,'kor2word');
        const others=shuffle(vocab.filter(x=>x.word!==v.word&&x.meaning!==v.meaning)).slice(0,3);
        const opts=shuffle([v.word,...others.map(o=>o.word)]);
        all.push({type:'kor2word',prompt:`"${v.meaning}"에 해당하는 영어 단어는?`,options:opts,answer:opts.indexOf(v.word),explanation:`'${v.meaning}'에 해당하는 단어는 '${v.word}'입니다.${v.example_en?' 예문: '+v.example_en:''}`});
    }
    // 빈칸 단어 고르기 — 본문 예문에서 단어를 빈칸 처리
    const pool3=shuffle(vocab.filter(v=>v.example_en));
    let added=0;
    for(const v of pool3){
        if(added>=n3)break;
        if(blockWord(v.word))continue;
        const sent=v.example_en.replace(new RegExp('\\b'+v.word+'\\b','i'),'_____');
        if(sent===v.example_en)continue; // word not in sentence; skip
        useWord(v.word,'blank');
        const others=shuffle(vocab.filter(x=>x.word!==v.word)).slice(0,3);
        const opts=shuffle([v.word,...others.map(o=>o.word)]);
        all.push({type:'blank',prompt:`다음 빈칸에 들어갈 알맞은 단어는?<div class="pres-box" style="margin:12px 0 0;margin-left:0">${sent}${v.example_ko?'<div style="margin-top:6px;font-size:12px;color:var(--text2)">↳ '+v.example_ko+'</div>':''}</div>`,options:opts,answer:opts.indexOf(v.word),explanation:`정답은 '${v.word}'(${v.meaning})입니다.${v.example_ko?' 해석: '+v.example_ko:''}`});
        added++;
    }
    // 부족하면 — 단어 수가 적은 경우만 type을 바꿔서 채우기 (같은 단어가 다른 type으로 나올 수 있음)
    while(all.length<count){
        let filled=false;
        for(const v of shuffle(vocab)){
            const types=['word2kor','kor2word','blank'];
            for(const t of types){
                const k=t+':'+v.word;
                if(usedKey.has(k))continue;
                if(t==='blank'&&!v.example_en)continue;
                if(t==='blank'){
                    const sent=v.example_en.replace(new RegExp('\\b'+v.word+'\\b','i'),'_____');
                    if(sent===v.example_en)continue;
                    usedKey.add(k);
                    const others=shuffle(vocab.filter(x=>x.word!==v.word)).slice(0,3);
                    const opts=shuffle([v.word,...others.map(o=>o.word)]);
                    all.push({type:'blank',prompt:`다음 빈칸에 들어갈 알맞은 단어는?<div class="pres-box" style="margin:12px 0 0;margin-left:0">${sent}${v.example_ko?'<div style="margin-top:6px;font-size:12px;color:var(--text2)">↳ '+v.example_ko+'</div>':''}</div>`,options:opts,answer:opts.indexOf(v.word),explanation:`정답은 '${v.word}'입니다.`});
                } else if(t==='word2kor'){
                    usedKey.add(k);
                    const others=shuffle(vocab.filter(x=>x.meaning!==v.meaning&&x.word!==v.word)).slice(0,3);
                    const opts=shuffle([v.meaning,...others.map(o=>o.meaning)]);
                    all.push({type:'word2kor',prompt:`"${v.word}"의 뜻으로 알맞은 것은?`,options:opts,answer:opts.indexOf(v.meaning),explanation:`'${v.word}'의 뜻은 '${v.meaning}'입니다.`});
                } else if(t==='kor2word'){
                    usedKey.add(k);
                    const others=shuffle(vocab.filter(x=>x.word!==v.word&&x.meaning!==v.meaning)).slice(0,3);
                    const opts=shuffle([v.word,...others.map(o=>o.word)]);
                    all.push({type:'kor2word',prompt:`"${v.meaning}"에 해당하는 영어 단어는?`,options:opts,answer:opts.indexOf(v.word),explanation:`'${v.meaning}'에 해당하는 단어는 '${v.word}'입니다.`});
                }
                filled=true;break;
            }
            if(filled||all.length>=count)break;
        }
        if(!filled)break; // 더 이상 가능한 조합 없음
    }
    return shuffle(all);
}

/* ========== 문장배열 문제 생성 (#12 — 청크 기반) ========== */
function genArrangeQuestions(data,count){
    const settings=getSettings();
    const mode=settings.chunkDifficulty||'normal';
    if(mode==='random'){
        return genRandomFillQuestions(data,count,settings.randomBlankPercent||30);
    }
    // Normal / Easy: 청크 기반
    const sents=(data.allChunkSentences||[]).filter(s=>s.chunks&&s.chunks.length>=2);
    if(sents.length===0)return [];
    const picked=sample(sents,count);
    return picked.map(s=>{
        const chunks=s.chunks;
        const shuffled=shuffle(chunks.map((c,i)=>({en:c.en,ko:c.ko,i})));
        const answerStr=chunks.map(c=>c.en).join(' ');
        return {
            type:'arrange',
            prompt:'다음 해석을 보고 청크를 순서대로 배열하여 영어 문장을 완성하세요.',
            translation:s.ko||'',
            chunks,
            shuffled,
            answerStr,
            explanation:`정답: ${s.en}${s.ko?'\n해석: '+s.ko:''}`
        };
    });
}

/* Random 모드: 청킹 없이 단어 단위 빈칸 채우기 */
function genRandomFillQuestions(data,count,blankPct){
    // 우선 keySentences 사용. 없으면 vocab example fallback
    let pool=(data.allKeySentences||[]).filter(s=>s.en&&s.en.split(/\s+/).length>=4);
    if(pool.length<count){
        // fallback: vocab example 문장도 활용
        const extras=(data.allSentences||[]).filter(s=>s.en&&s.en.split(/\s+/).length>=4);
        extras.forEach(e=>{if(!pool.some(p=>p.en===e.en))pool.push(e);});
    }
    if(pool.length===0)return [];
    const picked=sample(pool,count);
    return picked.map(s=>{
        const words=s.en.split(/\s+/);
        const total=words.length;
        // 빈칸 개수: 비율 적용. 최소 1, 최대는 전체 단어 수
        const numBlanks=Math.max(1,Math.min(total,Math.round(total*blankPct/100)));
        // 빈칸으로 만들 인덱스 무작위 선택
        const indices=shuffle([...Array(total).keys()]).slice(0,numBlanks).sort((a,b)=>a-b);
        // template: 각 단어 자리 → 단어 또는 {blank: idx}
        const template=words.map((w,i)=>indices.includes(i)?{blank:indices.indexOf(i)}:{word:w});
        const blankWords=indices.map(i=>words[i]); // 정답 순서대로 빈칸에 들어갈 단어들
        const shuffled=shuffle(blankWords.map((w,i)=>({w,i})));
        return {
            type:'random-fill',
            prompt:'본문 속 영어 문장의 빈칸에 알맞은 단어를 차례대로 채워넣으세요.',
            translation:s.ko||'',
            template,
            blankWords,
            shuffled,
            answerStr:blankWords.join(' '),
            originalSentence:s.en,
            explanation:`정답 문장: ${s.en}${s.ko?'\n해석: '+s.ko:''}\n빈칸 정답: ${blankWords.join(' / ')}`
        };
    });
}

/* ========== 문장어법 문제 생성 (#12) ========== */
function mutateSentence(s){
    // 무작위 어법 변형 적용
    const mutations=[
        {re:/\bis\b/,to:'are'},{re:/\bare\b/,to:'is'},
        {re:/\bwas\b/,to:'were'},{re:/\bwere\b/,to:'was'},
        {re:/\bhas\b/,to:'have'},{re:/\bhave\b/,to:'has'},
        {re:/\bdoes\b/,to:'do'},{re:/\bdo\b/,to:'does'},
        {re:/\ba\s+([aeiouAEIOU])/,to:'an $1'},{re:/\ban\s+([^aeiouAEIOU])/,to:'a $1'},
        {re:/\bmuch\b/,to:'many'},{re:/\bmany\b/,to:'much'},
        {re:/\bin\b/,to:'on'},{re:/\bon\b/,to:'at'},
        {re:/\bbe\b/,to:'being'},
        {re:/(\w+)ing\b/,to:'$1ed'}
    ];
    const tries=shuffle(mutations);
    for(const m of tries){
        if(m.re.test(s)){const out=s.replace(m.re,m.to);if(out!==s)return {result:out,changed:s.match(m.re)[0]+' → '+(m.to.includes('$')?'':m.to)};}
    }
    return null;
}
function genGrammarQuestions(data,count){
    const sents=data.allSentences.filter(s=>s.en.split(/\s+/).length>=5).map(s=>s.en);
    if(sents.length<4)return [];
    const picked=sample(sents,count);
    const qs=[];
    for(const correct of picked){
        const mut=mutateSentence(correct);
        if(!mut)continue;
        // 3개의 정답(다른 문장) + 1개 변형
        const others=shuffle(sents.filter(x=>x!==correct)).slice(0,3);
        if(others.length<3)continue;
        const opts=shuffle([mut.result,...others]);
        qs.push({type:'grammar',prompt:'다음 중 어법상 <strong>틀린</strong> 문장을 고르세요.',options:opts,answer:opts.indexOf(mut.result),explanation:`'${mut.result}'가 어법상 틀린 문장입니다. 원래 올바른 문장은 '${correct}'이며, 변경된 부분: ${mut.changed}`});
    }
    return qs.slice(0,count);
}
