function confirmExitTest(){
    if(confirm('진행 중인 테스트를 중단하시겠습니까?\n\n현재까지의 답안은 저장되며, 나중에 이어서 풀 수 있습니다.')){
        // 진행 상태는 그대로 유지 (이어풀기용)
        saveTestProgress();
        if(state.testType==='exam'){state.view='unit';state.examPhase=null;state.examScores={};}
        else{state.view='trainHub';}
        render();
    }
}
function testAnswer(i){state.testAnswers[state.testStepIdx]=i;saveTestProgress();render();}
function nextTestStep(){const total=state.testQuestions.length;if(state.testStepIdx<total-1){state.testStepIdx++;state.testArrangePlaced=restoreArrangePlaced(state.testStepIdx);saveTestProgress();render();}else{submitTest();}}
function prevTestStep(){
    if(state.testStepIdx>0){
        state.testStepIdx--;
        // 이전 문제가 어순배열/random-fill이면 placed 복원
        state.testArrangePlaced=restoreArrangePlaced(state.testStepIdx);
        saveTestProgress();render();
    }
}
// 어순배열/random-fill의 저장된 답안을 placed 배열로 복원
function restoreArrangePlaced(stepIdx){
    const q=state.testQuestions[stepIdx];
    if(!q)return [];
    if(q.type!=='arrange'&&q.type!=='random-fill')return [];
    const saved=state.testAnswers[stepIdx];
    if(!saved||typeof saved!=='string')return [];
    // saved는 user가 만든 문자열 (단어 join). shuffled에서 매핑 시도
    const tokens=saved.split(' ');
    const placed=[];const usedSi=new Set();
    for(const tok of tokens){
        // 사용 가능한 shuffled에서 매치 찾기
        const si=q.shuffled.findIndex((it,i)=>!usedSi.has(i)&&(q.type==='random-fill'?it.w===tok:it.en===tok));
        if(si<0){placed.length=0;break;} // 매치 실패 시 포기
        usedSi.add(si);
        const item=q.shuffled[si];
        if(q.type==='random-fill')placed.push({si,w:item.w});
        else placed.push({si,en:item.en,ko:item.ko});
    }
    return placed;
}
function placedArr(si){
    const q=state.testQuestions[state.testStepIdx];
    const item=q.shuffled[si];
    if(q.type==='random-fill'){
        state.testArrangePlaced.push({si,w:item.w});
    } else {
        state.testArrangePlaced.push({si,en:item.en,ko:item.ko});
    }
    saveTestProgress();
    render();
}
function unplacedArr(i){state.testArrangePlaced.splice(i,1);saveTestProgress();render();}
function submitArrangeStep(){
    const q=state.testQuestions[state.testStepIdx];
    const userStr=q.type==='random-fill'
        ? state.testArrangePlaced.map(p=>p.w).join(' ')
        : state.testArrangePlaced.map(p=>p.en).join(' ');
    state.testAnswers[state.testStepIdx]=userStr;
    state.testArrangePlaced=[];
    nextTestStep();
}

/* ========== 테스트 결과 (#9, #12) ========== */
function submitTest(){
    const qs=state.testQuestions;
    let correct=0;
    const detail=qs.map((q,i)=>{
        const ua=state.testAnswers[i];
        let isRight=false;
        if(q.type==='arrange'||q.type==='random-fill'){isRight=ua===q.answerStr;}
        else{isRight=ua===q.answer;}
        if(isRight)correct++;
        return {q,userAnswer:ua,isRight};
    });
    const total=qs.length;const score=Math.round(correct/total*100);
    state.testResult={correct,total,score,detail};
    // 실전평가는 phase별로 별도 처리
    if(state.testType==='exam'){
        const sets=getSettings();
        state.examScores[state.examPhase]={score,correct,total};
        // 각 phase의 문제별 detail도 누적 저장
        if(!state.examPhaseDetails)state.examPhaseDetails={};
        state.examPhaseDetails[state.examPhase]={detail,questions:qs};
        // 현재 phase 완료 → inprog 삭제
        const uid0=getUser().id;
        LS.del('inprog_'+uid0+'_'+state.unit+'_test_exam_'+state.examPhase);
        // 다음 phase로
        if(state.examPhase==='word'){
            state.examPhase='arrange';
            const data=collectUnitData();
            state.testQuestions=genArrangeQuestions(data,sets.examArrange.count);
            state.testAnswers={};state.testStepIdx=0;state.testArrangePlaced=[];state.testStartTime=Date.now();
            if(state.testQuestions.length===0){state.examPhase='grammar';}
            else{saveTestProgress();render();return;}
        }
        if(state.examPhase==='arrange'){
            state.examPhase='grammar';
            const data=collectUnitData();
            state.testQuestions=genGrammarQuestions(data,sets.examGrammar.count);
            state.testAnswers={};state.testStepIdx=0;state.testArrangePlaced=[];state.testStartTime=Date.now();
            if(state.testQuestions.length===0){state.examPhase='done';}
            else{saveTestProgress();render();return;}
        }
        if(state.examPhase==='grammar'){state.examPhase='done';}
        // 평가 완료
        const finalScores=state.examScores;
        const totalQ=Object.values(finalScores).reduce((a,s)=>a+s.total,0);
        const totalC=Object.values(finalScores).reduce((a,s)=>a+s.correct,0);
        const finalScore=totalQ?Math.round(totalC/totalQ*100):0;
        const target=sets.examWord.target||80;
        const passed=finalScore>=target;
        const s=getStudentData();
        const examKey='assess_'+getUser().id+'_'+s.textbooks?.reading+'_'+state.unit;
        safeSet(examKey,{score:finalScore,passed,parts:finalScores,phaseDetails:state.examPhaseDetails,timestamp:Date.now()});
        console.log('[실전평가 저장]','key:',examKey,'score:',finalScore,'isPreview:',isPreview()?'⚠️ 메모리만 (창 닫으면 사라짐)':'✅ 영구 저장');
        // 학습 기록 저장
        {
            const pr=LS.g('progress')||{};const uid=getUser().id;if(!pr[uid])pr[uid]=[];
            pr[uid].push({unit:state.unit,title:'실전평가',timeSpent:Math.floor((Date.now()-state.testStartTime)/1000),correctAnswers:totalC,totalQuestions:totalQ,timestamp:Date.now(),examScores:finalScores});
            LS.s('progress',pr);
        }
        // 전체 시험 완료 → 모든 inprog 데이터 삭제
        clearExamState();
        state.view='testResults';render();return;
    }
    // 일반 훈련 단계 결과 저장
    const setsCfg=getSettings();
    const tk=state.testTargetKey;
    // 단어 셀프체크는 wordSelfCheck.target 우선 사용
    let target=setsCfg[tk]?.target||80;
    if(state.testType==='selfcheck')target=setsCfg.wordSelfCheck?.target||target;
    const passed=score>=target;
    const uid=getUser().id;
    const resultRec={score,target,passed,correct,total,timestamp:Date.now()};
    // 단어 셀프체크는 detail까지 저장 (오답확인용)
    if(state.testType==='selfcheck'){
        resultRec.detail=state.testResult?.detail;
    }
    safeSet('trtype_'+uid+'_'+state.unit+'_'+state.testType,resultRec);
    // 새 키 매핑 (호환성) — 단어 셀프체크는 wordSelf 키로도 저장
    if(state.testType==='selfcheck'){
        safeSet('trtype_'+uid+'_'+state.unit+'_wordSelf',resultRec);
    }
    // 학습 기록 저장
    {
        const pr=LS.g('progress')||{};if(!pr[uid])pr[uid]=[];
        const tName={selfcheck:'단어 셀프체크',arrange:'문장배열',grammar:'문장어법'}[state.testType];
        pr[uid].push({unit:state.unit,title:tName,timeSpent:Math.floor((Date.now()-state.testStartTime)/1000),correctAnswers:correct,totalQuestions:total,timestamp:Date.now(),testDetail:state.testResult?.detail});
        LS.s('progress',pr);
    }
    // 완료했으니 진행 상태 삭제
    clearTestProgress(state.testType);
    state.view='testResults';render();
}

                    <div style="font-size:18px;color:var(--text2);line-height:1.6">${escU(bottom||'')}</div>
                </div>
            `:`<div style="padding:24px 0;text-align:center;color:var(--text3);font-size:13px;border-top:1px dashed var(--border);margin-top:12px">⌨️ <strong>스페이스 키</strong> 또는 아래 버튼을 눌러 ${isEng?'해석':'영어'} 보기</div>`}
            <div style="display:flex;gap:8px;margin-top:24px">
                <button class="btn-ghost" onclick="sentTrainPrev()" ${idx===0?'disabled':''} style="flex:1">← 이전</button>
                <button class="btn-primary" onclick="sentTrainToggle()" style="flex:2">${state.sentTrainShow?'숨기기':(isEng?'한국어 보기':'영어 보기')} (Space)</button>
                <button class="btn-primary" onclick="sentTrainNext()" style="flex:1">${idx===list.length-1?'완료 ✓':'다음 →'}</button>
            </div>
        </div>
        <p style="text-align:center;font-size:11px;color:var(--text3);margin-top:12px">⌨️ Space: 보이기/숨기기 · ← →: 이전/다음</p>`;
    }
    
    // ─── 3단계: 어순배열 + 틀린 위치 차단 ───
    if(step===3){
        const chunks=item.chunks||[];
        const placed=state.sentTrainPlaced||[];
        const wrongCi=state.sentTrainWrongChunk;
        // 청크를 셔플된 순서로 표시 (게임이 처음 시작될 때 한 번만 셔플)
        if(!item._shuffleOrder){
            const order=chunks.map((_,i)=>i);
            for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
            item._shuffleOrder=order;
        }
        const displayOrder=item._shuffleOrder;
        return `${header}${progress}
        <div class="card" style="max-width:760px;margin:0 auto;padding:24px">
            <p style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">한국어 해석</p>
            <div style="padding:14px;background:var(--bg);border-radius:8px;margin-bottom:18px;font-size:15px;font-weight:600;color:var(--text)">${escU(item.ko||'')}</div>
            <p style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">청크를 순서대로 클릭하세요</p>
            <div style="min-height:60px;padding:14px;background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:10px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
                ${placed.length===0?'<span style="color:var(--text3);font-size:13px">↓ 청크를 아래에서 클릭</span>':placed.map(ci=>`<span class="chunk-chip placed" style="background:var(--green);color:#fff">${escU(chunks[ci].en)}</span>`).join('')}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px">
                ${displayOrder.map(ci=>{
                    const used=placed.includes(ci);
                    const isWrong=wrongCi===ci;
                    return `<span class="chunk-chip ${used?'used':''} ${isWrong?'wrong-chip':''}" onclick="${used?'':`sentTrainPlaceChunk(${ci})`}">${escU(chunks[ci].en)}</span>`;
                }).join('')}
            </div>
            <p style="font-size:11px;color:var(--text3);text-align:center">⚠️ 정답 청크만 배치됩니다. 오답 클릭 시 흔들립니다.</p>
        </div>`;
    }
    
    // ─── 4단계: 틀린문장 고르기 + 즉시 해설 ───
    if(step===4){
        const q=item;
        const opts=q.opts;
        const myAns=state.sentTrainAnswers[idx];
        const showReason=state.sentTrainShowReason;
        return `${header}${progress}
        <div class="card" style="max-width:760px;margin:0 auto;padding:24px">
            <p style="font-size:14px;font-weight:700;margin-bottom:14px">다음 중 어법상 <span style="color:var(--red)">틀린</span> 문장은?</p>
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
                ${opts.map((opt,oi)=>{
                    let cls='q-option';
                    if(showReason){
                        if(oi===q.answerIdx)cls+=' selected'; // 정답 강조
                        if(myAns&&myAns.picked===oi&&!myAns.isCorrect)cls+=' wrong-option';
                    } else if(myAns&&myAns.picked===oi){
                        cls+=' selected';
                    }
                    return `<div class="${cls}" onclick="${showReason?'':`sentTrainSelectOpt(${oi})`}" style="cursor:${showReason?'default':'pointer'}">
                        <strong style="margin-right:10px;color:var(--text3)">${['①','②','③','④','⑤','⑥'][oi]}</strong>
                        <span>${escU(opt.text)}</span>
                        ${showReason&&oi===q.answerIdx?'<span style="margin-left:auto;color:var(--green-dark);font-weight:800;font-size:13px">✓ 틀린문장</span>':''}
                        ${showReason&&myAns&&myAns.picked===oi&&!myAns.isCorrect?'<span style="margin-left:auto;color:var(--red);font-weight:800;font-size:13px">✗ 오답</span>':''}
                    </div>`;
                }).join('')}
            </div>
            ${showReason?`
                <div style="padding:14px 16px;background:#FEF3C7;border-left:4px solid #F59E0B;border-radius:8px;margin:14px 0">
                    <div style="font-size:11px;color:#92400E;font-weight:800;text-transform:uppercase;margin-bottom:6px">📖 해설</div>
                    <div style="font-size:13px;color:#78350F;line-height:1.6">${escU(q.opts[q.answerIdx].reason||'어법 오류')}</div>
                    <div style="font-size:11px;color:#92400E;font-weight:700;margin-top:10px">✓ 올바른 문장: <span style="font-style:italic">${escU(q.opts[q.answerIdx].originalEn||'')}</span></div>
                </div>
                <button class="btn-primary" onclick="sentTrainNext4()" style="width:100%;justify-content:center;padding:14px;font-size:15px;${idx===list.length-1?'background:var(--green-dark);box-shadow:0 4px 12px rgba(16,185,129,.35)':''}">${idx===list.length-1?'🎉 4단계 완료 → 훈련모드로 돌아가기':'다음 문제 →'}</button>
            `:`<p style="font-size:11px;color:var(--text3);text-align:center;margin-top:10px">문장을 클릭하면 즉시 해설이 표시됩니다.</p>`}
        </div>`;
    }
    return '';
}

/* ========== 4단계 문장 셀프체크 View ========== */
function viewSentSelf(){
    if(!state.sentSelfList){return '<div class="card"><div class="empty">시험을 시작할 수 없습니다.</div></div>';}
    const phase=state.sentSelfPhase;
    const list=_phaseList();
    if(list.length===0){
        // 빈 phase면 다음으로
        const next=_nextPhaseAfter(phase);
        if(next){state.sentSelfPhase=next;state.sentSelfPhaseIdx=0;saveSentSelfProgress();return viewSentSelf();}
        return '<div class="card"><div class="empty">문제가 없습니다.</div></div>';
    }
    const idx=state.sentSelfPhaseIdx||0;
    const item=list[idx];
    if(!item)return '<div class="card"><div class="empty">문제를 찾을 수 없습니다.</div></div>';
    const phaseLabel={1:'영어 → 해석',2:'해석 → 영어',3:'어순배열',4:'어법 틀린문장'}[phase];
    const prog=_sentSelfProgress();
    const backBtn=`<button class="btn-ghost" onclick="confirmExitSentSelf()">⏸ 잠시 나가기 (이어풀기 가능)</button>`;
    const isLastPhase=_nextPhaseAfter(phase)===null;
    const isLastQInPhase=idx===list.length-1;
    const isFinalQ=isLastPhase&&isLastQInPhase;
    
    // 헤더 + 진행률
    const header=`<div class="flex flex-between mb-24">
        <div><h2 style="margin-bottom:4px">📋 문장 셀프체크</h2><div style="font-size:13px;color:var(--green-dark);font-weight:600">Phase ${phase}/4 · ${phaseLabel}</div></div>
        ${backBtn}
    </div>`;
    const progress=`<div class="progress-bar"><div class="progress-fill" style="width:${prog.done/prog.total*100}%"></div></div>
        <div class="flex flex-between" style="margin-bottom:20px;font-size:13px;color:var(--text3)">
            <span>전체 ${prog.done+1} / ${prog.total}</span>
            <span>현재 phase: ${idx+1} / ${list.length}</span>
        </div>`;
    
    // ─── Phase 1, 2: 객관식 ───
    if(phase===1||phase===2){
        const ans=state.sentSelfAnswers['phase'+phase][idx];
        const promptLabel=phase===1?'English':'Korean';
        return `${header}${progress}
        <div class="card" style="max-width:680px;margin:0 auto;padding:24px">
            <p style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${promptLabel}</p>
            <div style="padding:14px 18px;background:var(--bg);border-radius:10px;margin-bottom:18px;font-size:16px;font-weight:600;color:var(--text);line-height:1.6">${escU(item.prompt)}</div>
            <p style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${phase===1?'올바른 한국어 해석을 고르세요':'올바른 영어 문장을 고르세요'}</p>
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:18px">
                ${item.options.map((o,oi)=>`<div class="q-option ${ans===oi?'selected':''}" onclick="sentSelfPickOpt(${oi})">
                    <strong style="margin-right:10px;color:var(--text3)">${['①','②','③','④'][oi]}</strong>
                    <span>${escU(o)}</span>
                </div>`).join('')}
            </div>
            <div style="display:flex;gap:8px">
                <button class="btn-ghost" onclick="sentSelfPrev()" style="flex:1">← 이전</button>
                <button class="btn-primary" onclick="sentSelfNext()" ${ans===undefined?'disabled':''} style="flex:2;${isFinalQ?'background:var(--green-dark);box-shadow:0 4px 12px rgba(16,185,129,.35)':''}">${isFinalQ?'🎯 최종 제출':isLastQInPhase?`다음 Phase →`:'다음 →'}</button>
            </div>
        </div>`;
    }
    
    // ─── Phase 3: 어순배열 (틀려도 진행) ───
    if(phase===3){
        const chunks=item.chunks||[];
        const placed=state.sentSelfPlaced||[];
        return `${header}${progress}
        <div class="card" style="max-width:760px;margin:0 auto;padding:24px">
            <p style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">한국어 해석</p>
            <div style="padding:14px;background:var(--bg);border-radius:8px;margin-bottom:18px;font-size:15px;font-weight:600;color:var(--text)">${escU(item.ko||'')}</div>
            <p style="font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">청크를 순서대로 클릭 (틀려도 채점은 끝에 한꺼번에)</p>
            <div style="min-height:60px;padding:14px;background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:10px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
                ${placed.length===0?'<span style="color:var(--text3);font-size:13px">↓ 청크를 아래에서 클릭 (배치된 청크 클릭 시 제거)</span>':placed.map((ci,pi)=>`<span class="chunk-chip placed" style="background:var(--green);color:#fff" onclick="sentSelfUnplace(${pi})">${escU(chunks[ci].en)} ✕</span>`).join('')}
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px">
                ${item.shuffleOrder.map(ci=>{
                    const used=placed.includes(ci);
                    return `<span class="chunk-chip ${used?'used':''}" onclick="${used?'':`sentSelfPlace(${ci})`}">${escU(chunks[ci].en)}</span>`;
                }).join('')}
            </div>
            <div style="display:flex;gap:8px">
                <button class="btn-ghost" onclick="sentSelfPrev()" style="flex:1">← 이전</button>
                <button class="btn-primary" onclick="sentSelfSubmitArrange()" ${placed.length===0?'disabled':''} style="flex:2;${isFinalQ?'background:var(--green-dark);box-shadow:0 4px 12px rgba(16,185,129,.35)':''}">${isFinalQ?'🎯 최종 제출':isLastQInPhase?'다음 Phase →':'다음 문장 →'}</button>
            </div>
        </div>`;
    }
    
    // ─── Phase 4: 틀린문장 (즉시해설 없음) ───
    if(phase===4){
        const q=item;
        const opts=q.opts;
        const myAns=state.sentSelfAnswers['phase4'][idx];
        return `${header}${progress}
        <div class="card" style="max-width:760px;margin:0 auto;padding:24px">
            <p style="font-size:14px;font-weight:700;margin-bottom:14px">다음 중 어법상 <span style="color:var(--red)">틀린</span> 문장은?</p>
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
                ${opts.map((opt,oi)=>`<div class="q-option ${myAns===oi?'selected':''}" onclick="sentSelfPickWrong(${oi})">
                    <strong style="margin-right:10px;color:var(--text3)">${['①','②','③','④','⑤','⑥'][oi]}</strong>
                    <span>${escU(opt.text)}</span>
                </div>`).join('')}
            </div>
            <div style="display:flex;gap:8px">
                <button class="btn-ghost" onclick="sentSelfPrev()" style="flex:1">← 이전</button>
                <button class="btn-primary" onclick="sentSelfNext()" ${myAns===undefined?'disabled':''} style="flex:2;${isFinalQ?'background:var(--green-dark);box-shadow:0 4px 12px rgba(16,185,129,.35)':''}">${isFinalQ?'🎯 최종 제출':isLastQInPhase?'다음 Phase →':'다음 문제 →'}</button>
            </div>
        </div>`;
    }
    return '';
}

function viewSentSelfResult(){
    const r=state.sentSelfResult;
    if(!r)return '<div class="card"><div class="empty">결과가 없습니다</div></div>';
    const phaseLabels={1:'영어 → 해석',2:'해석 → 영어',3:'어순배열',4:'어법 틀린문장'};
    const phaseScore=(num,res)=>{
        if(res.total===0)return `<div style="padding:12px;background:var(--bg);border-radius:8px;text-align:center;opacity:.5"><div style="font-size:11px;color:var(--text3);font-weight:700">Phase ${num}</div><div style="font-size:11px;color:var(--text3);margin-top:4px">출제 없음</div></div>`;
        const wrongCount=res.total-res.correct;
        return `<div style="padding:12px;background:${res.score>=80?'var(--green-light)':res.score>=60?'#FEF3C7':'#FEE2E2'};border-radius:8px;text-align:center;cursor:pointer;transition:all .12s" onclick="openSentSelfReview(${num})" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
            <div style="font-size:11px;color:${res.score>=80?'var(--green-dark)':res.score>=60?'#92400E':'#991B1B'};font-weight:700;text-transform:uppercase">Phase ${num}</div>
            <div style="font-size:11.5px;color:var(--text2);margin-top:2px">${phaseLabels[num]}</div>
            <div style="font-size:22px;font-weight:800;color:${res.score>=80?'var(--green-dark)':res.score>=60?'#92400E':'#991B1B'};margin-top:6px">${res.score}<span style="font-size:13px">점</span></div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">${res.correct}/${res.total} 정답</div>
            ${wrongCount>0?`<div style="font-size:10px;color:var(--red);margin-top:4px;font-weight:600">📋 오답 ${wrongCount}개 보기 →</div>`:'<div style="font-size:10px;color:var(--green-dark);margin-top:4px;font-weight:600">✓ 전체 정답</div>'}
        </div>`;
    };
    return `<div style="max-width:760px;margin:30px auto">
        <div class="card" style="text-align:center;padding:36px 24px">
            <div class="score-circle" style="background:${r.passed?'var(--green-light)':'var(--red-light)'};color:${r.passed?'var(--green-dark)':'var(--red)'}">${r.score}<span class="lbl">점</span></div>
            <h2>${r.passed?'🎉 통과!':'😢 다시 도전'}</h2>
            <p class="page-desc" style="margin-top:4px">문장 셀프체크 (4가지 유형 통합)<br>${r.totalCorrect}/${r.totalQ} 정답 · 목표 ${r.target}점 ${r.passed?'✓ 통과':'✗ 미달'}</p>
            <div class="grid grid-4 mb-16" style="margin-top:20px;gap:10px">
                ${phaseScore(1,r.r1)}
                ${phaseScore(2,r.r2)}
                ${phaseScore(3,r.r3)}
                ${phaseScore(4,r.r4)}
            </div>
            <p style="font-size:11.5px;color:var(--text3);margin-bottom:14px">💡 각 Phase 카드를 클릭하면 오답과 해설을 확인할 수 있습니다.</p>
            <div class="flex flex-gap" style="justify-content:center;flex-wrap:wrap">
                ${!r.passed?`<button class="btn-primary" onclick="sentSelfRetry()">↻ 다시 시험 보기</button>`:''}
                <button class="${r.passed?'btn-primary':'btn-ghost'}" onclick="sentSelfBackHub()">${r.passed?'✓ 훈련모드로':'← 훈련모드로 (재시도 가능)'}</button>
            </div>
            ${!r.passed?`<p style="font-size:12px;color:var(--red);margin-top:14px">⚠️ 목표 ${r.target}점에 미달했습니다.</p>`:''}
        </div>
    </div>`;
}

function viewSentSelfReview(){
    const r=state.sentSelfResult;
    if(!r)return '<div class="card"><div class="empty">결과가 없습니다</div></div>';
    const phase=state.sentSelfReviewPhase;
    const phaseLabels={1:'영어 → 해석',2:'해석 → 영어',3:'어순배열',4:'어법 틀린문장'};
    const res={1:r.r1,2:r.r2,3:r.r3,4:r.r4}[phase];
    if(!res)return '<div class="card"><div class="empty">데이터가 없습니다</div></div>';
    
    const header=`<div class="flex flex-between mb-24">
        <h2>📋 오답 & 해설 — Phase ${phase} (${phaseLabels[phase]})</h2>
        <button class="btn-ghost" onclick="closeSentSelfReview()">← 결과로</button>
    </div>`;
    
    // Phase별 상세 렌더링
    const items=res.detail.map((d,i)=>{
        const num=`<div style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:${d.isRight?'var(--green)':'var(--red)'};color:#fff;font-weight:800;font-size:13px;margin-right:10px">${d.isRight?'✓':'✗'}</div>`;
        if(phase===1||phase===2){
            const q=d.q;
            return `<div class="card" style="margin-bottom:12px;padding:18px">
                <div style="display:flex;align-items:center;margin-bottom:10px">${num}<strong style="font-size:14px">문제 ${i+1}</strong>${d.isRight?'<span style="margin-left:auto;color:var(--green-dark);font-weight:700;font-size:13px">정답</span>':'<span style="margin-left:auto;color:var(--red);font-weight:700;font-size:13px">오답</span>'}</div>
                <div style="padding:10px;background:var(--bg);border-radius:6px;font-size:14px;margin-bottom:10px"><strong>${phase===1?'영어':'한국어'}:</strong> ${escU(q.prompt)}</div>
                <div style="font-size:13px;margin-bottom:6px">${q.options.map((o,oi)=>{
                    let style='padding:8px 12px;border-radius:6px;margin-bottom:4px;';
                    if(oi===q.answer){style+='background:var(--green-light);color:var(--green-dark);font-weight:700';}
                    else if(d.userAns===oi){style+='background:#FEE2E2;color:#991B1B;text-decoration:line-through';}
                    else{style+='background:#fff;color:var(--text2)';}
                    return `<div style="${style}">${['①','②','③','④'][oi]} ${escU(o)}${oi===q.answer?' ✓ 정답':''}${d.userAns===oi&&oi!==q.answer?' ✗ 선택':''}</div>`;
                }).join('')}</div>
            </div>`;
        } else if(phase===3){
            const q=d.q;
            const chunks=q.chunks;
            const userOrder=d.userOrder||[];
            return `<div class="card" style="margin-bottom:12px;padding:18px">
                <div style="display:flex;align-items:center;margin-bottom:10px">${num}<strong style="font-size:14px">문제 ${i+1}</strong>${d.isRight?'<span style="margin-left:auto;color:var(--green-dark);font-weight:700;font-size:13px">정답</span>':'<span style="margin-left:auto;color:var(--red);font-weight:700;font-size:13px">오답</span>'}</div>
                <div style="padding:10px;background:var(--bg);border-radius:6px;font-size:14px;margin-bottom:10px"><strong>해석:</strong> ${escU(q.ko||'')}</div>
                <div style="margin-bottom:8px"><strong style="font-size:11px;color:var(--text3);text-transform:uppercase">정답 영어 문장</strong><div style="padding:8px;background:var(--green-light);border-radius:6px;margin-top:4px;font-size:13px;color:var(--green-dark)">${chunks.map(c=>escU(c.en)).join(' ')}</div></div>

/* ========== 실전평가 시작 (#13) ========== */
function startExam(){
    const data=collectUnitData();
    const sets=getSettings();
    const uid=getUser().id;
    const examKey='inprog_'+uid+'_'+state.unit+'_examState';
    // 진행 중인 실전평가가 있으면 이어서
    const savedExam=LS.g(examKey);
    if(savedExam&&savedExam.phase&&savedExam.phase!=='done'){
        if(confirm('진행 중이던 실전평가가 있습니다. 이어서 진행하시겠습니까?\n\n[취소] 누르면 처음부터 다시 시작합니다.')){
            state.testType='exam';
            state.examPhase=savedExam.phase;
            state.examScores=savedExam.scores||{};
            state.testTargetKey=savedExam.phase==='word'?'examWord':savedExam.phase==='arrange'?'examArrange':'examGrammar';
            // 현재 phase 답안 복원 (있다면)
            const phaseKey='inprog_'+uid+'_'+state.unit+'_test_exam_'+state.examPhase;
            const phaseProgress=LS.g(phaseKey);
            if(phaseProgress&&phaseProgress.qs){
                state.testQuestions=phaseProgress.qs;
                state.testAnswers=phaseProgress.answers||{};
                state.testStepIdx=phaseProgress.stepIdx||0;
                state.testArrangePlaced=phaseProgress.placed||[];
                state.testStartTime=phaseProgress.startTime||Date.now();
            } else {
                // 답안이 없으면 해당 phase 문제 새로 생성
                if(state.examPhase==='word')state.testQuestions=genSelfcheckQuestions(data,sets.examWord.count);
                else if(state.examPhase==='arrange')state.testQuestions=genArrangeQuestions(data,sets.examArrange.count);
                else state.testQuestions=genGrammarQuestions(data,sets.examGrammar.count);
                state.testAnswers={};state.testStepIdx=0;state.testArrangePlaced=[];state.testStartTime=Date.now();
            }
            state.testResult=null;
            saveTestProgress();
            state.view='test';render();return;
        }
        // 취소 시 진행 데이터 삭제 후 처음부터
        LS.del(examKey);
        ['word','arrange','grammar'].forEach(p=>LS.del('inprog_'+uid+'_'+state.unit+'_test_exam_'+p));
    }
    state.testType='exam';state.testTargetKey='examWord';
    state.examPhase='word';state.examScores={};
    state.testQuestions=genSelfcheckQuestions(data,sets.examWord.count);
    if(state.testQuestions.length===0){alert('실전평가 단어 문제를 생성할 수 없습니다');return;}
    state.testAnswers={};state.testStepIdx=0;state.testArrangePlaced=[];state.testStartTime=Date.now();state.testResult=null;
    saveExamState();
    saveTestProgress();
    state.view='test';render();
}

// 학습일 단어 훈련 완료 (데이체크+셀프체크+이전실전평가 0점 통과)
// 체인: 이전 모든 학습일의 실전평가 + 이전 주간평가 실전도 통과 처리
function adminCompleteVocabTrain(deckId,dayStart,homeworkPerDay,_noRender){
    if(!isPreview())return;
    const pid=getPreviewId();
    const sd=getStudentData()||{};
    const globalStartDay=Math.max(1,parseInt(sd.startVocabDay)||1);
    const adminRec={score:0,bestScore:0,passed:true,attempts:1,lastAttempt:new Date().toISOString(),adminCompleted:true,history:[{score:0,passed:true,date:Date.now(),admin:true}]};
    
    const vIdx=LS.g('vocab_index')||{};
    const deck=vIdx[deckId];
    
    // 1) 데이체크 통과
    const dcKey='rl_vc_daycheck';
    const dcAll=JSON.parse(RL_STORE.get(dcKey)||'{}');
    if(deck&&deck.days){
        const maxDay=Math.min(dayStart+homeworkPerDay-1,deck.days.length);
        for(let d=globalStartDay;d<=maxDay;d++){
            const dayObj=deck.days[d-1];
            if(!dayObj)continue;
            const dk=deckId+'/'+dayObj.id;
            if(!dcAll[dk]||!dcAll[dk].passed) dcAll[dk]={...adminRec};
        }
    }
    RL_STORE.set(dcKey,JSON.stringify(dcAll));
    
    // 2) 이전 + 현재 셀프체크 통과
    const scKey='rl_vc_selfcheck';
    const scAll=JSON.parse(RL_STORE.get(scKey)||'{}');
    for(let ps=globalStartDay;ps<=dayStart;ps+=homeworkPerDay){
        const scK=deckId+'/'+ps+'_'+homeworkPerDay;
        if(!scAll[scK]||!scAll[scK].passed) scAll[scK]={...adminRec,deckId:deckId,startDay:ps,homework:homeworkPerDay};
    }
    RL_STORE.set(scKey,JSON.stringify(scAll));
    
    // 3) 이전 학습일들의 실전평가 통과 (현재 제외 — 훈련만 완료이므로)
    const reKey='rl_vc_realexam';
    const reAll=JSON.parse(RL_STORE.get(reKey)||'{}');
    for(let ps=globalStartDay;ps<dayStart;ps+=homeworkPerDay){
        const reK=deckId+'/'+ps+'_'+homeworkPerDay;
        if(!reAll[reK]) reAll[reK]={...adminRec,deckId:deckId,startDay:ps,homework:homeworkPerDay};
    }
    RL_STORE.set(reKey,JSON.stringify(reAll));
    
    // 4) 이전 주간평가 실전 통과
    _adminCompleteAllPrevWeekly(deckId,dayStart,homeworkPerDay,globalStartDay);
    
    if(!_noRender) render();
}

// 이전 주간평가(훈련+실전) 모두 통과 처리 (헬퍼)
function _adminCompleteAllPrevWeekly(deckId,beforeDayStart,homeworkPerDay,globalStartDay){
    const pid=getPreviewId();
    const adminRec={score:0,bestScore:0,passed:true,attempts:1,lastAttempt:new Date().toISOString(),adminCompleted:true,history:[{score:0,passed:true,date:Date.now(),admin:true}]};
    // 간단한 방식: 이전 주의 범위를 추정해서 주간평가 통과 처리
    // 한 주에 학습일 수 = (수업 요일 수 - 1)
    const sd=getStudentData()||{};
    const daysPerWeek=((sd.days||[]).length-1)||2; // 학습일 수 (평가일 제외)
    const daysPerWeekTotal=daysPerWeek*homeworkPerDay; // 한 주에 DAY 수
    
    const wTrainKey='rl_vc_weeklyexam_train';
    const wExamKey='rl_vc_weeklyexam_exam';
    const wTrainAll=JSON.parse(RL_STORE.get(wTrainKey)||'{}');
    const wExamAll=JSON.parse(RL_STORE.get(wExamKey)||'{}');
    
    for(let weekStart=globalStartDay;weekStart<beforeDayStart;weekStart+=daysPerWeekTotal){
        const weekEnd=Math.min(weekStart+daysPerWeekTotal-1,beforeDayStart-1);
        if(weekEnd<weekStart)continue;
        const wk=deckId+'/'+weekStart+'_'+weekEnd;
        if(!wTrainAll[wk]) wTrainAll[wk]={...adminRec,lastScore:0,lastPassed:true,lastDate:Date.now()};
        if(!wExamAll[wk]) wExamAll[wk]={...adminRec,lastScore:0,lastPassed:true,lastDate:Date.now()};
    }
    RL_STORE.set(wTrainKey,JSON.stringify(wTrainAll));
    RL_STORE.set(wExamKey,JSON.stringify(wExamAll));
}

function _grammarKeyPrefix(){
    const u=getUser();if(!u)return '';
    // inner-prefix 결정: 학생의 grammarLevel에 따라 (getGrammarRecords와 동일 매핑)
    // 이게 빠지면 어드민 "완료" 버튼이 옛 키 형식으로 저장 → getGrammarRecords가 못 읽음
    const level=getStudentGrammarLevel();
    let innerPrefix='';
    if(level==='namog2')innerPrefix='NAMOG2_';
    else if(level==='namog1')innerPrefix='NAMOG1_';
    else if(level===3)innerPrefix='L3_';
    else if(level===2)innerPrefix='L2_';
    else if(level===1)innerPrefix='L1_';
    return 'rl_gr_'+u.id+'_'+innerPrefix;
}

function submitQuiz(){
    const art=state.currentArticle;
    if((art.questions||[]).length===0){state.view='unit';render();return;}
    if(Object.keys(state.answers).length<art.questions.length)return alert('모든 문제에 답하세요');
    const ts=Math.floor((Date.now()-state.startTime)/1000);
    let c=0;const wrong=[];art.questions.forEach((q,i)=>{if(state.answers[i]===q.answer)c++;else wrong.push(i+1);});
    const uid=getUser().id;
    if(state.articleIdx!==null&&state.articleIdx!==undefined&&art.title!=='실전평가'){
        const s=getStudentData();markDone(s.textbooks?.reading,state.unit,state.articleIdx);
    }
    {
        const pr=LS.g('progress')||{};if(!pr[uid])pr[uid]=[];
        // 결과확인을 위해 answers와 questions 스냅샷 함께 저장
        pr[uid].push({unit:state.unit,title:art.title,articleIdx:state.articleIdx,timeSpent:ts,correctAnswers:c,totalQuestions:art.questions.length,wrongQuestions:wrong,timestamp:Date.now(),answers:state.answers,questions:art.questions});
        LS.s('progress',pr);
    }
    // 완료했으니 진행상태 삭제
    if(state.articleIdx!==null&&state.articleIdx!==undefined){
        LS.del('inprog_'+uid+'_'+state.unit+'_art_'+state.articleIdx);
    }
    state.view='results';render();
}

window.addEventListener('keydown',(e)=>{
    if(e.target&&['INPUT','TEXTAREA'].includes(e.target.tagName))return;
    // 문장훈련 1·2단계 (스페이스 토글, 화살표 이전/다음)
    if(state.view==='sentTrain'&&(state.sentTrainStep===1||state.sentTrainStep===2)){
        if(e.key===' '||e.key==='Spacebar'){e.preventDefault();sentTrainToggle();}
        else if(e.key==='ArrowRight'){e.preventDefault();sentTrainNext();}
        else if(e.key==='ArrowLeft'){e.preventDefault();sentTrainPrev();}
        return;
    }
    // 🟠 주간평가 훈련 — 단어 플래시 (Space 토글, 화살표 이전/다음)
    if(state.view==='weeklyTrain'&&state.weeklyTrain&&state.weeklyTrain.phase==='word'){
        if(e.key===' '||e.key==='Spacebar'){e.preventDefault();weeklyTrainWordToggle();}
        else if(e.key==='ArrowRight'){e.preventDefault();weeklyTrainWordNext();}
        else if(e.key==='ArrowLeft'){e.preventDefault();weeklyTrainWordPrev();}
        return;
    }
    if(state.view!=='vocabLearn'||state.vocabLearnMode!=='flash')return;
    const data=collectUnitData();const words=data.allVocab;
    let pool=words;if(state.flashReviewMode)pool=words.filter((w,i)=>state.flashUnknown.has(i));
    if(state.vocabLearnIdx>=pool.length)return;
    const w=pool[state.vocabLearnIdx];const origIdx=words.indexOf(w);
    if(e.key==='ArrowRight'){e.preventDefault();nextCardClassCard();}
    else if(e.key==='ArrowLeft'&&state.vocabLearnIdx>0){e.preventDefault();prevCard();}
    else if(e.key===' '||e.key==='Spacebar'){e.preventDefault();flipCard();}
    else if(e.key==='1'){e.preventDefault();markFlashUnknown(origIdx);}
    else if(e.key==='2'){e.preventDefault();markFlashKnown(origIdx);}
});

// 기출문제 탭 — 외부 quiz 사이트(terrysquiz)를 iframe으로 임베드
// 같은 origin이라서 iframe 안 fetch()를 가로채서 점수 캡처 가능
// ============================================================
const QUIZ_BASE_URL = 'https://terryssam1013-ship-it.github.io/terrysquiz/';
const QUIZ_FIREBASE_HOST = 'terrys-d643a-default-rtdb.firebaseio.com';

// 학생별 점수 이력 키
function gichulHistoryKey(){
    const u = getUser();
    return 'rl_gichul_history_' + (u?.id || 'anon');
}

// 점수 이력 읽기
function getGichulHistory(){
    try{
        const raw = RL_STORE.get(gichulHistoryKey());
        return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
}

// HTML 이스케이프 헬퍼
function gichulEscape(s){
    if(s===null||s===undefined) return '';
    return String(s).replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; });
}

// 메시지 → 풍부 데이터 객체 빌드 (학생 로컬 저장 + Firebase 저장 양쪽에 사용)
function buildGichulRich(msg){
    try{
        var u = getUser();
        var basePayload = msg.payload || {};
        if(typeof basePayload.score === 'undefined') return null;
        var questions = extractGichulQuestionsFromMessage(msg); // null OK
        var testFile = msg.testFile || '';
        var tid = basePayload.testId || (testFile ? testFile.replace(/\.html$/i, '') : '');
        return {
            studentId: (u && u.id) ? u.id : (msg.studentId || ''),
            studentName: basePayload.name || msg.studentName || (u && u.name) || '',
            testFile: testFile,
            testLabel: gichulTestFileLabel(testFile),
            testId: tid || 'unknown',
            chapter: (typeof basePayload.chapter !== 'undefined') ? basePayload.chapter : (typeof msg.curCh !== 'undefined' && msg.curCh !== null ? msg.curCh : null),
            chapterTitle: msg.chapterTitle || '',
            selectedChs: Array.isArray(msg.selectedChs) ? msg.selectedChs : null,
            selectedRounds: Array.isArray(msg.selectedRounds) ? msg.selectedRounds : null,
            score: basePayload.score,
            total: basePayload.total || 0,
            pct: (typeof basePayload.pct !== 'undefined') ? basePayload.pct : (basePayload.total ? Math.round((basePayload.score/basePayload.total)*100) : 0),
            grade: basePayload.grade || '',
            mcScore: (typeof basePayload.mcScore !== 'undefined') ? basePayload.mcScore : null,
            saScore: (typeof basePayload.saScore !== 'undefined') ? basePayload.saScore : null,
            ts: basePayload.ts || Date.now(),
            date: basePayload.date || new Date().toLocaleString('ko-KR'),
            questions: questions
        };
    }catch(e){
        console.warn('풍부 데이터 빌드 실패:', e);
        return null;
    }
}

// 학생 본인의 IndexedDB에 저장 (이력 화면에서 펼침 가능)
function saveGichulRich(rich){
    if(!rich) return;
    var history = getGichulHistory();
    // 동일 ts 중복 방지
    if(rich.ts && history.some(function(h){ return h.ts === rich.ts; })) return;
    history.push(rich);
    history.sort(function(a,b){ return (b.ts||0) - (a.ts||0); });
    try{
        RL_STORE.set(gichulHistoryKey(), JSON.stringify(history));
    }catch(e){ console.error('기출문제 저장 실패:', e); }
    // 현재 기출문제 탭 화면에 있으면 이력 부분만 갱신
    if(state.menu === 'reading' && state.schedTab === 'gichul'){
        var histBox = document.getElementById('gichul-history-list');
        if(histBox) histBox.innerHTML = renderGichulHistoryList();
    }
}

// Firebase에 풍부 데이터 추가 저장 (관리자 화면용)
function postRichToFirebase(rich){
    if(!rich) return;
    fetch('https://' + QUIZ_FIREBASE_HOST + '/quiz_detail.json', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(rich)
    }).catch(function(e){ console.warn('Firebase 저장 실패:', e); });
}

// 시험ID를 보기 좋은 이름으로 변환 (확장자 있어도/없어도 처리)
function gichulTestLabel(testId){
    if(!testId) return '시험';
    // .html 확장자 정규화
    var key = testId.replace(/\.html$/i, '');
    var map = {
        'vocab_1':'단어테스트 1회','vocab_2':'단어테스트 2회','vocab_3':'단어테스트 3회',
        'vocab_4':'단어테스트 4회','vocab_5':'단어테스트 5회','vocab_6':'단어테스트 6회',
        'vocab_7':'단어테스트 7회','vocab_8':'단어테스트 8회','vocab_9':'단어테스트 9회',
        'vocab_10':'단어테스트 10회','vocab_cumulative':'단어 누적테스트',
        'chunilmun_test':'천일문 GRAMMAR Lv2','chunilmun_cumulative':'천일문 누적',
        'eobeopkkeut_start':'어법끝 START','eobeopkkeut_cumulative':'어법끝 누적',
        'munmajung_lv1':'문마중 Lv1','munmajung_lv1_cumulative':'문마중 Lv1 누적',
        'munmajung':'문마중 Lv2','munmajung_cumulative':'문마중 Lv2 누적',
        'munmajung_lv3':'문마중 Lv3','munmajung_lv3_cumulative':'문마중 Lv3 누적',
    };
    return map[key] || key;
}

// 카테고리 색상 (단어=초록, 문법=파랑, 리딩=주황)
function gichulCategoryColor(testId){
    if(!testId) return '#6b7280';
    if(testId.startsWith('vocab')) return '#1a7350';
    if(testId.startsWith('chunilmun') || testId.startsWith('eobeopkkeut') || testId.startsWith('munmajung')) return '#2563eb';
    if(testId.startsWith('reading')) return '#d97706';
    return '#6b7280';
}

// 이력 리스트 렌더링 (날짜순 한 줄씩, 클릭하면 오답+해설 펼침)
function renderGichulHistoryList(){
    var history = getGichulHistory();
    if(!history.length){
        return '<div style="padding:30px 16px;text-align:center;color:var(--text3);font-size:13px;background:var(--bg);border-radius:10px">아직 응시 기록이 없어요. 위 시험을 풀면 여기에 기록됩니다.</div>';
    }
    return history.map(function(h, idx){
        var color = gichulCategoryColor(h.testId || h.testFile);
        var pctColor = h.pct >= 80 ? '#1a7350' : h.pct >= 60 ? '#d97706' : '#dc2626';
        var qs = Array.isArray(h.questions) ? h.questions : [];
        var hasDetail = qs.length > 0;
        var countLabel = '';
        if(hasDetail){
            var rightCount = qs.filter(function(q){ return q && q.isCorrect === true; }).length;
            var wrongCount = qs.filter(function(q){ return q && q.isCorrect === false; }).length;
            countLabel = ' · ✓' + rightCount + ' · ✗' + wrongCount;
        }

        // 챕터 라벨
        var chapterLabel = '';
        if(h.chapterTitle) chapterLabel = ' · ' + gichulEscape(h.chapterTitle);
        else if(h.chapter !== null && h.chapter !== undefined && h.chapter !== '') chapterLabel = ' · Ch.' + h.chapter;

        // 누적 정보
        var coverageLabel = '';
        if(Array.isArray(h.selectedChs) && h.selectedChs.length) coverageLabel = ' · 누적 ' + h.selectedChs.length + '개 챕터';
        else if(Array.isArray(h.selectedRounds) && h.selectedRounds.length) coverageLabel = ' · 누적 ' + h.selectedRounds.length + '개 회차';

        var label = gichulTestLabel(h.testId || h.testFile);
        var studentName = h.studentName || h.name || '';
        var caret = hasDetail ? '<div style="color:var(--text3);font-size:14px;flex-shrink:0">▾</div>' : '';
        var onclickAttr = hasDetail
            ? 'onclick="var d=document.getElementById(\'gichul-st-' + idx + '\');d.style.display=d.style.display===\'none\'?\'block\':\'none\'"'
            : '';
        var cursorStyle = hasDetail ? 'cursor:pointer' : '';

        return '<div style="background:#fff;border:1px solid var(--border-light);border-left:4px solid ' + color + ';border-radius:10px;margin-bottom:8px;padding:12px 14px">'
            + '<div ' + onclickAttr + ' style="display:flex;align-items:center;gap:12px;' + cursorStyle + '">'
            + '<div style="flex:1;min-width:0">'
            +   '<div style="font-size:11px;color:var(--text3);margin-bottom:3px">' + gichulEscape(studentName) + ' 학생 · ' + gichulEscape(h.date||'') + '</div>'
            +   '<div style="font-weight:600;color:var(--text);font-size:14px;line-height:1.4">' + gichulEscape(label) + chapterLabel + '</div>'
            +   (countLabel || coverageLabel ? '<div style="font-size:11px;color:var(--text3);margin-top:3px">' + countLabel.replace(/^ · /, '') + coverageLabel + '</div>' : '')
            + '</div>'
            + '<div style="text-align:right;flex-shrink:0">'
            +   '<div style="font-weight:700;font-size:18px;color:' + pctColor + '">' + h.score + '<span style="font-size:12px;color:var(--text3)">/' + h.total + '</span></div>'
            +   '<div style="font-size:11px;color:var(--text2)">' + h.pct + '점' + (h.grade ? ' · ' + gichulEscape(h.grade) : '') + '</div>'
            + '</div>'
            + caret
            + '</div>'
            + (hasDetail ? '<div id="gichul-st-' + idx + '" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light)">' + renderGichulStudentDetail(h) + '</div>' : '')
            + '</div>';
    }).join('');
}

// 학생 화면 — 응시 기록 한 항목 펼쳤을 때 오답 + 해설 표시
function renderGichulStudentDetail(rec){
    var qs = Array.isArray(rec.questions) ? rec.questions : [];
    if(qs.length === 0) return '<div style="color:var(--text3);font-size:12px;padding:8px 0">상세 데이터가 없습니다.</div>';
    var wrongs = qs.filter(function(q){ return q && q.isCorrect === false; });
    if(wrongs.length === 0) return '<div style="color:#16A34A;font-weight:600;padding:8px 0;font-size:13px">🎉 전부 정답입니다!</div>';
    return '<div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)">❌ 오답 ' + wrongs.length + '문항</div>'
        + wrongs.map(function(q){
            var body = '';
            if(q.type === 'sa'){
                body = '<div style="font-size:12px;background:#fee2e2;color:#991b1b;padding:7px 10px;border-radius:6px;margin-bottom:4px"><strong>✗ 내 답:</strong> ' + gichulEscape(q.userAns||'(미응답)') + '</div>'
                     + '<div style="font-size:12px;background:#dcfce7;color:#166534;padding:7px 10px;border-radius:6px"><strong>✓ 정답:</strong> ' + gichulEscape(q.a||'') + '</div>';
            } else if(Array.isArray(q.c)){
                body = q.c.map(function(choice, ci){
                    var isAns = ci === q.a;
                    var isPicked = ci === q.userAns;
                    var bg = isAns ? '#dcfce7' : (isPicked ? '#fee2e2' : '#f9fafb');
                    var fg = isAns ? '#166534' : (isPicked ? '#991b1b' : '#6b7280');
                    var mark = isAns ? '✓' : (isPicked ? '✗' : '·');
                    var fw = (isAns || isPicked) ? '600' : '400';
                    return '<div style="padding:6px 10px;background:' + bg + ';color:' + fg + ';border-radius:6px;margin-bottom:3px;font-size:12px;font-weight:' + fw + '"><strong>' + mark + '</strong> ' + gichulEscape(choice) + '</div>';
                }).join('');
            }
            return '<div style="background:#fafafa;border-radius:8px;padding:10px 12px;margin-bottom:8px">'
                + '<div style="font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.5">' + (q.n||'?') + '번. ' + gichulEscape(q.q||'') + '</div>'
                + body
                + (q.e ? '<div style="margin-top:6px;padding:8px 10px;background:#fef3c7;border-radius:6px;font-size:12px;color:#78350f;line-height:1.5"><strong>💡 해설:</strong> ' + gichulEscape(q.e) + '</div>' : '')
                + '</div>';
        }).join('');
}

// 기출문제 탭 메인 렌더링
function renderGichul(s){
    return `<div style="margin-top:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap">
            <div style="font-size:13px;color:var(--text2);line-height:1.5">
                📝 <strong style="color:var(--text)">${s.name||''}</strong> 학생 — 시험을 선택하고 풀어보세요. 점수는 자동 저장됩니다.
            </div>
            <button class="btn-ghost btn-sm" onclick="resetGichulIframe()">↺ 처음으로</button>
        </div>
        <div style="border:1px solid var(--border-light);border-radius:12px;overflow:hidden;background:#fff;box-shadow:var(--shadow-sm)">
            <iframe id="gichul-iframe"
                src="${QUIZ_BASE_URL}?student=${encodeURIComponent(s.name||'')}&sid=${encodeURIComponent((getUser()&&getUser().id)||'')}"
                style="width:100%;height:720px;border:0;display:block;background:#f0f4f1"

        </div>
        <div style="margin-top:24px">

}

// iframe을 처음 화면으로 리셋
function resetGichulIframe(){
    const fr = document.getElementById('gichul-iframe');
    if(!fr) return;
    const u = getUser();
    const name = encodeURIComponent((u&&u.name)||'');
    const sid = encodeURIComponent((u&&u.id)||'');
    fr.src = QUIZ_BASE_URL + '?student=' + name + '&sid=' + sid + '&t=' + Date.now();
}

// 시험 파일명 → 사람이 읽을 수 있는 라벨로 변환
function gichulTestFileLabel(file){
    if(!file) return '시험';
    const m = {
        'vocab_1.html':'단어테스트 1회','vocab_2.html':'단어테스트 2회','vocab_3.html':'단어테스트 3회',
        'vocab_4.html':'단어테스트 4회','vocab_5.html':'단어테스트 5회','vocab_6.html':'단어테스트 6회',
        'vocab_7.html':'단어테스트 7회','vocab_8.html':'단어테스트 8회','vocab_9.html':'단어테스트 9회',
        'vocab_10.html':'단어테스트 10회','vocab_cumulative.html':'단어 누적테스트',
        'chunilmun_test.html':'천일문 GRAMMAR Lv2','chunilmun_cumulative.html':'천일문 누적',
        'eobeopkkeut_start.html':'어법끝 START','eobeopkkeut_cumulative.html':'어법끝 누적',
        'munmajung_lv1.html':'문마중 Lv1','munmajung_lv1_cumulative.html':'문마중 Lv1 누적',
        'munmajung.html':'문마중 Lv2','munmajung_cumulative.html':'문마중 Lv2 누적',
        'munmajung_lv3.html':'문마중 Lv3','munmajung_lv3_cumulative.html':'문마중 Lv3 누적',
    };
    return m[file] || file.replace('.html','');
}

// iframe 로드 시 호출 (이제는 거의 비어있음 — 모든 작업은 bridge가 처리)
// onload 이벤트 자체는 유지 (혹시 향후 필요할 수 있어서)
function onGichulIframeLoad(){
    // bridge 스크립트가 iframe 내부에서 알아서 처리하므로 별도 작업 없음.
    // 부모창은 postMessage로 결과만 수신함 (아래 전역 리스너 참조).
}

// 메시지 기반 결과 수신 — bridge가 시험 제출 시 보내는 데이터 처리
if(!window.__terrysQuizMsgInstalled){
    window.addEventListener('message', function(e){
        var data = e.data;
        if(!data || data.type !== 'TERRYS_QUIZ_RESULT') return;
        try{
            // 한번 빌드해서 두 곳에 저장
            var rich = buildGichulRich(data);
            if(!rich) return;
            saveGichulRich(rich);       // 학생 본인 IndexedDB
            postRichToFirebase(rich);   // 관리자 화면용 Firebase
        }catch(err){ console.warn('quiz 결과 처리 실패:', err); }
    });
    window.__terrysQuizMsgInstalled = true;
}

// (구) captureRichDetailFromMessage 는 buildGichulRich + postRichToFirebase 로 분리되어 제거됨

// 메시지에서 받은 Q+답안 데이터로 문제별 정답/오답 매칭
function extractGichulQuestionsFromMessage(msg){
    try{
        var Q = msg.Q;
        if(!Array.isArray(Q) || Q.length === 0) return null;
        var mcAns = msg.mcAns, saAns = msg.saAns, ans = msg.ans;
        var MC_COUNT = msg.MC_COUNT;
        return Q.map(function(q, i){
            var out = {
                n: q.n || (i+1),
                type: q.type || 'mc',
                q:  q.q || q.question || q.prompt || '',
                c:  Array.isArray(q.c) ? q.c.slice() : (Array.isArray(q.choices) ? q.choices.slice() : null),
                a:  (typeof q.a !== 'undefined') ? q.a : q.answer,
                pts: q.pts || null,
                e:  q.e || ''
            };
            var userAns = null, isCorrect = false;
            if(out.type === 'sa'){
                if(saAns && MC_COUNT !== null && MC_COUNT !== undefined){
                    userAns = saAns[i - MC_COUNT];
                }
                isCorrect = (typeof userAns === 'string') && (typeof out.a === 'string') &&
                            userAns.trim().toLowerCase() === out.a.trim().toLowerCase();
            } else if(mcAns){
                userAns = mcAns[i];
                isCorrect = (userAns === out.a) && userAns !== -1 && userAns !== null && userAns !== undefined;
            } else if(ans){
                userAns = ans[i];
                isCorrect = (userAns === out.a) && userAns !== -1 && userAns !== null && userAns !== undefined;
            }
            out.userAns = userAns;
            out.isCorrect = !!isCorrect;
            return out;
        });
    }catch(e){
        console.warn('문제 추출 실패:', e);
        return null;
    }
}
