            let tc=lockCell,ec=lockCell;
            if(isPreview()&&uk) tc=lockCell+`<br><span class="admin-done-btn" onclick="adminCompleteReadingTrain('${uk}')">완료</span>`;
            return `<td class="sched-td cell-reading-train">${tc}</td><td class="sched-td cell-reading-exam">${ec}</td>`;
        }
        const sc=getUnitScores(bookName,uk,artCount);
        let trainCell;
        if(sc.trainRec){
            // 훈련 완료 → 점수 표시 (마지막 단계 = 문장 셀프체크 점수)
            //   sentSelf(ssAll) 점수가 학생의 학습 수준 대표값. 없으면 trainTotal 폴백.
            const displayScore=(sc.ssAll&&typeof sc.ssAll.score==='number')?sc.ssAll.score:(sc.trainTotal!==null?sc.trainTotal:0);
            trainCell=`<span class="sched-cell sc-done" onclick="openUnit('${uk}')" title="문장 셀프체크 ${displayScore}점">${displayScore}점</span>`;
        } else if(isNextHomework){
            trainCell=`<span class="sched-cell sc-active" onclick="openUnit('${uk}')">학습</span>`;
            if(isPreview()) trainCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteReadingTrain('${uk}')">완료</span>`;
        } else {
            trainCell=lockCell;
            if(isPreview()&&uk) trainCell=lockCell+`<br><span class="admin-done-btn" onclick="adminCompleteReadingTrain('${uk}')">완료</span>`;
        }
        let examCell;
        if(sc.exam!==null){
            examCell=`<span class="sched-cell sc-done" onclick="openUnit('${uk}')">${sc.exam}점</span>`;
        } else if(sc.trainRec){
            // 훈련 완료 → 실전 활성화
            examCell=`<span class="sched-cell sc-active" onclick="openUnit('${uk}')">학습</span>`;
            if(isPreview()) examCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteReadingExam('${uk}')">완료</span>`;
        } else {
            examCell=lockCell;
        }
        return `<td class="sched-td cell-reading-train">${trainCell}</td><td class="sched-td cell-reading-exam">${examCell}</td>`;
    };
    
    let rows='';
    const _gRecords=getGrammarRecords(); // 한 번만 로드해서 모든 행에서 재사용
    // ========== 일정 행 ↔ 문법 Unit / 주간평가 매핑 ==========
    // - 학습일(월·수): sessGrammarUnit[i] = Unit 번호
    // - 평가일(금): sessWeeklyInfo[i] = {weekIdx, fromUnit, toUnit}
    //   → 한 주에 2 Unit 학습 가정 (학습일이 2개씩 짝지어짐)
    const _sdForUnit=getStudentData()||{};
    const _startGrammarPt=parseInt(_sdForUnit.startGrammarPoint||getUser()?.startGrammarPoint||'1');
    // 나모그: 1 Chapter = 1 학습일이므로 시작 Point가 그대로 시작 Chapter (Unit과 동치)
    // 문마중: 4 Point = 1 Unit 환산
    const _grammarLevelForRow=getStudentGrammarLevel(_sdForUnit);
    const _isNamogRow=isNamogLevel(_grammarLevelForRow);
    const _startGrammarUnit=_isNamogRow?_startGrammarPt:Math.ceil(_startGrammarPt/4);
    const sessGrammarUnit={};
    const sessWeeklyInfo={};
    // _lessonCounter는 시작일부터 현재 표시 범위의 첫 학습일까지의 글로벌 오프셋으로 시작
    let _globalLessonOffset=-1;
    // 전체 세션에서 현재 표시 범위 첫 학습일의 글로벌 인덱스 계산
    const _firstDisplayDate=sessions.length>0?sessions[0].date:null;
    if(_firstDisplayDate){
        let _glo=0;
        for(const as of allSessions){
            if(as.isWeeklyTest)continue;
            if(as.date>=_firstDisplayDate)break;
            _glo++;
        }
        _globalLessonOffset=_glo-1;
    }
    let _lessonCounter=_globalLessonOffset;
    // 주차 인덱스도 글로벌 오프셋 (이전 주의 평가일 수)
    let _weekIdx=0;
    if(_firstDisplayDate){
        for(const as of allSessions){
            if(as.date>=_firstDisplayDate)break;
            if(as.isWeeklyTest)_weekIdx++;
        }
    }
    console.log('[문법오프셋] _globalLessonOffset:',_globalLessonOffset,'_weekIdx:',_weekIdx,'_startGrammarUnit:',_startGrammarUnit);
    let _weekStartUnit=null;
    sessions.forEach((sess,i)=>{
        if(!sess.isWeeklyTest){
            _lessonCounter++;
            const u=_startGrammarUnit+_lessonCounter;
            sessGrammarUnit[i]=u;
            if(_weekStartUnit===null)_weekStartUnit=u;
        } else {
            // 평가일: 직전 학습일들의 Unit 범위가 이 주의 fromUnit~toUnit
            _weekIdx++;
            if(_weekStartUnit!==null){
                const fromUnit=_weekStartUnit;
                const toUnit=_startGrammarUnit+_lessonCounter;
                sessWeeklyInfo[i]={weekIdx:_weekIdx,fromUnit,toUnit};
            }
            _weekStartUnit=null; // 다음 주 시작
        }
    });
    // 문법 다음 숙제 행 결정 — 학습일과 평가일 둘 다 고려
    // 우선순위: 학습 안 한 학습일 → 학습일 완료 후 평가일(주간평가 미진행) → 학습일 진행
    let grammarNextRowIdx=-1;
    {
        const curPt=parseInt(getCurrentGrammarPoint()||_startGrammarPt||'1');
        // 나모그: P=Chapter, 문마중: 4P=1Unit
        let curUnit=_isNamogRow?curPt:Math.ceil(curPt/4);
        const examUnits=Object.keys(_gRecords.exams||{}).map(u=>parseInt(u)).filter(u=>!isNaN(u));
        console.log('[문법] curPt:',curPt,'curUnit초기:',curUnit,'examUnits:',examUnits,'_startGrammarUnit:',_startGrammarUnit);
        if(examUnits.length>0){
            const maxExamUnit=Math.max(...examUnits);
            if(maxExamUnit+1>curUnit)curUnit=maxExamUnit+1;
        }
        // 주간 실전평가 시도한 가장 큰 주차 fallback (그 주 toUnit + 1)
        const wexEntries=Object.entries(_gRecords.weeklyExam||{});
        wexEntries.forEach(([w,d])=>{
            if(d&&d.toUnit&&d.toUnit+1>curUnit)curUnit=d.toUnit+1;
        });
        // 🔧 실전평가 미완료 Unit이 있으면 그 Unit으로 되돌리기
        // (셀프체크 통과했지만 실전 미진행 → 아직 그 Unit에 머물러야 함)
        for(let u=_startGrammarUnit;u<curUnit;u++){
            const scD=_gRecords.selfChecks?.[u];
            const exD=_gRecords.exams?.[u];
            const hasSc=scD?.attempts?.length>0;
            const hasEx=exD?.attempts?.length>0;
            if(hasSc&&!hasEx){curUnit=u;break;} // 셀프체크 있지만 실전 없음 → 여기서 멈춤
        }
        // 학습일 매칭 시도
        console.log('[문법] curUnit최종:',curUnit,'sessGrammarUnit:',JSON.stringify(sessGrammarUnit));
        for(let i=0;i<sessions.length;i++){
            if(sessGrammarUnit[i]===curUnit){grammarNextRowIdx=i;break;}
        }
        // 학습일 매칭 못 했지만 평가일이 다음 후보면 평가일을 다음 숙제로
        // (학생이 한 주 학습 완료 + 평가일 다가옴)
        if(grammarNextRowIdx===-1){
            for(let i=0;i<sessions.length;i++){
                const wi=sessWeeklyInfo[i];
                if(wi&&wi.toUnit<curUnit){
                    // 이 평가일 주는 이미 학습 끝남 → 주간평가 안 봤으면 다음 숙제
                    const wexDone=(_gRecords.weeklyExam||{})[wi.weekIdx];
                    if(!wexDone){
                        grammarNextRowIdx=i;
                        break;
                    }
                }
            }
        } else {
            // 학습일이 다음 숙제 — 단, 그 학습일 이전 평가일이 미완료면 평가일이 우선
            for(let i=0;i<grammarNextRowIdx;i++){
                const wi=sessWeeklyInfo[i];
                if(wi){
                    const wexDone=(_gRecords.weeklyExam||{})[wi.weekIdx];
                    if(!wexDone){grammarNextRowIdx=i;break;}
                }
            }
        }
    }
    
    sessions.forEach((sess,i)=>{
        const dateStr=fmtDate(sess.date);
        const dateISO=fmtDateISO(sess.date);
        const prevDateISO=i>0?fmtDateISO(sessions[i-1].date):null;
        const kn=dayKor[sess.date.getDay()];
        
        const uk=sess.isWeeklyTest?null:'unit'+sess.unitNum;
        const unit=uk?ba[uk]:null;
        const unitExists=unit&&(unit.articles||[]).length>0;
        const artCount=unitExists?unit.articles.length:0;
        const isNextHomework=i===currentIdx;
        const isGrammarNextHomework=i===grammarNextRowIdx;
        const readingCells=makeReadingCells(uk,sess,unitExists,artCount,isNextHomework);
        // 문법 셀 — Unit 기반 매핑 (날짜 무관)
        const sd=getStudentData()||{};
        // 학생의 실효 현재 Point: currentPoint 우선, 실전평가 시도 fallback도 고려
        // (이전 코드에서 실전평가 시도 시 setCurrentPoint 호출 안 됐던 경우 보정)
        let _effectiveCurrentPt=parseInt(getCurrentGrammarPoint()||sd.startGrammarPoint||getUser()?.startGrammarPoint||'1');
        {
            const _examUnits=Object.keys(_gRecords.exams||{}).map(u=>parseInt(u)).filter(u=>!isNaN(u));
            if(_examUnits.length>0){
                const _maxExamUnit=Math.max(..._examUnits);
                // 나모그: Chapter+1, 문마중: (Unit*4)+1
                const _nextAfterExam=_isNamogRow?(_maxExamUnit+1):(_maxExamUnit*4+1);
                if(_nextAfterExam>_effectiveCurrentPt)_effectiveCurrentPt=_nextAfterExam;
            }
        }
        const grammarStartPoint=_effectiveCurrentPt;
        const grammarStartDateStr=sd.startGrammarDate||getUser()?.startGrammarDate;
        const grammarStartDate=grammarStartDateStr?new Date(grammarStartDateStr+'T00:00:00'):null;
        // 문법 교재가 설정되어 있어야 활성화 (textbooks.grammar 없으면 모두 잠금)
        const hasGrammarBook=!!(sd.textbooks?.grammar);
        const grammarActive=hasGrammarBook&&grammarStartPoint&&(!grammarStartDate||sess.date>=grammarStartDate);
        const rowUnit=sessGrammarUnit[i];
        const weeklyInfo=sessWeeklyInfo[i];
        let grammarTrainCell,grammarExamCell;
        if(rowUnit==null&&!weeklyInfo){
            grammarTrainCell=lockCell;
            grammarExamCell=lockCell;
        } else if(weeklyInfo){
            // 평가일 — 주간 셀프체크 / 주간 실전평가 (리딩 평가와 동일한 주황색)
            const wIdx=weeklyInfo.weekIdx;
            const wFrom=weeklyInfo.fromUnit;
            const wTo=weeklyInfo.toUnit;
            const wscData=_gRecords.weeklySC?.[wIdx];
            const lastWsc=(wscData?.attempts?.length>0)?wscData.attempts[wscData.attempts.length-1]:null;
            const _wscAttempts=wscData?.attempts?.length||0;
            const wexData=_gRecords.weeklyExam?.[wIdx];
            const lastWex=(wexData?.attempts?.length>0)?wexData.attempts[wexData.attempts.length-1]:null;
            const _wexAttempts=wexData?.attempts?.length||0;
            // 나모그면 40문제, 문마중이면 28문제
            const _wLabel=_isNamogRow?`Ch ${wFrom}~${wTo}, 40문제`:`Unit ${wFrom}~${wTo}, 28문제`;
            // 훈련 셀 (주간 셀프체크) — 1차 미통과여도 점수만 표시, 실전 잠금이 재시험 필요성 알려줌
            if(lastWsc){
                const _wscRetake=!lastWsc.passed && _wscAttempts<2;
                grammarTrainCell=`<span class="sched-cell sc-weekly" title="${wIdx}주차 주간 셀프체크 ${lastWsc.attempt}차 · ${lastWsc.pct}점${lastWsc.passed?' 통과':' 미통과'}${_wscRetake?' · 재시험 가능':''}" onclick="window.location.href='${getGrammarUrl(wFrom)}&${_wscRetake?'wsc='+wIdx+'&from='+wFrom+'&to='+wTo:'wscReview='+wIdx}'">${lastWsc.pct}점</span>`;
            } else if(grammarActive&&isGrammarNextHomework){
                grammarTrainCell=`<span class="sched-cell sc-weekly" title="${wIdx}주차 주간 셀프체크 (${_wLabel})" onclick="window.location.href='${getGrammarUrl(wFrom)}&wsc=${wIdx}&from=${wFrom}&to=${wTo}'">학습</span>`;
                if(isPreview()) grammarTrainCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteGrammarWeekly(${wIdx},${wFrom},${wTo},'train')">완료</span>`;
            } else {
                grammarTrainCell=lockCell;
                if(isPreview()) grammarTrainCell=lockCell+`<br><span class="admin-done-btn" onclick="adminCompleteGrammarWeekly(${wIdx},${wFrom},${wTo},'train')">완료</span>`;
            }
            // 실전 활성화 조건: 훈련 80점 통과 OR 훈련 2회차 완료
            const _canEnterWex=lastWsc && (lastWsc.passed || _wscAttempts>=2);
            // 실전 셀 (주간 실전평가) — 1차 점수 고정 표시, 클릭 시 모달 (오답풀이/재시험 1회)
            if(lastWex){
                const _firstWex=wexData.attempts[0];
                const _wexAttemptsCnt=wexData.attempts.length;
                const _canRetakeWex=_wexAttemptsCnt<2;
                const _wexReviewUrl=`${getGrammarUrl(wFrom)}&wexReview=${wIdx}`;
                const _wexRetakeUrl=`${getGrammarUrl(wFrom)}&wex=${wIdx}&from=${wFrom}&to=${wTo}`;
                const _wexModalCall=`showExamScoreModal({title:'${wIdx}주차 주간 실전평가',scoreText:'1차 점수: ${_firstWex.pct}점${_firstWex.passed?' (통과)':' (미통과)'}'+(${_wexAttemptsCnt}>1?'  ·  재시험 ${_wexAttemptsCnt-1}회 완료':''),reviewUrl:'${_wexReviewUrl}',retakeUrl:'${_wexRetakeUrl}',canRetake:${_canRetakeWex},retakeAttempt:${_wexAttemptsCnt}})`;
                grammarExamCell=`<span class="sched-cell sc-weekly" title="${wIdx}주차 주간 실전평가 1차 ${_firstWex.pct}점${_wexAttemptsCnt>1?` · 재시험 ${_wexAttemptsCnt-1}회 완료`:''}" onclick="${_wexModalCall}">${_firstWex.pct}점</span>`;
            } else if(_canEnterWex){
                grammarExamCell=`<span class="sched-cell sc-weekly" title="${wIdx}주차 주간 실전평가 (${_wLabel})" onclick="window.location.href='${getGrammarUrl(wFrom)}&wex=${wIdx}&from=${wFrom}&to=${wTo}'">학습</span>`;
                if(isPreview()) grammarExamCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteGrammarWeekly(${wIdx},${wFrom},${wTo},'exam')">완료</span>`;
            } else {
                grammarExamCell=lockCell;
            }
        } else {
            // 학습일 — 이 행은 Unit ${rowUnit} 결과 표시
            // 나모그: rowUnit = Chapter 번호 그대로 (P=Chapter 1:1), URL에도 그대로 전달
            // 문마중: rowUnit = Unit 번호, 첫 Point = (Unit-1)*4+1
            const unitFirstPt=_isNamogRow?rowUnit:(rowUnit-1)*4+1;
            const unitLastPt=_isNamogRow?rowUnit:rowUnit*4;
            const scData=_gRecords.selfChecks?.[rowUnit];
            const lastSc=(scData?.attempts?.length>0)?scData.attempts[scData.attempts.length-1]:null;
            const exData=_gRecords.exams?.[rowUnit];
            const lastEx=(exData?.attempts?.length>0)?exData.attempts[exData.attempts.length-1]:null;
            // 재시험 룰: 1회차 80점 미만 → 재시험 강제 (1회까지), 2회차는 점수 무관 실전 진입
            const _scAttempts = scData?.attempts?.length || 0;
            const _canEnterExam = lastSc && (lastSc.passed || _scAttempts >= 2);
            // 훈련 셀 = 셀프체크 점수 (1회차 미통과여도 점수만 표시, 실전 잠금이 재시험 필요성 알려줌)
            if(lastSc){
                grammarTrainCell=`<span class="sched-cell sc-done" title="Unit ${rowUnit} 셀프체크 ${lastSc.attempt}차 · ${lastSc.pct}점${lastSc.passed?' 통과':' 미통과'}${(!lastSc.passed&&_scAttempts<2)?' · 재시험 가능':''}" onclick="window.location.href='${getGrammarUrl(unitFirstPt)}&scReview=${rowUnit}'">${lastSc.pct}점</span>`;
            } else if(grammarActive&&isGrammarNextHomework){
                grammarTrainCell=`<span class="sched-cell sc-active" title="Unit ${rowUnit} 학습 (P${unitFirstPt}~P${unitLastPt})" onclick="window.location.href='${getGrammarUrl(grammarStartPoint)}'">학습</span>`;
                if(isPreview()) grammarTrainCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteGrammarTrain(${rowUnit})">완료</span>`;
            } else {
                grammarTrainCell=lockCell;
                if(isPreview()&&rowUnit) grammarTrainCell=lockCell+`<br><span class="admin-done-btn" onclick="adminCompleteGrammarTrain(${rowUnit})">완료</span>`;
            }
            // 실전 셀: 1차 점수 고정 표시, 클릭 시 모달 (오답풀이/재시험 선택)
            if(lastEx){
                const _firstEx=exData.attempts[0]; // 일정표는 항상 1차 점수
                const _exAttempts=exData.attempts.length;
                const _canRetakeExam=_exAttempts<2; // 재시험 1회 한도
                const _examUrl=`${getGrammarUrl(unitFirstPt)}&examReview=${rowUnit}`;
                const _retakeUrl=`${getGrammarUrl(unitFirstPt)}&exam=${rowUnit}`;
                const _modalCall=`showExamScoreModal({title:'Unit ${rowUnit} 실전평가',scoreText:'1차 점수: ${_firstEx.pct}점${_firstEx.passed?' (통과)':' (미통과)'}'+(${_exAttempts}>1?'  ·  재시험 ${_exAttempts-1}회 완료':''),reviewUrl:'${_examUrl}',retakeUrl:'${_retakeUrl}',canRetake:${_canRetakeExam},retakeAttempt:${_exAttempts}})`;
                grammarExamCell=`<span class="sched-cell sc-done" title="Unit ${rowUnit} 실전평가 1차 ${_firstEx.pct}점${_exAttempts>1?` · 재시험 ${_exAttempts-1}회 완료`:''}" onclick="${_modalCall}">${_firstEx.pct}점</span>`;
            } else if(_canEnterExam){
                grammarExamCell=`<span class="sched-cell sc-active" title="Unit ${rowUnit} 실전평가" onclick="window.location.href='${getGrammarUrl(unitFirstPt)}&exam=${rowUnit}'">학습</span>`;
                if(isPreview()) grammarExamCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteGrammarExam(${rowUnit})">완료</span>`;
            } else {
                // 셀프체크 미통과 + 재시험 가능한 상태 → 실전 잠금
                grammarExamCell=lockCell;
                if(isPreview()&&rowUnit) grammarExamCell=lockCell+`<br><span class="admin-done-btn" onclick="adminCompleteGrammarExam(${rowUnit})">완료</span>`;
            }
        }
        const rowClass=sess.isWeeklyTest?' class="sched-row-weekly"':'';
        
        // ========== 📚 단어 셀 ==========
        // 학생의 단어장 + 시작일 + 시작 DAY + 숙제량으로 셀 생성
        // 리딩/문법과 동일: "다음 숙제" 칸만 학습 버튼, 나머지는 잠금
        let vocabTrainCell=lockCell;
        let vocabExamCell=lockCell;
        const sdVocab=getStudentData()||{};
        const vocabDeckId=sdVocab.textbooks?.vocab;
        if(vocabDeckId&&!sess.isWeeklyTest){
            const vocabStartDateStr=sdVocab.startVocabDate;
            const vocabStartDate=vocabStartDateStr?new Date(vocabStartDateStr+'T00:00:00'):null;
            const vocabActive=!vocabStartDate||sess.date>=vocabStartDate;
            if(vocabActive){
                const vIdx=LS.g('vocab_index')||{};
                const deck=vIdx[vocabDeckId];
                if(deck&&(deck.days||[]).length>0){
                    const homeworkPerDay=Math.max(1,parseInt(sdVocab.vocabHomeworkPerDay)||1);
                    const startDay=Math.max(1,parseInt(sdVocab.startVocabDay)||1);
                    // 이 학습일이 단어 시작일부터 몇 번째 수업인지
                    let lessonIdx=0;
                    for(let j=0;j<allSessions.length;j++){
                        const as=allSessions[j];
                        if(as.isWeeklyTest)continue;
                        if(vocabStartDate&&as.date<vocabStartDate)continue;
                        if(as.date.getTime()===sess.date.getTime())break;
                        lessonIdx++;
                    }
                    const dayStart=startDay+lessonIdx*homeworkPerDay;
                    const dayEnd=dayStart+homeworkPerDay-1;
                    const totalDays=(deck.days||[]).length;
                    if(dayStart<=totalDays){
                        // ════ 단어 진행 잠금 체인 ════
                        // 흐름: 월훈련→월실전→수훈련→수실전→주간훈련→주간실전→다음주월훈련
                        // 셀프체크 데이터
                        const scKey='rl_vc_selfcheck';
                        let scRaw=null;
                        try{scRaw=RL_STORE.get(scKey);}catch(e){}
                        const scAll=scRaw?JSON.parse(scRaw):{};
                        // 실전평가 데이터
                        const reKey='rl_vc_realexam';
                        let reRaw=null;
                        try{reRaw=RL_STORE.get(reKey);}catch(e){}
                        const reAll=reRaw?JSON.parse(reRaw):{};
                        
                        let canLearn=true;
                        // 1) 이전 학습일의 실전평가까지 완료 확인
                        for(let prevLesson=0;prevLesson<lessonIdx;prevLesson++){
                            const prevDayStart=startDay+prevLesson*homeworkPerDay;
                            if(prevDayStart>totalDays)continue;
                            const prevKey=vocabDeckId+'/'+prevDayStart+'_'+homeworkPerDay;
                            if(!reAll[prevKey]){canLearn=false;break;}
                        }
                        // 2) 이전 평가일의 주간평가 실전 완료 확인
                        if(canLearn){
                            const weExamKey='rl_vc_weeklyexam_exam';
                            let weExamRaw=null;
                            try{weExamRaw=RL_STORE.get(weExamKey);}catch(e){}
                            const weExamAll=weExamRaw?JSON.parse(weExamRaw):{};
                            // 현재 학습일 이전의 평가일 찾기
                            for(let j=0;j<allSessions.length;j++){
                                const as=allSessions[j];
                                if(as.date>=sess.date)break;
                                if(!as.isWeeklyTest)continue;
                                if(vocabStartDate&&as.date<vocabStartDate)continue;
                                // 이 평가일의 주 학습일들 → weekDayStart/End 계산
                                const wMon=getWeekMonday(as.date);
                                let wDS=null,wDE=null;
                                for(let k=0;k<allSessions.length;k++){
                                    const ak=allSessions[k];
                                    if(ak.isWeeklyTest)continue;
                                    if(vocabStartDate&&ak.date<vocabStartDate)continue;
                                    if(getWeekMonday(ak.date).getTime()!==wMon.getTime())continue;
                                    if(ak.date>=as.date)continue;
                                    // 이 학습일의 lessonIdx 계산
                                    let lIdx2=0;
                                    for(let m=0;m<allSessions.length;m++){
                                        const am=allSessions[m];
                                        if(am.isWeeklyTest)continue;
                                        if(vocabStartDate&&am.date<vocabStartDate)continue;
                                        if(am.date.getTime()===ak.date.getTime())break;
                                        lIdx2++;
                                    }
                                    const ds=startDay+lIdx2*homeworkPerDay;
                                    const de=Math.min(ds+homeworkPerDay-1,totalDays);
                                    if(wDS===null||ds<wDS)wDS=ds;
                                    if(wDE===null||de>wDE)wDE=de;
                                }
                                if(wDS!==null){
                                    const wk=vocabDeckId+'/'+wDS+'_'+wDE;
                                    if(!weExamAll[wk]){canLearn=false;break;}
                                }
                            }
                        }
                        
                        // 셀프체크 통과 여부 확인 (훈련 셀의 점수 표시 + 실전 셀 활성화)
                        const scKey2=vocabDeckId+'/'+dayStart+'_'+homeworkPerDay;
                        const scRec2=scAll[scKey2];
                        const selfCheckPassed=scRec2&&scRec2.passed;
                        const selfCheckTried=scRec2&&(scRec2.attempts||0)>0;
                        const scAttempts2=scRec2?(scRec2.attempts||0):0;
                        
                        if(selfCheckPassed){
                            // 셀프체크 통과 → 훈련 칸에 점수 표시 (녹색 클릭 가능, 종합 학습 기록 화면 열림)
                            vocabTrainCell=`<span class="sched-cell sc-active" onclick="openVocabSummary('${vocabDeckId}',${dayStart},${homeworkPerDay})" title="셀프체크 ${scRec2.bestScore}점 통과 · 클릭해서 학습 기록 보기">${scRec2.bestScore}점</span>`;
                            // 실전평가 점수 조회
                            const reKey='rl_vc_realexam';
                            let reRaw=null;
                            try{reRaw=RL_STORE.get(reKey);}catch(e){}
                            const reAll=reRaw?JSON.parse(reRaw):{};
                            const reRec=reAll[scKey2];
                            if(reRec){
                                // 실전평가 완료 — 점수 표시 (녹색 클릭 가능, 학습 기록 화면)
                                vocabExamCell=`<span class="sched-cell sc-active" onclick="openVocabSummary('${vocabDeckId}',${dayStart},${homeworkPerDay})" title="실전평가 ${reRec.bestScore}점 · 클릭해서 학습 기록 보기">${reRec.bestScore}점</span>`;
                            }else{
                                // 실전평가 미완료 — 녹색 학습 버튼
                                vocabExamCell=`<span class="sched-cell sc-active" onclick="openVocabExam('${vocabDeckId}',${dayStart},${homeworkPerDay})" title="실전평가 (${homeworkPerDay}개 DAY 누적, 새 문제)">학습</span>`;
                                if(isPreview()) vocabExamCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteVocabExam('${vocabDeckId}',${dayStart},${homeworkPerDay})">완료</span>`;
                            }
                        }else if(selfCheckTried){
                            // 셀프체크 미통과(80점 미만) — 학습일정에 점수 표시 + 실전 잠금
                            // attempts<2면 재시험 가능, attempts>=2면 재시험 완료(점수 무관 통과되어야 정상이지만 옛 데이터 호환)
                            const canRetake=scAttempts2<2;
                            const retakeMsg=canRetake?`재시험 ${scAttempts2}/1회 (클릭하여 재시험)`:'재시험 완료';
                            vocabTrainCell=`<span class="sched-cell sc-done" style="background:#FEF3C7;color:#92400E" onclick="openVocabTrain('${vocabDeckId}',${dayStart},${homeworkPerDay})" title="셀프체크 ${scRec2.bestScore}점 (목표점수 미달) · ${retakeMsg}">${scRec2.bestScore}점</span>`;
                            vocabExamCell=lockCell;
                            if(isPreview()) vocabExamCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteVocabExam('${vocabDeckId}',${dayStart},${homeworkPerDay})">완료</span>`;
                        }else if(canLearn){
                            // 아직 학습 중 → 학습 버튼
                            vocabTrainCell=`<span class="sched-cell sc-active" onclick="openVocabTrain('${vocabDeckId}',${dayStart},${homeworkPerDay})" title="DAY${dayStart}${homeworkPerDay>1?'~'+Math.min(dayEnd,totalDays):''}">학습</span>`;
                            if(isPreview()) vocabTrainCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteVocabTrain('${vocabDeckId}',${dayStart},${homeworkPerDay})">완료</span>`;
                        }else if(isPreview()&&dayStart<=totalDays){
                            // 미리보기: 잠금 상태에서도 관리자 완료 가능
                            vocabTrainCell=lockCell+`<br><span class="admin-done-btn" onclick="adminCompleteVocabTrain('${vocabDeckId}',${dayStart},${homeworkPerDay})">완료</span>`;
                        }
                    }
                }
            }
        }
        // 🟠 평가일 단어 셀 (그 주 학습일 누적)
        else if(vocabDeckId&&sess.isWeeklyTest){
            const vocabStartDateStr=sdVocab.startVocabDate;
            const vocabStartDate=vocabStartDateStr?new Date(vocabStartDateStr+'T00:00:00'):null;
            const vocabActive=!vocabStartDate||sess.date>=vocabStartDate;
            if(vocabActive){
                const vIdx=LS.g('vocab_index')||{};
                const deck=vIdx[vocabDeckId];
                if(deck&&(deck.days||[]).length>0){
                    const homeworkPerDay=Math.max(1,parseInt(sdVocab.vocabHomeworkPerDay)||1);
                    const startDay=Math.max(1,parseInt(sdVocab.startVocabDay)||1);
                    const totalDays=(deck.days||[]).length;
                    
                    // 그 주 학습일들 찾기 (평가일과 같은 주, 평가일 이전)
                    const weekMon=getWeekMonday(sess.date);
                    const weekLearnSessions=allSessions.filter(x=>!x.isWeeklyTest&&getWeekMonday(x.date).getTime()===weekMon.getTime()&&x.date<sess.date);
                    
                    if(weekLearnSessions.length>0){
                        // 각 학습일의 DAY 범위 계산 + 실전평가 완료 검증
                        let weekDayStart=null;
                        let weekDayEnd=null;
                        let allRealExamPassed=true;
                        // 실전평가 데이터
                        const reKeyW='rl_vc_realexam';
                        let reRawW=null;
                        try{reRawW=RL_STORE.get(reKeyW);}catch(e){}
                        const reAllW=reRawW?JSON.parse(reRawW):{};
                        
                        for(const ls of weekLearnSessions){
                            if(vocabStartDate&&ls.date<vocabStartDate)continue;
                            let lessonIdx=0;
                            for(let j=0;j<allSessions.length;j++){
                                const as=allSessions[j];
                                if(as.isWeeklyTest)continue;
                                if(vocabStartDate&&as.date<vocabStartDate)continue;
                                if(as.date.getTime()===ls.date.getTime())break;
                                lessonIdx++;
                            }
                            const lsDayStart=startDay+lessonIdx*homeworkPerDay;
                            const lsDayEnd=Math.min(lsDayStart+homeworkPerDay-1,totalDays);
                            if(lsDayStart>totalDays){allRealExamPassed=false;break;}
                            if(weekDayStart===null||lsDayStart<weekDayStart)weekDayStart=lsDayStart;
                            if(weekDayEnd===null||lsDayEnd>weekDayEnd)weekDayEnd=lsDayEnd;
                            // 실전평가 완료 확인
                            const reKeyW2=vocabDeckId+'/'+lsDayStart+'_'+homeworkPerDay;
                            if(!reAllW[reKeyW2]){
                                allRealExamPassed=false;
                                break;
                            }
                        }
                        
                        if(allRealExamPassed&&weekDayStart!==null){
                            // 주간평가 훈련/실전 점수 조회
                            const wTrainKey='rl_vc_weeklyexam_train';
                            const wExamKey='rl_vc_weeklyexam_exam';
                            let wTrainRaw=null,wExamRaw=null;
                            try{wTrainRaw=RL_STORE.get(wTrainKey);}catch(e){}
                            try{wExamRaw=RL_STORE.get(wExamKey);}catch(e){}
                            const wTrainAll=wTrainRaw?JSON.parse(wTrainRaw):{};
                            const wExamAll=wExamRaw?JSON.parse(wExamRaw):{};
                            const wKey=vocabDeckId+'/'+weekDayStart+'_'+weekDayEnd;
                            const wTrainRec=wTrainAll[wKey];
                            const wExamRec=wExamAll[wKey];
                            
                            // 주간평가 통과 기준 (admin 설정)
                            const settings=LS.g('settings')||{};
                            const weTarget=(settings.vocabFlow?.weeklyExam?.target)||80;
                            
                            // 진입 URL용 첫 DAY id
                            const firstDayObj=deck.days[weekDayStart-1];
                            const firstDayId=firstDayObj?firstDayObj.id:'';
                            
                            // 훈련 셀
                            if(wTrainRec){
                                vocabTrainCell=`<span class="sched-cell sc-weekly" title="주간평가 훈련 ${wTrainRec.bestScore}점" onclick="openVocabWeeklyExam('${vocabDeckId}','${firstDayId}','train',${weekDayStart},${weekDayEnd})">${wTrainRec.bestScore}점</span>`;
                                // 훈련 통과 시 실전 활성 (adminCompleted도 통과 처리)
                                if(wTrainRec.bestScore>=weTarget||wTrainRec.adminCompleted){
                                    if(wExamRec){
                                        vocabExamCell=`<span class="sched-cell sc-weekly" title="주간평가 실전 ${wExamRec.bestScore}점" onclick="openVocabWeeklyExam('${vocabDeckId}','${firstDayId}','exam',${weekDayStart},${weekDayEnd})">${wExamRec.bestScore}점</span>`;
                                    }else{
                                        vocabExamCell=`<span class="sched-cell sc-weekly" title="주간평가 실전 시작 (같은 범위, 새 문제)" onclick="openVocabWeeklyExam('${vocabDeckId}','${firstDayId}','exam',${weekDayStart},${weekDayEnd})">학습</span>`;
                                        if(isPreview()) vocabExamCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteWeeklyExam('${vocabDeckId}',${weekDayStart},${weekDayEnd})">완료</span>`;
                                    }
                                }else if(isPreview()){
                                    // 훈련 점수 미달 — 관리자 완료 버튼
                                    vocabTrainCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteWeeklyTrain('${vocabDeckId}',${weekDayStart},${weekDayEnd})">완료</span>`;
                                }
                            }else{
                                // 훈련 미진행 - 시작 버튼
                                vocabTrainCell=`<span class="sched-cell sc-weekly" title="주간평가 훈련 (DAY${weekDayStart}~${weekDayEnd} 누적)" onclick="openVocabWeeklyExam('${vocabDeckId}','${firstDayId}','train',${weekDayStart},${weekDayEnd})">학습</span>`;
                                if(isPreview()) vocabTrainCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteWeeklyTrain('${vocabDeckId}',${weekDayStart},${weekDayEnd})">완료</span>`;
                            }
                        }else if(isPreview()){
                            // 그 주 학습 미완료이지만 관리자 완료 가능
                            const homeworkPerDay2=Math.max(1,parseInt(sdVocab.vocabHomeworkPerDay)||1);
                            const startDay2=Math.max(1,parseInt(sdVocab.startVocabDay)||1);
                            vocabTrainCell=lockCell+`<br><span class="admin-done-btn" onclick="adminCompleteVocabTrain('${vocabDeckId}',${startDay2},${homeworkPerDay2})" title="관리자: 해당 주 학습 전체 완료 처리">완료</span>`;
                        }
                    }
                }
            }
        }
        
        rows+=`<tr${rowClass}>
            <td class="sched-td cell-date"><div class="sched-date-num">${dateStr}</div></td>
            <td class="sched-td cell-day">${kn}${sess.isWeeklyTest?' <span style="display:inline-block;width:8px;height:8px;background:#F59E0B;border-radius:50%;margin-left:3px;vertical-align:middle"></span>':''}</td>
            ${readingCells}
            <td class="sched-td cell-grammar-train">${grammarTrainCell}</td>
            <td class="sched-td cell-grammar-exam">${grammarExamCell}</td>
            <td class="sched-td cell-vocab-train">${vocabTrainCell}</td>
            <td class="sched-td cell-vocab-exam">${vocabExamCell}</td>
        </tr>`;
    });
    
    // ═══ 다음 숙제 하이라이트 카드 (영역별 3개) ═══
    const _sdVocab=getStudentData()||{};
    const _vocabDeckId=_sdVocab.textbooks?.vocab;
    // 📖 리딩
    let readingHW=null;
    if(nextHomework){
        const nh=nextHomework;
        if(nh.isWeeklyTest){
            const _wkId=nh.weekId;
            const _wkRec=LS.g('weekly_'+getUser().id+'_'+bookName+'_'+_wkId);
            const _wkPhase=(_wkRec&&_wkRec.trainDone)?'실전':'훈련';
            readingHW={label:`${bookName} · 🟠 주간평가 ${_wkPhase}`,sub:`${fmtDate(nh.date)} (${nh.dayKor}요일)`,onclick:`openWeeklyTest('${_wkId}','${_wkPhase==='실전'?'exam':'train'}')`,icon:'📖'};
        } else {
            readingHW={label:`${bookName} · Unit ${nh.unitNum} · ${nh.phase}`,sub:`${fmtDate(nh.date)} (${nh.dayKor}요일)`,onclick:`openUnit('${nh.uk}')`,icon:'📖'};
        }
    }
    // 📝 문법
    let grammarHW=null;
    console.log('[문법HW] grammarNextRowIdx:',grammarNextRowIdx,'sessGrammarUnit:',JSON.stringify(sessGrammarUnit),'sessWeeklyInfo:',JSON.stringify(sessWeeklyInfo));
    if(grammarNextRowIdx>=0){
        const gSess=sessions[grammarNextRowIdx];
        const gUnit=sessGrammarUnit[grammarNextRowIdx];
        if(gSess.isWeeklyTest){
            grammarHW={label:`${s.textbooks?.grammar||'문법'} · 🟠 주간평가`,sub:`${fmtDate(gSess.date)} (${dayKor[gSess.date.getDay()]}요일)`,onclick:`window.location.href='${getGrammarUrl(parseInt(s.startGrammarPoint||'1'))}'`,icon:'📝'};
        } else {
            const scD=_gRecords.selfChecks?.[gUnit];
            const lastSc=(scD?.attempts?.length>0)?scD.attempts[scD.attempts.length-1]:null;
            // 재시험 룰: 1회차 80점 미만은 '재시험', 80점 이상 OR 2회차는 '실전'
            const _scAttemptsHW = scD?.attempts?.length || 0;
            const gPhase=!lastSc?'훈련':((lastSc.passed || _scAttemptsHW >= 2)?'실전':'재시험');
            // 나모그: gUnit=Chapter, 라벨 "Chapter", URL에도 그대로
            // 문마중: gUnit=Unit, 라벨 "Unit", URL은 (Unit-1)*4+1
            const _gHWPt=_isNamogRow?gUnit:(gUnit-1)*4+1;
            const _gHWLabel=_isNamogRow?`Ch ${gUnit}`:`Unit ${gUnit}`;
            grammarHW={label:`${s.textbooks?.grammar||'문법'} · ${_gHWLabel} · ${gPhase}`,sub:`${fmtDate(gSess.date)} (${dayKor[gSess.date.getDay()]}요일)`,onclick:`window.location.href='${getGrammarUrl(_gHWPt)}'`,icon:'📝'};
        }
    }
    // 🔤 단어
    let vocabHW=null;
    if(_vocabDeckId){
        const vIdx2=LS.g('vocab_index')||{};
        const vDeck=vIdx2[_vocabDeckId];
        if(vDeck&&(vDeck.days||[]).length>0){
            const hpd=Math.max(1,parseInt(_sdVocab.vocabHomeworkPerDay)||1);
            const vocabStartDate2=_sdVocab.startVocabDate?new Date(_sdVocab.startVocabDate+'T00:00:00'):null;
            const deckName2=vDeck.name||_vocabDeckId;
            // 가장 가까운 미완료 단어 세션 찾기 (학습일 + 평가일)
            for(let i=0;i<sessions.length;i++){
                const vs=sessions[i];
                if(vs.isWeeklyTest){
                    // 평가일: 주간평가 실전 완료 여부 확인
                    const weExamKey2='rl_vc_weeklyexam_exam';
                    let weEA2={};
                    try{weEA2=JSON.parse(RL_STORE.get(weExamKey2)||'{}');}catch(e){}
                    // 이 평가일의 주간 범위 찾기
                    const wMon2=getWeekMonday(vs.date);
                    const wLearn2=allSessions.filter(x=>!x.isWeeklyTest&&getWeekMonday(x.date).getTime()===wMon2.getTime()&&x.date<vs.date);
                    if(wLearn2.length>0){
                        let wDS2=null,wDE2=null;
                        for(const wl of wLearn2){
                            if(vocabStartDate2&&wl.date<vocabStartDate2)continue;
                            let li=0;
                            for(const as3 of allSessions){
                                if(as3.isWeeklyTest)continue;
                                if(vocabStartDate2&&as3.date<vocabStartDate2)continue;
                                if(as3.date.getTime()===wl.date.getTime())break;
                                li++;
                            }
                            const ds=Math.max(1,parseInt(_sdVocab.startVocabDay)||1)+li*hpd;
                            const de=Math.min(ds+hpd-1,vDeck.days.length);
                            if(wDS2===null||ds<wDS2)wDS2=ds;
                            if(wDE2===null||de>wDE2)wDE2=de;
                        }
                        if(wDS2!==null){
                            const wk2=_vocabDeckId+'/'+wDS2+'_'+wDE2;
                            if(!weEA2[wk2]){
                                const weTrainKey2='rl_vc_weeklyexam_train';
                                let weTA2={};
                                try{weTA2=JSON.parse(RL_STORE.get(weTrainKey2)||'{}');}catch(e){}
                                const wPhase=weTA2[wk2]?'실전':'훈련';
                                vocabHW={label:`${deckName2} · 🟠 주간평가 ${wPhase}`,sub:`${fmtDate(vs.date)} (${dayKor[vs.date.getDay()]}요일)`,onclick:`openVocabWeeklyExam('${_vocabDeckId}','${vDeck.days[wDS2-1]?.id||''}','${wPhase==='실전'?'exam':'train'}',${wDS2},${wDE2})`,icon:'🔤'};
                                break;
                            }
                        }
                    }
                    continue;
                }
                if(vocabStartDate2&&vs.date<vocabStartDate2)continue;
                let lIdx=0;
                for(let j=0;j<allSessions.length;j++){
                    const as2=allSessions[j];
                    if(as2.isWeeklyTest)continue;
                    if(vocabStartDate2&&as2.date<vocabStartDate2)continue;
                    if(as2.date.getTime()===vs.date.getTime())break;
                    lIdx++;
                }
                const vDayStart=Math.max(1,parseInt(_sdVocab.startVocabDay)||1)+lIdx*hpd;
                if(vDayStart>vDeck.days.length)continue;
                const vScKey='rl_vc_selfcheck';

                try{vReAll2=JSON.parse(RL_STORE.get(vReKey)||'{}');}catch(e){}
                const vk=_vocabDeckId+'/'+vDayStart+'_'+hpd;
                if(!vReAll2[vk]){
                    const vPhase=vScAll2[vk]&&vScAll2[vk].passed?'실전':'훈련';
                    vocabHW={label:`${deckName2} · DAY${vDayStart}${hpd>1?'~'+(vDayStart+hpd-1):''} · ${vPhase}`,sub:`${fmtDate(vs.date)} (${dayKor[vs.date.getDay()]}요일)`,onclick:`openVocabTrain('${_vocabDeckId}',${vDayStart},${hpd})`,icon:'🔤'};

                }
            }
        }
    }

    </div>`:'';
    const homeworkCard=_hwCard(readingHW,'#3B82F6')+_hwCard(grammarHW,'#A855F7')+_hwCard(vocabHW,'#F59E0B');
    
    return `${homeworkCard}<div class="sched-wrap" style="position:relative"><table class="sched sched-pretty">
        <thead>
            <tr class="sched-head-main">
                <th rowspan="2" class="sched-th-base">날짜</th>
                <th rowspan="2" class="sched-th-base">요일</th>
                <th colspan="2" class="sched-th-reading">📖 리딩</th>
                <th colspan="2" class="sched-th-grammar">📝 문법</th>
                <th colspan="2" class="sched-th-vocab">📚 단어</th>
            </tr>
            <tr class="sched-head-sub">
                <th class="sched-sub-th sub-train sub-reading">훈련</th>
                <th class="sched-sub-th sub-exam">실전</th>
                <th class="sched-sub-th sub-train sub-grammar">훈련</th>
                <th class="sched-sub-th sub-exam">실전</th>
                <th class="sched-sub-th sub-train sub-vocab">훈련</th>
                <th class="sched-sub-th sub-exam">실전</th>
            </tr>
        </thead>
        <tbody>${rows}</tbody>
    </table></div>
    ${state.schedTab==='week'||state.schedTab==='monthly'?(()=>{
        if(state.schedTab!=='week')return '';
        // 간단한 완료 체크: 모든 셀이 점수(N점) 표시이면 완료
        // "학습" 버튼이나 잠금 셀이 하나라도 있으면 미완료
        const hasIncomplete=rows.includes('>학습</span>')||rows.includes('sc-locked')||rows.includes('sc-pending')||rows.includes('admin-done-btn');
        const allDone=sessions.length>0&&!hasIncomplete;
        if(allDone){
            return `<div style="text-align:center;margin-top:20px">
                <button onclick="advanceWeek()" style="background:#10B981;color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(16,185,129,.3)">
                    Next Week →
                </button>
                <div style="font-size:12px;color:var(--text3);margin-top:8px">이번 주 학습 완료! 다음 주 일정으로 넘어갑니다</div>

                <button disabled style="background:#9CA3AF;color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:700;cursor:default;opacity:0.5">

                </button>

    <div class="sched-legend">
        <span>📌 ${fmtDate(filterStart)} ~ ${fmtDate(displayEnd)} 학습 일정</span>
        <span><span class="legend-dot legend-done"></span>학습 완료 / 다음 숙제</span>

        <span class="legend-lock"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg> 잠금</span>
    </div>`;
}

function advanceWeek(){
    const awKey='rl_active_week';
    const sd=getStudentData()||{};
    const startDate=sd.startDate?new Date(sd.startDate+'T00:00:00'):new Date();
    const stored=RL_STORE.get(awKey);
    let current=stored?new Date(stored+'T00:00:00'):getWeekMonday(startDate);
    current=getWeekMonday(current);
    const next=addDays(current,7);
    RL_STORE.set(awKey,fmtDateISO(next));
    render();
}

// 월간일정 렌더링 (renderSchedule과 동일하지만 월 단위)
function renderMonthlySchedule(s){
    // schedTab을 임시로 monthly로 설정하고 renderSchedule 호출
    const origTab=state.schedTab;
    state.schedTab='monthly';
    const result=renderSchedule(s);
    state.schedTab=origTab;
    return result;
}

// 📊 누적학습일정 — 교재별 학습 히스토리
// ════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════
// 📋 학습현황 — 당일 숙제 현황 (리딩/문법/단어 영역별)
// ════════════════════════════════════════════════════════════════
function renderTodayStatus(s){
    const today=new Date();today.setHours(0,0,0,0);
    const dayKor=['일','월','화','수','목','금','토'];
    const bookName=s.textbooks?.reading;
    const ba=(getArticles()||{})[bookName]||{};
    
    // 전체 세션에서 오늘에 해당하는 세션 찾기
    const sd2=getStudentData()||{};
    const startDate=sd2.startDate?new Date(sd2.startDate+'T00:00:00'):today;
    const allSess=buildAllSessions(sd2);
    const todaySess=allSess.find(x=>x.date.getTime()===today.getTime());
    
    const todayStr=`${today.getMonth()+1}/${today.getDate()} (${dayKor[today.getDay()]}요일)`;
    
    if(!todaySess){
        return `<div style="text-align:center;padding:40px 20px">
            <div style="font-size:48px;margin-bottom:12px">😊</div>
            <div style="font-size:16px;font-weight:700;color:var(--text1);margin-bottom:6px">오늘은 수업이 없는 날이에요</div>
            <div style="font-size:13px;color:var(--text3)">${todayStr}</div>
        </div>`;
    }
    
    let html=`<div style="font-size:13px;color:var(--text3);margin-bottom:16px;font-weight:600">📋 ${todayStr} ${todaySess.isWeeklyTest?'평가일':'학습일'} 숙제 현황</div>`;
    
    // ─── 📖 리딩 ───
    html+=`<div style="margin-bottom:16px">
        <div style="font-size:14px;font-weight:700;color:#3B82F6;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #3B82F6">📖 리딩</div>`;
    if(todaySess.isWeeklyTest){
        const weekId=fmtDateISO(todaySess.date);
        const wkRec=LS.g('weekly_'+getUser().id+'_'+bookName+'_'+weekId);
        const trainDone=wkRec&&wkRec.trainDone;
        const examDone=wkRec&&wkRec.examDone;
        html+=_todayItem('복습 (주간평가)',trainDone?'완료':'미완료',trainDone,`openWeeklyTest('${weekId}','train')`);
        html+=_todayItem('시험 (주간평가)',examDone?(wkRec.score+'점'):'미완료',examDone,trainDone?`openWeeklyTest('${weekId}','exam')`:null);
    } else {
        const uk='unit'+todaySess.unitNum;
        const unit=ba[uk];
        if(unit){
            const arts=unit.articles||[];
            const sc=getUnitScores(bookName,uk,arts.length);
            const artDone=sc.articles.filter(a=>a!==null).length;
            html+=_todayItem(`Unit ${todaySess.unitNum} 훈련 (지문 ${artDone}/${arts.length})`,sc.trainRec?(sc.trainTotal!==null?sc.trainTotal+'점':'완료'):'미완료',!!sc.trainRec,`openUnit('${uk}')`);
            html+=_todayItem(`Unit ${todaySess.unitNum} 실전`,sc.exam!==null?sc.exam+'점':'미완료',sc.exam!==null,sc.trainRec?`openUnit('${uk}')`:null);
        } else {
            html+=`<div style="padding:10px;font-size:13px;color:var(--text3)">콘텐츠 준비중</div>`;
        }
    }
    html+=`</div>`;
    
    // ─── 📝 문법 ───
    html+=`<div style="margin-bottom:16px">
        <div style="font-size:14px;font-weight:700;color:#A855F7;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #A855F7">📝 문법</div>`;
    if(s.startGrammarPoint){
        const _gRec=getGrammarRecords();
        // 오늘의 문법 Unit/Chapter 계산 (학습일 순서에서 계산)
        let gLessonIdx=0;
        for(const as of allSess){
            if(as.isWeeklyTest)continue;
            if(as.date.getTime()===todaySess.date.getTime())break;
            gLessonIdx++;
        }
        // 나모그: P=Chapter 1:1, 문마중: 4P=1Unit
        const _gLevelTd=getStudentGrammarLevel(s);
        const _isNamogTd=isNamogLevel(_gLevelTd);
        const _startGU=_isNamogTd?parseInt(s.startGrammarPoint||'1'):Math.ceil(parseInt(s.startGrammarPoint||'1')/4);
        if(todaySess.isWeeklyTest){
            // 주간평가
            const weekMon=getWeekMonday(todaySess.date);
            const weekLessons=allSess.filter(x=>!x.isWeeklyTest&&getWeekMonday(x.date).getTime()===weekMon.getTime()&&x.date<todaySess.date);
            const wFrom=_startGU+Math.max(0,gLessonIdx-weekLessons.length);
            const wTo=_startGU+gLessonIdx-1;
            const wIdx=Math.ceil((wFrom-_startGU+1)/2)||1;
            const wscData=_gRec.weeklySC?.[wIdx];
            const lastWsc=(wscData?.attempts?.length>0)?wscData.attempts[wscData.attempts.length-1]:null;
            const wexData=_gRec.weeklyExam?.[wIdx];
            const lastWex=(wexData?.attempts?.length>0)?wexData.attempts[wexData.attempts.length-1]:null;
            html+=_todayItem('주간 셀프체크',lastWsc?lastWsc.pct+'점':'미완료',!!lastWsc,`window.location.href='${getGrammarUrl(wFrom)}&wsc=${wIdx}&from=${wFrom}&to=${wTo}'`);
            html+=_todayItem('주간 실전평가',lastWex?lastWex.pct+'점':'미완료',!!lastWex,(lastWsc&&(lastWsc.passed||wscData?.attempts?.length>=2))?`window.location.href='${getGrammarUrl(wFrom)}&wex=${wIdx}&from=${wFrom}&to=${wTo}'`:null);
        } else {
            const gUnit=_startGU+gLessonIdx;
            const scData=_gRec.selfChecks?.[gUnit];
            const lastSc=(scData?.attempts?.length>0)?scData.attempts[scData.attempts.length-1]:null;
            const exData=_gRec.exams?.[gUnit];
            const lastEx=(exData?.attempts?.length>0)?exData.attempts[exData.attempts.length-1]:null;
            // 나모그: gUnit=Chapter, URL 직접 / 문마중: (Unit-1)*4+1
            const _gTdPt=_isNamogTd?gUnit:(gUnit-1)*4+1;
            const _gTdLabel=_isNamogTd?`Ch ${gUnit}`:`Unit ${gUnit}`;
            html+=_todayItem(`${_gTdLabel} 셀프체크`,lastSc?lastSc.pct+'점'+(lastSc.passed?' ✓':''):'미완료',lastSc&&lastSc.passed,`window.location.href='${getGrammarUrl(_gTdPt)}'`);
            html+=_todayItem(`${_gTdLabel} 실전평가`,lastEx?lastEx.pct+'점':'미완료',!!lastEx,lastSc&&lastSc.passed?`window.location.href='${getGrammarUrl(_gTdPt)}&exam=${gUnit}'`:null);
        }
    } else {
        html+=`<div style="padding:10px;font-size:13px;color:var(--text3)">문법 교재가 설정되지 않았습니다.</div>`;
    }
    html+=`</div>`;
    
    // ─── 🔤 단어 ───
    html+=`<div style="margin-bottom:8px">
        <div style="font-size:14px;font-weight:700;color:#F59E0B;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #F59E0B">🔤 단어</div>`;
    const vocabDeckId2=sd2.textbooks?.vocab;
    if(vocabDeckId2){
        const vIdx2=LS.g('vocab_index')||{};
        const vDeck=vIdx2[vocabDeckId2];
        if(vDeck&&(vDeck.days||[]).length>0){
            const hpd=Math.max(1,parseInt(sd2.vocabHomeworkPerDay)||1);
            const vStartDay=Math.max(1,parseInt(sd2.startVocabDay)||1);
            const vocabSD=sd2.startVocabDate?new Date(sd2.startVocabDate+'T00:00:00'):null;
            
            if(todaySess.isWeeklyTest){
                // 주간평가 현황
                const wTrainKey='rl_vc_weeklyexam_train';
                const wExamKey='rl_vc_weeklyexam_exam';
                let wTA={},wEA={};
                try{wTA=JSON.parse(RL_STORE.get(wTrainKey)||'{}');}catch(e){}
                try{wEA=JSON.parse(RL_STORE.get(wExamKey)||'{}');}catch(e){}
                // 이번 주 범위 찾기 (간단히 표시)
                const anyTrainKey=Object.keys(wTA).find(k=>k.startsWith(vocabDeckId2+'/'));
                const anyExamKey=Object.keys(wEA).find(k=>k.startsWith(vocabDeckId2+'/'));
                html+=_todayItem('주간평가 훈련',anyTrainKey?wTA[anyTrainKey].bestScore+'점':'미완료',!!anyTrainKey,null);
                html+=_todayItem('주간평가 실전',anyExamKey?wEA[anyExamKey].bestScore+'점':'미완료',!!anyExamKey,null);
            } else {
                // 학습일 — 이 수업의 DAY 범위 계산
                let vLessonIdx=0;
                for(const as of allSess){
                    if(as.isWeeklyTest)continue;
                    if(vocabSD&&as.date<vocabSD)continue;
                    if(as.date.getTime()===todaySess.date.getTime())break;
                    vLessonIdx++;
                }
                const dayStart=vStartDay+vLessonIdx*hpd;
                const dayEnd=Math.min(dayStart+hpd-1,vDeck.days.length);
                if(dayStart<=vDeck.days.length){
                    const scKey2='rl_vc_selfcheck';
                    const reKey2='rl_vc_realexam';
                    let scA2={},reA2={};
                    try{scA2=JSON.parse(RL_STORE.get(scKey2)||'{}');}catch(e){}
                    try{reA2=JSON.parse(RL_STORE.get(reKey2)||'{}');}catch(e){}
                    const vk=vocabDeckId2+'/'+dayStart+'_'+hpd;
                    const scRec2=scA2[vk];
                    const reRec2=reA2[vk];
                    html+=_todayItem(`DAY${dayStart}${hpd>1?'~'+dayEnd:''} 훈련 (셀프체크)`,scRec2?scRec2.bestScore+'점'+(scRec2.passed?' ✓':''):'미완료',scRec2&&scRec2.passed,`openVocabTrain('${vocabDeckId2}',${dayStart},${hpd})`);
                    html+=_todayItem(`DAY${dayStart}${hpd>1?'~'+dayEnd:''} 실전`,reRec2?reRec2.bestScore+'점':'미완료',!!reRec2,scRec2&&scRec2.passed?`openVocabExam('${vocabDeckId2}',${dayStart},${hpd})`:null);
                } else {
                    html+=`<div style="padding:10px;font-size:13px;color:var(--text3)">단어장 범위를 초과했습니다.</div>`;
                }
            }
        } else {
            html+=`<div style="padding:10px;font-size:13px;color:var(--text3)">단어장 데이터가 없습니다.</div>`;
        }
    } else {
        html+=`<div style="padding:10px;font-size:13px;color:var(--text3)">단어장이 설정되지 않았습니다.</div>`;
    }
    html+=`</div>`;
    return html;
}

// 학습현황 항목 헬퍼
function _todayItem(label,status,done,onclick){
    const bg=done?'#F0FDF4':'#FFF';
    const border=done?'#BBF7D0':'#E5E7EB';
    const statusColor=done?'#10B981':'#F59E0B';
    const icon=done?'✅':'⬜';
    const clickAttr=onclick?`onclick="${onclick}" style="cursor:pointer;border:1px solid ${border};background:${bg};border-radius:10px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between"`:`style="border:1px solid ${border};background:${bg};border-radius:10px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;opacity:0.5"`;
    return `<div ${clickAttr}>
        <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:16px">${icon}</span>
            <span style="font-size:14px;font-weight:600">${label}</span>
        </div>
        <span style="font-size:13px;font-weight:700;color:${statusColor}">${status}${onclick&&!done?' →':''}</span>
    </div>`;
}

function renderCumulativeHistory(s){
    const tab=state.cumulativeTab||'reading';
    let content='';
    if(tab==='reading') content=_cumReading(s);
    else if(tab==='grammar') content=_cumGrammar(s);
    else content=_cumVocab(s);
    
    return `<div class="seg" style="margin-bottom:16px;justify-content:center">
        <button class="seg-btn ${tab==='reading'?'active':''}" onclick="state.cumulativeTab='reading';render()">📖 리딩</button>
        <button class="seg-btn ${tab==='grammar'?'active':''}" onclick="state.cumulativeTab='grammar';render()">📝 문법</button>
        <button class="seg-btn ${tab==='vocab'?'active':''}" onclick="state.cumulativeTab='vocab';render()">🔤 단어</button>
    </div>${content}`;
}

function _cumReading(s){
    const bookName=s.textbooks?.reading;
    if(!bookName) return '<p style="color:var(--text3);font-size:13px">리딩 교재가 설정되지 않았습니다.</p>';
    const articles=getArticles();
    const ba=articles[bookName]||{};
    const units=Object.keys(ba).filter(k=>k.startsWith('unit')).sort((a,b)=>{
        const na=parseInt(a.replace('unit',''));const nb=parseInt(b.replace('unit',''));return na-nb;
    });
    if(units.length===0) return '<p style="color:var(--text3);font-size:13px">등록된 유닛이 없습니다.</p>';
    
    let html=`<div style="font-size:13px;color:var(--text3);margin-bottom:12px;font-weight:600">📖 ${bookName}</div>`;
    units.forEach(uk=>{
        const unit=ba[uk];
        const arts=unit.articles||[];
        const unitNum=parseInt(uk.replace('unit',''));
        const sc=getUnitScores(bookName,uk,arts.length);
        const artDone=sc.articles.filter(a=>a!==null).length;
        
        // 상태 뱃지
        let statusHTML='';
        const parts=[];
        if(artDone>0) parts.push(`지문 ${artDone}/${arts.length}`);
        if(sc.trainRec) parts.push(`훈련 ${sc.trainTotal!==null?sc.trainTotal:0}점`);
        if(sc.exam!==null) parts.push(`실전 ${sc.exam}점`);
        if(parts.length===0) parts.push('미학습');
        statusHTML=parts.join(' · ');
        
        const hasSomeData=artDone>0||sc.trainRec||sc.exam!==null;
        const isDone=sc.exam!==null;
        const borderColor=isDone?'#10B981':hasSomeData?'#F59E0B':'#E5E7EB';
        const bgColor=isDone?'#F0FDF4':hasSomeData?'#FFFBEB':'#fff';
        
        html+=`<div style="border:1px solid ${borderColor};border-radius:12px;padding:14px 16px;margin-bottom:10px;background:${bgColor};cursor:${hasSomeData?'pointer':'default'}" 
            ${hasSomeData?`onclick="this.querySelector('.cum-detail').style.display=this.querySelector('.cum-detail').style.display==='none'?'block':'none'"`:''}>
            <div style="display:flex;align-items:center;gap:10px">
                <div style="width:32px;height:32px;border-radius:50%;background:${isDone?'#10B981':hasSomeData?'#F59E0B':'#E5E7EB'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">${unitNum}</div>
                <div style="flex:1">
                    <div style="font-weight:700;font-size:14px">Unit ${unitNum}</div>
                    <div style="font-size:12px;color:var(--text3)">${statusHTML}</div>
                </div>
                ${hasSomeData?'<span style="color:var(--text3);font-size:12px">▼</span>':''}
            </div>
            ${hasSomeData?`<div class="cum-detail" style="display:none;margin-top:12px;padding-top:12px;border-top:1px dashed ${borderColor}">
                ${arts.map((art,idx)=>{
                    const artScore=sc.articles[idx];
                    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid #F3F4F6">
                        <span>📄 ${art.title||'Article '+(idx+1)}</span>
                        <span style="color:${artScore!==null?'#10B981':'var(--text3)'}">${artScore!==null?artScore+'점':'미완료'}</span>
                    </div>`;
                }).join('')}
                <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">
                    <button class="nav-btn" style="font-size:12px;padding:5px 12px" onclick="event.stopPropagation();openUnit('${uk}')">📖 유닛 열기</button>
                </div>
            </div>`:''}
        </div>`;
    });
    return html;
}

function _cumGrammar(s){
    const grammarBook=s.textbooks?.grammar;
    if(!grammarBook) return '<p style="color:var(--text3);font-size:13px">문법 교재가 설정되지 않았습니다.</p>';
    const records=getGrammarRecords();
    const startPt=parseInt(s.startGrammarPoint||'1');
    // 나모그: P=Chapter 1:1, 문마중: 4P=1Unit
    const _gLevelCum=getStudentGrammarLevel(s);
    const _isNamogCum=isNamogLevel(_gLevelCum);
    const startUnit=_isNamogCum?startPt:Math.ceil(startPt/4);
    // 가장 높은 Unit 찾기 — startUnit부터 끝까지 모두 표시
    const curPt=parseInt(getCurrentGrammarPoint()||startPt);
    const curUnit=_isNamogCum?curPt:Math.ceil(curPt/4);
    let maxUnit=startUnit;
    Object.keys(records.selfChecks||{}).forEach(u=>{const n=parseInt(u);if(n>maxUnit)maxUnit=n;});
    Object.keys(records.exams||{}).forEach(u=>{const n=parseInt(u);if(n>maxUnit)maxUnit=n;});
    if(curUnit>maxUnit) maxUnit=curUnit;
    // 나모그: 챕터 총 개수 (L1=13, L2=12)에서 멈춤
    // 문마중: 데이터 끝 + 4 (또는 startUnit + 12 최소)
    if(_isNamogCum){
        const _namogMax=_gLevelCum==='namog2'?12:13;
        maxUnit=Math.min(_namogMax,Math.max(maxUnit,startUnit));
    } else {
        maxUnit=Math.max(maxUnit+4, startUnit+12);
    }
    const sorted=[];
    for(let u=startUnit;u<=maxUnit;u++) sorted.push(u);
    
    let html=`<div style="font-size:13px;color:var(--text3);margin-bottom:12px;font-weight:600">📝 ${grammarBook}</div>`;
    sorted.forEach(unitNum=>{
        const scData=records.selfChecks?.[unitNum];
        const lastSc=(scData?.attempts?.length>0)?scData.attempts[scData.attempts.length-1]:null;
        const exData=records.exams?.[unitNum];
        const lastEx=(exData?.attempts?.length>0)?exData.attempts[exData.attempts.length-1]:null;
        
        const parts=[];
        if(lastSc) parts.push(`셀프체크 ${lastSc.pct}점${lastSc.passed?' ✓':''}`);
        if(lastEx) parts.push(`실전 ${lastEx.pct}점${lastEx.passed?' ✓':''}`);
        if(parts.length===0) parts.push('미학습');
        
        const isDone=!!lastEx;
        const hasSomeData=!!lastSc||!!lastEx;
        const borderColor=isDone?'#10B981':hasSomeData?'#A855F7':'#E5E7EB';
        const bgColor=isDone?'#F0FDF4':hasSomeData?'#FAF5FF':'#fff';
        // 나모그: URL용 Point = unitNum (Chapter), 라벨도 "Chapter"
        // 문마중: URL용 Point = (unitNum-1)*4+1, 라벨에 P범위 표시
        const unitFirstPt=_isNamogCum?unitNum:(unitNum-1)*4+1;
        const _unitLabel=_isNamogCum?`Chapter ${unitNum}`:`Unit ${unitNum} <span style="font-size:11px;color:var(--text3);font-weight:400">(P${unitFirstPt}~P${unitNum*4})</span>`;
        
        html+=`<div style="border:1px solid ${borderColor};border-radius:12px;padding:14px 16px;margin-bottom:10px;background:${bgColor};cursor:${hasSomeData?'pointer':'default'}"
            ${hasSomeData?`onclick="this.querySelector('.cum-detail').style.display=this.querySelector('.cum-detail').style.display==='none'?'block':'none'"`:''}>
            <div style="display:flex;align-items:center;gap:10px">
                <div style="width:32px;height:32px;border-radius:50%;background:${isDone?'#10B981':hasSomeData?'#A855F7':'#E5E7EB'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">${unitNum}</div>
                <div style="flex:1">
                    <div style="font-weight:700;font-size:14px">${_unitLabel}</div>
                    <div style="font-size:12px;color:var(--text3)">${parts.join(' · ')}</div>
                </div>
                ${hasSomeData?'<span style="color:var(--text3);font-size:12px">▼</span>':''}
            </div>
            ${hasSomeData?`<div class="cum-detail" style="display:none;margin-top:12px;padding-top:12px;border-top:1px dashed ${borderColor}">
                ${lastSc?`<div style="padding:6px 0;font-size:13px">📝 셀프체크: ${scData.attempts.map((a,i)=>`<span style="color:${a.passed?'#10B981':'#F59E0B'}">${a.attempt}차 ${a.pct}점</span>`).join(' → ')}</div>`:''}
                ${lastEx?`<div style="padding:6px 0;font-size:13px">🏆 실전평가: ${exData.attempts.map((a,i)=>`<span style="color:${a.passed?'#10B981':'#F59E0B'}">${a.attempt}차 ${a.pct}점</span>`).join(' → ')}</div>`:''}
                <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px">
                    <button class="nav-btn" style="font-size:12px;padding:5px 12px" onclick="event.stopPropagation();window.location.href='${getGrammarUrl(unitFirstPt)}'">📝 학습하기</button>
                    ${lastSc?`<button class="nav-btn" style="font-size:12px;padding:5px 12px" onclick="event.stopPropagation();window.location.href='${getGrammarUrl(unitFirstPt)}&scReview=${unitNum}'">↺ 셀프체크</button>`:''}
                    ${lastEx?`<button class="nav-btn" style="font-size:12px;padding:5px 12px" onclick="event.stopPropagation();window.location.href='${getGrammarUrl(unitFirstPt)}&examReview=${unitNum}'">↺ 실전평가</button>`:''}
                </div>
            </div>`:''}
        </div>`;
    });
    return html;
}

function _cumVocab(s){
    const deckId=s.textbooks?.vocab;
    if(!deckId) return '<p style="color:var(--text3);font-size:13px">단어장이 설정되지 않았습니다.</p>';
    const vIdx=LS.g('vocab_index')||{};
    const deck=vIdx[deckId];
    if(!deck||!(deck.days||[]).length) return '<p style="color:var(--text3);font-size:13px">단어장 데이터가 없습니다.</p>';
    
    // 저장소 로드
    const dcKey='rl_vc_daycheck';
    const scKey='rl_vc_selfcheck';
    const reKey='rl_vc_realexam';
    let dcAll={},scAll={},reAll={},gameAll={};
    try{dcAll=JSON.parse(RL_STORE.get(dcKey)||'{}');}catch(e){}
    try{scAll=JSON.parse(RL_STORE.get(scKey)||'{}');}catch(e){}
    try{reAll=JSON.parse(RL_STORE.get(reKey)||'{}');}catch(e){}
    try{gameAll=JSON.parse(RL_STORE.get('rl_vocab_game_scores')||'{}');}catch(e){}
    
    const homeworkPerDay=Math.max(1,parseInt(s.vocabHomeworkPerDay)||1);
    const startDay=Math.max(1,parseInt(s.startVocabDay)||1);
    const totalDays=deck.days.length;
    const gameNames={speed:'⚡ 속도전',match:'🃏 매칭',mole:'🔨 두더지'};
    
    let html=`<div style="font-size:13px;color:var(--text3);margin-bottom:12px;font-weight:600">🔤 ${deck.name}</div>`;
    
    for(let dayNum=startDay;dayNum<=totalDays;dayNum++){
        const dayObj=deck.days[dayNum-1];
        if(!dayObj)continue;
        const dayKey=deckId+'/'+dayObj.id;
        const dcRec=dcAll[dayKey];
        const games=gameAll[dayKey]||{};
        const gameCount=Object.keys(games).length;
        
        const parts=[];
        if(gameCount>0) parts.push(`게임 ${gameCount}/3`);
        if(dcRec) parts.push(`데이체크 ${dcRec.bestScore}점${dcRec.passed?' ✓':''}`);
        if(parts.length===0) parts.push('미학습');
        
        const hasSomeData=gameCount>0||!!dcRec;
        const isDone=dcRec&&dcRec.passed;
        const borderColor=isDone?'#10B981':hasSomeData?'#F59E0B':'#E5E7EB';
        const bgColor=isDone?'#F0FDF4':hasSomeData?'#FFFBEB':'#fff';
        
        html+=`<div style="border:1px solid ${borderColor};border-radius:12px;padding:12px 16px;margin-bottom:8px;background:${bgColor};cursor:${hasSomeData?'pointer':'default'}"
            ${hasSomeData?`onclick="this.querySelector('.cum-detail').style.display=this.querySelector('.cum-detail').style.display==='none'?'block':'none'"`:''}>
            <div style="display:flex;align-items:center;gap:10px">
                <div style="width:28px;height:28px;border-radius:50%;background:${isDone?'#10B981':hasSomeData?'#F59E0B':'#E5E7EB'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">${dayNum}</div>
                <div style="flex:1">
                    <div style="font-weight:700;font-size:13px">DAY ${dayNum} <span style="font-size:11px;color:var(--text3);font-weight:400">${dayObj.name||''}</span></div>
                    <div style="font-size:12px;color:var(--text3)">${parts.join(' · ')}</div>
                </div>
                ${hasSomeData?'<span style="color:var(--text3);font-size:12px">▼</span>':''}
            </div>
            ${hasSomeData?`<div class="cum-detail" style="display:none;margin-top:10px;padding-top:10px;border-top:1px dashed ${borderColor};font-size:13px">
                ${Object.entries(games).map(([g,d])=>`<div style="padding:3px 0">${gameNames[g]||g}: ${d.score}점 (${d.accuracy}%)</div>`).join('')}
                ${dcRec?`<div style="padding:3px 0">✅ 데이체크: ${dcRec.bestScore}점 (${dcRec.attempts||1}회)</div>`:''}
                <div style="margin-top:8px">
                    <button class="nav-btn" style="font-size:12px;padding:5px 12px" onclick="event.stopPropagation();openVocabTrain('${deckId}',${dayNum},${homeworkPerDay})">🔄 다시 학습</button>
                </div>
            </div>`:''}
        </div>`;
        
        // 수업 단위 묶음 끝 (homeworkPerDay개씩) → 셀프체크/실전평가 표시
        if((dayNum-startDay+1)%homeworkPerDay===0||dayNum===totalDays){
            const groupStart=dayNum-((dayNum-startDay)%homeworkPerDay);
            const scK=deckId+'/'+groupStart+'_'+homeworkPerDay;
            const scRec=scAll[scK];
            const reRec=reAll[scK];
            if(scRec||reRec){
                html+=`<div style="margin:-4px 0 12px 20px;padding:8px 14px;background:#FAF5FF;border:1px solid #E9D5FF;border-radius:8px;font-size:12px">`;
                if(scRec) html+=`<div>📝 셀프체크 (DAY${groupStart}${homeworkPerDay>1?'~'+(groupStart+homeworkPerDay-1):''}): <b style="color:${scRec.passed?'#10B981':'#F59E0B'}">${scRec.bestScore}점</b> (${scRec.attempts||1}회)</div>`;
                if(reRec) html+=`<div>🏆 실전평가: <b style="color:#10B981">${reRec.bestScore}점</b> (${reRec.attempts||1}회)</div>`;
                html+=`</div>`;
            }
        }
    }
    return html;
}


/* ========== 유닛 상세 ========== */
function viewUnit(s){
    const bookName=s.textbooks?.reading;
    const articles=getArticles();
    const unit=articles[bookName]?.[state.unit];
    if(!unit)return '<div class="card"><div class="empty">유닛을 찾을 수 없습니다</div></div>';
    const arts=unit.articles||[];
    const done=getUnitDone(bookName,state.unit);
    const allArtsDone=isPreview()||(done.length>=arts.length&&arts.length>0);
    const trainRec=LS.g('train_'+getUser().id+'_'+bookName+'_'+state.unit);
    const assessRec=LS.g('assess_'+getUser().id+'_'+bookName+'_'+state.unit);
    const scores=getUnitScores(bookName,state.unit,arts.length);
    const expanded=state.expandedHistory;
    
    // 카드 한 줄을 생성하는 헬퍼
    const renderStep=(opts)=>{
        const {key,num,title,subtitle,score,isDone,isLocked,isNext,onClick,detail,iconBg,iconColor}=opts;
        const expandedNow=expanded===key;
        // 점수가 있으면 (isDone 무관) 표시 — 통과 못해도 점수 보임
        const showScore=score!==null&&score!==undefined;
        // 카드 본체 클릭 = 입장/재테스트 (이전 동작 유지)
        const cardClickJs=isLocked?'':(onClick||'');
        return `<div class="step-card ${isDone?'done':isNext?'current':'locked'}" style="cursor:${isLocked?'not-allowed':'pointer'}" onclick="${cardClickJs}">
            <div class="step-num" style="background:${iconBg};color:${iconColor}">${num}</div>
            <div style="flex:1;min-width:0">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
                    <div style="font-weight:700">${title}</div>
                    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                        ${showScore?`<span class="tag ${score>=80?'tag-green':score>=60?'tag-amber':'tag-red'}" style="font-weight:700">${score}점</span>`:isLocked?'<span style="font-size:12px;color:var(--text3)">잠금</span>':''}
                        ${detail?`<button class="btn-sm btn-ghost" onclick="event.stopPropagation();toggleUnitStep('${key}')" style="padding:4px 10px;min-width:auto;font-size:12px" title="결과 상세보기">${expandedNow?'▲ 닫기':'▼ 결과'}</button>`:''}
                    </div>
                </div>
                <div style="font-size:12px;color:var(--text3);margin-top:2px">${subtitle}${isDone?' · 카드 클릭 시 재학습':''}</div>
            </div>
        </div>
        ${expandedNow&&detail?detail:''}`;
    };
    
    // Article 카드들
    const artCards=arts.map((art,idx)=>{
        const isDone=done.includes(idx);
        const isNext=isPreview()||(!isDone&&(idx===0||done.includes(idx-1)));
        const isLocked=!isDone&&!isNext;
        return renderStep({
            key:'art_'+idx, num:isDone?'✓':(idx+1), title:art.title,
            subtitle:isDone?'완료':'기사 읽기 + 문제 풀기',
            score:scores.articles[idx], isDone, isLocked, isNext,
            onClick:isLocked?'':`openArticle(${idx})`,
            detail:isDone?renderArticleDetail(idx,scores):null,
            iconBg:isDone?'var(--green)':isNext?'var(--green-light)':'var(--bg3)',
            iconColor:isDone?'#fff':isNext?'var(--green-dark)':'var(--text3)'
        });
    }).join('');
    
    // 훈련모드 카드
    const trainInProgress=scores.trainInProgress;
    const trainStepsCount=scores.trainStepsCount;
    const trainTitle='🏋️ 훈련모드'+(trainInProgress?` <span style="display:inline-block;background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle">학습 진행중</span>`:'');
    const trainCard=renderStep({
        key:'train', num:trainRec?'✓':(trainInProgress?'…':'T'), title:trainTitle,
        subtitle:trainRec?'완료':trainInProgress?`${trainStepsCount}개 단계 완료 · 카드 클릭으로 이어 학습`:allArtsDone?'단어암기 · 문장훈련 · 셀프체크':'지문 '+arts.length+'개 완료 후 열림',
        score:(trainRec||trainInProgress)?scores.train:null, isDone:!!trainRec, isLocked:!allArtsDone, isNext:allArtsDone&&!trainRec,
        onClick:allArtsDone?'openTraining()':'',
        detail:(trainRec||trainInProgress)?renderTrainingDetail(scores):null,
        iconBg:trainRec?'var(--green)':trainInProgress?'#FEF3C7':allArtsDone?'var(--green-light)':'var(--bg3)',
        iconColor:trainRec?'#fff':trainInProgress?'#92400E':allArtsDone?'var(--green-dark)':'var(--text3)'
    });
    
    // 총 합산 (Article들 + 훈련모드 평균)
    const sumLine=scores.trainTotal!==null?`<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;margin:10px 0;background:var(--bg);border-radius:var(--radius-xs);border:1px dashed var(--border)">
        <div style="font-weight:700;color:var(--text2);font-size:14px">총 합산 <span style="font-size:11px;color:var(--text3);font-weight:500">(Article들 + 훈련모드 평균)</span></div>
        <span class="tag ${scores.trainTotal>=80?'tag-green':scores.trainTotal>=60?'tag-amber':'tag-red'}" style="font-size:14px;font-weight:800">${scores.trainTotal}점</span>
    </div>`:'';
    
    // 실전평가 카드 (한 번이라도 봤으면 잠금 해제 → 결과 보기/재시험 가능)
    const examUnlocked=isPreview()||!!trainRec||!!assessRec;
    const examCard=renderStep({
        key:'exam', num:assessRec?'✓':'!', title:'📝 실전평가',
        subtitle:assessRec?'완료':examUnlocked?'단어 + 문장배열 + 문장어법 종합':'훈련모드 완료 후 열림',
        score:assessRec?(assessRec.score||0):null, isDone:!!assessRec, isLocked:!examUnlocked, isNext:examUnlocked&&!assessRec,
        onClick:examUnlocked?'startExam()':'',
        detail:assessRec?renderExamDetail(assessRec):null,
        iconBg:assessRec?'var(--green)':examUnlocked?'var(--amber-light)':'var(--bg3)',
        iconColor:assessRec?'#fff':examUnlocked?'var(--amber)':'var(--text3)'
    });
    
    return `<div class="flex flex-between mb-24"><div><h2>${state.unit.replace('unit','Unit ')}</h2><div class="page-desc" style="margin:0">${bookName}</div></div><button class="btn-ghost" onclick="state.view='dashboard';render()">← 목록으로</button></div>
    <div style="max-width:680px;margin:0 auto">
        ${artCards}
        ${trainCard}
        ${sumLine}
        ${examCard}
    </div>`;
}

function toggleUnitStep(key){state.expandedHistory=state.expandedHistory===key?null:key;render();}

/* 점수 계산 */
function getUnitScores(bookName,unitKey,artCount){
    const uid=getUser().id;
    const progress=(LS.g('progress')||{})[uid]||[];
    const unitRecs=progress.filter(p=>p.unit===unitKey);
    // 각 article의 최신 점수
    const articles=[];
    for(let i=0;i<artCount;i++){
        const recs=unitRecs.filter(p=>p.articleIdx===i&&p.questions);
        const latest=recs.sort((a,b)=>b.timestamp-a.timestamp)[0];
        articles.push(latest?Math.round(latest.correctAnswers/latest.totalQuestions*100):null);
    }
    // 새 훈련 구조 keys
    const tk=(k)=>'trtype_'+uid+'_'+unitKey+'_'+k;
    const wl1=LS.g(tk('wordLearn1'));
    const wl2=LS.g(tk('wordLearn2'));
    const wSelf=LS.g(tk('wordSelf'));        // 2단계 단어 셀프체크
    const st1=LS.g(tk('sentTrain1'));
    const st2=LS.g(tk('sentTrain2'));
    const st3=LS.g(tk('sentTrain3'));
    const st4=LS.g(tk('sentTrain4'));
    const ssAll=LS.g(tk('sentSelf'));        // 4단계 통합 문장 셀프체크
    // 기존 호환 (구버전 데이터)
    const oldWord=LS.g(tk('word'));
    const oldArr=LS.g(tk('arrange'));
    const oldGram=LS.g(tk('grammar'));
    // 점수 합산용: 단어 셀프체크 + 문장 셀프체크 평균 (사용자 요청)
    // 문장 훈련의 s3, s4는 점수 합산 제외 (완료만)
    const scoredSteps=[wSelf?.score,ssAll?.score,
                       oldWord?.score,oldArr?.score,oldGram?.score].filter(x=>typeof x==='number');
    const train=scoredSteps.length>0?Math.round(scoredSteps.reduce((a,b)=>a+b,0)/scoredSteps.length):null;
    // 모든 단계 카운팅 (학습완료 단계 포함, 진행 상태 파악용)
    const allSteps=[wl1,wl2,wSelf,st1,st2,st3,st4,ssAll,oldWord,oldArr,oldGram].filter(x=>x);
    const trainStepsCount=allSteps.length;
    const trainRec=LS.g('train_'+uid+'_'+bookName+'_'+unitKey);
    const trainInProgress=!trainRec&&trainStepsCount>0;
    // 총 합산 = Article들 + 훈련 평균
    const all=[...articles.filter(x=>x!==null),...(train!==null?[train]:[])];
    const trainTotal=all.length>0?Math.round(all.reduce((a,b)=>a+b,0)/all.length):null;
    // 실전평가
    const assessRec=LS.g('assess_'+uid+'_'+bookName+'_'+unitKey);
    const exam=assessRec?(assessRec.score||0):null;
    return {articles,train,trainTotal,exam,wordRec:oldWord,arrangeRec:oldArr,grammarRec:oldGram,assessRec,trainRec,trainStepsCount,trainInProgress,
            wl1,wl2,wSelf,st1,st2,st3,st4,ssAll};
}

/* 펼쳤을 때 보이는 상세 */
function renderArticleDetail(idx,scores){
    const uid=getUser().id;
    const progress=(LS.g('progress')||{})[uid]||[];
    const recs=progress.filter(p=>p.unit===state.unit&&p.articleIdx===idx&&p.questions);
    const r=recs.sort((a,b)=>b.timestamp-a.timestamp)[0];

function viewReading(){
    const art=state.currentArticle;if(!art)return '';
    const isAssess=art.title==='실전평가';
    const answeredCount=Object.keys(state.answers||{}).length;
    const hasResume=answeredCount>0&&answeredCount<(art.questions||[]).length;
    const renderQuestion=(q,qi)=>{
        const hasPres=q.presentationBox&&q.presentationBox.trim();
        const hasSumm=q.summaryBox&&q.summaryBox.trim();
        const hasBoxes=Array.isArray(q.boxes)&&q.boxes.length>0;
        // boxes 배열 렌더링: "라벨|||내용" 형식 파싱
        const renderBoxes=()=>{
            return q.boxes.map(b=>{
                const sep=b.indexOf('|||');
                let label='',content=b;
                if(sep>=0){label=b.substring(0,sep).trim();content=b.substring(sep+3).trim();}
                return `<div class="pres-box pres-box-labeled">${label?`<div class="pres-box-label">${escU(label)}</div>`:''}<div>${escU(content)}</div></div>`;
            }).join('');
        };
        return `<div class="question-block">
            <div class="q-num-row"><div class="q-num">${qi+1}</div><div class="q-stem">${escU(stripQNum(q.question))}</div></div>
            ${hasSumm?`<div class="summ-box"><div class="summ-label">요약문</div><div>${escU(q.summaryBox)}</div></div>`:''}
            ${hasBoxes?renderBoxes():hasPres?`<div class="pres-box">${escU(q.presentationBox)}</div>`:''}
            <div class="options-wrap">
                ${q.options.map((o,oi)=>`<div class="q-option ${state.answers[qi]===oi?'selected':''}" onclick="answer(${qi},${oi})">
                    <input type="radio" name="q${qi}" ${state.answers[qi]===oi?'checked':''}><span><strong style="margin-right:6px">${['①','②','③','④','⑤'][oi]||oi+1}</strong>${escU(o)}</span>
                </div>`).join('')}
            </div>
        </div>`;
    };
    return `<div class="flex flex-between mb-24"><h2>${art.title}</h2><button class="btn-ghost" onclick="state.view='unit';render()">← 뒤로 (답안 저장됨)</button></div>
    <div class="reading-layout"><div>
        ${art.content&&!isAssess?`<div class="article-box mb-24">${escU(art.content)}</div>`:''}
        <div class="card">
            <div class="questions-header"><div class="q-num" style="width:28px;height:28px;font-size:13px">Q</div><h3>Questions</h3><span style="margin-left:auto;color:var(--text3);font-size:13px">총 ${(art.questions||[]).length}문제 · ${answeredCount}문제 답함</span></div>
            ${hasResume?`<div style="padding:10px 14px;background:#EFF6FF;border-left:3px solid #3B82F6;border-radius:6px;margin-bottom:14px;font-size:13px;color:#1E40AF">↩️ 이전에 답한 ${answeredCount}문제가 복원되었습니다. 이어서 풀어주세요.</div>`:''}
            ${(art.questions||[]).map((q,qi)=>renderQuestion(q,qi)).join('')}
            ${(!art.questions||art.questions.length===0)?'<p style="color:var(--text3);font-size:13px">문제가 아직 생성되지 않았습니다.</p>':''}
            <button class="btn-primary" onclick="submitQuiz()" style="width:100%;justify-content:center;margin-top:16px;padding:13px">답안 제출</button>
        </div>
    </div><div>
        ${!isAssess?`<div class="card sidebar"><h3>📝 주요 단어</h3>
            ${(art.vocabulary||[]).map(v=>`<div class="vocab-item"><div class="vocab-word">${v.word}</div><div class="vocab-meaning">${v.meaning}</div></div>`).join('')}
            ${(!art.vocabulary||art.vocabulary.length===0)?'<p style="color:var(--text3);font-size:13px">단어 없음</p>':''}
        </div>`:'<div class="card sidebar" style="text-align:center;color:var(--text3);font-size:13px">실전평가에서는<br>단어가 표시되지 않습니다</div>'}
    </div></div>`;
}
function stripQNum(q){return (q||'').replace(/^\s*\d+\s*[.)]\s*/,'');}

    const allDone=preview||(wordSelfPassed&&sentTrainDone&&sentSelfPassed);
    
    // 단계 카드 헬퍼
    const stepCard=(opts)=>{
        const {idx,icon,title,desc,rec,locked,onClick,scoreLabel}=opts;
        const isDone=rec&&(rec.passed!==false);
