<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadingLab - 학습</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#10B981">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TERRYS">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--green:#00C853;--green-dark:#00A844;--green-light:#E8F5E9;
--bg:#FAFBFC;--white:#FFFFFF;--bg3:#F2F4F6;
--text:#1B1D1F;--text2:#6B7684;--text3:#AEB5BC;
--border:#E5E8EB;--border-light:#F2F4F6;
--blue:#3B82F6;--blue-light:#EFF6FF;
--amber:#F59E0B;--amber-light:#FFFBEB;
--red:#EF4444;--red-light:#FEF2F2;
--purple:#8B5CF6;--purple-light:#F5F3FF;
--radius:16px;--radius-sm:12px;--radius-xs:8px;
--shadow-sm:0 1px 2px rgba(0,0,0,.06);
--shadow:0 2px 8px rgba(0,0,0,.08);
--shadow-lg:0 8px 24px rgba(0,0,0,.12);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:64px}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo img{height:32px;width:auto}
.nav-logo .academy{font-size:14px;font-weight:700}
.nav-logo .sub{font-size:11px;color:var(--text3)}
.nav-menu{display:flex;gap:4px}
.nav-mtab{padding:8px 16px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:none;border-radius:var(--radius-xs);transition:all .15s}
.nav-mtab:hover{background:var(--bg3)}
.nav-mtab.active{background:var(--green-light);color:var(--green-dark)}
.nav-mtab.disabled{color:var(--text3);cursor:not-allowed}
.nav-right{display:flex;align-items:center;gap:12px}
.container{max-width:1100px;margin:0 auto;padding:28px 24px 60px}
button{font-family:'Noto Sans KR',sans-serif;padding:10px 18px;border:none;border-radius:var(--radius-xs);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;background:var(--bg3);color:var(--text)}
button:hover{background:var(--border)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--bg3)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-danger{background:var(--red-light);color:var(--red)}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border-light);padding:24px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-green{background:var(--green-light);color:var(--green-dark)}
.tag-blue{background:var(--blue-light);color:var(--blue)}
.tag-amber{background:var(--amber-light);color:var(--amber)}
.tag-red{background:var(--red-light);color:var(--red)}
.tag-purple{background:var(--purple-light);color:var(--purple)}
.tag-gray{background:var(--bg3);color:var(--text2)}
.grid{display:grid;gap:16px}.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}.grid-4{grid-template-columns:repeat(4,1fr)}
.flex{display:flex}.flex-between{justify-content:space-between;align-items:center}.flex-gap{gap:10px}.flex-center{align-items:center}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
h2{font-size:20px;font-weight:800;margin-bottom:4px}
h3{font-size:16px;font-weight:700;margin-bottom:12px}
.page-desc{font-size:13px;color:var(--text3);margin-bottom:20px}
input,select,textarea{font-family:'Noto Sans KR',sans-serif}
.empty{text-align:center;color:var(--text3);padding:48px;font-size:14px}
u{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px;font-weight:700;text-decoration-color:var(--green)}
.hl-word{background:linear-gradient(transparent 55%,rgba(245,158,11,.35) 55%);font-weight:700;color:var(--amber);padding:0 2px;border-radius:3px}
.hl-mean{background:linear-gradient(transparent 55%,rgba(139,92,246,.25) 55%);font-weight:700;color:var(--purple);padding:0 2px;border-radius:3px}

.hero{background:linear-gradient(135deg,#F1FBF5 0%,#FAFBFC 100%);border:1px solid var(--border-light);border-radius:var(--radius);padding:28px;margin-bottom:24px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:rgba(0,200,83,.08);border-radius:50%}
.hero h2{font-size:22px;position:relative;z-index:1}
.hero p{font-size:14px;color:var(--text2);position:relative;z-index:1}
.hero-stats{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
.hero-stat{background:var(--white);border:1px solid var(--border-light);padding:10px 16px;border-radius:var(--radius-xs)}
.hero-stat .k{font-size:11px;color:var(--text3);font-weight:600}
.hero-stat .v{font-size:15px;font-weight:700;color:var(--text)}

.seg{display:inline-flex;background:var(--bg3);border-radius:var(--radius-xs);padding:3px;gap:3px}
.seg-btn{padding:7px 16px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text2);border-radius:6px;cursor:pointer}
.seg-btn.active{background:var(--white);color:var(--green-dark);box-shadow:var(--shadow-sm)}

.sched{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;background:#fff}
.sched-pretty{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.sched-th-base{background:#FAFBFC;padding:14px 10px;font-weight:600;color:var(--text2);font-size:12px;border-bottom:1px solid var(--border)}
.sched-head-main th{padding:12px 10px;font-size:13px;font-weight:700;background:#FAFBFC;border-bottom:1px solid var(--border);color:var(--text)}
.sched-th-reading{color:#059669;border-left:1px solid var(--border)}
.sched-th-grammar{color:#D97706;border-left:1px solid var(--border)}
.sched-th-vocab{color:#7C3AED;border-left:1px solid var(--border)}
.sched-head-sub th{padding:8px 6px;font-size:11px;font-weight:500;color:var(--text3);background:#FAFBFC;border-bottom:1px solid var(--border)}
.sub-reading-train{border-left:1px solid var(--border)}
.sub-grammar,.sub-vocab{border-left:1px solid var(--border)}
.sub-exam{color:#6B7280}

.sched-td{padding:11px 6px;border-bottom:1px solid #F3F4F6;text-align:center;vertical-align:middle;background:#fff}
.cell-date{font-weight:600;color:var(--text)}
.sched-date-num{font-size:13px;font-weight:700}
.cell-day{color:var(--text2);font-weight:500}
.cell-reading-train{border-left:1px solid var(--border)}
.cell-grammar-train{border-left:1px solid var(--border)}
.cell-vocab-train{border-left:1px solid var(--border)}
.cell-reading-exam,.cell-grammar-exam,.cell-vocab-exam{background:#FAFBFC}

.sched-cell{display:inline-flex;align-items:center;justify-content:center;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;min-width:62px;min-height:32px;line-height:1.25;transition:all .12s;gap:5px;border:1px solid transparent}
.sc-locked{background:#9CA3AF;color:#fff;font-weight:500;cursor:default;border-color:#9CA3AF}
.sc-locked svg{display:block}
.sc-done{background:#10B981;color:#fff;font-weight:700;border-color:#10B981;cursor:pointer}
.sc-done:hover{background:#059669;border-color:#059669}
.sc-active{background:#10B981;color:#fff;font-weight:700;border-color:#10B981;cursor:pointer}
.sc-active:hover{background:#059669;border-color:#059669}
.sc-pending{background:#FEF3C7;color:#92400E;font-weight:600;border:1px dashed #F59E0B;cursor:default}
.sc-weekly{background:#F97316;color:#fff;font-weight:700;border-color:#F97316;cursor:pointer}
.admin-done-btn{display:inline-block;font-size:10px;padding:2px 7px;margin-top:2px;background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;border-radius:4px;cursor:pointer;font-weight:700;line-height:1.4}
.admin-done-btn:hover{background:#FDE68A}
.sc-weekly:hover{background:#EA580C;border-color:#EA580C}
.sched-row-weekly{background:linear-gradient(90deg,#FFF7ED 0%,#FFEDD5 100%)}
.nhw-weekly{background:linear-gradient(135deg,#FFEDD5,#FED7AA)!important;border-color:#F97316!important}
.nhw-weekly .nhw-cta{background:#F97316!important;color:#fff!important}

.sched-legend{display:flex;flex-wrap:wrap;gap:16px;align-items:center;font-size:11px;color:var(--text3);margin-top:14px;padding:4px}
.sched-legend span{display:inline-flex;align-items:center;gap:5px}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.legend-done{background:#10B981}
.legend-lock{color:#9CA3AF}

/* 다음 숙제 카드 — 차분한 배너 스타일 */
.next-homework-card{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 18px;background:#F0FDF4;border:1px solid #BBF7D0;border-left:4px solid #10B981;border-radius:10px;margin-bottom:18px;cursor:pointer;transition:all .15s}
.next-homework-card:hover{background:#DCFCE7;border-left-color:#059669}
.nhw-left{flex:1;min-width:0}
.nhw-badge{display:inline-block;background:#fff;color:#166534;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:8px;margin-bottom:6px;border:1px solid #BBF7D0}
.nhw-title{font-size:16px;font-weight:700;color:#14532D;letter-spacing:-.2px;margin-bottom:2px}
.nhw-meta{font-size:12px;color:#166534;font-weight:500}
.nhw-cta{background:#10B981;color:#fff;border:none;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
.nhw-cta:hover{background:#059669}
.sc-eval{background:var(--amber-light);color:var(--amber)}

.step-card{padding:16px;border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;border:1.5px solid var(--border);display:flex;align-items:center;gap:14px;transition:all .15s;background:var(--white)}
.train-step{padding:14px 16px;border-radius:10px;margin-bottom:6px;border:1px solid var(--border-light);display:flex;align-items:center;gap:12px;background:#fff;transition:all .12s}
.train-step.current{cursor:pointer;border-color:#BBF7D0;background:#F0FDF4}
.train-step.current:hover{border-color:#10B981;background:#DCFCE7}
.train-step.done{border-color:#BBF7D0;background:#F0FDF4}
.train-step.locked{opacity:.65;cursor:not-allowed;background:#FAFBFC}
.train-step-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.train-section-head{display:flex;justify-content:space-between;align-items:center;margin:22px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border-light)}
.train-section-head.locked{opacity:.6}
.step-card:hover:not(.locked){border-color:var(--green);transform:translateY(-1px);box-shadow:var(--shadow)}
.step-card.done{background:var(--green-light);border-color:var(--green)}
.step-card.current{background:var(--white);border-color:var(--green);box-shadow:0 0 0 3px rgba(0,200,83,.1)}
.step-card.locked{opacity:.5;cursor:not-allowed;background:var(--bg)}
.step-num{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}

.reading-layout{display:grid;grid-template-columns:1fr 280px;gap:24px}
.article-box{line-height:1.95;font-size:15px;white-space:pre-wrap;background:var(--white);padding:24px;border-radius:var(--radius-sm);border:1px solid var(--border-light)}
.questions-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--green-light)}
.questions-header h3{margin:0;font-size:18px;color:var(--green-dark);font-family:'Noto Sans KR'}
.question-block{padding:24px 0;border-bottom:1px solid var(--border-light)}
.question-block:last-child{border-bottom:none}
.q-num-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.q-num{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:var(--green);color:#fff;border-radius:50%;font-weight:800;font-size:14px;flex-shrink:0}
.q-stem{font-size:15px;font-weight:600;line-height:1.7;flex:1;padding-top:4px}
.pres-box{margin:14px 0 16px 44px;padding:18px 20px;background:var(--green-light);border:1.5px solid var(--green);border-radius:var(--radius-sm);font-size:14px;line-height:1.85;color:var(--text)}
.pres-box-labeled{margin-bottom:10px;padding:14px 18px}
.pres-box-labeled:last-child{margin-bottom:16px}
.pres-box-label{font-size:11px;font-weight:800;color:var(--green-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:inline-block;background:rgba(255,255,255,.5);padding:2px 8px;border-radius:4px}
.summ-box{margin:14px 0 16px 44px;padding:20px 22px;background:var(--white);border:2px dashed var(--green-dark);border-radius:var(--radius-sm);font-size:15px;line-height:1.85;color:var(--text);font-weight:500}
.summ-label{font-size:11px;font-weight:700;color:var(--green-dark);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.options-wrap{margin-left:44px}
.q-option{padding:12px 16px;background:var(--bg);border-radius:var(--radius-xs);cursor:pointer;margin-bottom:8px;display:flex;align-items:center;border:1.5px solid transparent;transition:all .12s;font-size:14px}
.q-option:hover{border-color:var(--green);background:var(--green-light)}
.q-option input{margin-right:10px;accent-color:var(--green);width:auto}
.q-option.selected{background:var(--green-light);border-color:var(--green);font-weight:600}
.q-option.right{background:var(--green-light);border-color:var(--green);font-weight:600}
.q-option.wrong{background:var(--red-light);border-color:var(--red);color:var(--red)}

.vocab-item{padding:10px 0;border-bottom:1px solid var(--border-light)}
.vocab-item:last-child{border-bottom:none}
.vocab-word{font-weight:700;color:var(--green-dark);font-size:14px}
.vocab-meaning{font-size:12px;color:var(--text2);margin-top:2px}
.sidebar{position:sticky;top:84px}

.result-row{padding:14px 16px;background:var(--bg);border-radius:var(--radius-xs);margin-bottom:10px;border-left:4px solid var(--border)}
.result-row.right{border-left-color:var(--green);background:var(--green-light)}
.result-row.wrong{border-left-color:var(--red);background:var(--red-light)}
.detail-pane{margin:-12px 0 10px 0;padding:14px 16px;background:var(--bg);border-radius:var(--radius-xs);border:1px solid var(--border-light)}
.result-q{font-size:13px;font-weight:600;margin-bottom:6px}
.result-ans{font-size:12px;color:var(--text2);margin-bottom:8px}
.result-expl{font-size:12px;color:var(--text);background:var(--white);padding:10px 12px;border-radius:6px;margin-top:8px;line-height:1.6}
.expl-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

.train-option{padding:14px 18px;background:var(--bg);border-radius:var(--radius-xs);cursor:pointer;margin-bottom:8px;border:2px solid transparent;transition:all .12s;font-size:15px;text-align:center;font-weight:500}
.train-option:hover{border-color:var(--green);background:var(--green-light)}
.train-option.selected{background:var(--green-light);border-color:var(--green);font-weight:700}

.word-arrange{display:flex;flex-wrap:wrap;gap:8px;padding:18px;background:var(--white);border-radius:var(--radius-xs);min-height:64px;margin-bottom:16px;border:2px dashed var(--green)}
.chunk-chip{display:inline-block;padding:10px 16px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .12s;user-select:none;color:var(--text);font-size:14px;font-weight:700;line-height:1.2}
.chunk-chip:hover{border-color:var(--green);background:var(--green-light);transform:translateY(-1px)}
.chunk-chip.placed{background:var(--green);color:#fff;border-color:var(--green)}
.chunk-chip.wrong-chip{background:#FEF2F2;border-color:#EF4444;color:#991B1B;animation:matchShake .35s ease-in-out}
.q-option.wrong-option{background:#FEF2F2;border-color:#EF4444;color:#991B1B}
.chunk-chip.used{opacity:.3;pointer-events:none;background:var(--bg3)}
.answer-hint{padding:14px 18px;background:#EFF6FF;border-left:4px solid #3B82F6;border-radius:var(--radius-xs);margin-bottom:14px;font-size:15px;color:#1D4ED8;font-weight:600;line-height:1.7;letter-spacing:.2px}

/* Random 모드 빈칸 채우기 */
.rf-sentence{padding:20px 24px;background:var(--bg);border-radius:var(--radius-xs);font-size:17px;line-height:2;letter-spacing:.2px;margin-bottom:8px;border:1.5px solid var(--border-light)}
.rf-word{color:var(--text);font-weight:500;margin:0 1px}
.rf-blank{display:inline-block;min-width:64px;padding:2px 12px;margin:0 2px;border-bottom:2px dashed var(--text3);font-weight:700;text-align:center;color:var(--text3);font-size:14px;vertical-align:baseline}
.rf-blank-filled{background:var(--green);color:#fff;border-bottom:2px solid var(--green-dark);border-radius:6px;cursor:pointer;font-style:normal}
.rf-blank-filled:hover{background:var(--green-dark)}
.rf-blank-next{background:var(--amber-light);border-bottom-color:var(--amber);color:var(--amber)}
.arrange-translation{padding:14px 18px;background:var(--green-light);border-radius:var(--radius-xs);margin-bottom:14px;font-size:14px;color:var(--text);font-weight:500;line-height:1.7}
.word-chip{padding:9px 15px;background:var(--white);border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:14px;font-weight:600;transition:all .12s;user-select:none;color:var(--text)}
.word-chip:hover{border-color:var(--green);background:var(--green-light)}
.word-chip.placed{background:var(--green);color:#fff;border-color:var(--green)}
.word-chip.used{opacity:.35;pointer-events:none}

.progress-bar{width:100%;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;background:var(--green);border-radius:4px;transition:width .3s}
.score-circle{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 16px;flex-direction:column}
.score-circle .lbl{font-size:11px;font-weight:600;color:inherit;opacity:.75}

.flashcard{width:100%;max-width:400px;height:240px;margin:0 auto 24px;perspective:1200px;cursor:pointer}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--shadow);padding:24px}
.flashcard-front{background:var(--green);color:#fff}
.flashcard-back{background:var(--white);border:2px solid var(--green);transform:rotateY(180deg);text-align:left;justify-content:flex-start;padding:24px 28px}
.fc-word{font-size:32px;font-weight:800;letter-spacing:-.5px}
.fc-hint{font-size:13px;opacity:.85;margin-top:8px}
.fc-back-word{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.fc-back-meaning{font-size:24px;font-weight:800;color:var(--green-dark);margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border-light)}
.fc-back-example{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.fc-back-example-en{font-style:italic;color:var(--text)}
.fc-back-example-ko{color:var(--text2)}
.flash-btn{flex:1;max-width:160px;padding:13px 16px;font-size:14px;font-weight:700;border:2px solid;border-radius:12px;cursor:pointer;transition:all .12s}
.flash-btn:hover{transform:translateY(-1px)}
.flash-known{background:var(--green-light);color:var(--green-dark);border-color:var(--green)}
.flash-known:hover{background:var(--green);color:#fff}
.flash-unknown{background:var(--amber-light);color:var(--amber);border-color:var(--amber)}
.flash-unknown:hover{background:var(--amber);color:#fff}

.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.wgrid-card{padding:18px 12px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-sm);text-align:center;cursor:pointer;transition:all .15s;position:relative}
.wgrid-card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow)}
.wgrid-card.viewed{background:var(--green-light);border-color:var(--green)}
.wgrid-card .word{font-weight:700;font-size:15px;color:var(--text)}
.wgrid-card .badge{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:var(--green);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
/* 매칭게임 */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
.match-col{display:flex;flex-direction:column;gap:10px}
.match-card{position:relative;padding:14px 16px;background:#fff;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;text-align:center;transition:all .15s;user-select:none;min-height:48px;display:flex;align-items:center;justify-content:center}
.match-card:hover{border-color:var(--green);background:var(--green-light)}
.match-card.match-en{font-family:inherit;letter-spacing:.2px}
.match-card.match-ko{color:var(--text2)}
.match-card.selected{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 2px 8px rgba(16,185,129,.3)}
.match-card.matched{background:var(--green-light);border-color:#BBF7D0;color:var(--green-dark);cursor:default;opacity:.7}
.match-card.matched:hover{background:var(--green-light);transform:none}
.match-card.wrong{background:#FEF2F2;border-color:#EF4444;color:#991B1B;animation:matchShake .35s ease-in-out}
.match-check{position:absolute;top:4px;right:8px;color:var(--green-dark);font-size:12px;font-weight:800}
@keyframes matchShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@media(max-width:480px){.match-card{padding:11px 8px;font-size:13px;min-height:42px}}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px);padding:20px}
.modal-content{background:var(--white);border-radius:var(--radius);padding:28px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}

@media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.reading-layout{grid-template-columns:1fr}.nav-menu{display:none}.pres-box,.summ-box,.options-wrap{margin-left:0}}

/* ============ 📱 모바일 화면 전반 최적화 ============ */
@media(max-width:768px){
  /* 컨테이너 — 양옆 여백 축소 */
  .container{padding:14px 10px 50px;max-width:100%}
  /* 네비게이션 — 컴팩트하게 */
  .nav{padding:0 10px;position:sticky;top:0}
  .nav-inner{height:56px;flex-wrap:wrap;gap:8px}
  .nav-logo img{height:26px}
  .nav-logo .academy{font-size:13px;line-height:1.2}
  .nav-logo .sub{font-size:10px}
  .nav-right{gap:6px}
  /* 카드 — 패딩 축소 */
  .card{padding:14px;margin-bottom:14px;border-radius:10px}
  /* 헤딩 — 크기 조정 */
  h1{font-size:20px!important}
  h2{font-size:17px!important}
  h3{font-size:15px!important}
  /* 버튼 — 터치 친화적 (최소 44px 높이) */
  button{padding:10px 14px;font-size:14px;min-height:42px}
  .btn-sm{padding:8px 12px;font-size:13px;min-height:36px}
  /* 학습일정 헤더 — 모바일에선 세로 스택 */
  .card .flex.flex-between.mb-16{flex-direction:column;align-items:stretch;gap:10px}
  /* 학습일정 탭 — 한 줄에 4개 다 보이게 */

  .seg-btn{flex:1;padding:7px 4px;font-size:11px;min-height:34px;white-space:nowrap}
  /* 표 — 가로 스크롤 없이 화면에 맞춤 */
  .sched,.tbl,table{font-size:11px;width:100%;table-layout:fixed}
  .sched-wrap,.table-wrap{overflow:visible;margin:0;padding:0}
  /* 스케줄 셀 — 화면 폭에 맞게 축소 */
  .sched-cell{padding:4px 4px;font-size:10px;min-width:0;min-height:26px;gap:2px;width:100%;box-sizing:border-box}
  /* 스케줄 헤더 패딩 축소 */
  .sched-th-base,.sched-head-main th{padding:8px 2px;font-size:10px}
  .sched-head-sub th{padding:5px 2px;font-size:9px}
  .sched-td{padding:7px 2px}
  /* 다음 숙제 카드 — 콤팩트 (세로 폭 줄임) */
  .next-homework-card{flex-direction:row;align-items:center;gap:8px;padding:8px 12px;margin-bottom:8px;border-radius:8px}
  .nhw-badge{font-size:9px;padding:2px 6px;margin-bottom:2px}
  .nhw-title{font-size:13px;margin-bottom:0;line-height:1.3}
  .nhw-meta{font-size:11px}
  .nhw-cta{padding:6px 10px!important;font-size:12px!important;min-height:32px!important;flex-shrink:0}
  /* 히어로 통계 — 줄바꿈 허용 */
  .hero-stats{gap:6px}
  .hero-stats>*{font-size:12px;padding:6px 10px!important}
  /* 모달 — 화면에 맞춤 */
  .modal{padding:10px}
  .modal-content{padding:18px;max-height:94vh;border-radius:14px}
  /* 학습 단계 카드 */
  .step-card,.train-step{padding:12px;gap:10px}
  .step-num,.train-step-num{width:32px;height:32px;font-size:13px}
  /* 문제 카드 */
  .q-stem{font-size:14px;line-height:1.6}
  .q-num{width:28px;height:28px;font-size:13px}
  /* 플렉스 갭 줄이기 */
  .flex-gap{gap:6px;flex-wrap:wrap}
  /* 표 안의 셀 패딩 축소 */
  th,td{padding:6px 3px!important}
}
@media(max-width:480px){
  .container{padding:10px 8px 50px}
  .nav-inner{height:52px}
  h1{font-size:18px!important}
  h2{font-size:16px!important}
  .card{padding:12px 8px}
  /* 폰 폭에서 더 작게 — 가로 스크롤 없이 8칸 다 보이게 */
  .sched,.tbl,table{font-size:10px}
  .sched-cell{padding:3px 2px;font-size:9px;min-width:0;min-height:24px;border-radius:4px}
  .sched-th-base,.sched-head-main th{padding:6px 1px;font-size:9px}
  .sched-head-sub th{padding:4px 1px;font-size:8px}
  .sched-td{padding:5px 1px}
  th,td{padding:4px 2px!important;font-size:10px}
  /* 다음 숙제 카드 — 더 콤팩트 */
  .next-homework-card{padding:7px 10px;margin-bottom:6px}
  .nhw-title{font-size:12.5px}
  .nhw-meta{font-size:10.5px}
  /* 학습일정 탭 — 작은 폰에서 더 압축 */
  .seg-btn{font-size:10.5px;padding:6px 3px}
}

// ========== Phase 2: IndexedDB 통합 ==========
RLStorage.init().then(()=>{
    console.log('✅ IndexedDB 준비 완료');
}).catch(e=>{
    console.error('⚠️ IndexedDB 초기화 실패, localStorage로 폴백:',e);
});

const RL_STORE = {
    get(k){
        if(window.RLStorage && RLStorage.isReady()){
            const v = RLStorage.getItem(k);
            if(v !== null) return v;
        }
        return localStorage.getItem(k);
    },
    set(k, v){
        if(window.RLStorage && RLStorage.isReady()){
            RLStorage.setItem(k, v);
            return;
        }
        localStorage.setItem(k, v);
    },
    remove(k){
        if(window.RLStorage && RLStorage.isReady()){
            RLStorage.removeItem(k);
        }
        // localStorage는 스냅샷으로 유지
    },
    keys(){
        // RLStorage(IndexedDB)와 localStorage 양쪽의 키를 모두 모아 반환.
        // 챕터 페이지(grammarwise-*.html)는 RLStorage를 안 거치고 localStorage에 직접 저장하므로
        // RLStorage.keys()만 반환하면 챕터 페이지의 데이터를 못 찾는 버그가 발생함.
        const ksSet = new Set();
        if(window.RLStorage && RLStorage.isReady()){
            try{ RLStorage.keys().forEach(k=>ksSet.add(k)); }catch(e){}
        }
        for(let i=0; i<localStorage.length; i++){
            const k = localStorage.key(i);
            if(k) ksSet.add(k);
        }
        return Array.from(ksSet);
    }
};

// ============================================================
// 📡 기기간 진도 동기화 v2 (Firebase Realtime DB)
// 학생이 폰/태블릿/PC 어디서든 같은 학습 진도를 보게 합니다.
//
// 키 분류:
// 1. uid-prefixed: 키 이름에 uid 포함 (rl_inprog_<sid>_*, rl_trtype_<sid>_* 등)
//    → 값 그대로 동기화
// 2. uid-indexed: 단일 키이지만 값이 {sid: 데이터} 형식 (rl_progress, rl_vc_* 등)
//    → 현재 학생 부분만 추출/병합 (다른 학생 데이터 보호)
// ============================================================
const SYNC_FB_URL = 'https://terrys-d643a-default-rtdb.firebaseio.com';
let _syncEnabled = false;
let _syncBypass = false;
let _lastSyncDownTime = 0;
const _syncPushQueue = {};
let _syncPushTimer = null;

// 키 카테고리 판별
function _syncKeyType(k){
    if(!k || typeof k !== 'string' || !k.startsWith('rl_')) return 'skip';
    // uid-prefixed: 키 이름이 학생 진도용
    if(/^rl_gr_/.test(k)) return 'uid-prefixed';
    if(/^rl_gichul_history_/.test(k)) return 'uid-prefixed';
    if(/^rl_inprog_/.test(k)) return 'uid-prefixed';
    if(/^rl_trtype_/.test(k)) return 'uid-prefixed';
    if(/^rl_train_/.test(k)) return 'uid-prefixed';
    if(/^rl_done_/.test(k)) return 'uid-prefixed';
    if(/^rl_weekly_/.test(k)) return 'uid-prefixed';
    if(/^rl_assess_/.test(k)) return 'uid-prefixed';
    // uid-indexed (global key, value is {sid: data} dict)
    if(k === 'rl_progress') return 'uid-indexed';
    if(/^rl_vc_/.test(k)) return 'uid-indexed';
    if(k === 'rl_active_week') return 'per-student-global'; // 단순 문자열
    return 'skip';
}

function _syncGetStudentId(){
    try{
        const raw = RL_STORE.get('rl_current_user');
        if(!raw) return null;
        const u = JSON.parse(raw);
        return (u && u.id && u.role === 'student') ? u.id : null;
    }catch(e){ return null; }
}

// Firebase 키 이름 sanitize ($, [, ], #, /, . 금지)
function _syncSafeKey(k){
    return String(k).replace(/[$\[\].#\/]/g, '_');
}

// RL_STORE.set 시 호출 — 푸시 큐에 추가
function _syncQueuePush(k, v){
    const sid = _syncGetStudentId();
    if(!sid) return;
    const type = _syncKeyType(k);
    if(type === 'skip') return;
    
    if(type === 'uid-prefixed'){
        // 안전장치: 키에 현재 학생 sid가 포함되어 있어야만 동기화 (다른 학생 데이터 누출 방지)
        if(!k.includes(sid)) return;
        _syncPushQueue[_syncSafeKey(k)] = v;
    } else if(type === 'uid-indexed'){
        // 글로벌 dict 키 - 현재 학생 부분만 추출
        try{
            const parsed = (v === null || v === undefined) ? null : JSON.parse(v);
            const myPortion = parsed && typeof parsed === 'object' ? parsed[sid] : null;
            _syncPushQueue['__shared__' + _syncSafeKey(k)] = 
                myPortion === undefined || myPortion === null ? null : JSON.stringify(myPortion);
        }catch(e){ /* 잘못된 JSON 무시 */ }
    } else if(type === 'per-student-global'){
        // 학생별로 별도 저장
        _syncPushQueue['__perstudent__' + _syncSafeKey(k)] = v;
    }
    _syncSchedulePush();
}

function _syncSchedulePush(){
    if(_syncPushTimer) return;
    _syncPushTimer = setTimeout(_syncFlushPush, 800);
}

async function _syncFlushPush(){
    _syncPushTimer = null;
    const sid = _syncGetStudentId();
    if(!sid) return;
    const keys = Object.keys(_syncPushQueue);
    if(keys.length === 0) return;
    
    const batch = {};
    for(const k of keys){
        batch[k] = _syncPushQueue[k];
        delete _syncPushQueue[k];
    }
    
    const url = SYNC_FB_URL + '/student_state/' + encodeURIComponent(sid) + '.json';
    try{
        const r = await fetch(url, {
            method: 'PATCH',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(batch)
        });
        if(!r.ok){
            console.warn('[Sync] 푸시 실패 status='+r.status);
            for(const k in batch){ if(!(k in _syncPushQueue)) _syncPushQueue[k]=batch[k]; }
            setTimeout(_syncSchedulePush, 5000);
        } else {
            console.log('[Sync] ✅ '+keys.length+'개 항목 푸시');
        }
    }catch(e){
        console.warn('[Sync] 푸시 네트워크 오류:', e);
        for(const k in batch){ if(!(k in _syncPushQueue)) _syncPushQueue[k]=batch[k]; }
        setTimeout(_syncSchedulePush, 30000);
    }
}

// RL_STORE 후킹
(function _hookRLStore(){
    if(!RL_STORE || RL_STORE.__syncHooked) return;
    const _origSet = RL_STORE.set;
    const _origRemove = RL_STORE.remove;
    RL_STORE.__origSet = _origSet;
    RL_STORE.__origRemove = _origRemove;
    RL_STORE.set = function(k, v){
        const result = _origSet.call(this, k, v);
        if(_syncEnabled && !_syncBypass) _syncQueuePush(k, v);
        return result;
    };
    RL_STORE.remove = function(k){
        const result = _origRemove.call(this, k);
        if(_syncEnabled && !_syncBypass) _syncQueuePush(k, null);
        return result;
    };
    RL_STORE.__syncHooked = true;
})();

// Firebase에서 학생 진도 받아와 로컬에 적용
async function syncDownStudentState(){
    const sid = _syncGetStudentId();
    if(!sid){
        _syncEnabled = true;
        return;
    }
    _lastSyncDownTime = Date.now();
    try{
        const url = SYNC_FB_URL + '/student_state/' + encodeURIComponent(sid) + '.json?_t=' + Date.now();
        const r = await fetch(url, {cache:'no-store'});
        if(!r.ok){
            console.warn('[Sync] 다운로드 실패 status='+r.status);
            return;
        }
        const data = await r.json();
        if(!data || typeof data !== 'object'){
            console.log('[Sync] Firebase에 저장된 진도 없음 (신규)');
            return;
        }
        
        _syncBypass = true;
        let restoredPrefixed = 0, restoredShared = 0, restoredPerStudent = 0;
        
        for(const fbKey in data){
            const value = data[fbKey];
            if(value === null || value === undefined) continue;
            
            if(fbKey.startsWith('__shared__')){
                // uid-indexed 글로벌 키: 로컬 dict에 현재 학생 부분만 머지
                const realKey = fbKey.substring('__shared__'.length);
                if(typeof value !== 'string') continue;
                let myPortion;
                try{ myPortion = JSON.parse(value); }catch(e){ continue; }
                // 로컬에서 기존 dict 읽기
                let localDict = {};
                try{
                    const localStr = RL_STORE.get(realKey);
                    if(localStr) localDict = JSON.parse(localStr) || {};
                }catch(e){ localDict = {}; }
                if(typeof localDict !== 'object' || Array.isArray(localDict)) localDict = {};
                localDict[sid] = myPortion;
                RL_STORE.__origSet.call(RL_STORE, realKey, JSON.stringify(localDict));
                restoredShared++;
            } else if(fbKey.startsWith('__perstudent__')){
                // 학생별 글로벌 키
                const realKey = fbKey.substring('__perstudent__'.length);
                if(typeof value === 'string'){
                    RL_STORE.__origSet.call(RL_STORE, realKey, value);
                    restoredPerStudent++;
                }
            } else {
                // uid-prefixed 키: 그대로 복원 (sid 포함 키만)
                if(!fbKey.includes(sid)) continue;
                if(typeof value === 'string'){
                    RL_STORE.__origSet.call(RL_STORE, fbKey, value);
                    restoredPrefixed++;
                }
            }
        }
        _syncBypass = false;
        const total = restoredPrefixed + restoredShared + restoredPerStudent;
        if(total > 0){
            console.log('[Sync] ✅ 다운로드 완료: 학생진도 '+restoredPrefixed+'개, 공유키 '+restoredShared+'개, 개인전역 '+restoredPerStudent+'개');
        } else {
            console.log('[Sync] 받아올 진도 없음 ('+sid+')');
        }
    }catch(e){
        console.warn('[Sync] 다운로드 네트워크 오류:', e);
    }finally{
        _syncEnabled = true;
    }
}

// 탭이 다시 보일 때 자동 재동기화
document.addEventListener('visibilitychange', async function(){
    if(document.visibilityState !== 'visible') return;
    if(Date.now() - _lastSyncDownTime < 3000) return;
    if(!_syncGetStudentId()) return;
    await syncDownStudentState();
    if(typeof render === 'function'){ try{ render(); }catch(e){} }
});

// 페이지 종료 직전 푸시 큐 비우기 (학습 직후 페이지 닫는 케이스)
window.addEventListener('beforeunload', function(){
    if(_syncPushTimer){ clearTimeout(_syncPushTimer); _syncPushTimer = null; }
    const sid = _syncGetStudentId();
    if(!sid) return;
    const keys = Object.keys(_syncPushQueue);
    if(keys.length === 0) return;
    const batch = {};
    for(const k of keys){ batch[k] = _syncPushQueue[k]; }
    try{
        // sendBeacon은 PATCH 미지원 → fetch + keepalive 사용
        fetch(SYNC_FB_URL + '/student_state/' + encodeURIComponent(sid) + '.json', {
            method: 'PATCH',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(batch),
            keepalive: true
        });
    }catch(e){}
});
// ⚠️ 옛 미리보기 키 시스템 폐기됨 (학생 실 키 사용으로 통일)
// shadow LS는 호환성 유지를 위해 함수 형태는 유지하되 분기 없이 원본 동작만 함
function isShadowKey(k){return k==='progress'||/^(done_|train_|assess_|trtype_|inprog_|weekly_)/.test(k);}
const _origLSs=LS.s.bind(LS),_origLSg=LS.g.bind(LS);
function _previewKey(k){return k;}  // 미리보기 모드와 무관하게 원본 키 사용
LS.s=function(k,v){return _origLSs(k,v);};
LS.g=function(k){return _origLSg(k);};
LS.del=function(k){RL_STORE.remove('rl_'+k);};

// ========== 리딩 지문 읽기 (v2 — 분할 저장 구조 + 옛 구조 폴백) ==========
// 새 구조: rl_articles_index + rl_article_unit_{book}_{unit}
// 옛 구조: rl_articles (단일 키) — 폴백
function getArticles(){
    // 1) 신 구조 우선
    let index=null;
    try{index=JSON.parse(RL_STORE.get('rl_articles_index')||'null');}catch(e){}
    if(index){
        const result={};
        Object.keys(index).forEach(bookName=>{
            result[bookName]={};
            const bookIdx=index[bookName];
            Object.keys(bookIdx.units||{}).forEach(unitKey=>{
                const key='rl_article_unit_'+encodeURIComponent(bookName)+'_'+unitKey;
                try{
                    const unitData=JSON.parse(RL_STORE.get(key)||'null');
                    result[bookName][unitKey]=unitData||{articles:[]};
                }catch(e){result[bookName][unitKey]={articles:[]};}
            });
        });

function getGrammarRecords(){
    try{
        const u=getUser();if(!u)return {points:{},selfChecks:{},exams:{},weeklySC:{},weeklyExam:{},progress:null};
        const sid=u.id;
        const records={points:{},selfChecks:{},exams:{},weeklySC:{},weeklyExam:{},progress:null};
        // 미리보기 모드: 학생 실데이터 먼저 읽고, 미리보기 데이터로 덮어쓰기
        const prefixes=['rl_gr_'+sid+'_'];
        const allKeys=RL_STORE.keys();
        // ========== inner-prefix 결정 ==========
        // grammar-full.html은 'L1_/L2_/L3_' 형식으로 저장 (Level 분기)
        // grammarwise-ch{N}.html은 'NAMOG1_/NAMOG2_' 형식으로 저장 (나모그)
        // student.html은 학생의 grammarLevel을 보고 해당 inner-prefix로 분기해서 읽어야 함
        // (옛 코드는 inner-prefix를 모르고 옛 키 패턴만 읽어서 새 데이터가 안 보이던 버그가 있었음)
        const level=getStudentGrammarLevel();
        let innerPrefix='';
        if(level==='namog2')innerPrefix='NAMOG2_';
        else if(level==='namog1')innerPrefix='NAMOG1_';
        else if(level===3)innerPrefix='L3_';
        else if(level===2)innerPrefix='L2_';
        else if(level===1)innerPrefix='L1_';
        prefixes.forEach(prefix=>{
            allKeys.forEach(k=>{
                if(!k||!k.startsWith(prefix))return;
                let sub=k.slice(prefix.length);
                // 마이그레이션 플래그는 항상 무시
                if(sub.startsWith('_migrated'))return;
                // 학생 본인 레벨의 inner-prefix → 잘라내고 진행
                if(innerPrefix&&sub.startsWith(innerPrefix)){
                    sub=sub.slice(innerPrefix.length);
                }
                // 다른 레벨의 inner-prefix → 무시 (다른 교재 데이터)
                else if(sub.startsWith('L1_')||sub.startsWith('L2_')||sub.startsWith('L3_')
                       ||sub.startsWith('NAMOG1_')||sub.startsWith('NAMOG2_')){
                    return;
                }
                // 옛 키 (inner-prefix 없음) → 모든 학생이 읽기 (마이그레이션 이전 옛 데이터 호환성)
                // (해당 학생용 교재로 저장된 것으로 간주)
                try{
                    const v=JSON.parse(RL_STORE.get(k));
                    if(sub==='progress')records.progress=v;
                    else if(sub.startsWith('pt_')&&!sub.endsWith('_state'))records.points[sub.slice(3)]=v;
                    else if(sub.startsWith('sc_'))records.selfChecks[sub.slice(3)]=v;
                    else if(sub.startsWith('exam_'))records.exams[sub.slice(5)]=v;
                    else if(sub.startsWith('wsc_'))records.weeklySC[sub.slice(4)]=v;
                    else if(sub.startsWith('wex_'))records.weeklyExam[sub.slice(4)]=v;
                }catch(e){}
            });
        });
        return records;
    }catch(e){return {points:{},selfChecks:{},exams:{},weeklySC:{},weeklyExam:{},progress:null};}
}

// 문법 교재에 맞는 grammar-full.html URL 생성 — grammarLevel 필드 우선, fallback으로 텍스트 매칭
// 반환값: 1, 2, 3 (문마중) 또는 'namog1', 'namog2' (나모그)
function getStudentGrammarLevel(s){
    s=s||getStudentData()||{};
    // 1순위: 명시적 grammarLevel 필드 (나모그 우선 체크)
    if(s.grammarLevel==='namog2')return 'namog2';
    if(s.grammarLevel==='namog1')return 'namog1';
    if(s.grammarLevel===3||s.grammarLevel==='3')return 3;
    if(s.grammarLevel===2||s.grammarLevel==='2')return 2;
    if(s.grammarLevel===1||s.grammarLevel==='1')return 1;
    // 2순위: textbooks.grammar 텍스트 매칭 (대소문자·공백·한글 다양한 표기 대응)
    const g=(s.textbooks?.grammar||'').toLowerCase().replace(/\s+/g,'');
    // 나모그 매칭 먼저 (문마중 Level과 혼동 방지)
    if(g.includes('나모그level2')||g.includes('namoglevel2')||g.includes('나모그2')||g.includes('namog2'))return 'namog2';
    if(g.includes('나모그level1')||g.includes('namoglevel1')||g.includes('나모그1')||g.includes('namog1')||(g.includes('나모그')&&!g.includes('2')))return 'namog1';
    if(g.includes('level3')||g.includes('lv3')||g.includes('레벨3'))return 3;
    if(g.includes('level2')||g.includes('lv2')||g.includes('레벨2'))return 2;
    if(g.includes('level1')||g.includes('lv1')||g.includes('레벨1'))return 1;
    return 1; // 기본값
}

// ========== 일정표 — 날짜별 문법 학습/셀프체크 점수 조회 ==========
// 일정에 없는 날(예: 학생 요일반 외)의 학습 기록도 다음 일정 행에 누적 표시되도록 범위 기반 조회
// prevDateISO < d <= curDateISO 범위의 기록을 그 행에 매핑
function getGrammarScoreInRange(prevDateISO,curDateISO,records){
    records=records||getGrammarRecords();
    // 그 범위의 완료 Point들 (가장 마지막 하나만 표시)
    const ptEntries=Object.entries(records.points||{})
        .filter(([p,d])=>d&&d.completedAt&&(prevDateISO===null||d.completedAt>prevDateISO)&&d.completedAt<=curDateISO)
        .sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
    const lastPt=ptEntries.length>0?ptEntries[ptEntries.length-1]:null;
    // 그 범위의 셀프체크 시도 (가장 마지막 시도)
    let scAttempt=null;
    Object.entries(records.selfChecks||{}).forEach(([unit,sc])=>{
        (sc.attempts||[]).forEach(a=>{
            if(!a.date)return;
            if((prevDateISO===null||a.date>prevDateISO)&&a.date<=curDateISO){
                if(!scAttempt||a.date>=scAttempt.date){
                    scAttempt={unit,...a};
                }
            }
        });
    });
    // 그 범위의 실전평가 시도 (가장 마지막 시도)
    let exAttempt=null;
    Object.entries(records.exams||{}).forEach(([unit,ex])=>{
        (ex.attempts||[]).forEach(a=>{
            if(!a.date)return;
            if((prevDateISO===null||a.date>prevDateISO)&&a.date<=curDateISO){
                if(!exAttempt||a.date>=exAttempt.date){
                    exAttempt={unit,...a};
                }
            }
        });
    });
    return {
        point:lastPt?{p:lastPt[0],pct:lastPt[1].pct||0,completedAt:lastPt[1].completedAt}:null,
        selfCheck:scAttempt,
        exam:exAttempt
    };
}
// 점수 등급 (셀프체크 표시용)
function gradeFromPct(pct){return pct>=90?'A':pct>=80?'B':pct>=70?'C':'';}
// 학생이 특정 Unit의 4 Point를 모두 완료했고 셀프체크는 아직 미통과인지 (실전 진입 가능 상태)
function canEnterSelfCheck(unit,records){
    records=records||getGrammarRecords();
    const unitPts=[1,2,3,4].map(o=>(unit-1)*4+o);
    const completed=records.progress?.completedPoints||[];
    const allDone=unitPts.every(p=>completed.includes(p));
    const passed=records.selfChecks?.[unit]?.passed===true;
    return allDone&&!passed;
}

// 예문에서 target 단어를 다른 색깔로 강조 (#7)
function highlightWordInSentence(sentence,word){
    if(!sentence||!word)return sentence||'';
    const safe=escU(sentence);
    // word 변형: cats, cat, catching, catch 등 어근 매칭. 일단 단순 word boundary 매칭부터.
    const escWord=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // 단어 + 가능한 어미(s/es/ed/ing/er/est/'s 등)도 함께 매칭
    const re=new RegExp('\\b('+escWord+'(?:s|es|ed|ing|er|est|ies|ied)?)\\b','gi');
    return safe.replace(re,'<span class="hl-word">$1</span>');
}
function highlightMeaningInKorean(ko,meaning){
    if(!ko||!meaning)return ko||'';
    const safe=escU(ko);
    // 의미가 여러 개 콤마/슬래시로 구분되어 있을 수 있음: "수확하다, 거둬들이다" -> ["수확","거둬들"]
    const parts=meaning.split(/[,\/;·\(\)]+/).map(p=>p.trim()).filter(p=>p.length>=1);
    let result=safe;
    parts.forEach(part=>{
        // 한국어 동사/형용사는 끝의 -다/하다/되다를 떼고 어간으로 매칭
        let stem=part.replace(/(하다|되다|시키다|이다|다)$/,'').trim();
        if(stem.length<1)stem=part;
        const escP=stem.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        if(!escP)return;
        try{
            const re=new RegExp('('+escP+'[가-힣]{0,3})','g');
            // 이미 강조된 것은 다시 강조하지 않도록 처리
            result=result.replace(re,(m,p1,offset)=>{
                // 앞에 이미 <span class="hl-mean"> 가 있으면 스킵
                const before=result.substring(Math.max(0,offset-20),offset);
                if(/hl-mean/.test(before))return m;
                return '<span class="hl-mean">'+p1+'</span>';
            });
        }catch(e){}
    });
    return result;
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(arr,n){return shuffle(arr).slice(0,Math.min(n,arr.length));}
function stripHtml(s){return (s||'').replace(/<[^>]+>/g,'');}
// HTML escape while preserving <u>...</u> tags
function escU(s){
    return (s||'')
        .replace(/<u>/gi,'\x01U\x01')
        .replace(/<\/u>/gi,'\x01u\x01')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/\x01U\x01/g,'<u>')
        .replace(/\x01u\x01/g,'</u>');
}

/* 일정: 시작일 기준 — 주간=2주, 월간=해당 월 마지막 날이 속한 주의 일요일까지 */
// 한 주의 월요일을 반환 (월요일 기준) — 전역 함수
function getWeekMonday(d){
    const dt=new Date(d);
    const day=dt.getDay();
    const diff=(day===0?-6:1-day);
    dt.setDate(dt.getDate()+diff);
    dt.setHours(0,0,0,0);
    return dt;
}

// 시작일부터 endDate까지 모든 수업 세션 생성
function buildAllSessions(sd,endDate){
    const dayKor=['일','월','화','수','목','금','토'];
    const days=sd.days||[];
    const startDate=sd.startDate?new Date(sd.startDate+'T00:00:00'):new Date();
    startDate.setHours(0,0,0,0);
    const startUnit=sd.startUnit||1;
    const dayOrder=['일','월','화','수','목','금','토'];
    const sortedDays=days.slice().sort((a,b)=>dayOrder.indexOf(a)-dayOrder.indexOf(b));
    const weeklyTestDay=sortedDays[sortedDays.length-1];
    const endD=endDate||new Date(startDate.getTime()+365*24*60*60*1000);
    const sessions=[];
    const cur=new Date(startDate);
    let learningUnitIdx=0;
    while(cur<=endD){
        const dk=dayKor[cur.getDay()];
        if(days.includes(dk)){
            const isWT=(dk===weeklyTestDay);
            if(isWT){
                sessions.push({date:new Date(cur),unitNum:null,isWeeklyTest:true,dayKor:dk});
            } else {
                sessions.push({date:new Date(cur),unitNum:startUnit+learningUnitIdx,isWeeklyTest:false,dayKor:dk});
                learningUnitIdx++;
            }
        }
        cur.setDate(cur.getDate()+1);
    }
    return sessions;
}

function renderSchedule(s){
    const days=s.days||[];
    if(days.length===0)return '<p style="color:var(--text3);font-size:13px">수업 요일이 지정되지 않았습니다. 선생님께 문의하세요.</p>';
    const bookName=s.textbooks?.reading;
    const articles=getArticles();
    const ba=articles[bookName]||{};
    const today=new Date();today.setHours(0,0,0,0);
    const dayKor=['일','월','화','수','목','금','토'];
    const startDate=s.startDate?new Date(s.startDate+'T00:00:00'):today;
    const startUnit=s.startUnit||1;
    // 학생의 수업 요일 중 마지막 요일 = 주간평가일
    const dayOrder=['일','월','화','수','목','금','토'];
    const sortedDays=days.slice().sort((a,b)=>dayOrder.indexOf(a)-dayOrder.indexOf(b));
    const weeklyTestDay=sortedDays[sortedDays.length-1];
    
    // 먼저 넉넉한 범위로 전체 세션 빌드 (baseDate 계산용)
    const farEnd=addDays(today,120); // 4개월
    const allSessionsFull=buildAllSessions(s,farEnd);
    
    let baseDate;
    let displayEnd;
    let filterStart;
    
    if(state.schedTab==='week'){
        // 주간일정: 저장된 activeWeek부터 1주(7일)만 표시
        const awKey='rl_active_week';
        const storedAW=RL_STORE.get(awKey);
        if(storedAW){
            baseDate=new Date(storedAW+'T00:00:00');
        } else {
            baseDate=today<startDate?new Date(startDate):new Date(today);
        }
        baseDate=getWeekMonday(baseDate);
        baseDate.setHours(0,0,0,0);
        filterStart=new Date(baseDate);
        displayEnd=addDays(baseDate,6); // 1주(7일)
    } else if(state.schedTab==='monthly'){
        // 월간일정: 해당 월 전체
        baseDate=today<startDate?new Date(startDate):new Date(today);
        baseDate.setHours(0,0,0,0);
        filterStart=new Date(baseDate.getFullYear(),baseDate.getMonth(),1);
        filterStart.setHours(0,0,0,0);
        displayEnd=new Date(baseDate.getFullYear(),baseDate.getMonth()+1,0);
        displayEnd.setHours(0,0,0,0);
    } else {
        baseDate=new Date(startDate);
        baseDate.setHours(0,0,0,0);
        filterStart=new Date(startDate);
        filterStart.setHours(0,0,0,0);
        displayEnd=addDays(today,30);
    }
    
    // 표시 범위에 맞게 세션 빌드
    const allSessions=buildAllSessions(s,displayEnd);
    // 표시 범위만 추출
    const sessions=allSessions.filter(s=>s.date>=filterStart&&s.date<=displayEnd);
    if(sessions.length===0)return '<p style="color:var(--text3);font-size:13px">표시할 일정이 없습니다.</p>';
    
    // 첫 번째 미완료 세션 찾기 (다음 숙제) — 주간평가일은 별도 처리
    let currentIdx=-1;
    for(let i=0;i<sessions.length;i++){
        const sess=sessions[i];
        if(sess.isWeeklyTest){
            // 주간평가: 그 주 학습일이 모두 끝났는데 주간평가 안 봤으면 다음 숙제
            const weekStart=getWeekMonday(sess.date);
            const weekLearnSessions=allSessions.filter(x=>!x.isWeeklyTest&&getWeekMonday(x.date).getTime()===weekStart.getTime()&&x.date<sess.date);
            const allLearnDone=weekLearnSessions.length>0&&weekLearnSessions.every(x=>{
                const u='unit'+x.unitNum;const un=ba[u];
                if(!un||(un.articles||[]).length===0)return false;
                const sc=getUnitScores(bookName,u,un.articles.length);
                return sc.exam!==null;
            });
            const weekId=fmtDateISO(sess.date);
            const wkRec=LS.g('weekly_'+getUser().id+'_'+bookName+'_'+weekId);
            if(allLearnDone&&!(wkRec&&wkRec.examDone)){currentIdx=i;break;}
        } else {
            const uk='unit'+sess.unitNum;
            const unit=ba[uk];
            if(unit&&(unit.articles||[]).length>0){
                const sc=getUnitScores(bookName,uk,unit.articles.length);
                if(sc.exam===null){currentIdx=i;break;}
            } else {
                currentIdx=i;break;
            }
        }
    }
    
    // 다음 숙제 카드용 정보
    let nextHomework=null;
    if(currentIdx>=0){
        const sess=sessions[currentIdx];
        if(sess.isWeeklyTest){
            const weekId=fmtDateISO(sess.date);
            nextHomework={uk:null,weekId,unitNum:null,date:sess.date,dayKor:dayKor[sess.date.getDay()],isToday:sess.date.getTime()===today.getTime(),phase:'주간평가',isWeeklyTest:true};
        } else {
            const uk='unit'+sess.unitNum;
            const unit=ba[uk];
            if(unit&&(unit.articles||[]).length>0){
                const sc=getUnitScores(bookName,uk,unit.articles.length);
                const phase=!sc.trainRec?'훈련':'실전';
                nextHomework={uk,unitNum:sess.unitNum,date:sess.date,dayKor:dayKor[sess.date.getDay()],isToday:sess.date.getTime()===today.getTime(),phase,isWeeklyTest:false};
            }
        }
    }
    
    // 자물쇠 셀 (재사용)
    const lockCell='<span class="sched-cell sc-locked"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg></span>';
    
    const makeReadingCells=(uk,sess,unitExists,artCount,isNextHomework)=>{
        // 🟠 주간평가 셀
        if(sess.isWeeklyTest){
            const weekStart=getWeekMonday(sess.date);
            const weekLearnSessions=allSessions.filter(x=>!x.isWeeklyTest&&getWeekMonday(x.date).getTime()===weekStart.getTime()&&x.date<sess.date);
            const allLearnDone=weekLearnSessions.length>0&&weekLearnSessions.every(x=>{
                const u='unit'+x.unitNum;const un=ba[u];
                if(!un||(un.articles||[]).length===0)return false;
                const sc=getUnitScores(bookName,u,un.articles.length);
                return sc.exam!==null;
            });
            const weekId=fmtDateISO(sess.date);
            const wkRec=LS.g('weekly_'+getUser().id+'_'+bookName+'_'+weekId);
            if(!allLearnDone){
                let tc=lockCell,ec=lockCell;
                if(isPreview()){
                    tc=lockCell+`<br><span class="admin-done-btn" onclick="adminCompleteReadingWeekly('${weekId}','train')">완료</span>`;
                    ec=lockCell;
                }
                return `<td class="sched-td cell-reading-train">${tc}</td><td class="sched-td cell-reading-exam">${ec}</td>`;
            }
            const trainDone=wkRec&&wkRec.trainDone;

            let trainCell=`<span class="sched-cell sc-weekly" onclick="openWeeklyTest('${weekId}','train')">${trainDone?'0점':'학습'}</span>`;
            if(isPreview()&&!trainDone) trainCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteReadingWeekly('${weekId}','train')">완료</span>`;

                if(isPreview()&&!examDone) examCell+=`<br><span class="admin-done-btn" onclick="event.stopPropagation();adminCompleteReadingWeekly('${weekId}','exam')">완료</span>`;
