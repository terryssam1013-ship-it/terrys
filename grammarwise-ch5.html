<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>나모그 · Ch 05 · 분사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF7;
  --card:#FFFFFF;
  --ink:#1A1A1A;
  --ink-soft:#3F3F46;
  --ink-light:#71717A;
  --ink-faint:#A1A1AA;
  --line:#F1F0EC;
  --line-soft:#F7F6F2;
  --primary:#FF6B7A;
  --primary-soft:#FFE4E7;
  --primary-dark:#E04B5A;
  --green:#10B981;
  --green-soft:#D1FAE5;
  --blue:#3B82F6;
  --blue-soft:#DBEAFE;
  --amber:#F59E0B;
  --amber-soft:#FEF3C7;
  --red:#EF4444;
  --red-soft:#FEE2E2;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  --shadow:0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.08);
  --r-sm:8px;
  --r:14px;
  --r-lg:20px;
  --r-xl:28px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding:20px 14px 100px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  letter-spacing:-0.01em;
}
.app{max-width:620px;margin:0 auto}

/* HEADER */
.head{
  background:var(--card);
  border-radius:var(--r-lg);
  padding:20px 22px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
}
.head-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}
.brand{
  font-size:11px;
  font-weight:600;
  letter-spacing:0.1em;
  color:var(--primary);
  text-transform:uppercase;
}
.char-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:var(--primary-soft);
  color:var(--primary-dark);
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}
.char-chip-emoji{font-size:16px}
.ch-no{font-size:12px;color:var(--ink-light);font-weight:500;margin-bottom:4px}
.ch-title{font-size:21px;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px}
.unit-title{font-size:14px;color:var(--ink-light);font-weight:500}

/* TABS */
.tabs{
  display:flex;
  gap:5px;
  background:var(--card);
  border-radius:var(--r);
  padding:5px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
}
.tab{
  flex:1;
  padding:11px 4px;
  border:none;
  background:transparent;
  font-family:inherit;
  font-size:11.5px;
  font-weight:600;
  color:var(--ink-light);
  cursor:pointer;
  border-radius:var(--r-sm);
  transition:all .2s ease;
  letter-spacing:-0.01em;
}
.tab:hover:not(:disabled){color:var(--ink-soft)}
.tab.active{
  background:var(--ink);
  color:var(--card);
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.tab-num{display:block;font-size:9.5px;font-weight:600;opacity:.6;margin-bottom:2px}
.tab.active .tab-num{opacity:.7}
.tab.done .tab-num::after{content:" ✓";color:var(--green)}
.tab.active.done .tab-num::after{color:#D1FAE5}
.tab.locked{opacity:.4;cursor:not-allowed}
.tab.locked .tab-num::before{content:"🔒 ";font-size:9px;opacity:.8}
.tab.locked:hover{color:var(--ink-light)}

/* PROGRESS */
.progress-wrap{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
  padding:0 4px;
}
.progress-bar{
  flex:1;
  height:6px;
  background:var(--line);
  border-radius:99px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--primary),#FF8FA3);
  border-radius:99px;
  transition:width .3s ease;
}
.progress-text{font-size:12px;font-weight:600;color:var(--ink-light);min-width:50px;text-align:right}

/* CARD */
.card{
  background:var(--card);
  border-radius:var(--r-xl);
  padding:24px 22px;
  margin-bottom:14px;
  box-shadow:var(--shadow);
  animation:slide .25s ease;
}
@keyframes slide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* MASCOT */
.mascot{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}
.mascot-avatar{
  flex-shrink:0;
  width:48px;
  height:48px;
  background:linear-gradient(135deg,var(--primary-soft),#FFD6DA);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  border:2px solid var(--card);
}
.mascot-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.char-chip-img{
  width:22px;
  height:22px;
  border-radius:50%;
  background:var(--card);
  object-fit:cover;
}
/* Full character — Stage 1 hero */
.terry-hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:-8px 0 8px;
}
.terry-hero img{
  max-width:200px;
  width:60%;
  height:auto;
  filter:drop-shadow(0 4px 12px rgba(255,107,122,0.15));
}
.mascot-bubble{
  background:var(--line-soft);
  padding:11px 15px;
  font-size:13.5px;
  color:var(--ink-soft);
  line-height:1.55;
  border-radius:4px 16px 16px 16px;
  flex:1;
  font-weight:500;
}
.mascot-bubble em{color:var(--primary);font-style:normal;font-weight:700}
.mascot-bubble b{color:var(--ink);font-weight:700}

.card-label{
  display:inline-block;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.06em;
  color:var(--primary);
  text-transform:uppercase;
  margin-bottom:14px;
  background:var(--primary-soft);
  padding:5px 11px;
  border-radius:999px;
}
.card-label.hot{background:var(--amber-soft);color:#92400E}
.card-label.info{background:var(--blue-soft);color:#1E40AF}

/* QUESTION */
.q-text{
  font-size:14.5px;
  line-height:1.7;
  margin-bottom:14px;
  font-weight:600;
}
.q-text b{font-weight:700;color:var(--primary)}
.q-sentence{
  background:linear-gradient(135deg,#FFF7F8,#FFFFFF);
  border:1px solid var(--line);
  padding:16px 18px;
  border-radius:var(--r-lg);
  margin-bottom:16px;
  font-size:16px;
  font-weight:600;
  line-height:1.65;
  letter-spacing:-0.005em;
}
.q-sentence .blank{
  display:inline-block;
  min-width:90px;
  border-bottom:2px dotted var(--ink-faint);
  margin:0 3px;
  vertical-align:baseline;
}
.q-sentence .hl{color:var(--primary);font-weight:800}
.q-sentence u{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
.q-trans{
  margin-top:8px;
  font-size:12px;
  color:var(--ink-light);
  font-weight:500;
  font-style:italic;
}

/* OPTIONS */
.opt-row{display:grid;gap:10px;margin-bottom:6px}
.opt-row.col2{grid-template-columns:1fr 1fr}
.opt-row.col4{grid-template-columns:1fr 1fr}
.opt-row.col5{grid-template-columns:1fr}
.opt-box{
  border:2px solid var(--line);
  border-radius:var(--r);
  padding:13px 15px;
  cursor:pointer;
  font-size:13.5px;
  background:var(--card);
  transition:all .15s ease;
  display:flex;
  align-items:center;
  gap:11px;
  text-align:left;
  font-family:inherit;
  width:100%;
  color:var(--ink);
  font-weight:500;
  line-height:1.5;
}
.opt-box:hover:not(:disabled){
  border-color:var(--primary);
  background:var(--primary-soft);
  transform:translateY(-1px);
}
.opt-box:disabled{cursor:default}
.opt-letter{
  flex-shrink:0;
  width:24px;
  height:24px;
  border-radius:50%;
  background:var(--line);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:12px;
  color:var(--ink-soft);
  transition:all .15s;
}
.opt-box:hover:not(:disabled) .opt-letter{background:var(--primary);color:var(--card)}
.opt-box.selected{border-color:var(--primary);background:var(--primary-soft)}
.opt-box.selected .opt-letter{background:var(--primary);color:var(--card)}
.opt-box.right{border-color:var(--green);background:var(--green-soft)}
.opt-box.right .opt-letter{background:var(--green);color:var(--card)}
.opt-box.wrong{border-color:var(--red);background:var(--red-soft);opacity:.85}
.opt-box.wrong .opt-letter{background:var(--red);color:var(--card)}
.opt-box.dim{opacity:.5}

/* SUBJECTIVE */
.subj-wrap{margin-bottom:6px}
.subj-input{
  width:100%;
  padding:14px 16px;
  border:2px solid var(--line);
  border-radius:var(--r);
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  background:var(--card);
  color:var(--ink);
  transition:all .15s;
}
.subj-input:focus{outline:none;border-color:var(--primary)}
.subj-input.right{border-color:var(--green);background:var(--green-soft);color:#065F46}
.subj-input.wrong{border-color:var(--red);background:var(--red-soft);color:#991B1B}
.subj-actions{display:flex;gap:8px;margin-top:10px;align-items:center}
.subj-submit{
  padding:11px 22px;
  background:var(--ink);
  color:var(--card);
  border:none;
  border-radius:var(--r);
  font-family:inherit;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
}
.subj-submit:disabled{background:var(--ink-faint);cursor:default}
.subj-hint{font-size:11.5px;color:var(--ink-light);font-weight:500}

/* FEEDBACK */
.feedback{
  margin-top:14px;
  padding:14px 16px;
  font-size:13px;
  line-height:1.6;
  border-radius:var(--r);
  display:none;
  font-weight:500;
}
.feedback.show{display:block;animation:slide .3s ease}
.feedback.right{background:var(--green-soft);color:#065F46;border-left:3px solid var(--green)}
.feedback.wrong{background:var(--red-soft);color:#991B1B;border-left:3px solid var(--red)}
.feedback b{font-weight:700}
.fb-head{font-size:14px;font-weight:700;margin-bottom:6px}

/* TEACHER QUOTE */
.teacher-quote{
  margin-top:12px;
  padding:12px 14px;
  background:rgba(255,255,255,0.5);
  border-radius:var(--r-sm);
  font-size:12.5px;
  line-height:1.6;
}
.tq-label{
  font-size:10.5px;
  font-weight:700;
  letter-spacing:0.04em;
  text-transform:uppercase;
  opacity:.7;
  margin-bottom:5px;
}

/* EXPLAIN (Amber box) */
.explain{
  margin-top:14px;
  padding:13px 16px;
  background:var(--amber-soft);
  border-radius:var(--r);
  font-size:12.5px;
  color:#78350F;
  line-height:1.6;
  display:none;
  font-weight:500;
  border-left:3px solid var(--amber);
}
.explain.show{display:block;animation:slide .3s ease}
.explain b{color:#92400E;font-weight:700}

/* NAV (sticky bottom) */
.nav{
  display:flex;
  gap:8px;
  align-items:center;
  position:sticky;
  bottom:14px;
  background:var(--card);
  padding:8px;
  border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg);
  margin-top:14px;
}
.nav-btn{
  flex:1;
  padding:14px;
  border:none;
  background:var(--line-soft);
  font-family:inherit;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
  border-radius:var(--r);
  transition:all .15s ease;
  color:var(--ink-soft);
}
.nav-btn:hover:not(:disabled){background:var(--primary);color:var(--card)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.nav-btn.next{background:var(--ink);color:var(--card)}
.nav-btn.next:hover:not(:disabled){background:var(--primary)}

/* STAGE 1 - VIDEO */
.video-wrap{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  border-radius:var(--r);
  overflow:hidden;
  margin-bottom:10px;
}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.video-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:4px 4px 14px;
  font-size:12px;
}
.video-id-label{color:var(--ink-light);font-weight:500}
.video-id-label code{
  background:var(--line-soft);
  padding:2px 7px;
  border-radius:5px;
  font-family:'SF Mono','Menlo',monospace;
  font-size:11.5px;
  color:var(--ink-soft);
  margin-left:3px;
}
.video-change-btn{
  background:none;
  border:1px solid var(--line-strong, #E5E5E0);
  font-family:inherit;
  font-size:12px;
  color:var(--ink-soft);
  cursor:pointer;
  padding:5px 12px;
  font-weight:600;
  border-radius:999px;
  transition:all .15s;
}
.video-change-btn:hover{background:var(--line-soft);color:var(--ink);border-color:var(--ink-faint)}

/* Watch hint */
.watch-hint{
  display:flex;
  align-items:center;
  gap:10px;
  padding:13px 16px;
  background:var(--blue-soft);
  border-left:3px solid var(--blue);
  border-radius:var(--r);
  margin-bottom:18px;
  font-size:13px;
  font-weight:600;
  color:#1E3A5F;
  line-height:1.5;
}
.watch-hint b{font-weight:800;color:var(--blue)}
.watch-hint.completed{
  background:var(--green-soft);
  border-left-color:var(--green);
  color:#065F46;
  animation:slide .3s ease;
}
.watch-hint.completed b{color:var(--green)}
.watch-hint-icon{
  font-size:18px;
  flex-shrink:0;
  width:24px;
  height:24px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

/* Video input form */
.video-input-box{
  background:linear-gradient(135deg,#FFF7F8,#FFFFFF);
  border:2px dashed var(--primary-soft);
  border-radius:var(--r-lg);
  padding:24px 22px;
  margin-bottom:18px;
  transition:all .2s;
}
.video-input-box.drag-over{
  border-color:var(--primary);
  background:var(--primary-soft);
  transform:scale(1.005);
}
.vi-title{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:6px;letter-spacing:-0.01em;text-align:center}
.vi-desc{font-size:12.5px;color:var(--ink-light);margin-bottom:22px;font-weight:500;line-height:1.6;text-align:center}
.vi-desc b{color:var(--ink-soft)}

.vi-method{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:16px 18px;
  margin-bottom:6px;
}
.vi-method-label{
  font-size:13.5px;
  font-weight:700;
  color:var(--ink);
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:8px;
}
.vi-num{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px;
  height:22px;
  background:var(--primary);
  color:var(--card);
  border-radius:50%;
  font-size:12px;
  font-weight:800;
  flex-shrink:0;
}
.vi-method-hint{
  font-size:11.5px;
  color:var(--ink-light);
  margin-top:8px;
  text-align:center;
  font-weight:500;
}

.vi-file-btn{
  width:100%;
  padding:14px 18px;
  background:var(--ink);
  color:var(--card);
  border:none;
  border-radius:var(--r);
  font-family:inherit;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:all .15s;
}
.vi-file-btn:hover{background:var(--primary)}

.vi-divider{
  text-align:center;
  font-size:11px;
  color:var(--ink-faint);
  font-weight:600;
  letter-spacing:0.06em;
  margin:14px 0;
  position:relative;
}
.vi-divider::before, .vi-divider::after{
  content:'';
  position:absolute;
  top:50%;
  width:42%;
  height:1px;
  background:var(--line);
}
.vi-divider::before{left:0}
.vi-divider::after{right:0}

.vi-input{
  width:100%;
  padding:12px 14px;
  border:1.5px solid var(--line);
  border-radius:var(--r);
  font-family:inherit;
  font-size:13.5px;
  font-weight:500;
  color:var(--ink);
  background:var(--card);
  transition:all .15s;
  margin-bottom:8px;
}
.vi-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.vi-error{
  display:none;
  font-size:12px;
  color:var(--red);
  margin-bottom:8px;
  font-weight:600;
}
.vi-error.show{display:block;animation:slide .25s ease}
.vi-submit{
  width:100%;
  padding:11px 18px;
  background:var(--line-soft);
  color:var(--ink-soft);
  border:1.5px solid var(--line);
  border-radius:var(--r);
  font-family:inherit;
  font-size:13.5px;
  font-weight:700;
  cursor:pointer;
  transition:all .15s;
}
.vi-submit:hover{background:var(--ink);color:var(--card);border-color:var(--ink)}

.lec-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:18px;
}
.lec-stat{
  background:var(--line-soft);
  padding:11px 12px;
  border-radius:var(--r);
  text-align:center;
}
.lec-stat-label{font-size:10.5px;color:var(--ink-light);font-weight:500;margin-bottom:3px;letter-spacing:0.02em}
.lec-stat-val{font-size:13px;font-weight:700;color:var(--ink)}

.outline-title{
  font-size:14px;
  font-weight:700;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px;
}
.outline-list{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.outline-item{
  display:grid;
  grid-template-columns:48px 1fr;
  gap:10px;
  padding:10px 12px;
  background:var(--line-soft);
  border-radius:var(--r-sm);
  font-size:12.5px;
  align-items:center;
}
.outline-item.hot{background:#FFF7ED;border-left:3px solid var(--amber)}
.outline-ts{
  font-weight:700;
  color:var(--primary);
  font-size:11.5px;
  font-variant-numeric:tabular-nums;
}
.outline-topic{color:var(--ink-soft);font-weight:500;line-height:1.45}
.outline-hot-tag{
  display:inline-block;
  background:var(--amber);
  color:var(--card);
  font-size:9.5px;
  font-weight:700;
  padding:2px 7px;
  border-radius:999px;
  margin-left:5px;
  letter-spacing:0.03em;
  vertical-align:1px;
}

/* TEST MODE */
.test-banner{
  background:var(--blue-soft);
  border-left:3px solid var(--blue);
  padding:11px 14px;
  border-radius:var(--r);
  margin-bottom:16px;
  font-size:12.5px;
  font-weight:500;
  color:#1E3A5F;
  line-height:1.55;
}
.test-banner b{font-weight:700;color:#1E40AF}
.test-dots{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:18px;
  padding:12px;
  background:var(--line-soft);
  border-radius:var(--r);
}
.test-dot{
  width:26px;
  height:26px;
  border-radius:7px;
  background:var(--card);
  border:1.5px solid var(--line);
  font-size:11px;
  font-weight:700;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:var(--ink-faint);
  transition:all .15s;
}
.test-dot:hover{border-color:var(--primary)}
.test-dot.answered{background:var(--ink);color:var(--card);border-color:var(--ink)}
.test-dot.current{
  background:var(--primary);
  color:var(--card);
  border-color:var(--primary);
  transform:scale(1.1);
  box-shadow:0 0 0 3px var(--primary-soft);
}
.test-dot.right{background:var(--green);color:var(--card);border-color:var(--green)}
.test-dot.wrong{background:var(--red);color:var(--card);border-color:var(--red)}
.test-counter{
  font-size:12px;
  color:var(--ink-light);
  font-weight:600;
  margin-bottom:6px;
}

/* RESULT */
.result{text-align:center;padding:14px 0 6px}
.result-emoji{font-size:48px;margin-bottom:8px}
.result-title{font-size:14px;font-weight:700;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.result-score{
  font-size:54px;
  font-weight:800;
  letter-spacing:-0.03em;
  color:var(--ink);
  line-height:1;
  margin-bottom:4px;
}
.result-score .denom{color:var(--ink-faint);font-size:32px;font-weight:700;margin-left:2px}
.result-msg{color:var(--ink-light);font-size:13px;font-weight:500;margin-bottom:22px}
.result-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:20px;
}
.rstat{
  background:var(--line-soft);
  padding:12px 8px;
  border-radius:var(--r);
}
.rstat-val{font-size:22px;font-weight:800;letter-spacing:-0.02em}
.rstat-val.ok{color:var(--green)}
.rstat-val.no{color:var(--red)}
.rstat-label{font-size:11px;color:var(--ink-light);font-weight:600;margin-top:2px}
.result-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn-pill{
  padding:11px 20px;
  border:none;
  border-radius:999px;
  font-family:inherit;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  gap:5px;
}
.btn-pill.ghost{background:var(--line-soft);color:var(--ink-soft)}
.btn-pill.ghost:hover{background:var(--line)}
.btn-pill.primary{background:var(--ink);color:var(--card)}
.btn-pill.primary:hover{background:var(--primary)}

/* REVIEW */
.review-section-title{
  font-size:15px;
  font-weight:800;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
}
.review-section-title .badge{
  background:var(--red);
  color:var(--card);
  font-size:11px;
  font-weight:700;
  padding:3px 9px;
  border-radius:999px;
}
.review-item{
  background:var(--line-soft);
  border-radius:var(--r);
  padding:14px 16px;
  margin-bottom:10px;
}
.rev-num{
  display:inline-block;
  background:var(--ink);
  color:var(--card);
  font-size:11px;
  font-weight:700;
  padding:3px 8px;
  border-radius:6px;
  margin-bottom:8px;
}
.rev-q{font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:8px;line-height:1.55}
.rev-sentence{
  background:var(--card);
  padding:10px 12px;
  border-radius:var(--r-sm);
  font-size:13.5px;
  font-weight:600;
  margin-bottom:10px;
  line-height:1.55;
}
.rev-answers{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;font-size:12.5px}
.rev-row{display:flex;gap:8px;align-items:baseline}
.rev-row .lab{font-size:10.5px;color:var(--ink-light);font-weight:700;min-width:42px;letter-spacing:0.03em;text-transform:uppercase}
.rev-row.your .val{color:var(--red);text-decoration:line-through;font-weight:600}
.rev-row.your.no-answer .val{color:var(--ink-faint);text-decoration:none}
.rev-row.correct .val{color:var(--green);font-weight:700}
.rev-explain{
  font-size:12.5px;
  color:#78350F;
  line-height:1.6;
  background:var(--amber-soft);
  padding:10px 12px;
  border-radius:var(--r-sm);
  border-left:3px solid var(--amber);
  font-weight:500;
}
.perfect-msg{
  text-align:center;
  padding:30px 20px;
  background:var(--green-soft);
  border-radius:var(--r);
  color:#065F46;
  font-weight:700;
  font-size:15px;
}
.perfect-msg .emoji{font-size:36px;display:block;margin-bottom:6px}

/* DONE button row */
.done-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:4px 4px 0;
  font-size:12px;
  color:var(--ink-light);
  font-weight:600;
}

/* Dev tools - reset button */
.dev-tools{
  margin-top:30px;
  text-align:center;
  padding-top:14px;
  border-top:1px dashed var(--line);
}
.reset-btn{
  background:none;
  border:1px solid var(--line);
  color:var(--ink-faint);
  font-family:inherit;
  font-size:11px;
  font-weight:500;
  padding:6px 14px;
  border-radius:999px;
  cursor:pointer;
  transition:all .15s;
}
.reset-btn:hover{color:var(--red);border-color:var(--red);background:var(--red-soft)}

@media(max-width:480px){
  body{padding:14px 10px 100px}
  .card{padding:20px 18px;border-radius:var(--r-lg)}
  .head{padding:18px 18px;border-radius:var(--r-lg)}
  .ch-title{font-size:19px}
  .opt-row.col4{grid-template-columns:1fr}
  .lec-stats{grid-template-columns:1fr 1fr}
  .lec-stats .lec-stat:last-child{grid-column:1/-1}
  .result-score{font-size:44px}
  .tab{font-size:10.5px}
}

  <script src="grammar-sync.js"></script>

const STORAGE_KEY = 'namog-l2-ch05-v1';

// ============================================================
// NAMOG → 학생 페이지 점수 연동 (점수 복사 저장)
// 키 패턴: rl_gr_{sid}_NAMOG{1|2}_sc_{N} / _exam_{N}
// 미리보기 모드: URL ?previewSid=... → rl_pv_gr_... prefix
// 비로그인: 아무 동작 안 함 (개인 학습 모드 보호)
// ============================================================
const NAMOG_LEVEL = 2;
const NAMOG_CHAPTER_NO = 5;
function syncNamogScoreToStudent(stageN){
  try{
    const urlSid = new URLSearchParams(location.search).get('previewSid');
    const isPreview = !!urlSid;
    let sid = urlSid;
    if(!isPreview){
      try{
        const u = JSON.parse(localStorage.getItem('rl_current_user')||'null');
        sid = u && u.id;
      }catch(e){}
    }
    if(!sid) return; // 비로그인 → 학생 연동 안 함
    // 점수 계산 (renderResults와 동일)
    const dataArr = stageN===4 ? STAGE4 : STAGE5;
    const s = state['s'+stageN];
    const total = dataArr.length;
    const correct = (s.ans||[]).filter(a=>a && a.ok).length;
    const pct = total>0 ? Math.round((correct/total)*100) : 0;
    const passed = pct>=80;
    // 키 prefix 결정
    const prefix = (isPreview?'rl_pv_gr_':'rl_gr_') + sid + '_NAMOG' + NAMOG_LEVEL + '_';
    const suffix = stageN===4 ? ('sc_'+NAMOG_CHAPTER_NO) : ('exam_'+NAMOG_CHAPTER_NO);
    const key = prefix + suffix;
    // attempts 누적
    let dataObj;
    try{ dataObj = JSON.parse(localStorage.getItem(key)||'null'); }catch(e){}
    if(!dataObj || !Array.isArray(dataObj.attempts)) dataObj = {attempts:[]};
    const attemptNo = dataObj.attempts.length + 1;
    dataObj.attempts.push({
      attempt: attemptNo,
      right: correct,
      total: total,
      pct: pct,
      passed: passed,
      date: new Date().toISOString().slice(0,10)
    });
    // 📋 풀이 답안도 저장 (다른 기기에서 결과/오답풀이 화면 복원용)
    dataObj.lastAns = (s.ans||[]).map(a => a ? {value:a.value, ok:a.ok} : null);
    dataObj.lastStage = stageN;
    localStorage.setItem(key, JSON.stringify(dataObj));
    // 진도 업데이트 (student.html은 progress.currentPoint를 읽음)
    const progKey = prefix + 'progress';
    let prog;
    try{ prog = JSON.parse(localStorage.getItem(progKey)||'null'); }catch(e){}
    if(!prog) prog = {completedPoints:[]};
    if(!Array.isArray(prog.completedPoints)) prog.completedPoints = [];
    if(stageN===5 && passed){
      // 실전평가 통과 → 챕터 완료 + 다음 챕터로
      if(!prog.completedPoints.includes(NAMOG_CHAPTER_NO)) prog.completedPoints.push(NAMOG_CHAPTER_NO);
      prog.currentPoint = NAMOG_CHAPTER_NO + 1;
    } else if(!prog.currentPoint || prog.currentPoint < NAMOG_CHAPTER_NO){
      // 아직 챕터 미완료 → 현재 챕터에 머무름
      prog.currentPoint = NAMOG_CHAPTER_NO;
    }
    prog.lastUpdated = new Date().toISOString();
    localStorage.setItem(progKey, JSON.stringify(prog));
    console.log('[namog-sync] L'+NAMOG_LEVEL+' Ch'+NAMOG_CHAPTER_NO+' stage'+stageN+' →', pct+'%', passed?'✓통과':'');
  }catch(e){
    console.warn('[namog-sync] failed:', e);
  }
}

// ========== 주간평가 모드 (Weekly Test) ==========
let WEEKLY_MODE = null;   // null | 'wsc' | 'wex'
let WEEKLY_INDEX = null;  // 주차 번호 (1,2,3...)
let WEEKLY_REVIEW = false; // 오답풀이 모드

function getWeeklyKey(wIdx, kind){
  // kind: 'wsc' | 'wex'
  return 'NAMOG' + NAMOG_LEVEL + '_' + kind + '_' + wIdx;
}

function loadWeeklyPool(wIdx, kind){
  // kind: 'wsc'(훈련=train) | 'wex'(실전=exam)
  try{
    const pool = window.NAMOG_WEEKLY_POOL;
    if(!pool) return null;
    const lvKey = 'namog' + NAMOG_LEVEL;
    const wkKey = 'week' + wIdx;
    const wkData = pool[lvKey] && pool[lvKey][wkKey];
    if(!wkData) return null;
    return kind==='wsc' ? wkData.train : wkData.exam;
  }catch(e){
    console.warn('[weekly] pool load failed:', e);
    return null;
  }
}

function syncNamogWeeklyToStudent(){
  try{
    if(!WEEKLY_MODE || !WEEKLY_INDEX) return;
    const urlSid = new URLSearchParams(location.search).get('previewSid');
    const isPreview = !!urlSid;
    let sid = urlSid;
    if(!isPreview){
      try{
        const u = JSON.parse(localStorage.getItem('rl_current_user')||'null');
        sid = u && u.id;
      }catch(e){}
    }
    if(!sid) return;
    // STAGE5는 이미 weekly 풀로 덮어써져 있음
    const s = state.s5;
    const total = STAGE5.length;
    const correct = (s.ans||[]).filter(a=>a && a.ok).length;
    const pct = total>0 ? Math.round((correct/total)*100) : 0;
    const passed = pct>=80;
    const prefix = (isPreview?'rl_pv_gr_':'rl_gr_') + sid + '_';
    const innerKey = getWeeklyKey(WEEKLY_INDEX, WEEKLY_MODE);
    const key = prefix + innerKey;
    let dataObj;
    try{ dataObj = JSON.parse(localStorage.getItem(key)||'null'); }catch(e){}
    if(!dataObj || !Array.isArray(dataObj.attempts)) dataObj = {attempts:[]};
    const attemptNo = dataObj.attempts.length + 1;
    dataObj.attempts.push({
      attempt: attemptNo,
      right: correct,
      total: total,
      pct: pct,
      passed: passed,
      date: new Date().toISOString().slice(0,10)
    });
    // 주차 메타 (학생 페이지가 wFrom/wTo 표시에 쓸 수 있음)
    try{
      const pool = window.NAMOG_WEEKLY_POOL;
      const wkData = pool && pool['namog'+NAMOG_LEVEL] && pool['namog'+NAMOG_LEVEL]['week'+WEEKLY_INDEX];
      if(wkData){
        dataObj.fromChapter = wkData.fromChapter;
        dataObj.toChapter = wkData.toChapter;
        // student.html 호환: fromUnit/toUnit으로도
        dataObj.fromUnit = wkData.fromChapter;
        dataObj.toUnit = wkData.toChapter;
      }
    }catch(e){}
    localStorage.setItem(key, JSON.stringify(dataObj));
    console.log('[weekly-sync] L'+NAMOG_LEVEL+' '+WEEKLY_MODE+' week'+WEEKLY_INDEX+' →', pct+'%', passed?'✓통과':'');
  }catch(e){
    console.warn('[weekly-sync] failed:', e);
  }
}

function updateHeaderForWeekly(){
  try{
    const pool = window.NAMOG_WEEKLY_POOL;
    if(!pool || !WEEKLY_MODE) return;
    const lvKey = 'namog' + NAMOG_LEVEL;
    const wkKey = 'week' + WEEKLY_INDEX;
    const wkData = pool[lvKey] && pool[lvKey][wkKey];
    if(!wkData) return;
    const chNoEl = document.querySelector('.ch-no');
    const chTitleEl = document.querySelector('.ch-title');
    const unitTitleEl = document.querySelector('.unit-title');
    const modeLabel = WEEKLY_MODE==='wsc' ? '주간평가 훈련' : '주간평가 실전';
    if(chNoEl){
      chNoEl.textContent = '📝 ' + modeLabel + ' · ' + WEEKLY_INDEX + '주차';
    }
    if(chTitleEl){
      const range = wkData.fromChapter===wkData.toChapter
        ? 'Ch' + wkData.fromChapter
        : 'Ch' + wkData.fromChapter + ' ~ Ch' + wkData.toChapter;
      chTitleEl.textContent = range + ' 학습 범위';
    }
    if(unitTitleEl){
      const titles = wkData.chapterTitles || [];
      unitTitleEl.textContent = titles.length>0 ? titles.join(' + ') : '';
    }
    // 주간평가 모드에서는 STEP 진행 탭 숨김 (의미 없음)
    const tabsEl = document.getElementById('tabs');
    if(tabsEl) tabsEl.style.display = 'none';
  }catch(e){
    console.warn('[weekly-header] failed:', e);
  }
}

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function load(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s){
      const p=JSON.parse(s);
      delete p.videoId;
      // Blob URLs from URL.createObjectURL don't survive page reloads
      if(p.video && p.video.src && p.video.src.startsWith('blob:')){
        p.video = null;
        p.s1Watched = false;
      }
      // If previously completed Stage 1, consider video watched
      if(p.s1 && p.s1Watched === undefined) p.s1Watched = true;
      state=Object.assign(state,p);
    }
  }catch(e){}
}

function navHTML(opts={}){
  const {prevLabel='← 이전',nextLabel='다음 →',showPrev=true,showNext=true,nextDisabled=false,prevDisabled=false,nextClass='next'}=opts;
  return `<div class="nav">
    ${showPrev?`<button class="nav-btn" id="prevBtn" ${prevDisabled?'disabled':''}>${prevLabel}</button>`:''}
    ${showNext?`<button class="nav-btn ${nextClass}" id="nextBtn" ${nextDisabled?'disabled':''}>${nextLabel}</button>`:''}
  </div>`;
}
function normalize(s){return s.trim().toLowerCase().replace(/\s+/g,' ').replace(/[.,!?]/g,'')}

// ============================================================
// STAGE 1 — VIDEO
// ============================================================
function parseVideo(input){
  if(!input) return null;
  input = input.trim();
  // YouTube link or 11-char ID
  const yt = input.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube-nocookie\.com\/embed\/)([a-zA-Z0-9_-]{11})/) 
         || input.match(/^([a-zA-Z0-9_-]{11})$/);
  if(yt) return {type:'youtube', id:yt[1]};
  // Direct video file (mp4, webm, etc — local filename or full URL)
  if(input.match(/\.(mp4|webm|ogg|mov|m4v)(\?|$|#)/i)) return {type:'file', src:input};
  return null;
}

// Called when video reaches end (or 90%+ progress for slack)
function markWatched(){
  if(state.s1Watched) return;
  state.s1Watched = true;
  save();
  // Update UI without full re-render (don't disrupt video)
  const nb = document.getElementById('nextBtn');
  if(nb) nb.disabled = false;
  const wh = document.getElementById('watchHint');
  if(wh){
    wh.classList.add('completed');
    wh.innerHTML = '<span class="watch-hint-icon">✓</span><span><b>강의 완료!</b> 이제 다음 단계로 갈 수 있어요</span>';
  }
}

function setupWatchTracking(video){
  if(video.type === 'file'){
    const vid = document.getElementById('localVideo');
    if(!vid) return;
    vid.addEventListener('ended', markWatched);
    // Also mark watched at 90%+ in case of seeking past end
    vid.addEventListener('timeupdate', ()=>{
      if(vid.duration > 0 && vid.currentTime / vid.duration >= 0.9) markWatched();
    });
  } else if(video.type === 'youtube'){
    // Set up YouTube IFrame API tracking
    if(window.YT && window.YT.Player){
      createYTPlayer();
    } else {
      // API not loaded yet; will be created when API ready callback fires
      window._pendingYTSetup = true;
    }
  }
}

function createYTPlayer(){
  if(ytPlayer){try{ytPlayer.destroy()}catch(e){}}
  const iframeEl = document.getElementById('ytPlayer');
  if(!iframeEl) return;
  ytPlayer = new window.YT.Player('ytPlayer', {
    events:{
      onStateChange: (e)=>{
        if(e.data === window.YT.PlayerState.ENDED){
          markWatched();
        }
      }
    }
  });
  // Poll for 90%+ progress (in case ENDED doesn't fire reliably)
  if(window._ytProgressInterval) clearInterval(window._ytProgressInterval);
  window._ytProgressInterval = setInterval(()=>{
    try{
      if(ytPlayer && ytPlayer.getCurrentTime && ytPlayer.getDuration){
        const ct = ytPlayer.getCurrentTime();
        const dur = ytPlayer.getDuration();
        if(dur > 0 && ct / dur >= 0.9){
          markWatched();
          clearInterval(window._ytProgressInterval);
        }
      }
    }catch(e){}
  }, 2000);
}

// Global callback for YouTube IFrame API
window.onYouTubeIframeAPIReady = function(){
  if(window._pendingYTSetup){
    window._pendingYTSetup = false;
    createYTPlayer();
  }
};

function renderStage1(){
  const video = state.video; // {type, id|src} or null/undefined
  let videoBlock = '';

  if(video && video.type === 'youtube'){
    videoBlock = `
      <div class="video-wrap">
        <iframe id="ytPlayer" src="https://www.youtube-nocookie.com/embed/${video.id}?enablejsapi=1"
                title="강의 영상"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen></iframe>
      </div>
      <div class="video-actions">
        <span class="video-id-label">유튜브 ID: <code>${video.id}</code></span>
        <button class="video-change-btn" id="changeVideoBtn"><span style="font-size:13px">✎</span> 영상 바꾸기</button>
      </div>`;
  } else if(video && video.type === 'file'){
    videoBlock = `
      <div class="video-wrap">
        <video src="${video.src}" controls preload="metadata" controlsList="nodownload" style="width:100%;height:100%;background:#000;" id="localVideo"></video>
      </div>
      <div class="video-actions">
        <span class="video-id-label">${video.isLocal ? '📁' : '🔗'} ${video.name || video.src}</span>
        <button class="video-change-btn" id="changeVideoBtn"><span style="font-size:13px">✎</span> 영상 바꾸기</button>
      </div>`;
  } else {
    videoBlock = `
      <div class="video-input-box" id="videoDropZone">
        <div class="vi-title">📺 강의 영상 추가</div>
        <div class="vi-desc">아래 <b>두 가지 방법 중 하나</b>로 영상을 추가하세요</div>
        
        <div class="vi-method">
          <div class="vi-method-label"><span class="vi-num">1</span> 내 컴퓨터에서 영상 파일 선택 (가장 쉬움)</div>
          <input type="file" id="fileInput" accept="video/*" style="display:none">
          <button class="vi-file-btn" id="filePickBtn">📁 영상 파일 선택하기</button>
          <div class="vi-method-hint">또는 영상 파일을 이 영역에 드래그해서 놓아도 됩니다</div>
        </div>
        
        <div class="vi-divider">또는</div>
        
        <div class="vi-method">
          <div class="vi-method-label"><span class="vi-num">2</span> 유튜브 링크 붙여넣기</div>
          <input type="text" class="vi-input" id="videoInput" placeholder="https://youtu.be/..." autocomplete="off">
          <div class="vi-error" id="videoError"></div>
          <button class="vi-submit" id="setVideoBtn">유튜브 영상 설정</button>
        </div>
      </div>`;
  }

  const canProceed = !!video && state.s1Watched;
  const watchHintHtml = (video && !state.s1Watched) ? `
    <div class="watch-hint" id="watchHint">
      <span class="watch-hint-icon">💡</span>
      <span>강의를 <b>끝까지 시청</b>하면 다음 단계로 갈 수 있어요</span>
    </div>` : '';

  cardArea.innerHTML = `
    <div class="card">
      ${mascotHTML('안녕! 나는 <em>테리쌤</em>이야 오늘은 <em>분사</em>에 대해 배워볼 거야. 강의 한 번 집중해서 듣고 다음 단계로 가자!')}
      ${videoBlock}
      ${watchHintHtml}
      <div class="lec-stats">
        <div class="lec-stat"><div class="lec-stat-label">강의 길이</div><div class="lec-stat-val">약 8분</div></div>
        <div class="lec-stat"><div class="lec-stat-label">강의 제목</div><div class="lec-stat-val">분사</div></div>
        <div class="lec-stat"><div class="lec-stat-label">강사</div><div class="lec-stat-val">테리 쌤</div></div>
      </div>
    </div>
    ${navHTML({prevDisabled:true,nextLabel:'강의 다 들었어요 →',nextDisabled:!canProceed})}
  `;
  
  if(video){
    document.getElementById('nextBtn').onclick = ()=>{state.s1=true;state.cur=2;save();render()};
    document.getElementById('changeVideoBtn').onclick = ()=>{
      // Revoke blob URL if exists to free memory
      if(state.video && state.video.src && state.video.src.startsWith('blob:')){
        try{URL.revokeObjectURL(state.video.src)}catch(e){}
      }
      state.video = null;
      state.s1Watched = false; // reset when video changes
      // Destroy YT player if exists
      if(ytPlayer){try{ytPlayer.destroy()}catch(e){};ytPlayer=null;}
      save();render();
    };
    
    // Hook up "watched" detection (without full re-render to keep video playing)
    setupWatchTracking(video);
  } else {
    // Method 1: File picker
    const fileInput = document.getElementById('fileInput');
    const filePickBtn = document.getElementById('filePickBtn');
    const dropZone = document.getElementById('videoDropZone');
    
    const handleFile = (file)=>{
      if(!file || !file.type.startsWith('video/')){
        alert('영상 파일만 선택할 수 있어요 (mp4, webm, mov 등)');
        return;
      }
      const url = URL.createObjectURL(file);
      state.video = {type:'file', src:url, name:file.name, isLocal:true};
      save();render();
    };
    
    filePickBtn.onclick = ()=> fileInput.click();
    fileInput.onchange = (e)=>{ if(e.target.files[0]) handleFile(e.target.files[0]); };
    
    // Drag and drop
    ['dragenter','dragover'].forEach(ev=>{
      dropZone.addEventListener(ev, (e)=>{e.preventDefault();dropZone.classList.add('drag-over')});
    });
    ['dragleave','drop'].forEach(ev=>{
      dropZone.addEventListener(ev, (e)=>{e.preventDefault();dropZone.classList.remove('drag-over')});
    });
    dropZone.addEventListener('drop', (e)=>{
      if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    
    // Method 2: YouTube URL
    const inp = document.getElementById('videoInput');
    const btn = document.getElementById('setVideoBtn');
    const err = document.getElementById('videoError');
    const setVideo = ()=>{
      const parsed = parseVideo(inp.value);
      if(parsed){
        state.video = parsed;
        save();render();
      } else {
        err.textContent = '유튜브 링크를 정확히 붙여넣어주세요 (예: https://youtu.be/iklAVxwtuy4)';
        err.classList.add('show');
        inp.focus();
      }
    };
    btn.onclick = setVideo;
    inp.onkeypress = e=>{if(e.key==='Enter')setVideo()};
  }
}

// ============================================================
// STAGE 2/3 — PRACTICE WITH FEEDBACK
// ============================================================
function renderPractice(stageN){
  const data = stageN===2 ? STAGE2 : STAGE3;
  // 빈 Stage 2 placeholder
  if(data.length === 0){
    cardArea.innerHTML = `
      <div class="card">
        ${mascotHTML('이 챕터의 <em>개념체크</em>는 준비중이에요 🔧 강의 자막 정리 후 추가될 예정입니다. <b>STEP 3</b>로 바로 진행해주세요!')}
        <div style="text-align:center;padding:50px 20px;color:var(--ink-light)">
          <div style="font-size:56px;margin-bottom:10px">🔧</div>
          <div style="font-size:15px;font-weight:700;color:var(--ink-soft);margin-bottom:4px">준비중인 단계</div>
          <div style="font-size:12.5px;font-weight:500;line-height:1.6">강의 자막을 정리 후 개념체크 문제가<br>이 자리에 추가될 예정입니다</div>
        </div>
      </div>
      ${navHTML({prevLabel:'← STEP 1로',nextLabel:'STEP 3로 가기 →'})}
    `;
    document.getElementById('prevBtn').onclick = ()=>{state.cur=1;save();render()};
    document.getElementById('nextBtn').onclick = ()=>{state.cur=3;save();render()};
    return;
  }
  const s = state['s'+stageN];
  const i = Math.min(s.idx, data.length-1);
  const card = data[i];
  const prior = s.ans[i];

  const labelClass = card.label && card.label.includes('⭐') ? 'hot' : '';

  let optsHTML = '';
  if (card.subjective) {
    optsHTML = `
      <div class="subj-wrap">
        <input type="text" class="subj-input" id="subjInput" placeholder="답을 입력하세요" autocomplete="off" autocapitalize="off">
        <div class="subj-actions">
          <button class="subj-submit" id="subjSubmit">제출</button>
          ${card.hint?`<span class="subj-hint">💡 ${card.hint}</span>`:''}
        </div>
      </div>
    `;
  } else {
    const cls = card.layout || 'col2';
    optsHTML = `<div class="opt-row ${cls}">
      ${card.opts.map((o,j)=>`<button class="opt-box" data-i="${j}"><span class="opt-letter">${LETTERS[j]}</span><span>${o}</span></button>`).join('')}
    </div>`;
  }

  let feedbackHTML = '';
  if (card.quote) {
    feedbackHTML = `<div class="teacher-quote" style="display:none" id="tq">
      <div class="tq-label">🎓 이재영 쌤 강의 · ${card.quoteAt}</div>
      <div>${card.quote}</div>
    </div>`;
  }

  cardArea.innerHTML = `
    <div class="card">
      ${card.mascot?mascotHTML(card.mascot):''}
      ${card.label?`<div class="card-label ${labelClass}">${card.label}</div>`:''}
      <div class="q-text">${card.q}</div>
      ${card.sentence?`<div class="q-sentence">${card.sentence}${card.trans?`<div class="q-trans">${card.trans}</div>`:''}</div>`:''}
      ${optsHTML}
      <div class="feedback" id="fb"><div class="fb-head" id="fbHead"></div><div id="fbBody"></div>${feedbackHTML}</div>
    </div>
    ${navHTML({prevDisabled:i===0,nextDisabled:!prior,nextLabel: i===data.length-1?'다음 단계 →':'다음 →'})}
  `;

  document.getElementById('prevBtn').onclick = ()=>{if(i>0){s.idx=i-1;save();render()}};
  document.getElementById('nextBtn').onclick = ()=>{
    if(i===data.length-1){state.cur=stageN+1;if(state.cur===4)state.s4.idx=0;save();render();}
    else{s.idx=i+1;save();render();}
  };

  if (card.subjective) {
    const inp = document.getElementById('subjInput');
    const btn = document.getElementById('subjSubmit');
    if (prior) {inp.value=prior.value;inp.disabled=true;btn.disabled=true;showFeedback(card,prior)}
    btn.onclick = ()=>{
      const v = inp.value.trim();
      if(!v)return;
      const ok = card.answers.some(a=>normalize(a)===normalize(v));
      s.ans[i] = {value:v,ok};
      inp.disabled=true;btn.disabled=true;
      inp.classList.add(ok?'right':'wrong');
      showFeedback(card,s.ans[i]);
      save();render();
    };
    inp.onkeypress = e=>{if(e.key==='Enter')btn.click()};
  } else {
    document.querySelectorAll('.opt-box').forEach(b=>{
      b.onclick = ()=>{
        const j = parseInt(b.dataset.i);
        const ok = j===card.ans;
        s.ans[i] = {value:j,ok};
        showFeedback(card,s.ans[i]);
        save();render();
      };
    });
    if (prior) {
      document.querySelectorAll('.opt-box').forEach((b,j)=>{
        b.disabled=true;
        if(j===card.ans)b.classList.add('right');
        else if(j===prior.value)b.classList.add('wrong');
        else b.classList.add('dim');
      });
      showFeedback(card,prior);
    }
  }
}

function showFeedback(card, prior){
  const fb = document.getElementById('fb');
  const head = document.getElementById('fbHead');
  const body = document.getElementById('fbBody');
  fb.classList.add('show');
  fb.classList.add(prior.ok?'right':'wrong');
  if(prior.ok){head.textContent='✓ 정답이에요!'}
  else if(card.subjective){head.innerHTML=`✗ 정답: <b>${card.answers[0]}</b>`}
  else{head.innerHTML=`✗ 정답: ${LETTERS[card.ans]} <b>${card.opts[card.ans]}</b>`}
  body.innerHTML = card.explain;
  const tq = document.getElementById('tq');
  if(tq){tq.style.display='block';
    if(prior.ok){tq.style.background='rgba(255,255,255,0.6)';tq.style.color='#065F46';}
    else{tq.style.background='rgba(255,255,255,0.6)';tq.style.color='#78350F';}
  }
}

// ============================================================
// STAGE 4/5 — TEST MODE
// ============================================================
function renderTest(stageN){
  const data = stageN===4 ? STAGE4 : STAGE5;
  const s = state['s'+stageN];
  // 결과 화면으로 갈지 vs 풀이 화면(또는 리뷰 모드)로 갈지
  if(s.done && !s.reviewMode) return renderResults(stageN);
  const isReview = !!s.reviewMode;

  const i = Math.min(s.idx, data.length-1);
  const card = data[i];
  const answered = s.ans.filter(a=>a).length;

  const dotsHTML = data.map((_,j)=>{
    const a = s.ans[j];
    let cls = '';
    if(j===i)cls='current';
    else if(a)cls='answered';
    return `<span class="test-dot ${cls}" data-i="${j}">${j+1}</span>`;
  }).join('');

  let optsHTML = '';
  if(card.subjective){
    optsHTML = `
      <div class="subj-wrap">
        <input type="text" class="subj-input" id="subjInput" placeholder="답을 입력하세요" autocomplete="off" autocapitalize="off" value="${s.ans[i]?s.ans[i].value.replace(/"/g,'&quot;'):''}">
        ${card.hint?`<div class="subj-hint" style="margin-top:8px">💡 ${card.hint}</div>`:''}
      </div>
    `;
  } else {
    const cls = card.layout || 'col5';
    optsHTML = `<div class="opt-row ${cls}">
      ${card.opts.map((o,j)=>`<button class="opt-box ${s.ans[i]&&s.ans[i].value===j?'selected':''}" data-i="${j}"><span class="opt-letter">${LETTERS[j]}</span><span>${o}</span></button>`).join('')}
    </div>`;
  }

  const stageName = STAGE_META[stageN].name;
  const isLast = i===data.length-1;

  cardArea.innerHTML = `
    <div class="card">
      ${isReview?`
        <div class="test-banner" style="background:#FEF3C7;border-color:#F59E0B;color:#92400E">
          <b>📋 내 풀이 보기</b> · 채점된 결과 확인 · ${stageN===4?'셀프체크':'실전평가'} ${data.length}문제
          <button class="btn-pill primary" style="margin-left:8px;padding:5px 12px;font-size:12px" onclick="state.s${stageN}.reviewMode=false;save();render()">← 결과로 돌아가기</button>
        </div>
      `:`
        <div class="test-banner">
          <b>📝 ${stageName} 시험 모드</b> · 정답/해설은 모든 문제 제출 후에 보입니다 · 점 클릭으로 문제 이동 가능
        </div>
      `}
      <div class="test-counter">${i+1} / ${data.length} · 답한 문제 ${answered}개${isReview?(s.ans[i]?(s.ans[i].ok?' · <span style="color:#10B981;font-weight:700">✓ 맞음</span>':' · <span style="color:#EF4444;font-weight:700">✗ 틀림</span>'):' · <span style="color:#A1A1AA">미답</span>'):''}</div>
      <div class="test-dots" id="dots">${dotsHTML}</div>
      <div class="card-label info">${stageName} · Q${i+1}</div>
      <div class="q-text">${card.q}</div>
      ${card.sentence?`<div class="q-sentence">${card.sentence}${card.trans?`<div class="q-trans">${card.trans}</div>`:''}</div>`:''}
      ${optsHTML}
      ${isReview&&!card.subjective?`<div style="margin-top:12px;padding:12px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:12px;font-size:14px"><b style="color:#10B981">정답:</b> ${LETTERS[card.ans]} ${card.opts[card.ans]}</div>${card.explain?`<div style="margin-top:8px;padding:12px;background:#FAFAFA;border:1px solid #E5E7EB;border-radius:12px;font-size:13px;line-height:1.6"><b>💡 해설:</b> ${card.explain}</div>`:''}`:''}
      ${isReview&&card.subjective?`<div style="margin-top:12px;padding:12px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:12px;font-size:14px"><b style="color:#10B981">정답:</b> ${card.answers[0]}</div>${card.explain?`<div style="margin-top:8px;padding:12px;background:#FAFAFA;border:1px solid #E5E7EB;border-radius:12px;font-size:13px;line-height:1.6"><b>💡 해설:</b> ${card.explain}</div>`:''}`:''}
    </div>
    ${navHTML({prevDisabled:!isReview&&i===0, nextLabel: isReview?(isLast?'결과로 돌아가기 →':'다음 →'):(isLast?'제출하고 결과 보기 ✓':'다음 →')})}
  `;

  document.getElementById('prevBtn').onclick = ()=>{
    if(i>0){
      s.idx=i-1;save();render();
    } else if(isReview){
      // 리뷰 모드: 첫 문제에서 이전 → 결과 화면으로
      s.reviewMode = false;
      save();render();
    }
  };
  document.getElementById('nextBtn').onclick = ()=>{
    if(isReview){
      // 리뷰 모드: 답 변경 없이 다음/결과로
      if(isLast){
        s.reviewMode = false;
        save();render();
      } else {
        s.idx=i+1;save();render();
      }
      return;
    }
    if(isLast){
      // Capture subjective if pending
      if(card.subjective){
        const inp = document.getElementById('subjInput');
        const v = inp.value.trim();
        if(v){
          const ok = card.answers.some(a=>normalize(a)===normalize(v));
          s.ans[i] = {value:v,ok};
        }
      }
      const unanswered = data.length - s.ans.filter(a=>a).length;
      if(unanswered>0 && !confirm(`아직 답하지 않은 문제가 ${unanswered}개 있어요. 그래도 제출할까요?`))return;
      s.done = true;
      save();
      if(WEEKLY_MODE && stageN===5){
        syncNamogWeeklyToStudent();
      } else {
        syncNamogScoreToStudent(stageN);
      }
      render();
    } else {
      // Capture subjective before moving on
      if(card.subjective){
        const inp = document.getElementById('subjInput');
        const v = inp.value.trim();
        if(v){
          const ok = card.answers.some(a=>normalize(a)===normalize(v));
          s.ans[i] = {value:v,ok};
        }
      }
      s.idx=i+1;save();render();
    }
  };

  // Bind options (리뷰 모드면 모두 비활성화)
  if(card.subjective){
    const inp = document.getElementById('subjInput');
    if(isReview){
      inp.disabled = true;
      inp.style.background = '#F5F5F5';
    } else {
      inp.oninput = ()=>{
        const v = inp.value.trim();
        if(v){
          const ok = card.answers.some(a=>normalize(a)===normalize(v));
          s.ans[i] = {value:v,ok};
        } else {
          s.ans[i] = undefined;
        }
        save();
        const dot = document.querySelector(`.test-dot[data-i="${i}"]`);
        if(dot){dot.classList.remove('answered');if(v)dot.classList.add('answered')}
      };
    }
  } else {
    document.querySelectorAll('.opt-box').forEach(b=>{
      if(isReview){
        b.style.cursor = 'default';
        b.style.opacity = '0.75';
        // 정답 표시
        const j = parseInt(b.dataset.i);
        if(j === card.ans){
          b.style.background = '#D1FAE5';
          b.style.borderColor = '#10B981';
          b.style.opacity = '1';
        }
        // 내가 찍은 답이 틀린 경우 빨강
        if(s.ans[i] && s.ans[i].value === j && !s.ans[i].ok){
          b.style.background = '#FEE2E2';
          b.style.borderColor = '#EF4444';
          b.style.opacity = '1';
        }
      } else {
        b.onclick = ()=>{
          const j = parseInt(b.dataset.i);
          const ok = j===card.ans;
          s.ans[i] = {value:j,ok};
          document.querySelectorAll('.opt-box').forEach((bb,k)=>{
            bb.classList.remove('selected');
            if(k===j)bb.classList.add('selected');
          });
          save();
          const dot = document.querySelector(`.test-dot[data-i="${i}"]`);
          if(dot)dot.classList.add('answered');
        };
      }
    });
  }

  document.querySelectorAll('.test-dot').forEach(d=>{
    d.onclick = ()=>{
      // Save current subjective input before navigating
      if(card.subjective){
        const inp = document.getElementById('subjInput');
        if(inp){
          const v = inp.value.trim();
          if(v){
            const ok = card.answers.some(a=>normalize(a)===normalize(v));
            s.ans[i] = {value:v,ok};
          }
        }
      }
      s.idx = parseInt(d.dataset.i);
      save();render();
    };
  });
}

// ============================================================
// TEST RESULTS
// ============================================================
function renderResults(stageN){
  const data = stageN===4 ? STAGE4 : STAGE5;
  const s = state['s'+stageN];
  const total = data.length;
  const answered = s.ans.filter(a=>a);
  const correct = answered.filter(a=>a.ok).length;
  const wrong = answered.length - correct;
  const unanswered = total - answered.length;
  const pct = Math.round((correct/total)*100);

  let emoji, msg;
  if(pct>=90){emoji='🏆';msg='완벽해! 챕터 마스터 수준이야'}
  else if(pct>=75){emoji='✨';msg='아주 잘했어. 한두 개만 다시 짚어보면 돼'}
  else if(pct>=60){emoji='👍';msg='큰 흐름은 잡았어. 틀린 부분 복습하면 OK'}
  else {emoji='💪';msg='강의 한 번 더 듣고 다시 도전해보자'}

  const wrongList = [];
  data.forEach((card,j)=>{
    const a = s.ans[j];
    if(!a || !a.ok) wrongList.push({card,j,a});
  });

  const nextBtnHTML = (function(){
    // STEP 5(실전평가) 결과 화면: 항상 "처음으로" 표시
    if(stageN !== 4){
      // STEP 5 실전평가 결과 — 로그인 학생이면 학습일정으로, 비로그인이면 처음으로
      let _sid = new URLSearchParams(location.search).get('previewSid');
      const _isPv = !!_sid;
      if(!_sid){
        try{
          const _u = JSON.parse(localStorage.getItem('rl_current_user')||'null');
          _sid = _u && _u.id;
        }catch(e){}
      }
      if(_sid){
        const _url = _isPv ? 'student.html?preview='+encodeURIComponent(_sid) : 'student.html';
        return `<button class="btn-pill primary" onclick="window.location.href='${_url}'">📅 학습일정으로 →</button>`;
      }
      return `<button class="btn-pill primary" id="goHome">처음으로 🏠</button>`;
    }
    // STEP 4(셀프체크) 결과 화면: 점수 + 시도 횟수에 따라 분기
    // 비로그인(개인 학습) → 점수 무관 실전 진입
    // 로그인 학생 → 80점 이상이거나 재시험까지 끝낸 2회차면 실전 진입
    // 1회차 80점 미만 → 재시험 강제 (실전 버튼 안 보임)
    let sid = new URLSearchParams(location.search).get('previewSid');
    const isPreview = !!sid;
    if(!sid){
      try{
        const u = JSON.parse(localStorage.getItem('rl_current_user')||'null');
        sid = u && u.id;
      }catch(e){}
    }
    // 학습일정 버튼 - 로그인 여부 관계없이 항상 표시
    const _schedUrl4 = (sid && isPreview) ? 'student.html?preview='+encodeURIComponent(sid) : 'student.html';
    const _schedBtn4 = `<button class="btn-pill ghost" onclick="window.location.href='${_schedUrl4}'">📅 학습일정으로 →</button>`;
    if(!sid){
      // 비로그인: 학습일정 + 실전평가
      return _schedBtn4 + `<button class="btn-pill primary" id="nextStage">실전평가로 가기 →</button>`;
    }
    // 학생 로그인 모드: attempts 수 확인
    let attempts = 0;
    try{
      const key = (isPreview?'rl_pv_gr_':'rl_gr_') + sid + '_NAMOG' + NAMOG_LEVEL + '_sc_' + NAMOG_CHAPTER_NO;
      const data = JSON.parse(localStorage.getItem(key)||'null');
      if(data && Array.isArray(data.attempts)) attempts = data.attempts.length;
    }catch(e){}
    if(pct >= 80 || attempts >= 2){
      // 80점 이상 OR 재시험 끝(2회차) → 실전 진입 + 학습일정 옵션 함께
      return _schedBtn4 + `<button class="btn-pill primary" id="nextStage">실전평가로 가기 →</button>`;
    }
    // 1회차 80점 미만 → 학습일정 버튼 + 재시험 안내 메시지
    return _schedBtn4 + `<div style="font-size:13px;color:#E04B5A;text-align:center;font-weight:700;padding:10px 16px;background:#FFE4E7;border-radius:12px;margin-top:8px">⚠️ 80점 미만 — 재시험 1회 가능</div>`;
  })();

  cardArea.innerHTML = `
    <div class="card">
      <div class="result">
        <div class="result-emoji">${emoji}</div>
        <div class="result-title">${STAGE_META[stageN].name} 결과</div>
        <div class="result-score">${correct}<span class="denom"> / ${total}</span></div>
        <div class="result-msg">${pct}% · ${msg}</div>
        <div class="result-stats">
          <div class="rstat"><div class="rstat-val ok">${correct}</div><div class="rstat-label">맞음</div></div>
          <div class="rstat"><div class="rstat-val no">${wrong}</div><div class="rstat-label">틀림</div></div>
          <div class="rstat"><div class="rstat-val" style="color:var(--ink-faint)">${unanswered}</div><div class="rstat-label">미답</div></div>
        </div>
        <div class="result-actions">
          <button class="btn-pill ghost" id="reviewBtn">📋 내 풀이 보기</button>
          <button class="btn-pill ghost" id="retry">↻ 다시 풀기</button>
          ${nextBtnHTML}
        </div>
      </div>
    </div>
    ${wrongList.length>0 ? `
      <div class="card">
        <div class="review-section-title">📝 오답 노트 <span class="badge">${wrongList.length}개</span></div>
        ${wrongList.map(({card,j,a})=>`
          <div class="review-item">
            <span class="rev-num">Q${j+1}</span>
            <div class="rev-q">${card.q}</div>
            ${card.sentence?`<div class="rev-sentence">${card.sentence}</div>`:''}
            <div class="rev-answers">
              ${a?`<div class="rev-row your"><span class="lab">내 답</span><span class="val">${card.subjective?a.value:LETTERS[a.value]+' '+card.opts[a.value]}</span></div>`:`<div class="rev-row your no-answer"><span class="lab">내 답</span><span class="val">미답</span></div>`}
              <div class="rev-row correct"><span class="lab">정답</span><span class="val">${card.subjective?card.answers[0]:LETTERS[card.ans]+' '+card.opts[card.ans]}</span></div>
            </div>
            <div class="rev-explain">${card.explain}</div>
          </div>
        `).join('')}
      </div>
    ` : `
      <div class="card">
        <div class="perfect-msg"><span class="emoji">🎉</span>전부 맞췄어! 정말 잘했어</div>
      </div>
    `}
  `;

  document.getElementById('retry').onclick = ()=>{
    if(!confirm('현재 풀이가 모두 지워지고 처음부터 다시 풀게 됩니다.\n계속하시겠습니까?')) return;
    state['s'+stageN] = {idx:0,ans:[],done:false};
    save();render();
  };
  // 📋 내 풀이 보기: 결과 → 풀이 화면 (리뷰 모드 = 답 변경 불가, 자기 답 확인용)
  const rb = document.getElementById('reviewBtn');
  if(rb) rb.onclick = ()=>{
    state['s'+stageN].reviewMode = true;
    state['s'+stageN].idx = 0;
    save();render();
  };
  const ns = document.getElementById('nextStage');
  if(ns)ns.onclick = ()=>{state.cur=5;state.s5.idx=0;save();render()};
  const gh = document.getElementById('goHome');
  if(gh)gh.onclick = ()=>{state.cur=1;save();render()};
}

// ============================================================
// RENDER
// ============================================================
function render(){
  // Update tabs
  document.querySelectorAll('.tab').forEach(t=>{
    const s = parseInt(t.dataset.stage);
    t.classList.remove('active','done','locked');
    if(s===state.cur)t.classList.add('active');
    if(stageDone(s))t.classList.add('done');
    // Lock steps 2-5 until step 1 is completed
    if(s > 1 && !stageDone(s-1)) t.classList.add('locked');  // 순차 잠금: 이전 단계 완료해야 다음 단계 풀림
    t.onclick = ()=>{
      if(t.classList.contains('locked')) return; // 잠긴 단계 클릭 차단
      state.cur=s;save();render()
    };
  });

  // Progress
  const meta = STAGE_META[state.cur];
  let cur, tot = meta.total;
  if(state.cur===1){cur = state.s1?1:0}
  else if(state.cur<=3){cur = state['s'+state.cur].ans.filter(a=>a).length}
  else{
    const s = state['s'+state.cur];
    cur = s.done ? tot : s.ans.filter(a=>a).length;
  }
  const totalAll = 1 + STAGE2.length + STAGE3.length + STAGE4.length + STAGE5.length;
  let doneAll = 0;
  if(state.s1)doneAll++;
  doneAll += state.s2.ans.filter(a=>a).length;
  doneAll += state.s3.ans.filter(a=>a).length;
  doneAll += state.s4.ans.filter(a=>a).length;
  doneAll += state.s5.ans.filter(a=>a).length;
  const allPct = Math.round((doneAll/totalAll)*100);
  progFill.style.width = allPct+'%';
  progText.textContent = allPct+'%';

  // Render stage
  if(state.cur===1) renderStage1();
  else if(state.cur===2||state.cur===3) renderPractice(state.cur);
  else renderTest(state.cur);

  // 단계 변경 시에만 위로 스크롤 (문제 답한 후 다음 문제 갈 땐 현재 스크롤 위치 그대로 유지)
  if(window._lastStageRendered !== state.cur){
    window.scrollTo({top:0,behavior:'instant'});
    window._lastStageRendered = state.cur;
  }
}

function stageDone(s){
  if(s===1)return state.s1;
  if(s===2)return STAGE2.length===0 || state.s2.ans.filter(a=>a).length===STAGE2.length;
  if(s===3)return state.s3.ans.filter(a=>a).length===STAGE3.length;
  if(s===4)return state.s4.done;
  if(s===5)return state.s5.done;
}

load();

// ============================================================
// 학생 페이지에서 진입한 URL 파라미터 처리
// ?exam=N        → STEP 5(실전평가)로 직행 (학생 페이지 "실전" 버튼)
// ?scReview=N    → STEP 4(셀프체크) 화면 (재시험·결과)
// ?examReview=N  → STEP 5(실전평가) 화면 (결과)
// ============================================================
// 📋 다른 기기에서 푼 답안을 rl_gr 기록에서 복원 (결과/오답풀이 화면용)
//    로컬 state.s4/s5에 답안이 없을 때만 복원 (로컬 풀이 우선)
function _restoreAnswersFromStudentRecord(stageN){
  try{
    const s = state['s'+stageN];
    // 이미 로컬에 답안 있으면 복원 불필요
    if(s && Array.isArray(s.ans) && s.ans.some(a=>a)) return;
    const urlSid = new URLSearchParams(location.search).get('previewSid');
    const isPv = !!urlSid;
    let sid = urlSid;
    if(!isPv){
      try{ const u = JSON.parse(localStorage.getItem('rl_current_user')||'null'); sid = u && u.id; }catch(e){}
    }
    if(!sid) return;
    const prefix = (isPv?'rl_pv_gr_':'rl_gr_') + sid + '_NAMOG' + NAMOG_LEVEL + '_';
    const suffix = stageN===4 ? ('sc_'+NAMOG_CHAPTER_NO) : ('exam_'+NAMOG_CHAPTER_NO);
    const key = prefix + suffix;
    let dataObj;
    try{ dataObj = JSON.parse(localStorage.getItem(key)||'null'); }catch(e){}
    if(!dataObj || !Array.isArray(dataObj.lastAns)) return;
    // 복원: lastAns → state.s.ans
    state['s'+stageN] = {
      idx: 0,
      ans: dataObj.lastAns.map(a => a ? {value:a.value, ok:a.ok} : undefined),
      done: true
    };
    console.log('[namog-restore] stage'+stageN+' 답안 복원 (다른 기기 풀이): '+dataObj.lastAns.length+'문제');
  }catch(e){ console.warn('[namog-restore] failed:', e); }
}

(async function handleEntryParams(){
  // 📥 새 기기(아이패드 등)에서 진입 시 Firebase에서 진도 먼저 받아오기
  try{
    if(window.StudentSync && typeof window.StudentSync.syncDown === 'function'){
      await window.StudentSync.syncDown();
    }
  }catch(e){ console.warn('[entry] syncDown 실패:', e); }
  try{
    const params = new URLSearchParams(location.search);
    // 주간평가 진입 (wsc=N: 훈련, wex=N: 실전)
    const wscIdx = params.get('wsc') || params.get('wscReview');
    const wexIdx = params.get('wex') || params.get('wexReview');
    const isWscRev = !!params.get('wscReview');
    const isWexRev = !!params.get('wexReview');
    if(wscIdx || wexIdx){
      WEEKLY_MODE = wscIdx ? 'wsc' : 'wex';
      WEEKLY_INDEX = parseInt(wscIdx || wexIdx);
      WEEKLY_REVIEW = isWscRev || isWexRev;
      const pool = loadWeeklyPool(WEEKLY_INDEX, WEEKLY_MODE);
      if(pool && pool.length>0){
        // STAGE5를 주간평가 풀로 교체
        STAGE5 = pool;
        STAGE_META[5].total = STAGE5.length;
        STAGE_META[5].name = WEEKLY_MODE==='wsc' ? '주간평가 훈련' : '주간평가 실전';
        // 항상 STEP 5(주간평가)로 진입
        state.cur = 5;
        if(!WEEKLY_REVIEW){
          // 새 시도면 s5 초기화
          state.s5 = {idx:0, ans:[], done:false};
        }
        save();
        console.log('[weekly] mode='+WEEKLY_MODE+' week'+WEEKLY_INDEX+' loaded '+pool.length+' questions');
        // 헤더를 주간평가 모드로 변경 (DOM 로드 후)
        setTimeout(updateHeaderForWeekly, 0);
      } else {
        alert('주간평가 데이터를 찾을 수 없습니다 (week'+WEEKLY_INDEX+').');
      }
    } else if(params.get('exam')){
      state.cur = 5;
      save();
    } else if(params.get('scReview')){
      state.cur = 4;
      // 로컬 풀이가 없으면 rl_gr 기록(다른 기기에서 푼 답안)에서 복원
      _restoreAnswersFromStudentRecord(4);
      // 학습일정에서 점수 클릭으로 진입한 경우: 풀이 데이터가 있으면 결과 화면 강제 표시
      // (다시 풀기 버튼을 명시적으로 눌러야만 풀이 초기화)
      if(state.s4 && Array.isArray(state.s4.ans) && state.s4.ans.some(a=>a)){
        state.s4.done = true;
      }
      save();
    } else if(params.get('examReview')){
      state.cur = 5;
      _restoreAnswersFromStudentRecord(5);
      if(state.s5 && Array.isArray(state.s5.ans) && state.s5.ans.some(a=>a)){
        state.s5.done = true;
      }
      save();
    }
  }catch(e){
    console.warn('[entry-params] failed:', e);
  }
  render();
})();

// Reset button handler
document.getElementById('resetBtn').onclick = ()=>{
  if(!confirm('진도를 모두 초기화할까요?\n(영상 선택, 답한 문제, 완료 표시 등 모두 삭제됩니다)')) return;
  // Revoke any blob URLs first
  if(state.video && state.video.src && state.video.src.startsWith('blob:')){
    try{URL.revokeObjectURL(state.video.src)}catch(e){}
  }
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
};
</script>




<script>
// ========== 자동 서버 영상 로드 (GitHub Pages용) ==========
// video-config.json (YouTube URL) 우선 → videos/L1Ch1.mp4 등 폴백
// 모든 학생이 같은 영상을 자동 표시
(function autoLoadServerVideo(){
    function getChapterKey(){
        if(typeof STORAGE_KEY === 'undefined') return null;
        let m = STORAGE_KEY.match(/namog-l(\d)-ch0?(\d+)/);
        if(m) return 'L' + m[1] + 'Ch' + m[2];
        m = STORAGE_KEY.match(/readinglab-ch(\d+)/);
        if(m) return 'L2Ch' + m[1];
        return null;
    }
    
    function extractYouTubeId(url){
        if(!url || typeof url !== 'string') return null;
        const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=))([^"&?\/\s]{11})/);
        return m ? m[1] : null;
    }
    
    const chapterKey = getChapterKey();
    if(!chapterKey) return;
    
    async function tryLoadServerVideo(){
        try{
            // 학생 본인 업로드한 영상 있으면 우선 (blob URL은 무시)
            if(state.video && state.video.src && !state.video.src.startsWith('blob:') && !state.video.isServerLoaded) return;
            if(state.video && state.video.id && !state.video.isServerLoaded) return;
            
            // 1) video-config.json 시도 (YouTube URL 권장)
            try{
                const res = await fetch('video-config.json', {cache:'no-cache'});
                if(res.ok){
                    const config = await res.json();
                    const url = config[chapterKey] || config[STORAGE_KEY];
                    if(url && typeof url === 'string' && url.trim()){
                        const ytId = extractYouTubeId(url);
                        if(ytId){
                            state.video = {type:'youtube', id:ytId, isServerLoaded:true};
                        } else {
                            state.video = {type:'file', src:url, name:'강의 영상', isLocal:false, isServerLoaded:true};
                        }
                        if(typeof save === 'function') save();
                        if(typeof render === 'function' && state.cur === 1) render();
                        return;
                    }
                }
            }catch(e){}
            
            // 2) videos/<chapterKey>.mp4 폴백 (직접 호스팅)
            const mp4Path = 'videos/' + chapterKey + '.mp4';
            try{
                const res2 = await fetch(mp4Path, {method:'HEAD'});
                if(res2.ok){
                    state.video = {type:'file', src:mp4Path, name:'강의 영상', isLocal:false, isServerLoaded:true};
                    if(typeof save === 'function') save();
                    if(typeof render === 'function' && state.cur === 1) render();
                }
            }catch(e){}
        }catch(e){}
    }
    
    if(document.readyState === 'complete' || document.readyState === 'interactive'){
        setTimeout(tryLoadServerVideo, 100);
    } else {
        window.addEventListener('DOMContentLoaded', ()=>setTimeout(tryLoadServerVideo, 100));
    }
})();
</script>
