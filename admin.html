// 시각 라벨 (0~23 → "오전 6시", "밤 10시" 등)
function _hourLabel(h){
    if(h===0) return '자정 (0시)';
    if(h===12) return '정오 (12시)';
    if(h<6) return `새벽 ${h}시`;
    if(h<12) return `아침 ${h}시`;
    if(h<18) return `오후 ${h}시 (${h-12}시)`;
    return `밤 ${h}시 (${h-12}시)`;
}
function saveSettings(){
    const out=Object.assign({},getSettings());
    const num=(id,def,min,max)=>{const v=parseInt(document.getElementById(id)?.value)||def;return Math.max(min,Math.min(max,v));};
    
    // 1단계 단어 훈련
    out.wordTrain={
        matchPairsPerRound:num('set-wt-pairs',DEFAULT_SETTINGS.wordTrain.matchPairsPerRound,2,10)
    };
    
    // 2단계 단어 셀프체크 (비율 검증)
    let r1=num('set-wsc-r1',30,0,100);
    let r2=num('set-wsc-r2',30,0,100);
    let r3=num('set-wsc-r3',40,0,100);
    const sum=r1+r2+r3;
    if(sum!==100){
        if(!confirm(`단어 셀프체크 비율 합이 ${sum}%입니다.\n자동으로 100% 기준으로 정규화할까요?\n\n현재: ${r1} / ${r2} / ${r3}`))return;
        if(sum>0){r1=Math.round(r1*100/sum);r2=Math.round(r2*100/sum);r3=100-r1-r2;}
        else{r1=30;r2=30;r3=40;}
    }
    out.wordSelfCheck={
        total:num('set-wsc-total',10,3,50),
        target:num('set-wsc-target',80,0,100),
        ratio:{meaning:r1,word:r2,blank:r3}
    };
    // 호환성: 옛 selfcheck 키를 wordSelfCheck 값으로 동기화
    out.selfcheck={count:out.wordSelfCheck.total,target:out.wordSelfCheck.target};
    
    // 3단계 문장 훈련
    out.sentTrain={
        s3Count:num('set-st-s3',10,3,30),
        s4Count:num('set-st-s4',10,3,30),
        s4Choices:num('set-st-s4c',4,2,6)
    };
    
    // 4단계 문장 셀프체크
    out.sentSelfCheck={
        s1Count:num('set-ssc-s1',10,3,30),
        s2Count:num('set-ssc-s2',10,3,30),
        s3Count:num('set-ssc-s3',10,3,30),
        s4Count:num('set-ssc-s4',10,3,30),
        target:num('set-ssc-target',80,0,100)
    };
    
    // 실전평가
    out.examWord={count:num('set-examWord-count',30,1,50),target:num('set-examWord-target',80,0,100)};
    out.examArrange={count:num('set-examArrange-count',10,1,50),target:num('set-examArrange-target',80,0,100)};
    out.examGrammar={count:num('set-examGrammar-count',10,1,50),target:num('set-examGrammar-target',80,0,100)};
    
    // 청크 설정
    out.chunkDifficulty=document.getElementById('set-chunkDifficulty')?.value||'normal';
    out.sentArrangePerArticle=num('set-sentArrangePerArticle',5,1,20);
    out.randomBlankPercent=parseInt(document.getElementById('set-randomBlankPercent')?.value)||30;
    
    // 🟠 주간평가 (단어 비율 검증 + 정규화)
    let wkr1=num('set-wkt-r1',30,0,100);
    let wkr2=num('set-wkt-r2',30,0,100);
    let wkr3=num('set-wkt-r3',40,0,100);
    const wksum=wkr1+wkr2+wkr3;
    if(wksum!==100){
        if(!confirm(`주간평가 단어 출제 비율 합이 ${wksum}%입니다.\n자동으로 100% 기준으로 정규화할까요?`))return;
        if(wksum>0){wkr1=Math.round(wkr1*100/wksum);wkr2=Math.round(wkr2*100/wksum);wkr3=100-wkr1-wkr2;}
        else{wkr1=30;wkr2=30;wkr3=40;}
    }
    out.weeklyTest={
        wordCount:num('set-wkt-word-count',30,5,50),
        wordPoints:num('set-wkt-word-pts',2,1,10),
        wordRatio:{meaning:wkr1,word:wkr2,blank:wkr3},
        arrangeCount:num('set-wkt-arr-count',10,3,30),
        arrangePoints:num('set-wkt-arr-pts',3,1,10),
        grammarCount:num('set-wkt-gr-count',2,1,10),
        grammarPoints:num('set-wkt-gr-pts',5,1,10),
        gradeA:num('set-wkt-grade-a',90,0,100),
        gradeB:num('set-wkt-grade-b',80,0,100),
        trainArrangeCount:num('set-wkt-train-arr',15,5,30),
        trainGrammarCount:num('set-wkt-train-gr',5,1,15),
        requireTraining:document.getElementById('set-wkt-require-train')?.checked||false
    };
    // 총점 검증 안내
    const totalPts=out.weeklyTest.wordCount*out.weeklyTest.wordPoints+out.weeklyTest.arrangeCount*out.weeklyTest.arrangePoints+out.weeklyTest.grammarCount*out.weeklyTest.grammarPoints;
    if(totalPts!==100){
        if(!confirm(`주간평가 총 배점이 ${totalPts}점입니다 (100점 권장).\n그대로 저장할까요?`))return;
    }
    
    // 🆕 단어 학습 시스템 (신) — vocabFlow
    // 비율 검증/정규화 헬퍼
    const validRatio=(label,r1,r2,r3)=>{
        const sum=r1+r2+r3;
        if(sum===100)return {r1,r2,r3,ok:true};
        if(!confirm(`${label} 비율 합이 ${sum}%입니다.\n자동으로 100% 기준으로 정규화할까요?\n\n현재: ${r1} / ${r2} / ${r3}`))return {ok:false};
        if(sum>0){const n1=Math.round(r1*100/sum);const n2=Math.round(r2*100/sum);return {r1:n1,r2:n2,r3:100-n1-n2,ok:true};}
        return {r1:30,r2:30,r3:40,ok:true};
    };
    // 데이체크 비율
    const dc=validRatio('데이체크',num('set-vf-dc-r1',30,0,100),num('set-vf-dc-r2',30,0,100),num('set-vf-dc-r3',40,0,100));
    if(!dc.ok)return;
    // 셀프체크 비율
    const sc=validRatio('셀프체크',num('set-vf-sc-r1',30,0,100),num('set-vf-sc-r2',30,0,100),num('set-vf-sc-r3',40,0,100));
    if(!sc.ok)return;
    // 실전평가 비율
    const re=validRatio('실전평가',num('set-vf-re-r1',30,0,100),num('set-vf-re-r2',30,0,100),num('set-vf-re-r3',40,0,100));
    if(!re.ok)return;
    // 주간평가 비율
    const we=validRatio('주간평가',num('set-vf-we-r1',30,0,100),num('set-vf-we-r2',30,0,100),num('set-vf-we-r3',40,0,100));
    if(!we.ok)return;
    out.vocabFlow={
        gamesRequired:num('set-vf-games',1,1,3),
        dayCheck:{
            target:num('set-vf-dc-target',80,0,100),
            ratio:{meaning:dc.r1,word:dc.r2,blank:dc.r3}
        },
        selfCheck:{
            total:num('set-vf-sc-total',30,5,100),
            target:num('set-vf-sc-target',80,0,100),
            ratio:{meaning:sc.r1,word:sc.r2,blank:sc.r3}
        },
        realExam:{
            total:num('set-vf-re-total',30,5,100),
            target:num('set-vf-re-target',80,0,100),
            ratio:{meaning:re.r1,word:re.r2,blank:re.r3}
        },
        weeklyExam:{
            total:num('set-vf-we-total',60,5,200),
            target:num('set-vf-we-target',80,0,100),
            ratio:{meaning:we.r1,word:we.r2,blank:we.r3}
        }
    };
    
    // 저장 분기: 글로벌 vs 교재별
    if(editingBook){
        // 교재별 별도 설정 저장
        const byBook=LS.g('settings_byBook')||{};
        const overrideOn=document.getElementById('set-book-enabled')?.checked;
        if(!overrideOn){
            // 토글 꺼져있으면 byBook에서 제거 (=기본값 사용)
            delete byBook[editingBook];
            LS.s('settings_byBook',byBook);
            alert(`✅ ${editingBook}의 별도 설정이 해제되었습니다.\n(이제 기본값을 따릅니다)`);
        } else {
            // 별도 설정 저장
            byBook[editingBook]={
                _enabled:true,
                wordTrain:out.wordTrain,
                wordSelfCheck:out.wordSelfCheck,
                sentTrain:out.sentTrain,
                sentSelfCheck:out.sentSelfCheck,
                weeklyTest:out.weeklyTest,
                examWord:out.examWord,
                examArrange:out.examArrange,
                examGrammar:out.examGrammar,
                chunkDifficulty:out.chunkDifficulty,
                sentArrangePerArticle:out.sentArrangePerArticle,
                randomBlankPercent:out.randomBlankPercent,
                vocabFlow:out.vocabFlow
            };
            LS.s('settings_byBook',byBook);
            alert(`✅ ${editingBook} 교재의 별도 설정이 저장되었습니다.`);
        }
    } else {
        // 글로벌(기본값) 저장
        LS.s('settings',out);
        alert('✅ 기본 학습 세팅이 저장되었습니다.\n(별도 설정이 없는 모든 교재에 적용)');
    }
    render();
}
// 교재별 오버라이드 토글
function toggleBookOverride(checked){
    if(!editingBook)return;
    const byBook=LS.g('settings_byBook')||{};
    if(checked){
        // 켜기: 현재 글로벌 값을 복사해서 별도 설정으로 초기화
        const base=getSettings();
        byBook[editingBook]={
            _enabled:true,
            wordTrain:{...base.wordTrain},
            wordSelfCheck:{...base.wordSelfCheck,ratio:{...base.wordSelfCheck.ratio}},
            sentTrain:{...base.sentTrain},
            sentSelfCheck:{...base.sentSelfCheck},
            weeklyTest:{...base.weeklyTest,wordRatio:{...base.weeklyTest.wordRatio}},
            examWord:{...base.examWord},
            examArrange:{...base.examArrange},
            examGrammar:{...base.examGrammar},
            chunkDifficulty:base.chunkDifficulty,
            sentArrangePerArticle:base.sentArrangePerArticle,
            randomBlankPercent:base.randomBlankPercent
        };
    } else {
        // 끄기: 별도 설정 삭제 (기본값 따름)
        if(!confirm(`${editingBook} 교재의 별도 설정을 해제하시겠습니까?\n(이 교재는 기본값(글로벌)을 따르게 됩니다)`)){
            // 취소 시 체크박스 다시 켜기
            const cb=document.getElementById('set-book-enabled');
            if(cb)cb.checked=true;
            return;
        }
        delete byBook[editingBook];
    }
    LS.s('settings_byBook',byBook);
    render();
}

// 🌙 잠금 설정 전용 저장 (다른 학습 설정과 분리되어 단독 저장)
function saveStudyBlock(){
    const enabled=document.getElementById('set-sb-enabled')?.checked||false;
    const startHour=parseInt(document.getElementById('set-sb-start')?.value??22);
    const endHour=parseInt(document.getElementById('set-sb-end')?.value??6);
    // rl_settings의 studyBlock만 업데이트 (다른 설정은 그대로)
    const stored=LS.g('settings')||{};

    LS.s('settings',stored);
    
    let msg;
    if(!enabled){
        msg=`✅ 잠금 설정 저장됨\n\n⚪ 야간 학습 차단: 꺼짐\n(학생들 24시간 자유 접속 가능)`;

function resetSettings(){
    if(editingBook){
        if(!confirm(`${editingBook} 교재의 별도 설정만 초기화하시겠습니까?\n(다른 교재와 글로벌 설정은 그대로 유지)`))return;
        const byBook=LS.g('settings_byBook')||{};
        delete byBook[editingBook];
        LS.s('settings_byBook',byBook);
        alert('이 교재의 별도 설정이 해제되었습니다 (기본값을 따릅니다)');
    } else {
        if(!confirm('기본값(글로벌)을 초기화하시겠습니까?\n(교재별 별도 설정은 영향 없음)'))return;
        LS.s('settings',null);
        alert('기본 세팅이 초기화되었습니다');
    }
    render();
}

function renderQuestionEditor(q,qi){

    // boxes와 summaryBox는 편집 안 보임 — JSON으로 data 속성에 보존
    const boxesAttr=Array.isArray(q.boxes)&&q.boxes.length>0?` data-boxes='${JSON.stringify(q.boxes).replace(/'/g,"&apos;")}'`:'';
    const summaryAttr=q.summaryBox?` data-summary='${JSON.stringify(q.summaryBox).replace(/'/g,"&apos;")}'`:'';

    return `<div class="q-preview"${boxesAttr}${summaryAttr}>

            <button class="u-btn" onmousedown="event.preventDefault()" onclick="toggleU()">밑줄</button>
        </div>`).join('')}
        <label class="label" style="margin-top:10px">해설 (학생이 틀렸을 때 표시) — 비워둘 수 있음</label>

}

// 문제 블록들에서 데이터 수집
function collectQuestionsFromDOM(){
    const qBlocks=document.querySelectorAll('.q-preview');
    const out=[];
    qBlocks.forEach(blk=>{
        const qText=sanitizeUHtml(blk.querySelector('.q-text').innerHTML);
        const pbox=sanitizeUHtml(blk.querySelector('.q-pbox').innerHTML);
        const opts=[...blk.querySelectorAll('.q-opt-input')].map(i=>sanitizeUHtml(i.innerHTML)).filter(Boolean);
        const ansBadge=blk.querySelector('.q-ans-badge.is-ans');
        const answer=ansBadge?parseInt(ansBadge.dataset.idx):-1;
        const expl=(blk.querySelector('.q-expl')?.value||'').trim();
        // boxes / summaryBox 복원
        let boxes=[],summaryBox='';
        try{
            const b=blk.dataset.boxes;
            if(b)boxes=JSON.parse(b.replace(/&apos;/g,"'"));
        }catch(e){}
        try{
            const s=blk.dataset.summary;
            if(s)summaryBox=JSON.parse(s.replace(/&apos;/g,"'"));
        }catch(e){}
        if(qText&&opts.length>=2){
            const item={question:qText,presentationBox:pbox,options:opts,answer,explanation:expl};
            if(boxes.length>0)item.boxes=boxes;
            if(summaryBox)item.summaryBox=summaryBox;
            out.push(item);
        }
    });
    return out;
}
// contenteditable에서 가져온 HTML에서 <u> 태그만 남기고 정리
function sanitizeUHtml(html){
    return (html||'')
        .replace(/<u\b[^>]*>/gi,'\x01U\x01')
        .replace(/<\/u>/gi,'\x01/U\x01')
        .replace(/<br\s*\/?>/gi,'\n')
        .replace(/<\/(div|p)>/gi,'\n')
        .replace(/<[^>]+>/g,'')
        .replace(/&nbsp;/g,' ')
        .replace(/&amp;/g,'&')
        .replace(/&lt;/g,'<')
        .replace(/&gt;/g,'>')
        .replace(/&quot;/g,'"')
        .replace(/\x01U\x01/g,'<u>')
        .replace(/\x01\/U\x01/g,'</u>')
        .trim();
}

function saveStudent(editId){
    const name=document.getElementById('m-name').value.trim();
    const id=editId||document.getElementById('m-id').value.trim();
    const pwd=document.getElementById('m-pwd').value||'1234';
    const level=document.getElementById('m-level').value;
    const book=document.getElementById('m-book').value;
    const startUnit=parseInt(document.getElementById('m-startunit').value)||1;
    const startDate=document.getElementById('m-startdate').value||new Date().toISOString().slice(0,10);
    const days=[...document.querySelectorAll('.day-chk:checked')].map(c=>c.value);
    const gbook=document.getElementById('m-gbook')?.value||'';
    const gpointRaw=document.getElementById('m-gpoint')?.value;
    const startGrammarPoint=gpointRaw?(parseInt(gpointRaw)||0):0;
    // 시작 Point 검증: 문마중은 Unit 첫 P(1,5,9,...), 나모그는 모든 Ch 가능
    const _isNamogBook=gbook.includes('나모그');
    if(startGrammarPoint>0&&!_isNamogBook&&(startGrammarPoint-1)%4!==0){
        return alert('문법 시작 Point는 Unit의 첫 Point만 가능합니다 (P1, P5, P9, P13, P17, P21, P25, ...)');
    }
    const startGrammarDate=document.getElementById('m-gstartdate')?.value||'';
    // 단어 학습 설정
    const vbook=document.getElementById('m-vbook')?.value||'';
    const startVocabDate=document.getElementById('m-vstartdate')?.value||'';
    const startVocabDay=parseInt(document.getElementById('m-vstartday')?.value)||1;
    const vocabHomeworkPerDay=parseInt(document.getElementById('m-vhomework')?.value)||1;
    if(!name||!id)return alert('이름과 아이디를 입력하세요');
    const users=LS.g('users')||{};
    const textbooks={reading:book};
    if(gbook)textbooks.grammar=gbook;
    if(vbook)textbooks.vocab=vbook;
    const record={password:pwd,role:'student',name,days,startDate,level,textbooks,startUnit};
    if(startGrammarPoint>0)record.startGrammarPoint=startGrammarPoint;
    if(startGrammarDate)record.startGrammarDate=startGrammarDate;
    if(vbook){
        record.startVocabDay=startVocabDay;
        record.vocabHomeworkPerDay=Math.max(1,Math.min(10,vocabHomeworkPerDay));
        if(startVocabDate)record.startVocabDate=startVocabDate;
    }
    // 명시적 grammarLevel 필드 저장 — 추후 학습 페이지에서 Level 판별의 단일 진실 출처
    if(gbook){
        if(gbook.includes('나모그')){
            // 나모그 Level 1/2 분기
            if(gbook.includes('Level 2')||gbook.includes('레벨 2')||gbook.includes('레벨2')){
                record.grammarLevel='namog2';
            }else{
                record.grammarLevel='namog1';
            }
        }else if(gbook.includes('Level 3')||gbook.includes('레벨 3')||gbook.includes('레벨3')||gbook.toLowerCase().includes('level3')){
            record.grammarLevel=3;
        }else if(gbook.includes('Level 2')||gbook.includes('레벨 2')||gbook.includes('레벨2')||gbook.toLowerCase().includes('level2')){
            record.grammarLevel=2;
        }else{
            record.grammarLevel=1;
        }
    }
    users[id]=record;
    LS.s('users',users);
    // 🔐 비번 변경됨 → Firebase에도 동기화 (학생이 다른 기기에서 새 비번으로 즉시 로그인 가능)
    syncPasswordToFirebase(id, pwd);
    // 신규 학생 (또는 grammar 진도 미초기화 학생) — startGrammarPoint를 currentPoint로 자동 초기화
    // → 학생 본인 로그인·미리보기 모두에서 첫 학습일에 "학습하기" 버튼이 정상 표시됨
    if(startGrammarPoint>0){
        const progKey='rl_gr_'+id+'_progress';
        let prog=null;
        try{prog=JSON.parse(RL_STORE.get(progKey)||'null');}catch(e){}
        if(!prog||!prog.currentPoint){
            // 진도 데이터 없거나 currentPoint 없으면 초기 설정
            RL_STORE.set(progKey,JSON.stringify({
                currentPoint:startGrammarPoint,
                completedPoints:prog?.completedPoints||[]
            }));
        }
    }
    closeModal();render();
}

const ADMIN_PWD_FB_URL = 'https://terrys-d643a-default-rtdb.firebaseio.com';

// 안전한 비밀번호 자동생성 (소문자+숫자 6자리, 헷갈리는 문자 제외)
function generateSafePassword(){
    // 0/O/o, 1/l/I 같이 헷갈리는 문자 제외
    const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
    let pwd = '';
    for(let i=0; i<6; i++){
        pwd += chars[Math.floor(Math.random()*chars.length)];
    }
    return pwd;
}

// Firebase에 학생 비번 저장 (학생이 비번 변경했을 때 우선 적용되는 위치)
function syncPasswordToFirebase(studentId, password){
    fetch(ADMIN_PWD_FB_URL + '/student_passwords/' + encodeURIComponent(studentId) + '.json', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: password, changed: Date.now(), changedBy: 'admin'})
    }).catch(e => console.warn('Firebase 비번 동기화 실패:', e));
}

// 학생 삭제 시 Firebase 비번 항목도 정리
function deletePasswordFromFirebase(studentId){
    fetch(ADMIN_PWD_FB_URL + '/student_passwords/' + encodeURIComponent(studentId) + '.json', {
        method: 'DELETE'
    }).catch(e => console.warn('Firebase 비번 삭제 실패:', e));

// 🔐 전체 학생 비번 일괄 재설정
async function bulkResetPasswords(){
    const users = LS.g('users') || {};
    const students = Object.entries(users).filter(([id, u]) => u.role === 'student');
    if(students.length === 0){ alert('학생이 없습니다'); return; }
    
    if(!confirm(`${students.length}명 학생 전체 비밀번호를 자동생성된 안전한 비번으로 재설정합니다.\n\n• 모든 학생이 새 비번을 받게 됩니다\n• 학생들에게 배포할 CSV 파일이 다운로드됩니다\n• 학생들은 새 비번으로 로그인 후 본인이 원하는 비번으로 다시 변경 가능합니다\n\n계속하시겠습니까?`)) return;
    
    const csvRows = ['이름,아이디,새 비밀번호'];
    let updated = 0;
    
    for(const [id, u] of students){
        const newPwd = generateSafePassword();
        users[id].password = newPwd;
        // Firebase에도 즉시 적용 (학생들이 다른 기기에서 새 비번으로 바로 로그인 가능)
        syncPasswordToFirebase(id, newPwd);
        csvRows.push(`"${(u.name||'').replace(/"/g,'""')}","${id}","${newPwd}"`);
        updated++;
    }
    
    LS.s('users', users);
    
    // CSV 다운로드 (Excel에서 한글 깨짐 방지 BOM 포함)
    const BOM = '\uFEFF';
    const csv = BOM + csvRows.join('\r\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const dateStr = new Date().toISOString().slice(0,10);
    a.download = `학생비번_재설정_${dateStr}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    alert(`✅ ${updated}명 학생 비번 재설정 완료\nCSV 파일이 다운로드되었습니다.\n학생들에게 새 비번을 전달하세요.`);
    render();
}

function gichulEscape(s){
    if(s===null||s===undefined) return '';
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderGichulAdminRecords(records){
    return records.map((rec, idx) => {
        const pctColor = rec.pct >= 80 ? '#16A34A' : rec.pct >= 60 ? '#CA8A04' : '#DC2626';
        const qs = Array.isArray(rec.questions) ? rec.questions : [];
        const wrongCount = qs.filter(q => q && q.isCorrect === false).length;
        const okCount = qs.filter(q => q && q.isCorrect === true).length;
        let chapterLabel = '';
        if(rec.chapterTitle) chapterLabel = ' · ' + gichulEscape(rec.chapterTitle);
        else if(rec.chapter !== null && rec.chapter !== undefined) chapterLabel = ' · Ch.' + rec.chapter;
        let coverageLabel = '';
        if(Array.isArray(rec.selectedChs) && rec.selectedChs.length) coverageLabel = ' · 누적 '+rec.selectedChs.length+'개 챕터 [Ch.'+rec.selectedChs.join(', ')+']';
        else if(Array.isArray(rec.selectedRounds) && rec.selectedRounds.length) coverageLabel = ' · 누적 '+rec.selectedRounds.length+'개 회차';
        return `<div style="background:#fff;border:1px solid var(--border-light);border-left:4px solid ${pctColor};border-radius:10px;margin-bottom:10px;padding:12px 14px">
            <div onclick="document.getElementById('gichul-detail-${idx}').style.display=document.getElementById('gichul-detail-${idx}').style.display==='none'?'block':'none'" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:12px">
                <div style="flex:1;min-width:0">
                    <div style="font-weight:700;font-size:14px">${gichulEscape(rec.testLabel||'시험')}${chapterLabel}</div>
                    <div style="font-size:12px;color:var(--text3);margin-top:2px">${gichulEscape(rec.date||'')}${coverageLabel}</div>
                </div>
                <div style="text-align:right;flex-shrink:0">
                    <div style="font-size:18px;font-weight:800;color:${pctColor}">${rec.score}<span style="font-size:12px;color:var(--text3)">/${rec.total}</span></div>
                    <div style="font-size:11px;color:var(--text2)">✓${okCount} · ✗${wrongCount}${rec.grade?' · '+gichulEscape(rec.grade):''}</div>
                </div>
                <div style="color:var(--text3);font-size:18px;flex-shrink:0">▾</div>
            </div>
            <div id="gichul-detail-${idx}" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light)">
                ${renderGichulWrongList(rec)}
            </div>
        </div>`;
    }).join('');
}

function renderGichulWrongList(rec){
    const qs = Array.isArray(rec.questions) ? rec.questions : [];
    const wrongs = qs.filter(q => q && q.isCorrect === false);
    if(qs.length === 0) return '<div style="color:var(--text3);font-size:13px;padding:8px 0">상세 문제 데이터가 없습니다.</div>';
    if(wrongs.length === 0) return '<div style="color:#16A34A;font-weight:600;padding:8px 0;font-size:14px">🎉 전부 정답입니다!</div>';
    return `<div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2)">❌ 오답 ${wrongs.length}문항 · 클릭한 답(✗) vs 정답(✓)</div>` +
        wrongs.map(q => {
            let body = '';
            if(q.type === 'sa'){
                body = `<div style="font-size:12px;background:#fee2e2;color:#991b1b;padding:7px 10px;border-radius:6px;margin-bottom:4px"><strong>✗ 내 답:</strong> ${gichulEscape(q.userAns||'(미응답)')}</div>
                        <div style="font-size:12px;background:#dcfce7;color:#166534;padding:7px 10px;border-radius:6px"><strong>✓ 정답:</strong> ${gichulEscape(q.a||'')}</div>`;
            } else if(Array.isArray(q.c)){
                body = q.c.map((choice, ci) => {
                    const isAns = ci === q.a;
                    const isPicked = ci === q.userAns;
                    const bg = isAns ? '#dcfce7' : (isPicked ? '#fee2e2' : '#f9fafb');
                    const fg = isAns ? '#166534' : (isPicked ? '#991b1b' : '#6b7280');
                    const mark = isAns ? '✓' : (isPicked ? '✗' : '·');
                    const fw = (isAns || isPicked) ? '600' : '400';
                    return `<div style="padding:6px 10px;background:${bg};color:${fg};border-radius:6px;margin-bottom:3px;font-size:12px;font-weight:${fw}"><strong>${mark}</strong> ${gichulEscape(choice)}</div>`;
                }).join('');
            } else {
                body = '<div style="font-size:12px;color:var(--text3)">선택지 정보 없음</div>';
            }
            return `<div style="background:#fafafa;border-radius:8px;padding:10px 12px;margin-bottom:10px">
                <div style="font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.5">${q.n||'?'}번. ${gichulEscape(q.q||'')}</div>
                ${body}
                ${q.e ? `<div style="margin-top:8px;padding:8px 10px;background:#fef3c7;border-radius:6px;font-size:12px;color:#78350f;line-height:1.5"><strong>💡 해설:</strong> ${gichulEscape(q.e)}</div>` : ''}
            </div>`;
        }).join('');
}

// ========== 학생 학습 이력 영역별 리셋 모달 ==========
// 어드민 자동 완료(adminCompleted:true) 데이터만 영역별(리딩/문법/단어) × 훈련/실전별로 표시
function showResetStudentModal(studentId){
    const users=LS.g('users')||{};
    const s=users[studentId];
    if(!s)return alert('학생 정보를 찾을 수 없습니다');
    
    const allKeys=RL_STORE.keys();
    
    // 영역/항목별 데이터 구조: { 영역: { 항목ID: { train: {keys:[]}, exam: {keys:[]} } } }
    const data={
        reading:{},   // { unitKey: {train:[keys], exam:[keys]} }, weeklyKey: {weekly:[keys]}
        grammar:{},   // { unitN: {sc:[keys], exam:[keys]} }, weekN: {wsc:[keys], wex:[keys]}
        vocab:{}      // { itemId: {train: {key,itemKey}, exam: {...}} }
    };
    
    // ===== 1. 리딩 키 검색 =====
    // 패턴: rl_train_<sid>_<bookName>_<unitKey> (훈련)
    //       rl_assess_<sid>_<bookName>_<unitKey> (실전)
    //       rl_weekly_<sid>_<bookName>_<weekId> (주간평가)
    const sidPrefix='_'+studentId+'_';
    allKeys.forEach(k=>{
        if(!k)return;
        try{
            // 리딩 패턴 분기
            let m;
            // rl_train_<sid>_<book>_<unit>
            if(k.startsWith('rl_train'+sidPrefix)){
                const v=JSON.parse(RL_STORE.get(k));
                if(v&&v.adminCompleted){
                    // 끝부분 unitKey 추출 (마지막 _)
                    const rest=k.slice(('rl_train'+sidPrefix).length);
                    const lastUnderscore=rest.lastIndexOf('_');
                    const unitKey=lastUnderscore>=0?rest.slice(lastUnderscore+1):rest;
                    if(!data.reading[unitKey])data.reading[unitKey]={};
                    data.reading[unitKey].train=k;
                }
                return;
            }
            if(k.startsWith('rl_assess'+sidPrefix)){
                const v=JSON.parse(RL_STORE.get(k));
                if(v&&v.adminCompleted){
                    const rest=k.slice(('rl_assess'+sidPrefix).length);
                    const lastUnderscore=rest.lastIndexOf('_');
                    const unitKey=lastUnderscore>=0?rest.slice(lastUnderscore+1):rest;
                    if(!data.reading[unitKey])data.reading[unitKey]={};
                    data.reading[unitKey].exam=k;
                }
                return;
            }
            if(k.startsWith('rl_weekly'+sidPrefix)){
                const v=JSON.parse(RL_STORE.get(k));
                if(v&&v.adminCompleted){
                    const rest=k.slice(('rl_weekly'+sidPrefix).length);
                    const lastUnderscore=rest.lastIndexOf('_');
                    const weekKey='W:'+(lastUnderscore>=0?rest.slice(lastUnderscore+1):rest);
                    if(!data.reading[weekKey])data.reading[weekKey]={};
                    // examDone 있으면 실전 완료, 아니면 훈련만 완료
                    data.reading[weekKey].train=k;
                    if(v.examDone)data.reading[weekKey].exam=k; // 같은 키 → 삭제 시 통째로
                }
                return;
            }
            // 문법 패턴: rl_gr_<sid>_<innerPrefix>_<sc|exam|wsc|wex>_<N>
            if(k.startsWith('rl_gr_'+studentId+'_')){
                const v=JSON.parse(RL_STORE.get(k));
                if(!v||v.adminCompleted!==true)return;
                let inner=k.slice(('rl_gr_'+studentId+'_').length).replace(/^(L[123]_|NAMOG[12]_)/,'');
                let m2;
                if(m2=inner.match(/^sc_(\d+)$/)){
                    const n=m2[1];
                    if(!data.grammar['U'+n])data.grammar['U'+n]={};
                    data.grammar['U'+n].train=k;
                } else if(m2=inner.match(/^exam_(\d+)$/)){
                    const n=m2[1];
                    if(!data.grammar['U'+n])data.grammar['U'+n]={};
                    data.grammar['U'+n].exam=k;
                } else if(m2=inner.match(/^wsc_(\d+)$/)){
                    const n=m2[1];
                    if(!data.grammar['W'+n])data.grammar['W'+n]={};
                    data.grammar['W'+n].train=k;
                } else if(m2=inner.match(/^wex_(\d+)$/)){
                    const n=m2[1];
                    if(!data.grammar['W'+n])data.grammar['W'+n]={};
                    data.grammar['W'+n].exam=k;
                }
            }
        }catch(e){}
    });
    
    // ===== 2. 단어 글로벌 키 객체 내부 항목 검사 =====
    // rl_vc_selfcheck → 훈련, rl_vc_realexam → 실전
    // rl_vc_weeklyexam_train → 주간훈련, rl_vc_weeklyexam_exam → 주간실전
    const vocabMapping=[
        {key:'rl_vc_selfcheck',type:'train',group:'training'},
        {key:'rl_vc_realexam',type:'exam',group:'training'},
        {key:'rl_vc_weeklyexam_train',type:'train',group:'weekly'},
        {key:'rl_vc_weeklyexam_exam',type:'exam',group:'weekly'},
    ];
    vocabMapping.forEach(vm=>{
        try{
            const v=JSON.parse(RL_STORE.get(vm.key));
            if(!v||typeof v!=='object')return;
            Object.keys(v).forEach(itemKey=>{
                const item=v[itemKey];
                if(item&&item.adminCompleted===true){
                    // itemKey 예: "deckId/dayId" 또는 "deckId/N_homework"
                    const displayKey=(vm.group==='weekly'?'W:':'')+itemKey;
                    if(!data.vocab[displayKey])data.vocab[displayKey]={};
                    if(!data.vocab[displayKey][vm.type])data.vocab[displayKey][vm.type]=[];
                    data.vocab[displayKey][vm.type].push({vocabKey:vm.key,itemKey:itemKey});
                }
            });
        }catch(e){}
    });
    
    // ===== HTML 생성 =====
    const renderSection=(title,emoji,sectionData,labelFunc)=>{
        const itemKeys=Object.keys(sectionData);
        if(itemKeys.length===0)return '';
        // U1, U2... 와 W1, W2... 분리 정렬
        const units=itemKeys.filter(k=>k.startsWith('U')).sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));
        const weeks=itemKeys.filter(k=>k.startsWith('W')).sort();
        const others=itemKeys.filter(k=>!k.startsWith('U')&&!k.startsWith('W'));
        const sortedKeys=[...units,...others,...weeks];
        
        return `<h3 style="margin:20px 0 8px;font-size:14px">${emoji} ${title}</h3>
        <div style="overflow-x:auto"><table class="tbl" style="font-size:13px">
            <thead><tr><th style="width:140px">항목</th><th>훈련</th><th>실전</th></tr></thead>
            <tbody>${sortedKeys.map(itemKey=>{
                const item=sectionData[itemKey];
                const trainData=item.train?(Array.isArray(item.train)?JSON.stringify({vocab:item.train}):JSON.stringify({keys:[item.train]})):null;
                const examData=item.exam?(Array.isArray(item.exam)?JSON.stringify({vocab:item.exam}):JSON.stringify({keys:[item.exam]})):null;
                return `<tr>
                    <td><strong>${labelFunc(itemKey)}</strong></td>
                    <td>${trainData?`<label style="cursor:pointer;display:inline-flex;align-items:center;gap:6px"><input type="checkbox" class="reset-chk" data-info='${trainData.replace(/'/g,"&#39;")}'> 자동완료</label>`:`<span style="color:#9CA3AF">-</span>`}</td>
                    <td>${examData?`<label style="cursor:pointer;display:inline-flex;align-items:center;gap:6px"><input type="checkbox" class="reset-chk" data-info='${examData.replace(/'/g,"&#39;")}'> 자동완료</label>`:`<span style="color:#9CA3AF">-</span>`}</td>
                </tr>`;
            }).join('')}</tbody></table></div>`;
    };
    
    // 단어 섹션은 train/exam이 배열이라 특수 처리
    const renderVocabSection=()=>{
        const itemKeys=Object.keys(data.vocab);
        if(itemKeys.length===0)return '';
        const sorted=itemKeys.sort();
        return `<h3 style="margin:20px 0 8px;font-size:14px">📚 단어</h3>
        <div style="overflow-x:auto"><table class="tbl" style="font-size:13px">
            <thead><tr><th style="width:200px">항목</th><th>훈련</th><th>실전</th></tr></thead>
            <tbody>${sorted.map(itemKey=>{
                const item=data.vocab[itemKey];
                const trainData=item.train?JSON.stringify({vocab:item.train}):null;
                const examData=item.exam?JSON.stringify({vocab:item.exam}):null;
                const label=itemKey.startsWith('W:')?'주차 '+itemKey.slice(2):itemKey;
                return `<tr>
                    <td><strong style="font-size:11px">${label}</strong></td>
                    <td>${trainData?`<label style="cursor:pointer;display:inline-flex;align-items:center;gap:6px"><input type="checkbox" class="reset-chk" data-info='${trainData.replace(/'/g,"&#39;")}'> 자동완료</label>`:`<span style="color:#9CA3AF">-</span>`}</td>
                    <td>${examData?`<label style="cursor:pointer;display:inline-flex;align-items:center;gap:6px"><input type="checkbox" class="reset-chk" data-info='${examData.replace(/'/g,"&#39;")}'> 자동완료</label>`:`<span style="color:#9CA3AF">-</span>`}</td>
                </tr>`;
            }).join('')}</tbody></table></div>`;
    };
    
    const readingHTML=renderSection('리딩','📖',data.reading,k=>k.startsWith('W:')?'주간 '+k.slice(2):'Unit '+k);
    const grammarHTML=renderSection('문법','📝',data.grammar,k=>k.startsWith('U')?'Unit '+k.slice(1):k.startsWith('W')?(k.slice(1)+'주차'):k);
    const vocabHTML=renderVocabSection();
    
    let rowsHTML=readingHTML+grammarHTML+vocabHTML;
    if(!rowsHTML){
        rowsHTML='<p style="color:#9CA3AF;font-size:13px;text-align:center;padding:30px 0">자동 완료된 학습 데이터가 없습니다.<br><span style="font-size:11px">(어드민이 미리보기에서 [완료] 버튼을 누른 데이터만 표시됩니다)</span></p>';
    }
    
    const content=`<div class="flex flex-between mb-16">
        <h2>🗑 ${s.name} 학생 — 학습 이력 리셋</h2>
        <button class="btn-sm" onclick="closeResetModal()">✕</button>
    </div>
    <div style="background:#FEF3C7;padding:12px;border-radius:8px;font-size:13px;color:#92400E;margin-bottom:12px">
        ⚠️ 체크한 항목의 어드민 완료 처리가 삭제됩니다. 되돌릴 수 없습니다.<br>
        <span style="font-size:11px">※ 학생 실 학습 데이터는 보존됩니다. 진도/active_week도 자동 초기화 → 1주차 첫 학습일부터 다시 시작.</span>
    </div>
    <div style="background:#EFF6FF;padding:10px 12px;border-radius:8px;font-size:13px;color:#1E40AF;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:12px">
        <div>
            👁 <strong>한 번에 전체 취소</strong> — 영역/항목 무관 자동완료 일괄 삭제<br>
            <span style="font-size:11px;opacity:.8">아래 체크 안 해도 됨. 모든 어드민 [완료] 데이터 제거</span>
        </div>
        <button class="btn-sm" onclick="undoAdminCompletion('${studentId}')" style="background:#3B82F6;color:white;white-space:nowrap;flex-shrink:0">↺ 전체 일괄 취소</button>
    </div>
    ${rowsHTML}
    <div class="flex flex-gap" style="justify-content:space-between;align-items:center;margin-top:20px">
        <div class="flex flex-gap">
            <button class="btn-sm" onclick="document.querySelectorAll('.reset-chk').forEach(c=>c.checked=true)">✅ 전체 선택</button>
            <button class="btn-sm" onclick="document.querySelectorAll('.reset-chk').forEach(c=>c.checked=false)">❌ 전체 해제</button>
        </div>
        <div class="flex flex-gap">
            <button class="btn-sm" onclick="closeResetModal()">취소</button>
            <button class="btn-sm btn-danger" onclick="executeResetStudent('${studentId}')">🗑 선택 항목 리셋</button>
        </div>
    </div>`;
    
    // 모달 띄우기
    const modalEl=document.createElement('div');
    modalEl.className='modal';
    modalEl.id='resetStudentModal';
    modalEl.onclick=function(e){if(e.target===this)closeResetModal();};
    modalEl.innerHTML=`<div class="modal-content" style="max-width:820px;max-height:88vh;overflow-y:auto">${content}</div>`;
    document.body.appendChild(modalEl);
}

function closeResetModal(){
    const m=document.getElementById('resetStudentModal');
    if(m)m.remove();
}

// 어드민 미리보기 "완료" 처리만 취소 — 학생 실 학습 데이터는 보존
// 모든 키를 스캔해서 adminCompleted:true 플래그가 있는 데이터를 찾아 삭제
// 콘솔에 진단 로그 출력 (F12 → Console에서 확인 가능)
function undoAdminCompletion(studentId){
    const allKeys=RL_STORE.keys();
    const toDelete=new Set();    // 통째로 삭제할 키
    const toUpdate=new Map();    // 객체 안 일부 항목만 삭제할 키 → 새 값
    
    console.group(`[어드민 완료 취소 진단] 학생: ${studentId}`);
    console.log('전체 키 개수:', allKeys.length);
    
    allKeys.forEach(k=>{
        if(!k)return;
        // 학생ID가 포함된 키 OR 글로벌 학습 키(rl_vc_*, rl_active_week 등)만 검사
        const hasStudentId=k.includes(studentId);
        const isGlobalLearningKey=/^rl_(vc_|active_week)/.test(k);
        if(!hasStudentId && !isGlobalLearningKey)return;
        
        try{
            const raw=RL_STORE.get(k);
            if(!raw)return;
            const v=JSON.parse(raw);
            if(!v)return;
            
            // Case A: 데이터 자체가 adminCompleted:true
            if(v.adminCompleted===true){
                toDelete.add(k);
                console.log('🔴 통째 삭제 대상:', k, v);
                return;
            }
            
            // Case B: 객체 안의 항목에 adminCompleted:true (단어 글로벌 키 형식)
            if(typeof v==='object' && !Array.isArray(v)){
                const newObj={};
                let hasAdminCompleted=false;
                Object.keys(v).forEach(itemKey=>{
                    const item=v[itemKey];
                    if(item && typeof item==='object' && item.adminCompleted===true){
                        hasAdminCompleted=true;
                        console.log('🟡 객체 내 항목 삭제 대상:', k, '→', itemKey, item);
                    } else {
                        newObj[itemKey]=item;
                    }
                });
                if(hasAdminCompleted){
                    toUpdate.set(k, Object.keys(newObj).length>0 ? JSON.stringify(newObj) : null);
                }
            }
        }catch(e){
            // JSON 파싱 실패 — 일반 텍스트 키이므로 무시
        }
    });
    
    console.log('통째 삭제 키:', toDelete.size, '개');
    console.log('객체 내부 정리 키:', toUpdate.size, '개');
    console.groupEnd();
    
    const totalCount=toDelete.size+toUpdate.size;
    if(totalCount===0){
        alert('취소할 어드민 완료 처리 데이터가 없습니다.\n\n(F12 → Console에서 진단 로그 확인 가능)');
        return;
    }
    
    if(!confirm(`어드민 미리보기 [완료] 처리를 모두 취소하시겠습니까?\n\n• 통째 삭제: ${toDelete.size}개 키\n• 객체 내부 정리: ${toUpdate.size}개 키\n\n학생 실 학습 데이터는 보존됩니다.\n(상세 진단은 F12 콘솔 참고)`))return;
    
    // 삭제 실행 — IndexedDB + localStorage 양쪽 모두
    let deleted=0;
    toDelete.forEach(k=>{
        try{
            if(window.RLStorage && RLStorage.isReady()) RLStorage.removeItem(k);
            localStorage.removeItem(k);
            deleted++;
            console.log('✓ 삭제 완료:', k);
        }catch(e){console.error('삭제 실패:',k,e);}
    });
    
    // 객체 내부 항목 삭제 (객체 다시 저장)
    let updated=0;
    toUpdate.forEach((newValue,k)=>{
        try{
            if(newValue===null){
                if(window.RLStorage && RLStorage.isReady()) RLStorage.removeItem(k);
                localStorage.removeItem(k);
                console.log('✓ 빈 객체 키 삭제:', k);
            } else {
                if(window.RLStorage && RLStorage.isReady()) RLStorage.setItem(k,newValue);
                localStorage.setItem(k,newValue);
                console.log('✓ 객체 갱신:', k);
            }
            updated++;
        }catch(e){console.error('갱신 실패:',k,e);}
    });
    
    // ★ active_week 키 초기화 → 1주차로 돌아감
    // 어드민이 [완료] 버튼으로 1주차 마치고 Next Week 눌러서 2주차로 넘어간 경우,
    // 어드민 완료 취소만 해도 활성 주차가 계속 2주차로 남아있어서 1주차 데이터 안 보임.
    // active_week 키 삭제 → 학생 시작일 기준 자동으로 1주차부터 표시
    try{

// Firebase에서 학생의 adminCompleted 데이터 정리
// /student_state/<sid>/ 경로의 키들을 검사:
//  - 통째 삭제 대상 키 → null로 PATCH
//  - 객체 내부 정리 키 → 새 값으로 PATCH (남은 항목만)
async function cleanupFirebaseAdminData(studentId, fbUrl, toDelete, toUpdate){
    const fbPath = fbUrl + '/student_state/' + encodeURIComponent(studentId) + '.json';
    // 1) Firebase 현재 데이터 받기
    let current;
    try{
        const r = await fetch(fbPath + '?_t=' + Date.now(), {cache:'no-store'});
        if(!r.ok) throw new Error('GET 실패: HTTP ' + r.status);
        current = await r.json();
    }catch(e){
        throw new Error('Firebase 학생 데이터 조회 실패: ' + e.message);
    }
    if(!current || typeof current !== 'object'){
        return {fbDeleted: 0, fbUpdated: 0, msg: 'Firebase에 학생 데이터 없음'};
    }
    
    // Firebase 키 sanitize 함수 ($, [, ], #, /, . 금지)
    const safeKey = (k) => String(k).replace(/[$\[\].#\/]/g, '_');
    
    // 2) PATCH로 보낼 변경사항 구성
    const patch = {};
    let fbDeleted = 0, fbUpdated = 0;
    
    // (A) 통째 삭제 대상 — Firebase 키 형식으로 변환해서 null 설정
    toDelete.forEach(k => {
        // Firebase 키 형식 추측: uid-prefixed 또는 uid-prefixed-shared (rl_vc_*)
        if(/^rl_vc_/.test(k) || /^rl_vocab_game_scores$/.test(k)){
            const fbKey = '__vshared__' + safeKey(k);
            if(current[fbKey] !== undefined){ patch[fbKey] = null; fbDeleted++; }
        } else if(/^rl_(gr_|gichul_history_|inprog_|trtype_|train_|done_|weekly_|assess_|skip_history_|vocab_progress_)/.test(k)){
            const fbKey = safeKey(k);
            if(current[fbKey] !== undefined){ patch[fbKey] = null; fbDeleted++; }
        } else if(k === 'rl_active_week'){
            const fbKey = '__perstudent__' + safeKey(k);
            if(current[fbKey] !== undefined){ patch[fbKey] = null; fbDeleted++; }
        }
    });
    
    // (B) 객체 내부 정리 대상 — 새 값으로 덮어쓰기
    toUpdate.forEach((newValue, k) => {
        if(/^rl_vc_/.test(k) || /^rl_vocab_game_scores$/.test(k)){
            const fbKey = '__vshared__' + safeKey(k);
            patch[fbKey] = (newValue === null) ? null : newValue;
            fbUpdated++;
        }
    });
    
    // (C) active_week 강제 정리
    const awFbKey = '__perstudent__rl_active_week';
    if(current[awFbKey] !== undefined){
        patch[awFbKey] = null;
        fbDeleted++;
    }
    
    if(Object.keys(patch).length === 0){
        return {fbDeleted: 0, fbUpdated: 0, msg: 'Firebase에 정리할 키 없음'};
    }
    
    // 3) PATCH 요청 (null 값은 해당 키 삭제됨)
    const patchRes = await fetch(fbPath, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(patch)
    });
    if(!patchRes.ok) throw new Error('PATCH 실패: HTTP ' + patchRes.status);
    
    return {fbDeleted, fbUpdated, msg: 'Firebase 정리 완료'};
}

// 학생 학습 이력 리셋 실행 — 체크된 항목들의 키 모두 삭제 + 진도 자동 초기화
function executeResetStudent(studentId){
    const checked=document.querySelectorAll('.reset-chk:checked');
    if(checked.length===0)return alert('리셋할 항목을 선택하세요');
    
    // 체크된 항목 분류
    // data-info 형식: {"keys":["rl_..."]} 또는 {"vocab":[{vocabKey,itemKey}]}
    const toDelete=new Set();    // 통째로 삭제할 키
    const toUpdate=new Map();    // 객체 안 일부 항목만 정리 → key → Set(삭제할 itemKey들)
    
    checked.forEach(chk=>{
        try{
            const info=JSON.parse(chk.dataset.info||'{}');
            if(info.keys){
                info.keys.forEach(k=>toDelete.add(k));
            }
            if(info.vocab){
                info.vocab.forEach(v=>{
                    if(!toUpdate.has(v.vocabKey)) toUpdate.set(v.vocabKey, new Set());
                    toUpdate.get(v.vocabKey).add(v.itemKey);
                });
            }
        }catch(e){}
    });
    
    const totalCount=toDelete.size+toUpdate.size;
    if(!confirm(`${totalCount}개 항목을 정말 리셋하시겠습니까?\n\n• 진도는 자동으로 시작점으로 초기화됩니다\n• 1주차 첫 학습일에 '학습' 버튼이 다시 표시됩니다\n• 이 작업은 되돌릴 수 없습니다.`))return;
    
    // 1. 통째 삭제 — IndexedDB + localStorage 양쪽 모두
    let deleted=0;
    toDelete.forEach(k=>{
        try{
            if(window.RLStorage && RLStorage.isReady()) RLStorage.removeItem(k);
            localStorage.removeItem(k);
            deleted++;
        }catch(e){}
    });
    
    // 2. 객체 내부 항목 삭제 (단어 글로벌 키 처리)
    let updated=0;
    toUpdate.forEach((itemKeysSet,vocabKey)=>{
        try{
            const v=JSON.parse(RL_STORE.get(vocabKey));
            if(!v||typeof v!=='object')return;
            const newObj={};
            Object.keys(v).forEach(itemKey=>{
                if(!itemKeysSet.has(itemKey)) newObj[itemKey]=v[itemKey];
            });
            const newValue=Object.keys(newObj).length>0?JSON.stringify(newObj):null;
            if(newValue===null){
                if(window.RLStorage && RLStorage.isReady()) RLStorage.removeItem(vocabKey);
                localStorage.removeItem(vocabKey);
            } else {
                if(window.RLStorage && RLStorage.isReady()) RLStorage.setItem(vocabKey,newValue);
                localStorage.setItem(vocabKey,newValue);
            }
            updated++;
        }catch(e){}
    });
    
    // 3. 진도 자동 초기화 — 항상 학생의 startGrammarPoint로 currentPoint 재설정
    const users=LS.g('users')||{};
    const s=users[studentId];
    const startPt=s?.startGrammarPoint||1;
    if(s){
        const progressKeys=RL_STORE.keys().filter(k=>
            k && (k.startsWith('rl_gr_'+studentId+'_')||k.startsWith('rl_pv_gr_'+studentId+'_')) && k.endsWith('_progress')
        );
        const setBoth=(k,v)=>{
            try{
                if(window.RLStorage && RLStorage.isReady()) RLStorage.setItem(k,v);
                localStorage.setItem(k,v);
            }catch(e){}
        };
        const newProgData=JSON.stringify({currentPoint:startPt,completedPoints:[],lastUpdated:new Date().toISOString()});
        progressKeys.forEach(k=>setBoth(k,newProgData));
        if(progressKeys.length===0){
            setBoth('rl_gr_'+studentId+'_progress',newProgData);
        }
    }
    
    // 4. 챕터 페이지 자체의 학습 진행 상태 삭제 (옵션 A — STEP 1부터 다시)
    const grLevel=s?.grammarLevel;
    if(grLevel==='namog1'||grLevel==='namog2'){
        const lvSeg=grLevel==='namog2'?'l2':'l1';
        const maxCh=grLevel==='namog2'?12:13;
        const removeBoth=(k)=>{
            try{
                if(window.RLStorage && RLStorage.isReady()) RLStorage.removeItem(k);
                localStorage.removeItem(k);
            }catch(e){}
        };
        for(let i=1;i<=maxCh;i++){
            const padded=i<10?'0'+i:''+i;
            const k=`namog-${lvSeg}-ch${padded}-v1`;
            removeBoth(k);
            removeBoth(k+'-video');
        }
        if(grLevel==='namog2'){
            removeBoth('readinglab-ch2-v2');
            removeBoth('readinglab-ch2-v2-video');
        }
    }
    
    // ★ active_week 키 초기화 → 1주차로 돌아감
    try{
        if(window.RLStorage && RLStorage.isReady()) RLStorage.removeItem('rl_active_week');
        localStorage.removeItem('rl_active_week');
    }catch(e){}
    
    alert(`✅ 리셋 완료\n• 삭제된 키: ${deleted}개\n• 정리된 단어 객체: ${updated}개\n진도가 시작점(P${startPt})으로 초기화되었습니다.\n1주차 첫 학습일부터 다시 시작됩니다.`);
    closeResetModal();
    render();
}

(C) 서술어(동사) 청크 규칙:
- 단일 동사: 그대로 한 청크 ("disappeared", "ran")
- 조동사+본동사: 한 청크 ("can see", "will go", "has been")
- 수동태(be+과거분사): 한 청크 ("is designed", "was made")
- 진행형(be+~ing): 한 청크 ("is running")
- 구동사(phrasal verb, 동사+불변화사): 한 청크 ("look at", "find out", "give up")
- 일반 부사 수식어(quickly, often 등): 서술어와 분리하여 별도 청크
- ★ 서술어는 절대 주어·목적어·보어와 합치지 말 것

(D) 전치사+명사구(전명구):
- 전명구 전체를 한 청크로 ("in the mountain", "with my friends", "at home", "on the table")
- 전명구가 4단어 초과 시에만 자연스러운 곳에서 분할

(E) to부정사 / ~ing구 / that절 분할 규칙 — ⚠️ 반드시 준수:
- 3단어 이하인 경우만 한 청크로 유지 ("to run", "to study hard", "running fast", "that I see")
- ⚠️ 4단어 이상이면 절대로 한 청크로 묶지 말 것. 무조건 그 안에서 5형식 구조에 따라 또 분할
- that절: "that"(접속사)을 별도 청크로 빼고, that절 안의 주어/서술어/목적어/보어를 다시 5형식 분할
- to부정사구: "to+동사"를 한 청크로 빼고, 그 뒤의 목적어/보어/수식어를 다시 5형식 분할
- ~ing구도 동일하게 처리
- 분할 후에도 각 청크는 ★ 최대 3단어 ★ 제한 유지

(F) 청크 최대 길이 = 3단어 — ⚠️ 절대 위반 금지
- 주어/서술어/목적어/보어/수식어/that절 내부/to부정사 내부/~ing구 내부 — 모든 위치에서 동일 적용
- 4단어 이상이 되면 무조건 분할
- 단 전명구(전치사+한정사+명사)는 4단어까지만 허용 ("in the big mountain" 4단어 OK / 5단어 이상이면 또 분할)

(G) 접속사(and/but/so/because/when/if/although/that 등): 별도 청크

[정밀 분할 예시 — 이 형식 그대로 따를 것]

예시 1 (1형식, 단순):
원문: "The beautiful girl disappeared in the mountain."
청크: ["The beautiful", "girl", "disappeared", "in the mountain."]
설명: The beautiful(주어수식어) / girl(주어) / disappeared(서술어) / in the mountain.(부사어=전명구)

예시 2 (3형식 + that절):
원문: "Many people assume that the croissant comes from France."
청크: ["Many people", "assume", "that", "the croissant", "comes", "from France."]
설명: Many people(주어,2단어OK) / assume(서술어) / that(접속사,별도청크) / the croissant(that절 안 주어=관사+명사) / comes(that절 안 서술어) / from France.(that절 안 부사어=전명구)
⚠️ "that the croissant comes from France." (6단어)를 한 청크로 묶으면 절대 안 됨 - 4단어 초과 위반

예시 3 (복문, 5형식):
원문: "There is an open kitchen, so you can see the chef cooking."
청크: ["There", "is", "an open", "kitchen,", "so", "you", "can see", "the chef", "cooking."]
설명: There(주어) / is(서술어) / an open(보어수식어) / kitchen,(보어) / so(접속사) / you(주어) / can see(서술어=조동사+본동사) / the chef(목적어,형용사없음→한청크) / cooking.(목적보어)

예시 4 (3형식, 수동태+to부정사 분할):
원문: "The new policy is designed to reduce the environmental damage."
청크: ["The new", "policy", "is designed", "to reduce", "the environmental", "damage."]
설명: The new(주어수식어) / policy(주어) / is designed(서술어=수동태) / to reduce(to부정사본체,2단어OK) / the environmental(to부정사 안 목적어수식어) / damage.(to부정사 안 목적어)
⚠️ "to reduce the environmental damage" (5단어)를 한 청크로 묶으면 절대 안 됨 - 4단어 초과 위반

예시 5 (4형식):
원문: "She gave her friend a beautiful gift yesterday."
청크: ["She", "gave", "her friend", "a beautiful", "gift", "yesterday."]
설명: She(주어) / gave(서술어) / her friend(간접목적어=소유격+명사,형용사없음) / a beautiful(직접목적어수식어) / gift(직접목적어) / yesterday.(부사어)

예시 6 (~ing구 분할):
원문: "I enjoy reading interesting books in the library."
청크: ["I", "enjoy", "reading", "interesting books", "in the library."]
설명: I(주어) / enjoy(서술어) / reading(~ing구 본체) / interesting books(~ing구 안 목적어,2단어OK) / in the library.(부사어=전명구)

[잘못된 분할 예시 — 절대 만들지 말 것]
❌ ["that the croissant comes from France."] — 6단어, 4단어 초과
❌ ["I am happy"] — 서술어와 주어/보어가 합쳐짐
❌ ["to reduce the environmental damage"] — 5단어, 4단어 초과
❌ ["because she was very tired"] — 5단어, 4단어 초과 (because + she + was very tired로 분할 필요)`,

async function createArticle(){
    const bookName=document.getElementById('sel-book').value;
    const unitNum=parseInt(document.getElementById('sel-unit').value);
    if(!bookName)return alert('교재를 먼저 추가하세요');

    if(genMode==='pdf'){
        return createFromPdf(bookName,unitNum);
    }

    const content=document.getElementById('art-content').value.trim();
    if(!content)return alert('기사 내용을 입력하세요');
    const articles=getArticles();
    if(!articles[bookName])articles[bookName]={};
    const uk='unit'+unitNum;
    if(!articles[bookName][uk])articles[bookName][uk]={articles:[]};
    const arts=articles[bookName][uk].articles;
    const books=LS.g('textbooks')||{};
    const maxArts=books[bookName]?.articles||3;
    if(arts.length>=maxArts)return alert('이 유닛에는 이미 '+maxArts+'개의 지문이 있습니다.');
    const num=arts.length+1;
    const st=document.getElementById('gen-status');const btn=document.getElementById('gen-btn');
    if(st)st.style.display='flex';if(btn)btn.disabled=true;
    const msg=document.getElementById('gen-msg');
    if(msg)msg.textContent='Article '+num+' 생성 중... (AI가 지문을 분석합니다)';
    let result=null,ai=false;
    if(LS.g('apikey')){result=await generateWithAI(content,num);if(result)ai=true;}
    if(!result)result={vocabulary:[],questions:[]};
    arts.push({title:'Article '+num,content,vocabulary:result.vocabulary,sentenceList:result.sentenceList||result.keySentences||[],keySentences:result.keySentences||result.sentenceList||[],questions:result.questions,aiGenerated:ai});
    saveArticles(articles);
    if(document.getElementById('art-content'))document.getElementById('art-content').value='';
    if(st)st.style.display='none';if(btn)btn.disabled=false;
    // 청크 룰 검증 — 4단어 초과 청크 검출
    let chunkWarn='';
    if(result.keySentences&&result.keySentences.length>0){
        const violations=[];
        result.keySentences.forEach((ks,si)=>{
            (ks.chunks||[]).forEach(c=>{
                const wc=(c.en||'').trim().split(/\s+/).length;
                const isPrep=/^(in|on|at|to|of|for|with|by|from|into|onto|about|under|over|through|across|behind|beside|between|during|after|before|since|until|near)\s/i.test((c.en||'').trim());
                const limit=isPrep?4:3;
                if(wc>limit)violations.push(`문장${si+1}: "${c.en}" (${wc}단어)`);
            });
        });
        if(violations.length>0)chunkWarn='\n⚠️ 청크 룰 위반 '+violations.length+'건 (3단어 초과):\n'+violations.slice(0,5).join('\n')+(violations.length>5?`\n외 ${violations.length-5}건`:'');
    }
    alert('✅ Article '+num+' 생성 완료!'+(ai?' (AI · 단어 '+result.vocabulary.length+'개, 문제 4개)':' (API 키 없음 — 빈 상태로 저장됨)')+chunkWarn);
    render();
}

// PDF 문제지+정답지 -> 추출 -> 검토 모달
async function createFromPdf(bookName,unitNum){
    if(pdfFiles.q.length===0)return alert('문제지 PDF를 올려주세요');
    if(!LS.g('apikey'))return alert('PDF 모드는 AI가 필요합니다. 설정에서 API 키를 입력하세요.');
    const st=document.getElementById('gen-status');const btn=document.getElementById('gen-btn');
    if(st)st.style.display='flex';if(btn)btn.disabled=true;
    const msg=document.getElementById('gen-msg');
    try{
        if(msg)msg.textContent='문제지 PDF 읽는 중...';
        let qText='';
        for(const f of pdfFiles.q){qText+=await extractPdfText(f)+'\n';}
        if(msg)msg.textContent='정답지 PDF 읽는 중...';
        let aText='';
        for(const f of pdfFiles.a){aText+=await extractPdfText(f)+'\n';}
        if(!qText.trim())throw new Error('문제지에서 텍스트를 추출하지 못했습니다. 스캔 PDF는 지원되지 않습니다.');
        if(msg)msg.textContent='AI가 문제·보기·정답을 정리하는 중... (시간이 걸릴 수 있습니다)';
        const result=await parsePdfWithAI(qText,aText,(cur,total)=>{
            if(msg)msg.textContent='AI가 문제 정리 중... ('+cur+'/'+total+' 묶음)';
        });
        if(!result||!result.questions||result.questions.length===0)throw new Error('문제를 추출하지 못했습니다. PDF 내용을 확인해주세요.');
        if(st)st.style.display='none';if(btn)btn.disabled=false;
        // 검토 모달 열기
        modal={type:'pdfReview',data:{bookName,unitNum,questions:result.questions}};
        render();
    }catch(e){
        if(st)st.style.display='none';if(btn)btn.disabled=false;
        alert('❌ '+e.message);
    }
}

// ========================================================================
// 💾 백업 시스템 — 매일 1회 1클릭 백업, Dropbox 폴더 활용
// ========================================================================
const BACKUP_META_KEY='rl_backup_meta';

function getBackupMeta(){
    try{
        const raw=RL_STORE.get(BACKUP_META_KEY);
        if(!raw)return {lastBackup:null,backupCount:0,history:[]};
        return JSON.parse(raw);
    }catch(e){return {lastBackup:null,backupCount:0,history:[]};}
}

function saveBackupMeta(meta){
    RL_STORE.set(BACKUP_META_KEY,JSON.stringify(meta));
}

// 백업 상태 확인 — 24시간 경과 시 알림
function getBackupStatus(){
    const meta=getBackupMeta();
    if(!meta.lastBackup)return {status:'never',hoursAgo:Infinity,label:'아직 백업 없음'};
    const last=new Date(meta.lastBackup);
    const hoursAgo=(Date.now()-last.getTime())/(1000*60*60);
    let status='ok';
    if(hoursAgo>=48)status='overdue';
    else if(hoursAgo>=24)status='warning';
    const days=Math.floor(hoursAgo/24);
    let label;
    if(hoursAgo<1)label='방금 백업';
    else if(hoursAgo<24)label=Math.floor(hoursAgo)+'시간 전';
    else label=days+'일 전';
    return {status,hoursAgo,label,lastBackup:meta.lastBackup};
}

// 헤더 상단 백업 배지
function renderBackupBadge(){
    const st=getBackupStatus();
    let color,emoji,text;
    if(st.status==='never'){color:'#EF4444';emoji='⚠️';color='#EF4444';text='백업 필요';}
    else if(st.status==='overdue'){color='#EF4444';emoji='⚠️';text=st.label;}
    else if(st.status==='warning'){color='#F59E0B';emoji='💾';text=st.label;}
    else {color='#10B981';emoji='✅';text=st.label;}
    return `<button class="btn-ghost btn-sm" onclick="openBackupModal()" title="마지막 백업: ${st.label}\n클릭하여 백업 관리" style="display:inline-flex;align-items:center;gap:6px;color:${color};border-color:${color}">
        <span>${emoji}</span><span style="font-size:12px">${text}</span>
    </button>`;
}

// 페이지 로드 시 자동 백업 + 알림
// - 24시간 이상 경과 → 조용히 자동 백업 (토스트만)
// - 48시간 이상 경과 → 자동 백업 시도 + 실패하면 빨간 배너
function checkBackupOnLoad(){
    setTimeout(()=>{
        const st=getBackupStatus();
        // 24시간 이상 경과 시 자동 백업
        if(st.status==='never'||st.status==='warning'||st.status==='overdue'){
            try{
                doBackup({silent:true});
                console.log('🔄 자동 백업 실행됨 (마지막 백업: '+st.label+')');
            }catch(e){
                console.error('자동 백업 실패:',e);
                // 자동 백업 실패 시 알림 배너
                if(st.status==='overdue')showBackupBanner(st);
            }
        }
    },1500);
}

// 6시간마다 자동 백업 (admin 페이지 열려있는 동안)
function startAutoBackupTimer(){
    const SIX_HOURS=6*60*60*1000;
    setInterval(()=>{
        const st=getBackupStatus();
        if(st.hoursAgo>=6){
            try{
                doBackup({silent:true});
                console.log('⏰ 정기 자동 백업 실행됨');
            }catch(e){
                console.error('정기 자동 백업 실패:',e);
            }
        }
    },SIX_HOURS);
}

function showBackupBanner(st){
    if(document.getElementById('backupBanner'))return;
    const banner=document.createElement('div');
    banner.id='backupBanner';
    banner.style.cssText='position:fixed;top:0;left:0;right:0;background:#FEE2E2;border-bottom:2px solid #EF4444;padding:12px 18px;font-size:13px;color:#991B1B;font-weight:600;z-index:10000;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,0.1)';
    const msg=st.status==='never'?'⚠️ 아직 백업이 한 번도 없습니다. 데이터 안전을 위해 백업해주세요.':'⚠️ 마지막 백업이 '+st.label+'입니다. 오늘 백업을 받아주세요.';
    banner.innerHTML=`
        <div style="flex:1">${msg}</div>
        <button onclick="doBackup();closeBackupBanner()" style="background:#EF4444;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit">💾 지금 백업</button>
        <button onclick="closeBackupBanner()" style="background:none;border:none;color:#991B1B;font-size:20px;cursor:pointer;padding:4px 8px;font-weight:700">×</button>
    `;
    document.body.appendChild(banner);
    document.body.style.paddingTop=banner.offsetHeight+'px';
}

function closeBackupBanner(){
    const b=document.getElementById('backupBanner');
    if(b){b.remove();document.body.style.paddingTop='0';}
}

// 백업 모달 (상세 정보 + 백업 받기)
function openBackupModal(){
    const meta=getBackupMeta();
    const st=getBackupStatus();
    const historyHtml=(meta.history||[]).slice(-10).reverse().map(h=>{
        const d=new Date(h.date);
        return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #E5E7EB;font-size:13px">
            <span>${d.toLocaleString('ko-KR')}</span>
            <span style="color:#6B7280">${h.size?h.size+'KB':'-'} · ${h.keys||0}개 키</span>
        </div>`;
    }).join('')||'<div style="text-align:center;color:#9CA3AF;padding:16px;font-size:13px">백업 기록이 없습니다</div>';
    
    const statusColor=st.status==='ok'?'#10B981':(st.status==='warning'?'#F59E0B':'#EF4444');
    const statusBg=st.status==='ok'?'#D1FAE5':(st.status==='warning'?'#FEF3C7':'#FEE2E2');
    
    const modal=document.createElement('div');
    modal.id='backupModalOverlay';
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10001;display:flex;align-items:center;justify-content:center;padding:20px';
    modal.innerHTML=`
        <div style="background:#fff;border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,0.3)" onclick="event.stopPropagation()">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
                <div style="font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px">💾 데이터 백업</div>
                <button onclick="closeBackupModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#6B7280;line-height:1">×</button>
            </div>
            
            <div style="background:${statusBg};border-radius:10px;padding:16px;margin-bottom:18px">
                <div style="font-size:13px;color:${statusColor};font-weight:700;margin-bottom:4px">${st.status==='ok'?'✅ 정상':st.status==='warning'?'⚠️ 백업 권장':'🚨 즉시 백업 필요'}</div>
                <div style="font-size:14px;font-weight:600">마지막 백업: ${st.label}</div>
                ${st.lastBackup?`<div style="font-size:11px;color:#6B7280;margin-top:2px">${new Date(st.lastBackup).toLocaleString('ko-KR')}</div>`:''}
            </div>
            
            <button onclick="doBackup()" style="width:100%;padding:14px;background:#10B981;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px">💾 지금 백업 받기</button>
            
            <div style="background:#F3F4F6;border-radius:10px;padding:14px;font-size:12px;color:#374151;line-height:1.7;margin-bottom:18px">
                <b>📋 백업 안내</b><br>
                • 백업 파일이 자동 다운로드됨<br>
                • 파일을 <b>Dropbox/홈페이지/backups/</b> 폴더로 이동 → Dropbox가 자동 클라우드 업로드<br>
                • 또는 다운로드 폴더를 Dropbox 폴더로 설정 (Edge 설정 → 다운로드 → 위치 변경)<br>
                • 매일 학원 마감 시 1회 권장
            </div>
            
            <div>
                <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#374151">📅 최근 백업 기록</div>
                <div style="max-height:200px;overflow-y:auto">${historyHtml}</div>
            </div>
            
            <div style="margin-top:18px;padding-top:14px;border-top:1px solid #E5E7EB">
                <div style="font-size:11px;color:#9CA3AF;font-family:monospace">총 백업 횟수: ${meta.backupCount||0}회</div>
            </div>

    `;
    modal.onclick=closeBackupModal;
    document.body.appendChild(modal);
}

function closeBackupModal(){
    const m=document.getElementById('backupModalOverlay');
    if(m)m.remove();
}

// 실제 백업 수행
// options.silent: true면 모달/알림 최소화 (자동 백업용)
function doBackup(options){
    options=options||{};
    const silent=!!options.silent;
    try{
        // 모든 데이터 수집 (IndexedDB + localStorage rl_* 전체)
        const data={};
        // IndexedDB 키
        if(window.RLStorage&&RLStorage.isReady()){
            RLStorage.keys().forEach(k=>{
                if(k.startsWith('rl_'))data[k]=RLStorage.getItem(k);
            });
        }
        // localStorage 키 (스냅샷 포함)
        for(let i=0;i<localStorage.length;i++){
            const k=localStorage.key(i);
            if(k&&k.startsWith('rl_')&&!(k in data)){
                data[k]=localStorage.getItem(k);
            }
        }
        
        const now=new Date();
        const dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
        const timeStr=String(now.getHours()).padStart(2,'0')+'-'+String(now.getMinutes()).padStart(2,'0');
        const fileName='backup_'+dateStr+'_'+timeStr+'.json';
        
        const json=JSON.stringify(data,null,2);
        const sizeKB=Math.round(json.length/1024);
        
        const blob=new Blob([json],{type:'application/json'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        a.download=fileName;
        a.click();
        URL.revokeObjectURL(url);
        
        // 백업 메타 업데이트
        const meta=getBackupMeta();
        meta.lastBackup=now.toISOString();
        meta.backupCount=(meta.backupCount||0)+1;
        meta.history=meta.history||[];
        meta.history.push({
            date:now.toISOString(),
            fileName,
            size:sizeKB,
            keys:Object.keys(data).length
        });
        // 최근 30개만 유지
        if(meta.history.length>30)meta.history=meta.history.slice(-30);
        saveBackupMeta(meta);
        
        // 토스트 알림 (자동 백업도 표시 — 사용자가 인지할 수 있도록)
        const toastMsg=silent
            ?'🔄 자동 백업 ('+sizeKB+'KB)'
            :'✅ 백업 완료 ('+sizeKB+'KB, '+Object.keys(data).length+'개 키)\n파일을 Dropbox 폴더로 옮겨주세요';
        showBackupToast(toastMsg);
        
        // 배너 닫기
        closeBackupBanner();
        // 모달이 열려있으면 새로고침 (수동 백업 시에만 — silent 모드는 모달이 없음)
        if(!silent && document.getElementById('backupModalOverlay')){
            closeBackupModal();
            openBackupModal();
        }
        // 헤더 배지 갱신
        render();
    }catch(e){
        if(!silent)alert('백업 실패: '+e.message);
        console.error('Backup error:',e);
        throw e;
    }
}

function showBackupToast(msg){
    const t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:24px;right:24px;background:#10B981;color:#fff;padding:14px 20px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:10002;white-space:pre-line;max-width:340px';
    t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.style.opacity='0',4000);
    setTimeout(()=>t.remove(),4500);
}

// 페이지 로드 시 백업 상태 확인 + 자동 백업 타이머 시작
window.addEventListener('load',()=>{
    setTimeout(checkBackupOnLoad,500);
    startAutoBackupTimer();
});

async function logout(){
    // IndexedDB 쓰기 큐 비우기 (페이지 이동 전에 저장 완료 보장)
    try{ if(window.RLStorage && RLStorage.flush) await RLStorage.flush(); }catch(e){}
    // 자동 배포 진행 중이면 즉시 실행 (페이지 떠나기 전에 GitHub로 보내기)
    if(_autoDeployTimer){
        clearTimeout(_autoDeployTimer); _autoDeployTimer=null;
        try{ await silentAutoDeploy(); }catch(e){}
    }
    localStorage.removeItem('rl_current_user');
    window.location.href='login.html';
}
