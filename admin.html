<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadingLab - 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--green:#00C853;--green-dark:#00A844;--green-light:#E8F5E9;
--bg:#FAFBFC;--white:#FFFFFF;--bg3:#F2F4F6;
--text:#1B1D1F;--text2:#6B7684;--text3:#AEB5BC;
--border:#E5E8EB;--border-light:#F2F4F6;
--blue:#3B82F6;--blue-light:#EFF6FF;
--amber:#F59E0B;--amber-light:#FFFBEB;
--red:#EF4444;--red-light:#FEF2F2;
--radius:16px;--radius-sm:12px;--radius-xs:8px;
--shadow-sm:0 1px 2px rgba(0,0,0,.06);
--shadow:0 2px 8px rgba(0,0,0,.08);
--shadow-lg:0 8px 24px rgba(0,0,0,.12);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:64px}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo img{height:32px;width:auto}
.nav-logo .academy{font-size:14px;font-weight:700;color:var(--text);}
.nav-logo .sub{font-size:11px;color:var(--text3);}
.nav-tabs{display:flex;gap:4px}
.nav-tab{padding:8px 16px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:none;border-radius:var(--radius-xs);transition:all .15s}
.nav-tab:hover{background:var(--bg3)}
.nav-tab.active{background:var(--green-light);color:var(--green-dark)}
.nav-right{display:flex;align-items:center;gap:12px}
.api-status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px}
.api-on{background:var(--green-light);color:var(--green-dark)}
.api-off{background:var(--red-light);color:var(--red)}
.container{max-width:1280px;margin:0 auto;padding:28px 24px 60px}
button{font-family:'Noto Sans KR',sans-serif;padding:10px 18px;border:none;border-radius:var(--radius-xs);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;background:var(--bg3);color:var(--text)}
button:hover{background:var(--border)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-danger{background:var(--red-light);color:var(--red)}
.btn-danger:hover{background:#FEE2E2}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--bg3)}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border-light);padding:24px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
input[type=text],input[type=password],input[type=number],select,textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);background:var(--white);color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,200,83,.1)}
textarea{resize:vertical}
.label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text2)}
.grid{display:grid;gap:16px}.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}.grid-4{grid-template-columns:repeat(4,1fr)}
.flex{display:flex}.flex-between{justify-content:space-between;align-items:center}.flex-gap{gap:10px}.flex-center{align-items:center}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-green{background:var(--green-light);color:var(--green-dark)}
.tag-blue{background:var(--blue-light);color:var(--blue)}
.tag-amber{background:var(--amber-light);color:var(--amber)}
.tag-red{background:var(--red-light);color:var(--red)}
.tag-gray{background:var(--bg3);color:var(--text2)}
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;padding:12px 14px;background:var(--bg3);font-weight:600;color:var(--text2);font-size:13px}
.tbl th:first-child{border-radius:var(--radius-xs) 0 0 var(--radius-xs)}
.tbl th:last-child{border-radius:0 var(--radius-xs) var(--radius-xs) 0}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border-light)}
.tbl tr:hover td{background:var(--bg)}
/* 학습 세팅값 — 4단계 카드 레이아웃 */
.book-selector{margin-bottom:20px;padding:16px 18px;background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:12px}
.book-selector select{padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;background:#fff}
.set-section{margin-bottom:24px;border:1px solid var(--border-light);border-radius:12px;overflow:hidden;background:#fff}
.set-section-head{display:flex;align-items:center;gap:14px;padding:16px 20px;background:#F0FDF4;border-bottom:1px solid var(--border-light)}
.set-section-num{width:36px;height:36px;border-radius:50%;background:#10B981;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.set-section-title{font-size:16px;font-weight:800;color:#14532D}
.set-section-sub{font-size:12px;color:#166534;font-weight:500;margin-top:2px}
.set-section-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.set-step-card{padding:14px 16px;background:#FAFBFC;border:1px solid var(--border-light);border-radius:8px}
.set-step-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.set-step-desc{font-size:12px;color:var(--text3);margin:4px 0 10px}
.set-step-meta{font-size:11px;color:var(--text3);font-style:italic;margin-top:6px}
.set-input-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 0}
.set-input-label{font-size:13px;color:var(--text2);font-weight:500;display:flex;flex-direction:column;flex:1}
.set-input-hint{font-size:10.5px;color:var(--text3);font-weight:400;margin-top:2px}
.set-input-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.set-input-wrap input[type="number"]{width:80px;text-align:center;padding:7px 8px;font-weight:600}
.set-input-unit{font-size:12px;color:var(--text3);font-weight:600;min-width:24px}
.set-input-default{font-size:10px;color:#6B7280;background:#F3F4F6;padding:3px 7px;border-radius:8px;font-weight:600;white-space:nowrap}
.set-divider{height:1px;background:var(--border-light);margin:10px 0}
.set-step-card select{padding:8px 10px;font-size:13px;border-radius:6px;border:1px solid var(--border)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px)}
.modal-content{background:var(--white);border-radius:var(--radius);padding:32px;max-width:720px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.loading{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.row-item{padding:14px 16px;background:var(--bg);border-radius:var(--radius-xs);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;transition:all .15s}
.row-item:hover{background:var(--green-light)}
h2{font-size:20px;font-weight:800;margin-bottom:4px}
h3{font-size:16px;font-weight:700;margin-bottom:12px}
.page-desc{font-size:13px;color:var(--text3);margin-bottom:24px}
.seg{display:inline-flex;background:var(--bg3);border-radius:var(--radius-xs);padding:3px;gap:3px}
.seg-btn{padding:7px 16px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;transition:all .15s}
.seg-btn.active{background:var(--white);color:var(--green-dark);box-shadow:var(--shadow-sm)}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.empty{text-align:center;color:var(--text3);padding:48px;font-size:14px}
.unit-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;cursor:pointer;transition:all .15s;text-align:center}
.unit-card:hover{border-color:var(--green);box-shadow:var(--shadow)}
.unit-card.has-content{border-color:var(--green);background:var(--green-light)}
.crumb{font-size:13px;color:var(--text3);margin-bottom:8px}
.crumb a{color:var(--green-dark);cursor:pointer;font-weight:600}
.pdf-drop{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:24px;text-align:center;cursor:pointer;transition:all .15s}
.pdf-drop:hover{border-color:var(--green);background:var(--green-light)}
.pdf-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:var(--radius-xs);font-size:12px;margin-bottom:6px}
.pdf-chip-x{cursor:pointer;color:var(--red);font-weight:700;flex-shrink:0}
.q-preview{background:var(--bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.q-preview textarea{margin-top:6px;font-size:13px}
.q-text-edit{width:100%;min-height:60px;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-xs);background:var(--white);font-size:14px;line-height:1.6;outline:none;white-space:pre-wrap}
.q-text-edit:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,200,83,.1)}
.q-text-edit u{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:2px}
.q-opt-edit{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-xs);background:var(--white);font-size:13px;outline:none;min-height:18px}
.q-opt-edit:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,200,83,.1)}
.q-opt-edit u{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:2px}
.u-btn{padding:4px 10px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:var(--white);color:var(--text2);border-radius:6px;cursor:pointer;text-decoration:underline;text-decoration-thickness:2px;flex-shrink:0}
.u-btn:hover{border-color:var(--green);color:var(--green-dark);background:var(--green-light)}
.q-toolbar{display:flex;gap:6px;margin-bottom:6px;font-size:11px;color:var(--text3);align-items:center}
.q-opt-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.q-opt-row input[type=text]{flex:1}
.q-ans-badge{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--white)}
.q-ans-badge.is-ans{background:var(--green);color:#fff;border-color:var(--green)}
@media(max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.nav-tabs{display:none}}

/* 설정 페이지 카테고리별 표시 제어 */
.settings-cat-vocab [data-cat="reading"]{display:none}
.settings-cat-reading [data-cat="vocab"]{display:none}
.settings-cat-grammar [data-cat="vocab"],
.settings-cat-grammar [data-cat="reading"]{display:none}
</style>

// ========== Phase 2: IndexedDB 통합 ==========
// localStorage 5MB 한계 해소 — 데이터 저장은 IndexedDB로 (사실상 무제한)
// 옛 localStorage 데이터는 스냅샷으로 보존 (Phase 3에서 정리 예정)
RLStorage.init().then(()=>{
    console.log('✅ IndexedDB 준비 완료');
    // IDB가 준비됐으니 화면 다시 렌더링 (배지/콘텐츠가 최신 상태 반영)
    if(typeof render === 'function' && document.getElementById('app')){
        render();
    }
}).catch(e=>{
    console.error('⚠️ IndexedDB 초기화 실패, localStorage로 폴백:',e);
});

// 통합 스토리지 헬퍼 — IndexedDB 우선, localStorage 폴백
const RL_STORE = {
    get(k){
        if(window.RLStorage && RLStorage.isReady()){
            const v = RLStorage.getItem(k);
            if(v !== null) return v;
        }
        return localStorage.getItem(k);
    },
    set(k, v){
        if(window.RLStorage && RLStorage.isReady()){
            RLStorage.setItem(k, v);
        } else {
            // RLStorage 준비 전엔 임시로 localStorage (정상은 init 후라 거의 발생 안 함)
            localStorage.setItem(k, v);
        }
        // 🚀 자동 배포 트리거 (curriculum 키 변경 시)
        if(window._scheduleAutoDeploy) window._scheduleAutoDeploy(k);
    },
    remove(k){
        if(window.RLStorage && RLStorage.isReady()){
            RLStorage.removeItem(k);
        }
        // localStorage는 그대로 유지 (스냅샷)
        if(window._scheduleAutoDeploy) window._scheduleAutoDeploy(k);
    },
    keys(){
        // RLStorage(IndexedDB)와 localStorage 양쪽의 키를 모두 모아 반환.
        // 챕터 페이지(grammarwise-*.html)는 RLStorage를 안 거치고 localStorage에 직접 저장하므로
        // RLStorage.keys()만 반환하면 챕터 페이지의 데이터(점수 등)를 못 찾는 버그가 발생함.
        const ksSet = new Set();
        if(window.RLStorage && RLStorage.isReady()){
            try{ RLStorage.keys().forEach(k=>ksSet.add(k)); }catch(e){}
        }
        for(let i=0; i<localStorage.length; i++){
            const k = localStorage.key(i);
            if(k) ksSet.add(k);
        }
        return Array.from(ksSet);
    }
};

const LS={g(k){try{return JSON.parse(RL_STORE.get('rl_'+k))}catch{return null}},s(k,v){RL_STORE.set('rl_'+k,JSON.stringify(v))}};
// 글로벌 HTML 이스케이프
function escU(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// 레벨 정렬: LEVEL 1,2,3 -> MTEST 1,2 순서. 모르는 형식은 끝으로
function sortLevels(arr){
    const rank=(s)=>{
        const m1=/^LEVEL\s*(\d+)/i.exec(s);if(m1)return [0,parseInt(m1[1])];
        const m2=/^MTEST\s*(\d+)/i.exec(s);if(m2)return [1,parseInt(m2[1])];
        return [2,0];
    };
    return [...(arr||[])].sort((a,b)=>{const ra=rank(a),rb=rank(b);return ra[0]-rb[0]||ra[1]-rb[1]||a.localeCompare(b);});

function getUser(){const u=localStorage.getItem('rl_current_user');return u?JSON.parse(u):null;}

function render(){
    const user=getUser();
    if(!user||user.role!=='admin'){window.location.href='login.html';return;}
    // 정상 로드 성공 — 자동 로그인 무한 루프 마커 클리어
    sessionStorage.removeItem('_auto_login_at');
    // videos/publish 탭이 설정 sub-tab으로 이동됨 — 이전 상태에서 새로고침 시 자동 리다이렉트
    if(currentTab==='videos'){ currentTab='settings'; settingsSubTab='videos'; }
    if(currentTab==='publish'){ currentTab='settings'; settingsSubTab='publish'; }
    document.getElementById('app').innerHTML=renderNav()+`<div class="container">${
        currentTab==='students'?tabStudents():
        currentTab==='reading'?tabReading():
        currentTab==='grammar'?tabGrammar():
        currentTab==='vocab'?tabVocab():
        currentTab==='progress'?tabProgress():
        currentTab==='settings'?tabSettings():''
    }</div>`+(modal?renderModal():'');
}

function renderNav(){
    const hasKey=!!LS.g('apikey');
    const tabs=[
        {id:'students',label:'학생'},
        {id:'reading',label:'리딩'},
        {id:'grammar',label:'문법'},
        {id:'vocab',label:'단어'},
        {id:'progress',label:'현황'},
        {id:'settings',label:'설정'}

    return `<div class="nav"><div class="nav-inner">
        <div class="nav-logo">
            <img src="${LOGO}" alt="logo">
            <div><div class="academy">엠베스트SE 동탄남광장</div><div class="sub">관리자</div></div>
        </div>
        <div class="nav-tabs">${tabs.map(t=>`<button class="nav-tab ${currentTab===t.id?'active':''}" onclick="goTab('${t.id}')">${t.label}</button>`).join('')}</div>
        <div class="nav-right">
            <span class="api-status ${hasKey?'api-on':'api-off'}"><span style="width:6px;height:6px;border-radius:50%;background:currentColor"></span>${hasKey?'AI 연결됨':'AI 미연결'}</span>

    </div></div>`;
}

// ========== 단어 학습 시스템 ==========
// 데이터 구조 (v2 — DAY 단위 분할 저장으로 localStorage quota 회피):
//   rl_vocab_index = { deckId: {id, name, createdAt, days:[{id, name, wordCount}]} }
//   rl_vocab_day_{deckId}_{dayId} = [{en, ko, example, exampleKo, highlight, highlightKo}, ...]
//
// 옛 구조 (v1): rl_vocab_decks 단일 키 → 자동 마이그레이션
const VOCAB_INDEX_KEY='rl_vocab_index';
const VOCAB_DAY_PREFIX='rl_vocab_day_';
function _vocabDayKey(deckId,dayId){return VOCAB_DAY_PREFIX+deckId+'_'+dayId;}

function _safeSetItem(key,value,errors){
    try{RL_STORE.set(key,value);return true;}
    catch(e){if(errors)errors.push({key,error:e.message});return false;}
}

// 옛 단일 키(rl_vocab_decks) → 새 분할 구조로 자동 마이그레이션
function _migrateOldDecks(){
    const oldRaw=RL_STORE.get('rl_vocab_decks');
    if(!oldRaw)return false;
    let oldDecks;
    try{oldDecks=JSON.parse(oldRaw);}
    catch(e){console.error('Migration parse error:',e);return false;}
    
    // 옛 키를 먼저 삭제하여 quota 공간 확보 (메모리에 oldDecks 보유)
    RL_STORE.remove('rl_vocab_decks');
    console.log('🔄 Vocab 마이그레이션 시작 (옛 단일 키 → 분할 저장)');
    
    const index={};
    const errors=[];
    Object.values(oldDecks).forEach(d=>{
        // 옛옛 구조 보정 (deck.words → deck.days[].words)
        if(d.words&&!d.days){
            d.days=[{id:'day_'+Date.now()+Math.random().toString(36).slice(2,7),name:'DAY01',words:d.words}];
            delete d.words;
        }
        if(!d.days)d.days=[];
        
        // 인덱스 메타 (단어 제외)
        index[d.id]={
            id:d.id,
            name:d.name,
            createdAt:d.createdAt,
            days:d.days.map(day=>({
                id:day.id,
                name:day.name,
                wordCount:(day.words||[]).length
            }))
        };
        // 각 DAY 단어를 별도 키로 저장
        d.days.forEach(day=>{
            _safeSetItem(_vocabDayKey(d.id,day.id),JSON.stringify(day.words||[]),errors);
        });
    });
    _safeSetItem(VOCAB_INDEX_KEY,JSON.stringify(index),errors);
    
    if(errors.length>0){
        console.warn(`마이그레이션 일부 실패 (${errors.length}건):`,errors);
    } else {
        console.log('✅ Vocab 마이그레이션 완료');
    }
    return true;
}

function getVocabDecks(){
    // 옛 구조 발견 시 자동 마이그레이션
    if(RL_STORE.get('rl_vocab_decks'))_migrateOldDecks();
    
    let index;
    try{index=JSON.parse(RL_STORE.get(VOCAB_INDEX_KEY)||'{}');}
    catch(e){index={};}
    
    // 분할 저장 → 풀 객체 조립 (기존 API 호환)
    const decks={};
    Object.values(index).forEach(meta=>{
        decks[meta.id]={
            id:meta.id,
            name:meta.name,
            createdAt:meta.createdAt,
            days:(meta.days||[]).map(dayMeta=>{
                let words=[];
                try{words=JSON.parse(RL_STORE.get(_vocabDayKey(meta.id,dayMeta.id))||'[]');}
                catch(e){}
                return {id:dayMeta.id,name:dayMeta.name,words};
            })
        };
    });
    return decks;
}

function saveVocabDecks(decks){
    const index={};
    const errors=[];
    Object.values(decks).forEach(d=>{
        index[d.id]={
            id:d.id,
            name:d.name,
            createdAt:d.createdAt,
            days:(d.days||[]).map(day=>({
                id:day.id,
                name:day.name,
                wordCount:(day.words||[]).length
            }))
        };
        (d.days||[]).forEach(day=>{
            _safeSetItem(_vocabDayKey(d.id,day.id),JSON.stringify(day.words||[]),errors);
        });
    });
    _safeSetItem(VOCAB_INDEX_KEY,JSON.stringify(index),errors);
    _cleanupOrphanedDays(index);
    
    if(errors.length>0){
        const detail=errors.slice(0,3).map(e=>e.key).join(', ')+(errors.length>3?` 외 ${errors.length-3}건`:'');
        throw new Error('저장 실패: '+detail);
    }
}

// 인덱스에 없는 day 데이터 삭제 (저장공간 회수)
function _cleanupOrphanedDays(index){
    const validKeys=new Set();
    Object.values(index).forEach(d=>{
        (d.days||[]).forEach(day=>{validKeys.add(_vocabDayKey(d.id,day.id));});
    });
    const keysToRemove=[];
    for(let i=0;i<RL_STORE.keys().length;i++){
        const key=RL_STORE.keys()[i];
        if(key&&key.startsWith(VOCAB_DAY_PREFIX)&&!validKeys.has(key)){
            keysToRemove.push(key);
        }
    }
    keysToRemove.forEach(k=>RL_STORE.remove(k));
}

// 단일 DAY만 저장하는 효율 함수 (예문 생성 등 부분 업데이트용)
function saveVocabDay(deckId,dayId,words){
    const errors=[];
    _safeSetItem(_vocabDayKey(deckId,dayId),JSON.stringify(words||[]),errors);
    
    // 인덱스의 wordCount 동기화
    try{
        const index=JSON.parse(RL_STORE.get(VOCAB_INDEX_KEY)||'{}');
        const deck=index[deckId];
        if(deck){
            const dayMeta=(deck.days||[]).find(d=>d.id===dayId);
            if(dayMeta){
                dayMeta.wordCount=(words||[]).length;
                _safeSetItem(VOCAB_INDEX_KEY,JSON.stringify(index),errors);
            }
        }
    }catch(e){}
    
    if(errors.length>0){throw new Error('DAY 저장 실패: '+errors[0].error);}
}

// ========== 리딩 지문 저장 시스템 (v2 — Unit 단위 분할) ==========
// 옛 구조: rl_articles = { bookName: { unitKey: {articles:[...]} } } — 단일 키 (quota 초과)
// 신 구조: rl_articles_index (메타) + rl_article_unit_{book}_{unit} (Unit별 분리)
const ARTICLES_INDEX_KEY='rl_articles_index';
const ARTICLE_UNIT_PREFIX='rl_article_unit_';
function _articleUnitKey(bookName,unitKey){
    return ARTICLE_UNIT_PREFIX+encodeURIComponent(bookName)+'_'+unitKey;
}

function _migrateOldArticles(){
    const oldRaw=RL_STORE.get('rl_articles');
    if(!oldRaw)return false;
    let oldData;
    try{oldData=JSON.parse(oldRaw);}
    catch(e){console.error('Articles migration parse error:',e);return false;}
    
    RL_STORE.remove('rl_articles');
    console.log('🔄 Articles 마이그레이션 시작');
    
    const index={};
    const errors=[];
    Object.entries(oldData).forEach(([bookName,bookData])=>{
        index[bookName]={units:{}};
        Object.entries(bookData).forEach(([unitKey,unitData])=>{
            const arts=unitData.articles||[];
            index[bookName].units[unitKey]={
                articleCount:arts.length,
                articles:arts.map(a=>({title:a.title||'',aiGenerated:!!a.aiGenerated}))
            };
            _safeSetItem(_articleUnitKey(bookName,unitKey),JSON.stringify(unitData),errors);
        });
    });
    _safeSetItem(ARTICLES_INDEX_KEY,JSON.stringify(index),errors);
    
    if(errors.length>0)console.warn(`Articles 마이그레이션 일부 실패 (${errors.length}건)`);
    else console.log('✅ Articles 마이그레이션 완료');
    return true;
}

function getArticles(){
    if(RL_STORE.get('rl_articles'))_migrateOldArticles();
    
    let index;
    try{index=JSON.parse(RL_STORE.get(ARTICLES_INDEX_KEY)||'{}');}
    catch(e){index={};}
    
    const result={};
    Object.keys(index).forEach(bookName=>{
        result[bookName]={};
        const bookIdx=index[bookName];
        Object.keys(bookIdx.units||{}).forEach(unitKey=>{
            try{
                const unitData=JSON.parse(RL_STORE.get(_articleUnitKey(bookName,unitKey))||'null');
                result[bookName][unitKey]=unitData||{articles:[]};
            }catch(e){result[bookName][unitKey]={articles:[]};}
        });
    });
    return result;
}

function saveArticles(articles){
    const index={};
    const errors=[];
    Object.entries(articles).forEach(([bookName,bookData])=>{
        index[bookName]={units:{}};
        Object.entries(bookData).forEach(([unitKey,unitData])=>{
            const arts=unitData.articles||[];
            index[bookName].units[unitKey]={
                articleCount:arts.length,
                articles:arts.map(a=>({title:a.title||'',aiGenerated:!!a.aiGenerated}))
            };
            _safeSetItem(_articleUnitKey(bookName,unitKey),JSON.stringify(unitData),errors);
        });
    });
    _safeSetItem(ARTICLES_INDEX_KEY,JSON.stringify(index),errors);
    _cleanupOrphanedArticleUnits(index);
    
    if(errors.length>0){
        const detail=errors.slice(0,3).map(e=>e.key).join(', ');
        throw new Error('저장 실패: '+detail+(errors.length>3?` 외 ${errors.length-3}건`:''));
    }
}

// 단일 Unit만 저장 (AI 생성 등 부분 업데이트용)
function saveArticleUnit(bookName,unitKey,unitData){
    const errors=[];
    _safeSetItem(_articleUnitKey(bookName,unitKey),JSON.stringify(unitData),errors);
    
    // 인덱스 동기화
    try{
        const index=JSON.parse(RL_STORE.get(ARTICLES_INDEX_KEY)||'{}');
        if(!index[bookName])index[bookName]={units:{}};
        const arts=unitData.articles||[];
        index[bookName].units[unitKey]={
            articleCount:arts.length,
            articles:arts.map(a=>({title:a.title||'',aiGenerated:!!a.aiGenerated}))
        };
        _safeSetItem(ARTICLES_INDEX_KEY,JSON.stringify(index),errors);
    }catch(e){}
    
    if(errors.length>0)throw new Error('Unit 저장 실패: '+errors[0].error);
}

function _cleanupOrphanedArticleUnits(index){
    const validKeys=new Set();
    Object.entries(index).forEach(([bookName,bookData])=>{
        Object.keys(bookData.units||{}).forEach(unitKey=>{
            validKeys.add(_articleUnitKey(bookName,unitKey));
        });
    });
    const keysToRemove=[];
    for(let i=0;i<RL_STORE.keys().length;i++){
        const key=RL_STORE.keys()[i];
        if(key&&key.startsWith(ARTICLE_UNIT_PREFIX)&&!validKeys.has(key)){
            keysToRemove.push(key);
        }
    }
    keysToRemove.forEach(k=>RL_STORE.remove(k));
}

// HTML escape helper
function escapeHtml(str){
    if(!str)return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// 인라인 셀 편집 — 영어/한글 즉시 저장
function updateVocabWord(idx,field,value){
    const decks=getVocabDecks();
    const deck=decks[vocabEditDeck];
    const day=deck?.days?.find(d=>d.id===vocabEditDay);
    if(!day||!day.words[idx])return;
    const trimmed=(value||'').trim();
    if(!trimmed){alert(field==='en'?'영어 단어를 비울 수 없어요.':'한글 뜻을 비울 수 없어요.');render();return;}
    if(field==='en'&&!/^[a-zA-Z\s'\-]+$/.test(trimmed)){
        alert('영어 단어는 영문/공백/하이픈/어퍼스트로피만 가능합니다.');
        render();
        return;
    }
    day.words[idx][field]=trimmed;
    // 영어 단어 바꾸면 highlight도 동기화 (예문 강조 깨지지 않도록)
    if(field==='en'&&!day.words[idx].example){
        day.words[idx].highlight=trimmed;
    }
    if(field==='ko'&&!day.words[idx].example){
        day.words[idx].highlightKo=trimmed;
    }
    saveVocabDecks(decks);
    // 화면 갱신은 안 함 (input focus 잃을까봐) — 새로고침 시 반영됨
}

// 새 단어 행 추가
function addVocabWord(){
    const decks=getVocabDecks();
    const deck=decks[vocabEditDeck];
    const day=deck?.days?.find(d=>d.id===vocabEditDay);
    if(!day)return;
    if(!day.words)day.words=[];
    day.words.push({en:'new',ko:'새 단어',example:'',exampleKo:'',highlight:'new',highlightKo:'새 단어'});
    saveVocabDecks(decks);
    render();
    // 새 행의 영어 셀에 포커스
    setTimeout(()=>{
        const lastRow=document.getElementById('vw-row-'+(day.words.length-1));
        if(lastRow){
            const enInput=lastRow.querySelector('input');
            if(enInput){enInput.focus();enInput.select();}
        }
    },50);
}

// JSON 일괄 가져오기 — 파일 선택 시 호출
function handleVocabBulkImport(event,deckId){
    const file=event.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
        let data;
        try{
            data=JSON.parse(e.target.result);
        }catch(err){
            alert('JSON 파일 형식이 올바르지 않아요.\n'+err.message);
            event.target.value='';
            return;
        }
        if(!data.days||!Array.isArray(data.days)){
            alert('JSON에 "days" 배열이 없어요. 파일 형식을 확인해주세요.');
            event.target.value='';
            return;
        }
        const decks=getVocabDecks();
        const deck=decks[deckId];
        if(!deck){alert('단어장을 찾을 수 없어요.');return;}
        
        const totalDays=data.days.length;
        const totalWords=data.days.reduce((s,d)=>s+(d.words||[]).length,0);
        
        if(!confirm(`📥 일괄 가져오기 확인\n\n단어장: ${deck.name}\n DAY 수: ${totalDays}개\n단어 수: ${totalWords}개\n\n진행하시겠어요?\n(같은 이름의 DAY가 있으면 단어가 덮어쓰기됩니다)`))return;
        
        if(!deck.days)deck.days=[];
        let addedDays=0,updatedDays=0,addedWords=0;
        
        data.days.forEach(dayData=>{
            const dayName=(dayData.name||'').trim();
            if(!dayName)return;
            const words=(dayData.words||[]).filter(w=>w&&w.en&&w.ko).map(w=>({
                en:String(w.en).trim(),
                ko:String(w.ko).trim(),
                example:w.example||'',
                exampleKo:w.exampleKo||'',
                highlight:w.highlight||w.en,
                highlightKo:w.highlightKo||w.ko
            }));
            
            // 같은 이름의 DAY 있는지 체크
            const existing=deck.days.find(d=>d.name===dayName);
            if(existing){
                existing.words=words;
                updatedDays++;
            } else {
                deck.days.push({
                    id:'day_'+Date.now()+Math.random().toString(36).slice(2,7),
                    name:dayName,
                    words:words
                });
                addedDays++;
            }
            addedWords+=words.length;
        });
        
        // 번호 순 정렬
        deck.days.sort((a,b)=>{
            const na=parseInt((a.name.match(/\d+/)||[0])[0]);
            const nb=parseInt((b.name.match(/\d+/)||[0])[0]);
            return na-nb;
        });
        
        saveVocabDecks(decks);
        event.target.value='';
        render();
        setTimeout(()=>{
            alert(`✅ 일괄 가져오기 완료!\n\n➕ 새 DAY: ${addedDays}개\n♻️ 갱신된 DAY: ${updatedDays}개\n📚 총 단어: ${addedWords}개\n\nAI 예문 생성은 각 DAY에서 따로 실행하세요.`);
        },100);
    };
    reader.onerror=function(){
        alert('파일 읽기 실패');
        event.target.value='';
    };
    reader.readAsText(file,'utf-8');
}

function addVocabDay(deckId){
    const decks=getVocabDecks();
    const deck=decks[deckId];
    if(!deck)return;
    if(!deck.days)deck.days=[];
    // 사용 중인 번호 모음 → 1부터 빈 자리 찾기
    const used=new Set(deck.days.map(d=>{const m=d.name.match(/\d+/);return m?parseInt(m[0]):0;}));
    let nextNum=1;
    while(used.has(nextNum))nextNum++;
    const dayName='DAY'+String(nextNum).padStart(2,'0');
    const dayId='day_'+Date.now()+Math.random().toString(36).slice(2,7);
    deck.days.push({id:dayId,name:dayName,words:[]});
    // 번호 순으로 정렬해서 UI에 깔끔히 표시
    deck.days.sort((a,b)=>{
        const na=parseInt((a.name.match(/\d+/)||[0])[0]);
        const nb=parseInt((b.name.match(/\d+/)||[0])[0]);
        return na-nb;
    });
    saveVocabDecks(decks);
    vocabEditDay=dayId;
    render();
}

// 단일 DAY에 예문 생성 — 내부 코어 함수 (UI 없이 데이터만 처리)
async function _generateExamplesCore(deckId,dayId,apikey){
    const decks=getVocabDecks();
    const deck=decks[deckId];
    const day=deck?.days?.find(d=>d.id===dayId);
    if(!day||!day.words||day.words.length===0){throw new Error('단어가 없어요.');}
    
    const wordsList=day.words.map((w,i)=>`${i+1}. ${w.en} = ${w.ko}`).join('\n');
    const prompt=`다음 영어 단어들 각각에 대해 중학생 수준의 자연스러운 영어 예문과 한글 번역을 만들어주세요.

단어 목록:
${wordsList}

다음 JSON 형식으로만 응답하세요 (다른 텍스트 없이):
{
  "examples": [
    {
      "en": "영어 단어 (입력과 동일)",
      "example": "단어를 활용한 영어 예문 (10-20단어)",
      "exampleKo": "예문의 한글 번역",
      "highlight": "예문에서 강조할 단어 (단어의 활용형 가능, 예: remember → remembered)",
      "highlightKo": "한글 번역에서 강조할 부분 (예: 기억하나요)"
    }
  ]
}

지침:
- 단어를 자연스럽게 활용한 예문 (해당 단어의 한글 뜻을 활용)
- 중학생이 이해할 수 있는 어휘로 작성
- 예문은 10~20단어 사이
- highlight는 예문 안에 실제로 나오는 단어 형태로 정확히 표기
- highlightKo는 한글 번역 안에 실제로 나오는 표현으로 정확히 표기
- 응답은 반드시 위 JSON 형식 (다른 텍스트, 마크다운, 설명 절대 금지)`;
    
    const response=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
            'Content-Type':'application/json',
            'x-api-key':apikey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true'
        },
        body:JSON.stringify({
            model:'claude-sonnet-4-20250514',
            max_tokens:8000,
            messages:[{role:'user',content:prompt}]
        })
    });
    
    if(!response.ok){
        const err=await response.text();
        throw new Error(`API ${response.status}: ${err.slice(0,200)}`);
    }
    
    const data=await response.json();
    let text=data.content[0].text.trim();
    text=text.replace(/^```json\s*/,'').replace(/\s*```$/,'').replace(/^```\s*/,'').replace(/\s*```$/,'');
    const parsed=JSON.parse(text);
    
    if(!parsed.examples||!Array.isArray(parsed.examples)){
        throw new Error('AI 응답 형식 오류');
    }
    
    const exMap={};
    parsed.examples.forEach(e=>{if(e.en)exMap[e.en.toLowerCase()]=e;});
    
    let matched=0;
    day.words.forEach(w=>{
        const e=exMap[w.en.toLowerCase()];
        if(e){
            w.example=e.example||'';
            w.exampleKo=e.exampleKo||'';
            w.highlight=e.highlight||w.en;
            w.highlightKo=e.highlightKo||w.ko;
            matched++;
        }
    });
    
    // 단일 DAY만 저장 (전체 decks 저장 X — localStorage quota 회피)
    saveVocabDay(deckId,dayId,day.words);
    return matched;
}

// ========================================================================
// 일괄 예문 생성 — 단어장 전체 DAY 순차 처리
// ========================================================================
let bulkGenState={running:false,stopRequested:false};

async function bulkGenerateExamples(deckId){
    const apikey=LS.g('apikey');
    if(!apikey){alert('AI 예문 생성에는 Claude API 키가 필요합니다. 설정 탭에서 입력해주세요.');return;}
    
    const decks=getVocabDecks();
    const deck=decks[deckId];
    if(!deck){return;}
    
    // 예문 없거나 일부만 있는 DAY 추출 (모든 단어에 예문 있는 DAY는 건너뛰기)
    const targetDays=(deck.days||[]).filter(d=>
        d.words&&d.words.length>0&&!d.words.every(w=>w.example)
    );
    
    if(targetDays.length===0){
        alert(`✨ ${deck.name}의 모든 DAY에 이미 예문이 있어요!`);
        return;
    }
    
    const totalDays=targetDays.length;
    const totalWords=targetDays.reduce((s,d)=>s+d.words.length,0);
    const skipped=(deck.days||[]).length-totalDays;
    const estMin=Math.ceil(totalDays*25/60);
    
    if(!confirm(`🤖 ${deck.name} 전체 예문 생성\n\n• 처리할 DAY: ${totalDays}개\n• 처리할 단어: ${totalWords}개\n${skipped>0?`• 이미 예문 있어 건너뛰는 DAY: ${skipped}개\n`:''}• 예상 시간: 약 ${estMin}분 (단어당 약 25초)\n\n* 중간에 중단할 수 있어요\n* 진행된 DAY는 자동 저장됩니다\n\n진행하시겠어요?`))return;
    
    bulkGenState.running=true;
    bulkGenState.stopRequested=false;
    showBulkProgressModal(deck.name,totalDays);
    
    let completed=0,failed=0;
    const failedDays=[];
    const startTime=Date.now();
    
    for(let i=0;i<targetDays.length;i++){
        if(bulkGenState.stopRequested)break;
        const day=targetDays[i];
        const elapsed=Math.floor((Date.now()-startTime)/1000);
        const remaining=completed>0?Math.floor(elapsed/completed*(totalDays-i)):totalDays*25;
        
        updateBulkProgress(i,totalDays,day.name,'생성 중...',elapsed,remaining);
        
        try{
            const matched=await _generateExamplesCore(deckId,day.id,apikey);
            completed++;
            updateBulkProgress(i+1,totalDays,day.name,`✅ ${matched}개 단어 완료`,elapsed,remaining);
        }catch(e){
            failed++;
            failedDays.push({name:day.name,error:e.message});
            updateBulkProgress(i+1,totalDays,day.name,`❌ 실패: ${e.message.slice(0,60)}`,elapsed,remaining);
            // 크레딧/인증 관련 에러는 즉시 중단 (모든 DAY 다 실패할 게 뻔하니까)
            const criticalErrors=['credit balance','API key','authentication','unauthorized','permission'];
            const isCritical=criticalErrors.some(kw=>e.message.toLowerCase().includes(kw.toLowerCase()));
            if(isCritical){
                bulkGenState.stopRequested=true;
                updateBulkProgress(i+1,totalDays,day.name,`🛑 치명적 에러 감지 — 자동 중단`,elapsed,remaining);
                await new Promise(r=>setTimeout(r,1500));
                break;
            }
            // 일반 에러는 다음 DAY로 계속
            await new Promise(r=>setTimeout(r,1500));
        }
    }
    
    bulkGenState.running=false;
    const totalSec=Math.floor((Date.now()-startTime)/1000);
    finishBulkProgressModal(completed,failed,failedDays,bulkGenState.stopRequested,totalSec);
}

function updateBulkProgress(done,total,dayName,status,elapsed,remaining){
    const pct=Math.round(done/total*100);
    const lbl=document.getElementById('bulk-progress-label');
    const pctEl=document.getElementById('bulk-progress-pct');
    const bar=document.getElementById('bulk-progress-bar');
    const curDay=document.getElementById('bulk-current-day');
    const curStat=document.getElementById('bulk-current-status');
    const elap=document.getElementById('bulk-elapsed');
    const remn=document.getElementById('bulk-remaining');
    if(lbl)lbl.textContent=`${done} / ${total} DAY`;
    if(pctEl)pctEl.textContent=pct+'%';
    if(bar)bar.style.width=pct+'%';
    if(curDay)curDay.textContent=dayName||'-';
    if(curStat)curStat.innerHTML=status||'-';
    if(elap)elap.textContent=fmtSeconds(elapsed||0);
    if(remn)remn.textContent=remaining?fmtSeconds(remaining):'계산 중...';
}

function fmtSeconds(s){
    if(s<60)return s+'초';
    return Math.floor(s/60)+'분 '+(s%60)+'초';
}

function stopBulkGenerate(){
    if(!bulkGenState.running)return;
    if(confirm('진행을 중단하시겠어요?\n(현재 처리 중인 DAY는 완료 후 멈춥니다)')){
        bulkGenState.stopRequested=true;
        const btn=document.getElementById('bulk-stop-btn');
        if(btn){btn.textContent='⏳ 중단 중...';btn.disabled=true;}
    }
}

        </div>`:'';
    
    modal.innerHTML=`
        <div style="background:#fff;border-radius:18px;padding:28px;max-width:500px;width:100%">
            <div style="font-size:20px;font-weight:800;margin-bottom:16px;text-align:center">${status}</div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px">
                <div style="background:#DCFCE7;border-radius:10px;padding:14px;text-align:center">
                    <div style="font-size:24px;font-weight:800;color:#166534">${completed}</div>
                    <div style="font-size:12px;color:#166534">성공한 DAY</div>
                </div>
                <div style="background:${failed>0?'#FEE2E2':'#F3F4F6'};border-radius:10px;padding:14px;text-align:center">
                    <div style="font-size:24px;font-weight:800;color:${failed>0?'#991B1B':'#6B7280'}">${failed}</div>
                    <div style="font-size:12px;color:${failed>0?'#991B1B':'#6B7280'}">실패한 DAY</div>
                </div>
            </div>
            <div style="text-align:center;font-size:13px;color:#6B7280;margin-bottom:10px">소요 시간: ${fmtSeconds(totalSec)}</div>
            ${failHtml}
            <button onclick="closeBulkProgressModal()" style="width:100%;margin-top:18px;padding:12px;background:#3B82F6;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700">닫기</button>
        </div>
    `;
}

function closeBulkProgressModal(){
    const m=document.getElementById('bulk-progress-modal');
    if(m)m.remove();
    render();
}

function createVocabDeck(){
    const name=document.getElementById('m-vocabname')?.value?.trim();
    if(!name){alert('단어장 이름을 입력하세요.');return;}
    const decks=getVocabDecks();
    if(Object.values(decks).some(d=>d.name===name)){alert('같은 이름의 단어장이 이미 있어요.');return;}
    const id='deck_'+Date.now();
    decks[id]={id,name,words:[],createdAt:new Date().toISOString().slice(0,10)};
    saveVocabDecks(decks);
    closeModal();
    vocabEditDeck=id;
    render();
}

function importVocabWords(deckDayId){
    // 형식: "deckId|dayId"
    const [deckId,dayId]=deckDayId.split('|');
    const text=document.getElementById('m-vocabwords')?.value?.trim();
    if(!text){alert('단어를 입력하세요.');return;}
    const decks=getVocabDecks();
    const deck=decks[deckId];
    const day=deck?.days?.find(d=>d.id===dayId);
    if(!day){alert('DAY를 찾을 수 없어요.');return;}
    
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    const words=[];
    const errors=[];
    lines.forEach((line,i)=>{
        let parts=line.includes('\t')?line.split('\t'):line.split(',');
        parts=parts.map(p=>p.trim()).filter(p=>p);
        if(parts.length<2){errors.push(`${i+1}번째 줄: "${line.slice(0,30)}" (영어·한글 구분 안 됨)`);return;}
        const en=parts[0];
        const ko=parts.slice(1).join(', ');
        if(!/^[a-zA-Z\s'\-]+$/.test(en)){
            errors.push(`${i+1}번째 줄: "${en}" (영어가 아닌 것 같아요)`);return;
        }
        words.push({en,ko,example:'',exampleKo:'',highlight:en,highlightKo:ko});
    });
    
    if(errors.length>0&&words.length===0){
        alert('단어 가져오기 실패:\n\n'+errors.slice(0,5).join('\n')+(errors.length>5?'\n...':''));
        return;
    }
    if(errors.length>0){
        if(!confirm(`${words.length}개 단어 가져오기 성공, ${errors.length}개 줄 실패:\n\n${errors.slice(0,3).join('\n')}\n\n성공한 ${words.length}개만 저장할까요?`))return;
    }
    
    day.words=words;
    decks[deckId]=deck;
    saveVocabDecks(decks);
    closeModal();
    render();
    setTimeout(()=>alert(`✅ ${words.length}개 단어 가져오기 완료!\n이제 "🤖 AI 예문 생성" 버튼을 눌러 예문을 만들어보세요.`),100);
}

function deleteVocabDeck(id){
    const decks=getVocabDecks();
    if(!decks[id])return;
    if(!confirm(`"${decks[id].name}" 단어장을 삭제하시겠어요?`))return;
    delete decks[id];
    saveVocabDecks(decks);
    render();
}

// 단어장 이름만 변경 (인덱스만 업데이트 — 효율적, per-day 데이터 안 건드림)
function renameVocabDeck(id){
    try{
        const index=JSON.parse(RL_STORE.get(VOCAB_INDEX_KEY)||'{}');
        if(!index[id]){alert('단어장을 찾을 수 없어요.');return;}
        const currentName=index[id].name||'';
        const newName=prompt('새 단어장 이름을 입력하세요:',currentName);
        if(newName===null)return;
        const trimmed=newName.trim();
        if(!trimmed){alert('이름을 비울 수 없어요.');return;}
        if(trimmed===currentName)return;
        index[id].name=trimmed;
        RL_STORE.set(VOCAB_INDEX_KEY,JSON.stringify(index));
        render();
    }catch(e){
        alert('이름 변경 실패: '+e.message);
    }
}

// 교재의 grammar-full.html URL 생성 — Level을 먼저, Point 뒤로 (?level=2&p=N), cache buster 추가
// 나모그는 별도 페이지(grammarwise-l1-ch{N}.html / grammarwise-ch{N}.html)로 라우팅
function getBookPointUrl(bookId,p){
    const t=Date.now();
    if(bookId==='namog1')return `grammarwise-l1-ch${p}.html?_t=${t}`;
    if(bookId==='namog2')return `grammarwise-ch${p}.html?_t=${t}`;
    if(bookId==='level3')return `grammar-full.html?level=3&p=${p}&_t=${t}`;
    if(bookId==='level2')return `grammar-full.html?level=2&p=${p}&_t=${t}`;
    return `grammar-full.html?level=1&p=${p}&_t=${t}`;
}

// 메인 — 교재 리스트 또는 교재 상세 (Point 리스트)
// ============================================================
// 📺 나모그 챕터 영상 관리
//   - 챕터별 YouTube URL (또는 영상 URL) 입력
//   - localStorage에 저장 (어드민 PC 임시)
//   - video-config.json 다운로드 → GitHub repo 루트에 업로드 → 모든 학생 자동 표시
// ============================================================
function getVideoConfigLocal(){
    // LS.g already returns the parsed value (or null). Don't double-parse.
    const v = LS.g('namog_video_config_admin');
    return (v && typeof v === 'object') ? v : {};
}
function setVideoConfigLocal(cfg){LS.s('namog_video_config_admin',cfg);}

function tabVideos(){
    const cfg=getVideoConfigLocal();
    const l1Chapters=Array.from({length:13},(_,i)=>({key:'L1Ch'+(i+1),label:`Level 1 · Chapter ${i+1}`}));
    const l2Chapters=Array.from({length:12},(_,i)=>({key:'L2Ch'+(i+1),label:`Level 2 · Chapter ${i+1}`}));

function downloadVideoConfig(){
    // 먼저 저장
    const cfg={};
    for(let i=1;i<=13;i++){
        const el=document.getElementById('vid-L1Ch'+i);
        if(el)cfg['L1Ch'+i]=el.value.trim();
    }
    for(let i=1;i<=12;i++){
        const el=document.getElementById('vid-L2Ch'+i);
        if(el)cfg['L2Ch'+i]=el.value.trim();
    }
    setVideoConfigLocal(cfg);
    
    // JSON 생성 (주석/도움말 포함)
    const exported={
        "_사용법":"각 챕터의 YouTube URL을 채워서 GitHub repo 루트에 업로드. 비워두면 학생 화면에 영상 업로드 UI가 표시됨.",
        "_YouTube_형식_예시":"https://youtu.be/abc123 또는 https://www.youtube.com/watch?v=abc123",
        ...cfg
    };
    const json=JSON.stringify(exported,null,2);
    
    // 다운로드 트리거
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='video-config.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    const count=Object.values(cfg).filter(v=>v).length;
    setTimeout(()=>{
        alert(`📥 video-config.json 다운로드 완료\n• 채워진 챕터: ${count}개\n\n다음 단계:\n1. 다운로드된 파일을 GitHub repo의 루트 폴더에 업로드\n2. 기존 파일이 있으면 덮어쓰기\n3. commit + push\n\n학생들은 챕터 페이지 새로고침하면 영상 자동 표시됩니다.`);

// 학원 자료(지문/단어/챕터/학생계정 등)를 모아 curriculum.json으로 다운로드
// → GitHub에 올리면 모든 학생이 자기 기기에서 자동 동기화
function isCurriculumKey(k){
    if(!k || !k.startsWith('rl_')) return false;
    // 민감/관리자 전용 키 — 제외
    if(k === 'rl_apikey') return false;
    if(k === 'rl_backup') return false;
    if(k === 'rl_current_user') return false;
    if(k === 'rl_progress') return false; // 어드민이 집계한 학생 진도
    if(k === 'rl_curriculum_version') return false; // 버전 마커
    // GitHub 자동 배포 관련 키 (토큰/설정) — 절대 배포 금지!
    if(k.includes('gh_token')) return false;
    if(k.includes('gh_owner')) return false;
    if(k.includes('gh_repo')) return false;
    if(k.includes('gh_branch')) return false;
    if(k.includes('last_deploy')) return false;
    // 학생 본인 진도/상태 — 제외 (각 학생 기기에서 따로 저장)
    if(/_progress$/.test(k)) return false;
    if(k.startsWith('rl_train_')) return false;
    if(k.startsWith('rl_weekly_')) return false;
    if(k.startsWith('rl_done_')) return false;
    if(k.startsWith('rl_inprog_')) return false;
    if(k.startsWith('rl_active_')) return false;
    if(k.startsWith('rl_vc_')) return false;
    // ⚠️ 중요: 학생 본인 문법 학습 진도 (pt_*, sc_*, exam_*, wsc_*, wex_*) — 절대 배포 X
    // 배포되면 학생 기기의 실제 진도를 덮어써서 학습 데이터 손실 발생
    if(k.startsWith('rl_gr_')) return false;
    // 학생 본인 기출문제 응시 이력 (각 학생 기기에 저장)
    if(k.startsWith('rl_gichul_history_')) return false;
    // 나머지 (rl_users, rl_levels, rl_textbooks, rl_articles*, rl_vocab*, rl_namog*, rl_trtype_*, rl_assess_*, rl_pv_<id>, rl_settings 등) — 포함
    return true;
}

async function testAndSaveGitHubConfig(){
    const owner = document.getElementById('gh-owner').value.trim();
    const repo = document.getElementById('gh-repo').value.trim();
    const tokenInput = document.getElementById('gh-token').value.trim();
    const branch = document.getElementById('gh-branch').value.trim() || 'main';
    
    if(!owner || !repo){
        alert('⚠️ 사용자명과 저장소 이름을 모두 입력해주세요.');
        return;
    }
    
    // If token field is empty, keep existing token
    const existing = getGitHubConfig();
    const token = tokenInput || existing.token;
    
    if(!token){
        alert('⚠️ Personal Access Token을 입력해주세요.');
        return;
    }
    
    // Test connection by getting repo info
    const btn = event.target;
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '⏳ 연결 테스트 중...';
    
    try{
        const r = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
            headers: {
                'Authorization': `Bearer ${token}`,
                'Accept': 'application/vnd.github+json'
            }
        });
        
        if(r.status === 401){
            throw new Error('토큰이 잘못되었거나 만료됨');
        } else if(r.status === 404){
            throw new Error('저장소를 찾을 수 없음 — 사용자명/저장소명 확인');
        } else if(!r.ok){
            const err = await r.json().catch(()=>({}));
            throw new Error(err.message || ('HTTP ' + r.status));
        }
        
        const repoInfo = await r.json();
        const permissions = repoInfo.permissions || {};
        if(!permissions.push){
            throw new Error('이 토큰으로 저장소에 쓰기 권한 없음 — repo 권한이 있는지 확인');
        }
        
        saveGitHubConfig(token, owner, repo, branch);
        closeModal();
        alert(`✅ 연결 성공!\n\n저장소: ${repoInfo.full_name}\n브랜치: ${branch}\n\n이제 [🚀 지금 배포하기] 버튼으로 즉시 배포할 수 있어요.`);
        render();
    } catch(e){
        alert(`❌ 연결 실패\n\n${e.message}\n\n설정을 다시 확인해주세요.`);
    } finally {
        btn.disabled = false;
        btn.innerHTML = orig;
    }
}

// btoa with Unicode safe encoding (Korean chars need this)
function utf8ToBase64(str){
    // Encode UTF-8 then base64
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    const chunk = 0x8000;
    for(let i = 0; i < bytes.length; i += chunk){
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    return btoa(binary);
}

// SHA 충돌 시 자동 재시도하는 업로드 함수
async function uploadCurriculumWithRetry(gh, json, keyCount, now, maxRetries){
    maxRetries = maxRetries === undefined ? 2 : maxRetries;
    const contentB64 = utf8ToBase64(json);
    
    for(let attempt = 0; attempt <= maxRetries; attempt++){
        // 매번 최신 SHA를 가져옴 (충돌 방지)
        let currentSha = null;
        try{
            const checkRes = await fetch(
                `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/curriculum.json?ref=${gh.branch}&t=${Date.now()}`,
                {headers: {'Authorization': `Bearer ${gh.token}`, 'Accept': 'application/vnd.github+json'}}
            );
            if(checkRes.ok){
                const checkData = await checkRes.json();
                currentSha = checkData.sha;
            }
        } catch(e){}
        
        const body = {
            message: `Update curriculum.json (${keyCount} items, ${now.toLocaleString('ko-KR')})`,
            content: contentB64,
            branch: gh.branch
        };
        if(currentSha) body.sha = currentSha;
        
        const putRes = await fetch(
            `https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/curriculum.json`,
            {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${gh.token}`,
                    'Accept': 'application/vnd.github+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            }
        );
        
        // 성공
        if(putRes.ok){
            return {ok:true, response:putRes};
        }
        
        // SHA 충돌 (409 conflict 또는 422 with "sha" in message)인지 확인 → 재시도
        let isConflict = (putRes.status === 409 || putRes.status === 422);
        if(isConflict && attempt < maxRetries){
            const errClone = putRes.clone();
            const errBody = await errClone.json().catch(()=>({}));
            const msg = errBody.message || '';
            // 명확히 SHA 충돌인지 확인
            if(/sha|conflict|expected|update_or_create/i.test(msg) || putRes.status === 409){
                console.warn(`Upload conflict on attempt ${attempt+1}, retrying...`);
                await new Promise(r => setTimeout(r, 500 + attempt*500)); // 점진적 대기
                continue;
            }
        }
        
        // 다른 종류 에러 또는 최종 실패 → 응답 반환 (호출자가 에러 처리)
        return {ok:false, response:putRes};
    }
    return {ok:false, response:null};
}

async function autoDeployCurriculum(){
    const gh = getGitHubConfig();
    if(!gh.token || !gh.owner || !gh.repo){
        alert('⚠️ GitHub 설정이 안 되어 있어요. [⚙️ 설정하기]를 먼저 해주세요.');
        return;
    }
    
    if(!confirm('학원 자료를 GitHub에 자동 업로드합니다.\n학생들에게 즉시 반영됩니다.\n\n계속할까요?')) return;
    
    const btn = event.target;
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '⏳ 자료 수집 중...';
    
    try{
        // Step 1: Build curriculum.json
        const keys = RL_STORE.keys().filter(isCurriculumKey);
        const items = {};
        let totalSize = 0;
        keys.forEach(k=>{
            try{
                const v = RL_STORE.get(k);
                if(v !== null){
                    items[k] = v;
                    totalSize += v.length;
                }
            } catch(e){}
        });
        
        const now = new Date();
        const exported = {
            _meta: {
                version: now.toISOString(),
                generated: now.toLocaleString('ko-KR'),
                generator: '엠베스트SE 동탄남광장 어드민 (자동 배포)',
                keyCount: keys.length,
                sizeBytes: totalSize
            },
            _items: items
        };
        const json = JSON.stringify(exported, null, 2);
        
        // 🔒 안전 점검: 시크릿/API 키 패턴 검사
        const secretPatterns = [
            {name: 'Anthropic API Key (sk-ant-)', regex: /sk-ant-[A-Za-z0-9_-]{20,}/},
            {name: 'OpenAI API Key (sk-...)', regex: /\bsk-(?!ant-)[A-Za-z0-9]{40,}/},
            {name: 'GitHub Token (ghp_/gho_)', regex: /gh[pousr]_[A-Za-z0-9]{20,}/},
            {name: 'Google API Key (AIza)', regex: /AIza[A-Za-z0-9_-]{35}/}
        ];
        
        const foundSecrets = [];
        for(const sp of secretPatterns){
            if(sp.regex.test(json)){
                // 어느 키에 들어있는지 찾기
                let foundIn = '(찾는 중...)';
                let sample = '';
                for(const k of keys){
                    const v = items[k] || '';
                    if(typeof v === 'string'){
                        const m = v.match(sp.regex);
                        if(m){
                            foundIn = k;
                            sample = m[0].substring(0,12) + '...';
                            break;
                        }
                    }
                }
                foundSecrets.push({type: sp.name, key: foundIn, sample});
            }
        }
        
        if(foundSecrets.length > 0){
            btn.disabled = false;
            btn.innerHTML = orig;
            const detail = foundSecrets.map(s => `• ${s.type}\n  위치: ${s.key}\n  샘플: ${s.sample}`).join('\n\n');
            alert(`🚨 배포 중단 — 데이터에 API 키 또는 시크릿이 포함되어 있어요!\n\n${detail}\n\n원인:\n실수로 API 키를 학생 정보, 단어장 등 다른 곳에 붙여넣으셨을 수 있어요.\n\n해결:\n어드민에서 해당 항목을 찾아 API 키 제거 후 다시 시도\n(API 키는 설정 탭에만 두기)`);
            return;
        }
        
        // Step 2-3: Upload with SHA retry on conflict
        btn.innerHTML = '⏳ 업로드 중... (' + (totalSize/1024/1024).toFixed(1) + 'MB)';
        const result = await uploadCurriculumWithRetry(gh, json, keys.length, now);
        if(!result.ok){
            // 에러는 uploadCurriculumWithRetry에서 throw됨, 여기 도달 안 함
        }
        const putRes = result.response;
        
        if(!putRes.ok){
            const err = await putRes.json().catch(()=>({}));
            // GitHub Push Protection error may contain bypass URL
            let bypassUrl = null;
            let secretType = null;
            try{
                if(err.message && /push protection|secret/i.test(err.message)){
                    // Look for bypass URL in metadata
                    const metadata = err.metadata || err.errors || [];
                    if(Array.isArray(metadata)){
                        for(const m of metadata){
                            if(m.bypass_url || m.url){ bypassUrl = m.bypass_url || m.url; }
                            if(m.type || m.secret_type){ secretType = m.type || m.secret_type; }
                        }
                    }
                    if(!bypassUrl && err.documentation_url){
                        bypassUrl = err.documentation_url;
                    }
                }
            }catch(_){}
            
            const errMsg = err.message || ('HTTP ' + putRes.status);
            const fullErr = JSON.stringify(err, null, 2);
            console.error('GitHub API error:', fullErr);
            
            const e2 = new Error(errMsg);
            e2.fullResponse = fullErr;
            e2.bypassUrl = bypassUrl;
            e2.secretType = secretType;
            throw e2;
        }
        
        const putData = await putRes.json();
        LS.s('rl_last_deploy', now.toISOString());
        
        alert(`✅ 배포 완료!\n\n• 항목 수: ${keys.length}개\n• 크기: ${(totalSize/1024/1024).toFixed(2)}MB\n• 시각: ${now.toLocaleString('ko-KR')}\n\n학생들이 사이트 새로고침 시 자동 반영됩니다 (1~2분 후 적용).`);
        render();
    } catch(e){
        console.error('Deploy failed:', e);
        let msg = `❌ 배포 실패\n\n${e.message}`;
        if(e.bypassUrl){
            msg += `\n\n🔓 해결 방법:\n위 메시지에 따르면 GitHub의 Push Protection이 작동했어요.\n\n아래 주소를 새 탭에 복사해서 여세요:\n${e.bypassUrl}\n\n그 페이지에서 "Allow secret" 또는 "False positive" 선택하시면 한 번만 우회할 수 있어요.`;
        } else if(/push protection|secret/i.test(e.message)){
            msg += `\n\n🔓 Push Protection 문제로 보여요. 다음을 확인하세요:\n\n1. GitHub repo Settings → Code security\n2. "Push protection" 항목 → "Enable" 버튼이 보이면 OFF, "Disable" 버튼이 보이면 ON\n3. ON 상태면 클릭해서 OFF로 바꾸기\n4. Rules → Rulesets 에 따로 규칙 있는지 확인\n\nF12 → Console 탭에 자세한 에러가 출력돼 있어요. 그것도 도움이 됩니다.`;
        } else {
            msg += `\n\n원인 가능성:\n• 토큰 만료 → 설정에서 새 토큰 발급/입력\n• 인터넷 연결\n• GitHub 서비스 일시 장애`;
        }
        alert(msg);
    } finally {
        btn.disabled = false;
        btn.innerHTML = orig;
    }
}

// ========== 🤖 자동 배포 시스템 ==========
// 학원 자료 변경 후 10초 지나면 자동으로 GitHub에 배포
let _autoDeployTimer = null;
let _autoDeployStatus = 'idle'; // 'idle' | 'pending' | 'deploying' | 'success' | 'error'
let _autoDeployMsg = '';
let _autoDeployActive = false; // 첫 사용자 액션 후에만 활성화 (페이지 로드 시 자동 트리거 방지)

window._scheduleAutoDeploy = function(changedKey){
    if(!_autoDeployActive) return; // 페이지 초기 로드 중에는 무시
    if(!isCurriculumKey(changedKey)) return; // 학원 자료 키가 아니면 무시
    
    const gh = getGitHubConfig();
    if(!gh.token || !gh.owner || !gh.repo) return; // GitHub 설정 안 됨
    
    // 자동 배포 토글 OFF면 무시
    if(LS.g('autodeploy_off') === true) return;
    
    // 10초 디바운스
    if(_autoDeployTimer) clearTimeout(_autoDeployTimer);
    setAutoDeployStatus('pending', '곧 배포...');
    _autoDeployTimer = setTimeout(()=>{
        silentAutoDeploy();
    }, 10000);
};

function setAutoDeployStatus(status, msg){

    }
}

async function silentAutoDeploy(){
    if(_autoDeployStatus === 'deploying') return; // 이미 진행 중이면 스킵
    
    const gh = getGitHubConfig();
    if(!gh.token || !gh.owner || !gh.repo){
        setAutoDeployStatus('error', '설정 없음');
        return;
    }
    
    setAutoDeployStatus('deploying', '배포 중...');
    
    try{
        // curriculum.json 빌드
        const keys = RL_STORE.keys().filter(isCurriculumKey);
        const items = {};
        let totalSize = 0;
        keys.forEach(k=>{
            try{
                const v = RL_STORE.get(k);
                if(v !== null){
                    items[k] = v;
                    totalSize += v.length;
                }
            } catch(e){}
        });
        
        const now = new Date();
        const exported = {
            _meta: {
                version: now.toISOString(),
                generated: now.toLocaleString('ko-KR'),
                generator: '엠베스트SE 동탄남광장 어드민 (자동 배포)',
                keyCount: keys.length,
                sizeBytes: totalSize
            },
            _items: items
        };
        const json = JSON.stringify(exported, null, 2);
        
        // 시크릿 패턴 검사
        const secretPatterns = [
            /sk-ant-[A-Za-z0-9_-]{20,}/,
            /\bsk-(?!ant-)[A-Za-z0-9]{40,}/,
            /gh[pousr]_[A-Za-z0-9]{20,}/,
            /AIza[A-Za-z0-9_-]{35}/
        ];
        for(const pat of secretPatterns){
            if(pat.test(json)){
                setAutoDeployStatus('error', '시크릿 감지 - 수동 확인 필요');
                console.error('Silent deploy aborted: secret pattern detected in curriculum.json');
                return;
            }
        }
        
        // 현재 SHA + PUT 업로드 (SHA 충돌 시 자동 재시도)
        const result = await uploadCurriculumWithRetry(gh, json, keys.length, now);
        const putRes = result.response;
        
        if(!putRes || !putRes.ok){
            const err = putRes ? await putRes.json().catch(()=>({})) : {};
            throw new Error(err.message || ('HTTP ' + (putRes?putRes.status:'no response')));
        }
        
        LS.s('rl_last_deploy', now.toISOString());
        setAutoDeployStatus('success', `방금 배포됨 (${keys.length}개)`);
        
        // 5초 후 상태 메시지 사라짐
        setTimeout(()=>{
            if(_autoDeployStatus === 'success') setAutoDeployStatus('idle', '');
        }, 5000);
    } catch(e){
        console.error('Silent auto-deploy failed:', e);
        const errShort = e.message.length > 40 ? e.message.substring(0,40)+'...' : e.message;
        setAutoDeployStatus('error', `실패: ${errShort}`);
    }
}

// 문마중: P1, P5, P9 ... (4 Point = 1 Unit, 27개 옵션)
// 나모그: Ch 1, Ch 2 ... (Level 1=13, Level 2=12 챕터)
function grammarPointOptionsHTML(gbook,curVal){
    const cur=parseInt(curVal||0);
    let html='<option value="">— 미설정 —</option>';
    if(gbook==='나모그 Level 1'){
        for(let c=1;c<=13;c++)html+=`<option value="${c}" ${cur===c?'selected':''}>Ch ${c}</option>`;
    } else if(gbook==='나모그 Level 2'){
        for(let c=1;c<=12;c++)html+=`<option value="${c}" ${cur===c?'selected':''}>Ch ${c}</option>`;
    } else {
        // 문마중 (기본)
        for(let k=0;k<27;k++){
            const p=k*4+1;const u=k+1;
            html+=`<option value="${p}" ${cur===p?'selected':''}>P${p} (Unit ${u})</option>`;
        }
    }
    return html;
}

async function extractPdfText(file){
    const buf=await file.arrayBuffer();

    let text='';
    for(let p=1;p<=pdf.numPages;p++){

// AI로 문제지+정답지 -> 문제 JSON 정리
// 잘린 JSON에서 완성된 question 객체만 복구 (괄호 카운팅 방식)
function salvageQuestions(text){
    const qs=[];
    // "questions":[ 부터 시작해서 객체별로 추출
    const startIdx=text.indexOf('"questions"');
    if(startIdx<0)return qs;
    let i=text.indexOf('[',startIdx);
    if(i<0)return qs;
    i++;
    while(i<text.length){
        // 다음 { 찾기
        while(i<text.length&&text[i]!=='{')i++;
        if(i>=text.length)break;
        const objStart=i;
        let depth=0,inStr=false,esc=false;
        for(;i<text.length;i++){
            const c=text[i];
            if(esc){esc=false;continue;}
            if(c==='\\'){esc=true;continue;}
            if(c==='"'){inStr=!inStr;continue;}
            if(inStr)continue;
            if(c==='{')depth++;
            else if(c==='}'){depth--;if(depth===0){i++;break;}}
        }
        if(depth!==0)break; // 미완성 객체에서 종료
        const objStr=text.substring(objStart,i);
        try{const obj=JSON.parse(objStr);if(obj.question&&obj.options)qs.push(obj);}catch(e){}
    }
    return qs;
}

// 한 묶음의 문제지 텍스트를 AI로 정리

순수 JSON만 출력하세요. 설명/마크다운/코드블록 절대 금지.

[문제지]
${questionText}

[정답지]
${answerText}

[규칙]
- question: 문항 번호와 발문 (예: "1. 다음 글의 주제로 가장 적절한 것은?"). 짧게.
- presentationBox: 문제와 함께 사각박스에 표시될 부속 내용 (지문/문장/요약문/위치표시 등). 없으면 빈 문자열.
  · 빈칸 문제는 빈칸이 있는 문장을 박스에 넣으세요.
  · 문장 삽입은 주어진 문장과 위치 표시(①②③④)가 들어간 본문을 박스에.
  · 글의 순서는 도입부+(A)(B)(C)를 박스에.
  · 요약문 완성은 (A)(B) 빈칸이 있는 요약문장을 박스에.
- 밑줄 친 단어가 있는 경우 반드시 <u>단어</u> HTML 태그로 감싸세요. 다른 HTML 태그 금지.
- options: 보기 배열. ①②③④⑤ 기호 제거하고 텍스트만
- answer: 정답 보기의 인덱스(0부터). ③이면 2. 못 찾으면 -1
- explanation: 학생이 틀렸을 때 보여줄 한국어 해설(2~4문장). 왜 그 보기가 정답인지, 다른 보기가 왜 오답인지.
- 반드시 유효한 JSON으로, 마지막 }까지 완전하게 출력

[출력 형식]
{"questions":[{"question":"1. ...","presentationBox":"...","options":["...","...","...","..."],"answer":2,"explanation":"..."}]}`;
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:8000,messages:[{role:"user",content:prompt}]})});
    if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error?.message||('HTTP '+r.status));}
    const data=await r.json();
    const t=data.content?.find(c=>c.type==="text")?.text||"";
    // 1차: 통째로 파싱 시도
    const m=t.match(/\{[\s\S]*\}/);
    if(m){
        try{const p=JSON.parse(m[0]);if(p.questions&&p.questions.length>0)return p.questions;}catch(e){}
    }
    // 2차: 잘렸으면 완성된 객체만 복구

// 문제지 텍스트를 적당한 크기로 분할 (문항 번호 기준)
function splitQuestionText(text){
    // "숫자." 또는 "[숫자]" 또는 "숫자 ." 패턴 앞에서 분할 지점 찾기
    const chunks=[];
    const maxLen=6000;
    if(text.length<=maxLen){return [text];}
    // 줄 단위로 모으되 maxLen 넘으면 새 청크
    const lines=text.split('\n');
    let cur='';
    for(const line of lines){
        if(cur.length+line.length>maxLen&&cur.length>0){
            chunks.push(cur);cur='';
        }
        cur+=line+'\n';
    }
    if(cur.trim())chunks.push(cur);
    return chunks;
}

async function parsePdfWithAI(questionText,answerText,onProgress){
    const apiKey=LS.g('apikey');if(!apiKey)return null;
    const aText=answerText.substring(0,6000);
    const chunks=splitQuestionText(questionText);
    let allQuestions=[];
    for(let i=0;i<chunks.length;i++){
        if(onProgress)onProgress(i+1,chunks.length);
        try{
            const qs=await parsePdfChunk(chunks[i],aText,apiKey);
            allQuestions=allQuestions.concat(qs);
        }catch(e){
            // 한 청크 실패해도 나머지는 계속
            console.error('chunk '+i+' failed:',e.message);
            if(i===0&&chunks.length===1)throw e; // 단일 청크면 에러 전파
        }
    }
    return {vocabulary:[],questions:allQuestions};
}

// 리딩 지문 일괄 가져오기
function handleReadingBulkImport(event){
    const file=event.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
        let data;
        try{data=JSON.parse(e.target.result);}
        catch(err){alert('JSON 파일 형식이 올바르지 않아요.\n'+err.message);event.target.value='';return;}
        
        if(!data.deckName||!data.units||!Array.isArray(data.units)){
            alert('JSON 형식 오류 — deckName과 units 배열이 필요해요.');
            event.target.value='';return;
        }
        
        const books=LS.g('textbooks')||{};
        if(!books[data.deckName]){
            alert(`교재 "${data.deckName}"이 없어요!\n먼저 [+ 교재 추가] 버튼으로 만들어주세요.`);
            event.target.value='';return;
        }
        
        const totalUnits=data.units.length;
        const totalArts=data.units.reduce((s,u)=>s+(u.articles||[]).length,0);
        
        if(!confirm(`📥 지문 일괄 가져오기\n\n교재: ${data.deckName}\nUnit 수: ${totalUnits}개\n지문 수: ${totalArts}개\n\n진행하시겠어요?\n* 같은 Unit에 기존 지문이 있으면 덮어쓰기 됩니다\n* AI 단어/문제 생성은 안 됨 (지문 본문만 등록)`))return;
        
        const articles=getArticles();
        if(!articles[data.deckName])articles[data.deckName]={};
        
        let createdUnits=0,createdArts=0;
        data.units.forEach(uData=>{
            const unitNum=uData.unit;
            const arts=uData.articles||[];
            if(!unitNum||arts.length===0)return;
            const uk='unit'+unitNum;
            articles[data.deckName][uk]={
                articles: arts.map((a,i)=>({
                    title: a.title||('Article '+(i+1)),
                    content: a.body||a.content||'',
                    vocabulary: [],
                    sentenceList: [],
                    keySentences: [],
                    questions: [],
                    aiGenerated: false
                }))
            };
            createdUnits++;
            createdArts+=arts.length;
        });
        
        saveArticles(articles);
        event.target.value='';
        render();
        setTimeout(()=>{
            alert(`✅ 일괄 가져오기 완료!\n\n📚 등록된 Unit: ${createdUnits}개\n📄 등록된 지문: ${createdArts}개\n\n* AI 단어/문제 생성은 각 지문에서 따로 실행하세요.`);
        },100);
    };
    reader.onerror=function(){alert('파일 읽기 실패');event.target.value='';};
    reader.readAsText(file,'utf-8');
}

// 리딩 일괄 AI 생성 — 모든 교재의 모든 article을 순차 처리
// ========================================================================
let bulkReadingState={running:false,stopRequested:false};

async function bulkGenerateReadingAI(){
    const apikey=LS.g('apikey');
    if(!apikey){alert('AI 생성에는 Claude API 키가 필요합니다. 설정 탭에서 입력해주세요.');return;}
    
    const articles=getArticles();
    
    // 처리 대상: AI 미생성된 article들
    const targets=[];
    for(const bookName in articles){
        const ba=articles[bookName];
        for(const uk in ba){
            const arts=ba[uk].articles||[];
            arts.forEach((art,idx)=>{
                if(!art.aiGenerated&&art.content){
                    const unitNum=parseInt(uk.replace('unit',''))||0;
                    targets.push({bookName,uk,unitNum,idx,title:art.title,content:art.content});
                }
            });
        }
    }
    
    if(targets.length===0){
        alert('✨ 모든 지문이 이미 AI 처리되어 있어요!');
        return;
    }
    
    // 교재별 / Unit별 통계
    const byBook={};
    targets.forEach(t=>{
        if(!byBook[t.bookName])byBook[t.bookName]=0;
        byBook[t.bookName]++;
    });
    const bookSummary=Object.entries(byBook).map(([n,c])=>`• ${n}: ${c}개`).join('\n');
    
    const estMin=Math.ceil(targets.length*40/60);
    if(!confirm(`🤖 전체 AI 생성 (단어 + 문장 + 문제)\n\n처리할 지문: ${targets.length}개\n${bookSummary}\n\n예상 시간: 약 ${estMin}분 (지문당 약 40초)\n\n* 처리된 지문은 자동 저장됩니다\n* 중간에 중단할 수 있어요\n\n진행하시겠어요?`))return;
    
    bulkReadingState.running=true;
    bulkReadingState.stopRequested=false;
    showReadingProgressModal(targets.length);
    
    let completed=0,failed=0;
    const failedItems=[];
    const startTime=Date.now();
    
    for(let i=0;i<targets.length;i++){
        if(bulkReadingState.stopRequested)break;
        const t=targets[i];
        const elapsed=Math.floor((Date.now()-startTime)/1000);
        const remaining=completed>0?Math.floor(elapsed/completed*(targets.length-i)):targets.length*40;
        
        updateReadingProgress(i,targets.length,`${t.bookName} · Unit ${t.unitNum} · ${t.title}`,'AI 분석 중...',elapsed,remaining);
        
        try{
            const num=t.idx+1;
            const result=await generateWithAI(t.content,num);
            if(!result)throw new Error('AI 응답 실패');
            
            // 저장 — 해당 Unit만 저장 (전체 articles 저장 X — localStorage quota 회피)
            const articles=getArticles();
            const art=articles[t.bookName]?.[t.uk]?.articles?.[t.idx];
            if(art){
                art.vocabulary=result.vocabulary||[];
                art.sentenceList=result.sentenceList||result.keySentences||[];
                art.keySentences=result.keySentences||result.sentenceList||[];
                art.questions=result.questions||[];
                art.aiGenerated=true;
                saveArticleUnit(t.bookName,t.uk,articles[t.bookName][t.uk]);
            }
            completed++;
            updateReadingProgress(i+1,targets.length,`${t.bookName} · Unit ${t.unitNum}`,`✅ 단어 ${art?.vocabulary?.length||0}개, 문제 ${art?.questions?.length||0}개`,elapsed,remaining);
        }catch(e){
            failed++;
            failedItems.push({label:`${t.bookName} · U${t.unitNum} · ${t.title}`,error:e.message});
            updateReadingProgress(i+1,targets.length,`${t.bookName} · Unit ${t.unitNum}`,`❌ 실패: ${e.message.slice(0,60)}`,elapsed,remaining);
            // 치명적 에러 자동 중단
            const critical=['credit balance','API key','authentication','unauthorized','permission'];
            if(critical.some(kw=>e.message.toLowerCase().includes(kw.toLowerCase()))){
                bulkReadingState.stopRequested=true;
                updateReadingProgress(i+1,targets.length,t.title,'🛑 치명적 에러 — 자동 중단',elapsed,remaining);
                await new Promise(r=>setTimeout(r,1500));
                break;
            }
            await new Promise(r=>setTimeout(r,1200));
        }
    }
    
    bulkReadingState.running=false;
    const totalSec=Math.floor((Date.now()-startTime)/1000);
    finishReadingProgressModal(completed,failed,failedItems,bulkReadingState.stopRequested,totalSec);
}

function updateReadingProgress(done,total,itemName,status,elapsed,remaining){
    const pct=Math.round(done/total*100);
    const $=id=>document.getElementById(id);
    if($('reading-progress-label'))$('reading-progress-label').textContent=`${done} / ${total} 지문`;
    if($('reading-progress-pct'))$('reading-progress-pct').textContent=pct+'%';
    if($('reading-progress-bar'))$('reading-progress-bar').style.width=pct+'%';
    if($('reading-current-item'))$('reading-current-item').textContent=itemName||'-';
    if($('reading-current-status'))$('reading-current-status').innerHTML=status||'-';
    if($('reading-elapsed'))$('reading-elapsed').textContent=fmtSeconds(elapsed||0);
    if($('reading-remaining'))$('reading-remaining').textContent=remaining?fmtSeconds(remaining):'계산 중...';
}

function stopReadingBulk(){
    if(!bulkReadingState.running)return;
    if(confirm('진행을 중단하시겠어요?\n(현재 처리 중인 지문은 완료 후 멈춥니다)')){
        bulkReadingState.stopRequested=true;
        const btn=document.getElementById('reading-stop-btn');
        if(btn){btn.textContent='⏳ 중단 중...';btn.disabled=true;}
    }
}

function getSettings(bookName){
    const stored=LS.g('settings')||{};
    const merged=Object.assign({},DEFAULT_SETTINGS,stored);
    ['wordTrain','wordSelfCheck','sentTrain','sentSelfCheck','weeklyTest','vocabFlow'].forEach(k=>{
        merged[k]=Object.assign({},DEFAULT_SETTINGS[k],stored[k]||{});
        if(DEFAULT_SETTINGS[k]&&DEFAULT_SETTINGS[k].ratio)merged[k].ratio=Object.assign({},DEFAULT_SETTINGS[k].ratio,(stored[k]||{}).ratio||{});
        if(DEFAULT_SETTINGS[k]&&DEFAULT_SETTINGS[k].wordRatio)merged[k].wordRatio=Object.assign({},DEFAULT_SETTINGS[k].wordRatio,(stored[k]||{}).wordRatio||{});
    });
    // vocabFlow는 nested 객체라 한 단계 더 deep merge (dayCheck/selfCheck/realExam/weeklyExam)
    if(merged.vocabFlow){
        ['dayCheck','selfCheck','realExam','weeklyExam'].forEach(sub=>{
            merged.vocabFlow[sub]=Object.assign({},DEFAULT_SETTINGS.vocabFlow[sub],(stored.vocabFlow||{})[sub]||{});
            if(DEFAULT_SETTINGS.vocabFlow[sub].ratio){
                merged.vocabFlow[sub].ratio=Object.assign({},DEFAULT_SETTINGS.vocabFlow[sub].ratio,((stored.vocabFlow||{})[sub]||{}).ratio||{});
            }
        });
    }
    // 🌙 야간 학습 차단 설정 머지
    merged.studyBlock=Object.assign({},DEFAULT_SETTINGS.studyBlock,stored.studyBlock||{});
    // 교재별 오버라이드 적용
    if(bookName){
        const byBook=LS.g('settings_byBook')||{};
        const book=byBook[bookName];
        if(book&&book._enabled){
            Object.assign(merged,book);
            ['wordTrain','wordSelfCheck','sentTrain','sentSelfCheck','weeklyTest','vocabFlow'].forEach(k=>{
                if(book[k])merged[k]=Object.assign({},merged[k],book[k]);
                if(book[k]&&book[k].ratio)merged[k].ratio=Object.assign({},merged[k].ratio,book[k].ratio);
                if(book[k]&&book[k].wordRatio)merged[k].wordRatio=Object.assign({},merged[k].wordRatio,book[k].wordRatio);
            });
        }
    }
    return merged;
}
