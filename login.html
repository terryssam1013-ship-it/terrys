<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>엠베스트SE 동탄남광장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#00C853;--green-dark:#00A844;--green-light:#E8F5E9;--bg:#FAFBFC;--white:#FFFFFF;--text:#1B1D1F;--text2:#6B7684;--text3:#AEB5BC;--border:#E5E8EB;--border-light:#F2F4F6;--radius:16px;--radius-sm:12px;--radius-xs:8px;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-sm:0 1px 2px rgba(0,0,0,.06)}
html,body{height:100%}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;-webkit-font-smoothing:antialiased;}
.login-container{width:100%;max-width:420px;padding:0 20px;}
.logo-area{text-align:center;margin-bottom:32px;}
.logo-img{max-width:220px;height:auto;margin-bottom:12px;}
.academy-name{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.academy-sub{font-size:13px;color:var(--text2);margin-top:6px;}
.login-card{background:var(--white);border-radius:var(--radius);padding:36px 32px;box-shadow:var(--shadow);border:1px solid var(--border-light);}
.login-title{font-size:18px;font-weight:700;margin-bottom:28px;text-align:center;}
.field{margin-bottom:16px;}
.field-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.field-input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-xs);background:var(--white);color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;transition:all .2s;outline:none;}
.field-input::placeholder{color:var(--text3);}
.field-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,200,83,.12);}
.error-box{display:none;padding:12px 16px;background:#FFF5F5;border:1px solid #FEB2B2;border-radius:var(--radius-xs);font-size:13px;color:#E53E3E;margin-bottom:16px;text-align:center;}
.login-btn{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-xs);font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;margin-top:8px;}
.login-btn:hover{background:var(--green-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,200,83,.3);}
.login-btn:active{transform:translateY(0);}
.login-footer{text-align:center;margin-top:24px;font-size:12px;color:var(--text3);line-height:1.6;}
.subjects{display:flex;gap:10px;margin-top:32px;justify-content:center;}
.subject-chip{display:flex;align-items:center;gap:6px;padding:10px 18px;background:var(--white);border:1px solid var(--border);border-radius:24px;font-size:13px;font-weight:500;color:var(--text2);box-shadow:var(--shadow-sm);}
.subject-chip.active{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:600;}
.subject-dot{width:8px;height:8px;border-radius:50%;}
@media(max-width:480px){.login-card{padding:28px 24px;}.academy-name{font-size:20px;}.logo-img{max-width:180px;}}
/* ============ 📱 모바일 최적화 추가 ============ */
@media(max-width:768px){
  .login-container{max-width:100%;padding:0 16px}
  .login-card{padding:28px 22px;border-radius:14px}
  .field-input{padding:13px 14px;font-size:16px} /* iOS 자동 줌 방지 위해 16px */
  .login-btn{padding:14px;font-size:16px;min-height:48px}
  .logo-area{margin-bottom:24px}
  .academy-name{font-size:20px}
  .academy-sub{font-size:12px}
  .subjects{gap:8px;flex-wrap:wrap;margin-top:24px}
  .subject-chip{padding:8px 14px;font-size:12px}
}
@media(max-width:380px){
  .login-container{padding:0 12px}
  .login-card{padding:22px 18px}
  .logo-img{max-width:160px}
  .academy-name{font-size:18px}
  .field-input{padding:12px}
  .subjects{justify-content:center}
  .subject-chip{padding:7px 12px;font-size:11.5px}
}
</style>
</head>

<script>
function todayStr(){return new Date().toISOString().slice(0,10);}

// IndexedDB 우선 + localStorage 폴백
const RL_STORE = {
    get(k){
        if(window.RLStorage && RLStorage.isReady()){
            const v = RLStorage.getItem(k);
            if(v !== null) return v;
        }
        return localStorage.getItem(k);
    },
    set(k, v){
        if(window.RLStorage && RLStorage.isReady()){
            RLStorage.setItem(k, v);
        }
        // localStorage에도 rl_current_user는 항상 저장 (다른 페이지가 빨리 로드되도록)
        if(k === 'rl_current_user'){
            localStorage.setItem(k, v);
        }
    }
};

function initData(){
    // 학생 데이터 없을 때만 기본값 (IndexedDB와 localStorage 모두 체크)
    if(!RL_STORE.get('rl_users')){
        const defaultUsers = JSON.stringify({
            admin:{password:'1234',role:'admin'},
            '107857':{password:'1234',role:'student',name:'김리원',days:['월','수'],startDate:todayStr(),level:'LEVEL 1',textbooks:{reading:'Reading Forward'},startUnit:1},
            '178651':{password:'1234',role:'student',name:'이지유',days:['화','목'],startDate:todayStr(),level:'LEVEL 2',textbooks:{reading:'Reading Inside'},startUnit:1}
        });
        if(window.RLStorage && RLStorage.isReady()){
            RLStorage.setItem('rl_users', defaultUsers);
        } else {
            localStorage.setItem('rl_users', defaultUsers);
        }
    }
    if(!RL_STORE.get('rl_levels')){
        const v = JSON.stringify(['LEVEL 1','LEVEL 2','LEVEL 3','MTEST 1','MTEST 2']);
        if(window.RLStorage && RLStorage.isReady())RLStorage.setItem('rl_levels',v);
        else localStorage.setItem('rl_levels',v);
    }
    if(!RL_STORE.get('rl_textbooks')){
        const v = JSON.stringify({
            'Reading Forward':{level:'LEVEL 1',units:16,articles:3},
            'Reading Inside':{level:'LEVEL 1',units:16,articles:3},
            '1316 Reading':{level:'LEVEL 3',units:12,articles:3},
            'Bridge Reading':{level:'MTEST 1',units:10,articles:3},
            'The Class Reading':{level:'MTEST 2',units:10,articles:3},
            'Junior Reading-Tutor':{level:'LEVEL 2',units:14,articles:3}
        });
        if(window.RLStorage && RLStorage.isReady())RLStorage.setItem('rl_textbooks',v);
        else localStorage.setItem('rl_textbooks',v);
    }
}
function login(){
    const uid=document.getElementById('uid').value.trim();
    const pwd=document.getElementById('pwd').value;
    const users=JSON.parse(RL_STORE.get('rl_users')||'{}');
    if(!uid||!pwd){showError('아이디와 비밀번호를 입력하세요');return;}
    const user=users[uid];
    if(!user||user.password!==pwd){showError('아이디 또는 비밀번호가 올바르지 않습니다');return;}
    RL_STORE.set('rl_current_user',JSON.stringify({id:uid,...user}));
    if(user.role==='admin')window.location.href='admin.html';
    else window.location.href='student.html';
}
function showError(msg){const el=document.getElementById('err');el.textContent=msg;el.style.display='block';}
document.addEventListener('keypress',e=>{if(e.key==='Enter')login();});

// RLStorage 준비 후 로그인 페이지 초기화 (IndexedDB의 rl_users를 못 찾는 문제 해결)
async function bootstrap(){
    try{
        if(window.RLStorage){
            await RLStorage.init();
            console.log('✅ IndexedDB ready (login page)');
        }
    }catch(e){
        console.error('IndexedDB init failed, fallback to localStorage:',e);
    }
    
    // 📦 GitHub의 curriculum.json 자동 동기화
    // 단, 로컬에 학생 데이터가 있으면 건너뜀 (어드민이 추가한 신규 학생이 옛 데이터로 덮어쓰여 사라지는 문제 방지)
    // 학생들이 처음 사이트에 들어올 때만 자동 부트스트랩됨. 이후엔 student.html에서 동기화함.
    const hasLocalUsers = !!RL_STORE.get('rl_users');
    if(!hasLocalUsers && window.syncCurriculum){
        console.log('[login] 로컬 학생 데이터 없음 — GitHub에서 동기화');
        try{await window.syncCurriculum();}catch(e){console.warn('Curriculum sync failed:',e);}
    } else if(hasLocalUsers){
        console.log('[login] 로컬 학생 데이터 있음 — 동기화 건너뜀');
    }
    
    initData();
    
    // 무한 리다이렉트 방지 — 1초 내 자동 로그인 직후 다시 login에 왔으면 자동 로그인 중단
    const lastAutoLogin = parseInt(sessionStorage.getItem('_auto_login_at')||'0');
    const now = Date.now();
    if(lastAutoLogin && (now - lastAutoLogin) < 2000){
        console.warn('⚠️ 자동 로그인 직후 다시 login으로 돌아왔습니다. 무한 루프 방지를 위해 수동 로그인 필요');
        sessionStorage.removeItem('_auto_login_at');
        // 잔존 세션 정리 (안전장치)
        try{ localStorage.removeItem('rl_current_user'); }catch(e){}
        try{ if(window.RLStorage && RLStorage.isReady()) RLStorage.removeItem('rl_current_user'); }catch(e){}
        return;
    }
    
    const c=RL_STORE.get('rl_current_user');
    if(c){
        try{
            const u=JSON.parse(c);
            // 자동 로그인 시간 기록 (다음 페이지에서 다시 login.html로 돌아오면 감지)
            sessionStorage.setItem('_auto_login_at', String(now));
            if(u.role==='admin')window.location.href='admin.html';
            else window.location.href='student.html';
        }catch(e){
            console.error('rl_current_user 파싱 실패:',e);
            // 손상된 데이터 정리
            localStorage.removeItem('rl_current_user');
            if(window.RLStorage && RLStorage.isReady())RLStorage.removeItem('rl_current_user');
        }
    }
}
window.addEventListener('DOMContentLoaded',bootstrap);

// 수동 로그인 성공 시 자동 로그인 마커 클리어 (정상 흐름)
const originalLogin = login;
login = function(){
    sessionStorage.removeItem('_auto_login_at');
    originalLogin();
};
</script>
