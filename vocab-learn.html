// 오답 보기 선택 (같은 DAY 다른 단어)
function _pickDistractors(allWords,correctWord,count,field){
    const candidates=allWords.filter(w=>w.en!==correctWord.en&&w[field]&&w[field]!==correctWord[field]);
    const shuffled=[...candidates].sort(()=>Math.random()-0.5);
    return shuffled.slice(0,count).map(w=>w[field]);
}

function _shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

// 문제 유형별 생성
function _makeMeaningQ(word,allWords){
    const distractors=_pickDistractors(allWords,word,3,'ko');
    if(distractors.length<3)return null; // 단어 부족
    const choices=_shuffle([word.ko,...distractors]);
    return {
        type:'meaning',
        question:'다음 단어의 뜻으로 알맞은 것은?',
        prompt:word.en,
        choices:choices,
        correctIndex:choices.indexOf(word.ko),
        word:word
    };
}

function _makeWordQ(word,allWords){
    const distractors=_pickDistractors(allWords,word,3,'en');
    if(distractors.length<3)return null;
    const choices=_shuffle([word.en,...distractors]);
    return {
        type:'word',
        question:'다음 뜻에 알맞은 단어는?',
        prompt:word.ko,
        choices:choices,
        correctIndex:choices.indexOf(word.en),
        word:word
    };
}

function _makeBlankQ(word,allWords){
    if(!word.example)return _makeMeaningQ(word,allWords); // 예문 없으면 fallback
    const hl=escapeRegExp(word.highlight||word.en);
    const exampleBlank=word.example.replace(new RegExp('\\b('+hl+')\\b','gi'),'_____');
    // 한글 해석은 정답 단어 부분만 강조 색 표시 (학생이 영어 단어를 추측하는 단서)
    let exampleKoHighlight=word.exampleKo||'';
    if(word.exampleKo){
        const hlKo=escapeRegExp(word.highlightKo||word.ko);
        exampleKoHighlight=word.exampleKo.replace(new RegExp('('+hlKo+')'),'<span class="dc-ko-hint">$1</span>');
    }
    const distractors=_pickDistractors(allWords,word,3,'en');
    if(distractors.length<3)return null;
    const choices=_shuffle([word.en,...distractors]);
    return {
        type:'blank',
        question:'다음 예문의 빈칸에 알맞은 단어는?',
        prompt:exampleBlank,
        promptKo:exampleKoHighlight,
        choices:choices,
        correctIndex:choices.indexOf(word.en),
        word:word
    };
}

// 데이체크 시작
function startDayCheck(){
    const vfs=getVocabFlowSettings();
    if(state.gamesCompleted.size<vfs.gamesRequired){
        alert(`데이체크 시작 전에 게임을 ${vfs.gamesRequired}개 완료해주세요.\n(현재: ${state.gamesCompleted.size}/${vfs.gamesRequired})`);
        return;
    }
    
    // 진행 중인 데이체크 복원 (이어 풀기)
    const saved=loadDayCheckProgress();
    if(saved&&saved.idx<saved.questions.length){
        state.dayCheck={
            questions:saved.questions,
            idx:saved.idx,
            answers:saved.answers,
            startTime:Date.now()
        };
        renderDayCheck();
        return;
    }
    
    const words=state.day.words;
    if(words.length<4){
        alert('데이체크는 최소 4단어 이상 필요해요 (오답 보기 생성 불가)');
        return;
    }
    
    // 비율로 문제 분배
    const total=words.length;
    const r=vfs.dayCheck.ratio;
    const cMeaning=Math.round(total*r.meaning/100);
    const cWord=Math.round(total*r.word/100);
    const cBlank=total-cMeaning-cWord;
    
    // 단어 셔플 후 비율에 따라 유형 배정
    const shuffled=_shuffle(words);
    const questions=[];
    let i=0;
    for(let j=0;j<cMeaning&&i<shuffled.length;j++,i++){
        const q=_makeMeaningQ(shuffled[i],words);
        if(q)questions.push(q);
    }
    for(let j=0;j<cWord&&i<shuffled.length;j++,i++){
        const q=_makeWordQ(shuffled[i],words);
        if(q)questions.push(q);
    }
    for(let j=0;j<cBlank&&i<shuffled.length;j++,i++){
        const q=_makeBlankQ(shuffled[i],words);
        if(q)questions.push(q);
    }
    
    // 문제 순서 셔플
    state.dayCheck={
        questions:_shuffle(questions),
        idx:0,
        answers:[],
        startTime:Date.now()
    };
    renderDayCheck();
}

// 데이체크 진행 화면
function renderDayCheck(){
    const dc=state.dayCheck;
    if(!dc)return;
    if(dc.idx>=dc.questions.length){
        renderDayCheckResult();
        return;
    }
    
    const q=dc.questions[dc.idx];
    const progress=Math.round((dc.idx/dc.questions.length)*100);
    
    let promptHTML='';
    if(q.type==='meaning'){
        promptHTML=`<div class="dc-prompt-word">${q.prompt}</div>`;
    }else if(q.type==='word'){
        promptHTML=`<div class="dc-prompt-meaning">"${q.prompt}"</div>`;
    }else if(q.type==='blank'){
        promptHTML=`<div class="dc-prompt-example">${q.prompt}</div>
            ${q.promptKo?`<div class="dc-prompt-example-ko">↳ ${q.promptKo}</div>`:''}`;
    }
    
    const typeLabel={meaning:'단어 → 뜻',word:'뜻 → 단어',blank:'예문 빈칸'}[q.type];
    const typeColor={meaning:'#3B82F6',word:'#A855F7',blank:'#F59E0B'}[q.type];
    
    document.getElementById('app').innerHTML=`
    <div class="dc-screen">
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:${typeColor}"></div></div>
        <div class="dc-header">
            <span class="dc-progress-text">${dc.idx+1} / ${dc.questions.length}</span>
            <span class="dc-type-badge" style="background:${typeColor}">${typeLabel}</span>
        </div>
        
        <div class="dc-card">
            <div class="dc-question">${q.question}</div>
            ${promptHTML}
        </div>
        
        <div class="dc-choices">
            ${q.choices.map((c,i)=>`
                <button class="dc-choice" onclick="answerDayCheck(${i})">
                    <span class="dc-choice-num">${i+1}</span>
                    <span class="dc-choice-text">${c}</span>
                </button>
            `).join('')}
        </div>
    </div>
    `;
    window.scrollTo({top:0,behavior:'smooth'});
}

// 답 선택 처리
function answerDayCheck(choiceIdx){
    const dc=state.dayCheck;
    if(!dc)return;
    const q=dc.questions[dc.idx];
    const isCorrect=choiceIdx===q.correctIndex;
    
    dc.answers.push({
        questionIdx:dc.idx,
        choiceIdx:choiceIdx,
        correct:isCorrect,
        question:q
    });
    saveDayCheckProgress(); // 진행 저장 (이어 풀기)
    
    // 즉시 피드백 (잠시 후 다음 문제로)
    const buttons=document.querySelectorAll('.dc-choice');
    buttons.forEach((btn,i)=>{
        btn.disabled=true;
        if(i===q.correctIndex)btn.classList.add('dc-choice-correct');
        if(i===choiceIdx&&!isCorrect)btn.classList.add('dc-choice-wrong');
    });
    
    // 정답 사운드
    if(isCorrect){playCorrectSound&&playCorrectSound();}
    else{playWrongSound&&playWrongSound();}
    
    // 700ms 후 다음
    setTimeout(()=>{
        dc.idx++;
        if(dc.idx>=dc.questions.length){
            renderDayCheckResult();
        }else{
            renderDayCheck();
        }
    },isCorrect?700:1200);
}

// 데이체크 결과 화면
function renderDayCheckResult(){
    const dc=state.dayCheck;
    const vfs=getVocabFlowSettings();
    const total=dc.questions.length;
    const correct=dc.answers.filter(a=>a.correct).length;
    const score=Math.round(correct/total*100);
    const passed=score>=vfs.dayCheck.target;
    
    // 점수 저장
    saveDayCheckScore(state.deck.id,state.day.id,score,passed);
    clearDayCheckProgress(); // 완료 → 진행 삭제 (재시험은 새 문제로)
    
    const wrongs=dc.answers.filter(a=>!a.correct);
    
    // 다음 단계 버튼 결정
    // 한 수업에 여러 DAY (homework) 진행 시:
    // - 통과 + 마지막 DAY가 아니면 → 다음 DAY 학습 버튼
    // - 통과 + 마지막 DAY면 → 셀프체크 가능 여부 체크
    let nextStepHTML='';
    if(passed){
        if(homeworkIdx<homeworkSize){
            // 다음 DAY 학습 진행
            const nextDayNum=startDayNum+homeworkIdx; // homeworkIdx가 1이면 startDay+1
            const nextDayObj=state.deck.days[nextDayNum-1];
            if(nextDayObj){
                const nextUrl=`vocab-learn.html?deck=${encodeURIComponent(state.deck.id)}&day=${encodeURIComponent(nextDayObj.id)}&homework=${homeworkSize}&idx=${homeworkIdx+1}&startDay=${startDayNum}${isPreview?'&preview=1':''}`;
                nextStepHTML=`<button class="nav-btn nav-btn-primary" onclick="location.href='${nextUrl}'" style="background:#10B981;border-color:#10B981;color:#fff;width:100%;padding:14px;font-size:15px">📖 DAY${nextDayNum} 학습 시작 →</button>`;
            }
        }else{
            // 마지막 DAY 통과 — 셀프체크 가능 여부 확인
            // homework=1이면 startDayNum만, homework=2면 startDayNum, startDayNum+1 모두 통과해야 함
            const allDaysPassed=_checkAllHomeworkDaysPassed();
            if(allDaysPassed){
                nextStepHTML=`<button class="nav-btn nav-btn-primary" onclick="startSelfCheck()" style="background:#A855F7;border-color:#A855F7;color:#fff;width:100%;padding:14px;font-size:15px">📝 셀프체크 시작 (${homeworkSize}개 DAY 누적)</button>`;
            }
        }
    }
    
    document.getElementById('app').innerHTML=`<div class="summary-screen">
        <div class="summary-emoji">${passed?'🎉':'📝'}</div>
        <div class="summary-title">${passed?'데이체크 통과!':'재시험이 필요해요'}</div>
        <div class="summary-sub">${score}점 ${passed?'· 목표':'· 목표'} ${vfs.dayCheck.target}점</div>
        <div class="summary-stats">
            <div class="summary-stat"><div class="summary-stat-num">${total}</div><div class="summary-stat-label">전체</div></div>
            <div class="summary-stat"><div class="summary-stat-num" style="color:var(--green-d)">${correct}</div><div class="summary-stat-label">정답</div></div>
            <div class="summary-stat"><div class="summary-stat-num" style="color:var(--orange)">${total-correct}</div><div class="summary-stat-label">오답</div></div>
        </div>
        
        ${wrongs.length>0?`
        <div class="word-list-section" style="border-color:#EF4444;background:#FEF2F2;text-align:left">
            <div class="word-list-header">
                <span style="color:#991B1B">❌ 틀린 문제 (${wrongs.length}개)</span>
            </div>
            <div style="padding:0 4px">
                ${wrongs.map(a=>{
                    const q=a.question;
                    const myAnswer=q.choices[a.choiceIdx];
                    const correctAnswer=q.choices[q.correctIndex];
                    let promptText='';
                    if(q.type==='meaning')promptText=`<b>${q.prompt}</b> = ?`;
                    else if(q.type==='word')promptText=`"${q.prompt}" = ?`;
                    else promptText=`<i>${q.prompt}</i>`;
                    return `<div style="padding:10px;border-bottom:1px solid #FCA5A5;font-size:13px">
                        <div style="margin-bottom:6px">${promptText}</div>
                        <div style="color:#991B1B">내 답: ${myAnswer}</div>
                        <div style="color:#10B981">정답: ${correctAnswer} <span style="color:var(--gray);font-weight:400">(${q.word.en} = ${q.word.ko})</span></div>
                    </div>`;
                }).join('')}
            </div>
        </div>
        `:''}
        
        <div class="summary-cta" style="margin-top:20px;flex-direction:column;gap:8px">
            ${nextStepHTML}
            ${!passed?`<button class="nav-btn nav-btn-primary" onclick="startDayCheck()" style="background:#3B82F6;border-color:#3B82F6;width:100%">↺ 재시험</button>`:''}
            <button class="nav-btn" onclick="state.dayCheck=null;state.done=true;render()" style="width:100%">📋 학습 결과 화면</button>
            <button class="nav-btn" onclick="goBack()" style="width:100%">📅 학습일정으로</button>
        </div>
    </div>`;
    window.scrollTo({top:0,behavior:'smooth'});
}

// 한 수업의 모든 DAY 데이체크 통과 여부
function _checkAllHomeworkDaysPassed(){
    try{
        const key=_dayCheckStorageKey();
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        for(let i=0;i<homeworkSize;i++){
            const dayNum=startDayNum+i;

            if(!dayObj)return false;
            const k=state.deck.id+'/'+dayObj.id;
            if(!all[k]||!all[k].passed)return false;
        }

    }catch(e){return false;}

        };
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){console.error('셀프체크 점수 저장 실패:',e);}
}

// 셀프체크 시작 — 한 수업의 모든 DAY 단어 누적 → 총 N 문제 출제
function startSelfCheck(){
    if(!_checkAllHomeworkDaysPassed()){
        alert('모든 DAY의 데이체크를 먼저 통과해주세요');
        return;
    }
    
    // 진행 중인 셀프체크 복원 (이어 풀기)
    const saved=loadSelfCheckProgress();
    if(saved&&saved.idx<saved.questions.length){
        state.selfCheck={
            questions:saved.questions,
            idx:saved.idx,
            answers:saved.answers,
            startTime:Date.now()
        };
        renderSelfCheck();
        return;
    }
    
    const vfs=getVocabFlowSettings();
    const sc=vfs.selfCheck;
    
    // 모든 DAY 단어 모으기
    const allWords=[];
    for(let i=0;i<homeworkSize;i++){
        const dayNum=startDayNum+i;
        const dayObj=state.deck.days[dayNum-1];
        if(!dayObj)continue;
        const dayKey='rl_vocab_day_'+state.deck.id+'_'+dayObj.id;
        try{
            const words=JSON.parse(RL_STORE.get(dayKey)||'[]');
            words.forEach(w=>allWords.push(w));
        }catch(e){}
    }
    
    if(allWords.length<4){
        alert('셀프체크에 사용할 단어가 부족합니다 (최소 4개 필요)');
        return;
    }
    
    // 총 N문제, 비율에 따라 분배
    const total=sc.total;
    const r=sc.ratio;
    const cMeaning=Math.round(total*r.meaning/100);
    const cWord=Math.round(total*r.word/100);
    const cBlank=total-cMeaning-cWord;
    
    // 단어 셔플 후 문제 생성 (단어 부족하면 중복 허용)
    const shuffled=_shuffle(allWords);
    const questions=[];
    let pickIdx=0;
    const nextWord=()=>{
        const w=shuffled[pickIdx%shuffled.length];
        pickIdx++;
        return w;
    };
    
    for(let i=0;i<cMeaning;i++){
        const q=_makeMeaningQ(nextWord(),allWords);
        if(q)questions.push(q);
    }
    for(let i=0;i<cWord;i++){
        const q=_makeWordQ(nextWord(),allWords);
        if(q)questions.push(q);
    }
    for(let i=0;i<cBlank;i++){
        const q=_makeBlankQ(nextWord(),allWords);
        if(q)questions.push(q);
    }
    
    state.selfCheck={
        questions:_shuffle(questions),
        idx:0,
        answers:[],
        startTime:Date.now()
    };
    renderSelfCheck();
}

function renderSelfCheck(){
    const sc=state.selfCheck;
    if(!sc)return;
    if(sc.idx>=sc.questions.length){
        renderSelfCheckResult();
        return;
    }
    
    const q=sc.questions[sc.idx];
    const progress=Math.round((sc.idx/sc.questions.length)*100);
    
    let promptHTML='';
    if(q.type==='meaning')promptHTML=`<div class="dc-prompt-word">${q.prompt}</div>`;
    else if(q.type==='word')promptHTML=`<div class="dc-prompt-meaning">"${q.prompt}"</div>`;
    else if(q.type==='blank'){
        promptHTML=`<div class="dc-prompt-example">${q.prompt}</div>
            ${q.promptKo?`<div class="dc-prompt-example-ko">↳ ${q.promptKo}</div>`:''}`;
    }
    
    const typeLabel={meaning:'단어 → 뜻',word:'뜻 → 단어',blank:'예문 빈칸'}[q.type];
    const typeColor={meaning:'#3B82F6',word:'#A855F7',blank:'#F59E0B'}[q.type];
    
    document.getElementById('app').innerHTML=`
    <div class="dc-screen">
        <div style="text-align:center;margin-bottom:6px;font-size:13px;color:#A855F7;font-weight:700">📝 셀프체크</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:${typeColor}"></div></div>
        <div class="dc-header">
            <span class="dc-progress-text">${sc.idx+1} / ${sc.questions.length}</span>
            <span class="dc-type-badge" style="background:${typeColor}">${typeLabel}</span>
        </div>
        <div class="dc-card">
            <div class="dc-question">${q.question}</div>
            ${promptHTML}
        </div>
        <div class="dc-choices">
            ${q.choices.map((c,i)=>`
                <button class="dc-choice" onclick="answerSelfCheck(${i})">
                    <span class="dc-choice-num">${i+1}</span>
                    <span class="dc-choice-text">${c}</span>
                </button>
            `).join('')}
        </div>
    </div>`;
    window.scrollTo({top:0,behavior:'smooth'});
}

function answerSelfCheck(choiceIdx){
    const sc=state.selfCheck;
    if(!sc)return;
    const q=sc.questions[sc.idx];
    const isCorrect=choiceIdx===q.correctIndex;
    
    sc.answers.push({questionIdx:sc.idx,choiceIdx,correct:isCorrect,question:q});
    saveSelfCheckProgress(); // 진행 저장 (도중에 나가도 이어 풀기 가능)
    
    const buttons=document.querySelectorAll('.dc-choice');
    buttons.forEach((btn,i)=>{
        btn.disabled=true;
        if(i===q.correctIndex)btn.classList.add('dc-choice-correct');
        if(i===choiceIdx&&!isCorrect)btn.classList.add('dc-choice-wrong');
    });
    
    if(isCorrect){playCorrectSound&&playCorrectSound();}
    else{playWrongSound&&playWrongSound();}
    
    setTimeout(()=>{
        sc.idx++;
        if(sc.idx>=sc.questions.length)renderSelfCheckResult();
        else renderSelfCheck();
    },isCorrect?700:1200);
}

function renderSelfCheckResult(){
    const sc=state.selfCheck;
    const vfs=getVocabFlowSettings();
    const total=sc.questions.length;
    const correct=sc.answers.filter(a=>a.correct).length;
    const score=Math.round(correct/total*100);
    const passedTarget=score>=vfs.selfCheck.target;
    
    // 룰 적용:
    //  - 1회차 목표점수 이상 → 통과, 실전평가 잠금해제
    //  - 1회차 목표점수 미만 → 점수만 표시, 재시험 1회 가능
    //  - 2회차 (재시험) → 점수 무관 잠금해제, 추가 재시험 불가
    const prevRec=getSelfCheckScore();
    const prevAttempts=prevRec?prevRec.attempts||0:0;
    const isRetake=prevAttempts>=1; // 이번이 재시험(2회차)인지
    const unlocked=passedTarget||isRetake; // 잠금해제 조건
    
    // 잠금해제면 passed:true로 저장 → student.html이 실전평가 잠금해제
    saveSelfCheckScore(score,unlocked);
    clearSelfCheckProgress();
    
    const wrongs=sc.answers.filter(a=>!a.correct);
    
    // 헤더 제목/이모지
    let emoji,title,subtitle;
    if(passedTarget){
        emoji='🏆';
        title='셀프체크 통과! 훈련 종료';
        subtitle=`${score}점 · 목표 ${vfs.selfCheck.target}점`;
    } else if(isRetake){
        emoji='🎯';
        title='재시험 완료! 실전평가 잠금해제';
        subtitle=`${score}점 · 재시험 완료 (점수 무관 잠금해제)`;
    } else {
        emoji='📝';
        title='재시험이 필요해요 (1회만 가능)';
        subtitle=`${score}점 · 목표 ${vfs.selfCheck.target}점`;
    }
    
    document.getElementById('app').innerHTML=`<div class="summary-screen">
        <div class="summary-emoji">${emoji}</div>
        <div class="summary-title">${title}</div>
        <div class="summary-sub">${subtitle}</div>
        <div class="summary-stats">
            <div class="summary-stat"><div class="summary-stat-num">${total}</div><div class="summary-stat-label">전체</div></div>
            <div class="summary-stat"><div class="summary-stat-num" style="color:var(--green-d)">${correct}</div><div class="summary-stat-label">정답</div></div>
            <div class="summary-stat"><div class="summary-stat-num" style="color:var(--orange)">${total-correct}</div><div class="summary-stat-label">오답</div></div>
        </div>
        
        ${unlocked?`<div style="margin-top:20px;padding:18px;background:#D1FAE5;border:1px solid #10B981;border-radius:12px;text-align:center">
            <div style="font-size:14px;font-weight:700;color:#065F46;margin-bottom:6px">🎯 실전평가 잠금해제!</div>
            <div style="font-size:13px;color:#047857">학습일정의 단어 <b>실전</b> 칸에 자동으로 활성화됩니다.<br>같은 단어로 새 문제 ${vfs.realExam.total}개를 풀어보세요.</div>
        </div>`:`<div style="margin-top:20px;padding:18px;background:#FEF3C7;border:1px solid #F59E0B;border-radius:12px;text-align:center">
            <div style="font-size:14px;font-weight:700;color:#92400E;margin-bottom:6px">⚠️ ${vfs.selfCheck.target}점 미만 — 재시험 1회 가능</div>
            <div style="font-size:13px;color:#78350F">재시험 점수와 무관하게 실전평가가 잠금해제됩니다.<br>재시험 안 보면 실전평가는 잠금 유지됩니다.</div>
        </div>`}
        
        ${wrongs.length>0?`
        <div class="word-list-section" style="border-color:#EF4444;background:#FEF2F2;text-align:left">
            <div class="word-list-header"><span style="color:#991B1B">❌ 틀린 문제 (${wrongs.length}개)</span></div>
            <div style="padding:0 4px">
                ${wrongs.map(a=>{
                    const q=a.question;
                    const myAnswer=q.choices[a.choiceIdx];
                    const correctAnswer=q.choices[q.correctIndex];
                    let promptText='';
                    if(q.type==='meaning')promptText=`<b>${q.prompt}</b> = ?`;
                    else if(q.type==='word')promptText=`"${q.prompt}" = ?`;
                    else promptText=`<i>${q.prompt}</i>`;
                    return `<div style="padding:10px;border-bottom:1px solid #FCA5A5;font-size:13px">
                        <div style="margin-bottom:6px">${promptText}</div>
                        <div style="color:#991B1B">내 답: ${myAnswer}</div>
                        <div style="color:#10B981">정답: ${correctAnswer} <span style="color:var(--gray);font-weight:400">(${q.word.en} = ${q.word.ko})</span></div>
                    </div>`;
                }).join('')}
            </div>
        </div>`:''}
        
        <div class="summary-cta" style="margin-top:20px;flex-direction:column;gap:8px">
            ${!unlocked?`<button class="nav-btn nav-btn-primary" onclick="startSelfCheck()" style="background:#A855F7;border-color:#A855F7;width:100%">↺ 재시험 (1/1회)</button>`:''}
            <button class="nav-btn" onclick="goBack()" style="width:100%">📅 학습일정으로</button>
        </div>
    </div>`;
    window.scrollTo({top:0,behavior:'smooth'});
}

function _realExamStorageKey(){
    if(isPreview){
        const pid=typeof getPreviewId==='function'?getPreviewId():'pv';
        return 'rl_pv_'+pid+'_vc_realexam';
    }
    return 'rl_vc_realexam';
}

function saveRealExamScore(score){
    if(isPreview) return; // 어드민 미리보기 모드는 데이터 저장 차단 (학생 실 데이터 보호)
    try{
        const key=_realExamStorageKey();
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        const k=_selfCheckKey(); // 동일 키 (deck/startDay_homework)
        const prev=all[k]||{attempts:0,bestScore:0,history:[]};
        const hist=(prev.history||[]).slice();
        hist.push({score:score,date:Date.now()});
        if(hist.length>10)hist.splice(0,hist.length-10);
        all[k]={
            score:score,
            bestScore:Math.max(score,prev.bestScore),
            attempts:prev.attempts+1,
            lastAttempt:new Date().toISOString(),
            deckId:state.deck.id,
            startDay:startDayNum,
            homework:homeworkSize,
            history:hist
        };
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){console.error('실전평가 점수 저장 실패:',e);}
}

// 실전평가 진행 상태 저장 (이어 풀기용)
function _realExamProgressKey(){
    if(isPreview)return 'rl_pv_'+studentId+'_vc_realexam_progress';
    return 'rl_vc_realexam_progress';
}
function saveRealExamProgress(){
    if(isPreview) return; // 어드민 미리보기 모드는 데이터 저장 차단 (학생 실 데이터 보호)
    if(!state.realExam)return;
    try{
        const key=_realExamProgressKey();
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        all[_selfCheckKey()]={
            questions:state.realExam.questions,
            idx:state.realExam.idx,
            answers:state.realExam.answers,
            timestamp:Date.now()
        };
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){console.error('실전평가 진행 저장 실패:',e);}
}
function loadRealExamProgress(){
    try{
        const all=JSON.parse(RL_STORE.get(_realExamProgressKey())||'{}');
        return all[_selfCheckKey()]||null;
    }catch(e){return null;}
}
function clearRealExamProgress(){
    try{
        const key=_realExamProgressKey();
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        delete all[_selfCheckKey()];
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){}
}

function startRealExam(){
    // 진행 중인 실전평가 복원 (이어 풀기)
    const saved=loadRealExamProgress();
    if(saved&&saved.idx<saved.questions.length){
        state.realExam={
            questions:saved.questions,
            idx:saved.idx,
            answers:saved.answers,
            startTime:Date.now()
        };
        renderRealExam();
        return;
    }
    
    // 셀프체크와 동일하게 단어 누적
    const vfs=getVocabFlowSettings();
    const re=vfs.realExam;
    
    const allWords=[];
    for(let i=0;i<homeworkSize;i++){
        const dayNum=startDayNum+i;
        const dayObj=state.deck.days[dayNum-1];
        if(!dayObj)continue;
        const dayKey='rl_vocab_day_'+state.deck.id+'_'+dayObj.id;
        try{
            const words=JSON.parse(RL_STORE.get(dayKey)||'[]');
            words.forEach(w=>allWords.push(w));
        }catch(e){}
    }
    
    if(allWords.length<4){alert('실전평가에 사용할 단어가 부족합니다');return;}
    
    const total=re.total;
    const r=re.ratio;
    const cMeaning=Math.round(total*r.meaning/100);
    const cWord=Math.round(total*r.word/100);
    const cBlank=total-cMeaning-cWord;
    
    const shuffled=_shuffle(allWords);
    const questions=[];
    let pickIdx=0;
    const nextWord=()=>{const w=shuffled[pickIdx%shuffled.length];pickIdx++;return w;};
    
    for(let i=0;i<cMeaning;i++){const q=_makeMeaningQ(nextWord(),allWords);if(q)questions.push(q);}
    for(let i=0;i<cWord;i++){const q=_makeWordQ(nextWord(),allWords);if(q)questions.push(q);}
    for(let i=0;i<cBlank;i++){const q=_makeBlankQ(nextWord(),allWords);if(q)questions.push(q);}
    
    state.realExam={questions:_shuffle(questions),idx:0,answers:[],startTime:Date.now()};
    renderRealExam();
}

function answerRealExam(choiceIdx){

// ────────────────────────────────────────────────────────────────────────
// 두 모드:
//   - train: 주간평가 훈련 (1회차, 같은 풀에서 새 문제)
//   - exam:  주간평가 실전 (2회차, train 통과 후 활성, 다시 셔플)
// 차이점:
//   - 셀프체크: homeworkSize 기반 (한 수업 단위 누적)
//   - 주간평가: weekStart~weekEnd 범위 (그 주 학습 전체 누적)
// 문제 분배:
//   - total ÷ DAY 수 = DAY당 문제 수 (균등 분배)
//   - 각 DAY 내에서 30/30/40 비율 적용
// ════════════════════════════════════════════════════════════════════════

function _weeklyExamStorageKey(mode){
    // mode: 'train' or 'exam'
    const base='vc_weeklyexam_'+mode;
    if(isPreview){
        const pid=typeof getPreviewId==='function'?getPreviewId():'pv';
        return 'rl_pv_'+pid+'_'+base;
    }
    return 'rl_'+base;
}

function _weeklyExamKey(){
    // 키: deck_id + weekStart_weekEnd (그 주 범위)
    return (state.deck?state.deck.id:deckId)+'/'+weekStart+'_'+weekEnd;
}

function _weeklyExamProgressKey(mode){
    return _weeklyExamStorageKey(mode)+'_progress';
}

function saveWeeklyExamProgress(){
    if(isPreview) return; // 어드민 미리보기 모드는 데이터 저장 차단 (학생 실 데이터 보호)
    if(!state.weeklyExam)return;
    try{
        const key=_weeklyExamProgressKey(state.weeklyExam.mode);
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        all[_weeklyExamKey()]={
            questions:state.weeklyExam.questions,
            idx:state.weeklyExam.idx,
            answers:state.weeklyExam.answers,
            startTime:state.weeklyExam.startTime
        };
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){console.error('주간평가 진행 저장 실패:',e);}
}

function loadWeeklyExamProgress(mode){
    try{
        const all=JSON.parse(RL_STORE.get(_weeklyExamProgressKey(mode))||'{}');
        return all[_weeklyExamKey()]||null;
    }catch(e){return null;}
}

function clearWeeklyExamProgress(mode){
    try{
        const key=_weeklyExamProgressKey(mode);
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        delete all[_weeklyExamKey()];
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){}
}

function saveWeeklyExamScore(mode,score,passed){
    if(isPreview) return; // 어드민 미리보기 모드는 데이터 저장 차단 (학생 실 데이터 보호)
    try{
        const key=_weeklyExamStorageKey(mode);
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        const k=_weeklyExamKey();
        const prev=all[k]||{attempts:0,bestScore:0,history:[]};
        const hist=(prev.history||[]).slice();
        hist.push({score:score,passed:!!passed,date:Date.now()});
        if(hist.length>10)hist.splice(0,hist.length-10);
        all[k]={
            attempts:prev.attempts+1,
            bestScore:Math.max(prev.bestScore,score),
            lastScore:score,
            lastPassed:!!passed,
            lastDate:Date.now(),
            history:hist
        };
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){console.error('주간평가 점수 저장 실패:',e);}
}

// 주간평가 시작 (mode: 'train' or 'exam')
function startWeeklyExam(mode){
    // train 모드만 exam 잠금 해제 검증 필요
    if(mode==='exam'){
        const trainKey=_weeklyExamStorageKey('train');
        try{
            const allTrain=JSON.parse(RL_STORE.get(trainKey)||'{}');
            const trainRec=allTrain[_weeklyExamKey()];
            const vfsCheck=getVocabFlowSettings();
            if(!trainRec||(trainRec.bestScore<vfsCheck.weeklyExam.target&&!trainRec.adminCompleted)){
                alert('주간평가 훈련을 먼저 통과(목표 점수 이상)해야 실전을 응시할 수 있습니다.');
                return;
            }
        }catch(e){alert('주간평가 훈련 기록을 확인할 수 없습니다.');return;}
    }
    
    // 진행 중인 평가 복원 (이어 풀기)
    const saved=loadWeeklyExamProgress(mode);
    if(saved&&saved.idx<saved.questions.length){
        state.weeklyExam={
            mode:mode,
            questions:saved.questions,
            idx:saved.idx,
            answers:saved.answers,
            startTime:saved.startTime||Date.now()
        };
        renderWeeklyExam();
        return;
    }
    
    const vfs=getVocabFlowSettings();
    const we=vfs.weeklyExam;
    
    // 1) 각 DAY별로 단어 그룹 수집 (균등 추출용)
    const dayGroups=[]; // [[day1단어들], [day2단어들], ...]
    for(let dayNum=weekStart;dayNum<=weekEnd;dayNum++){
        const dayObj=state.deck.days[dayNum-1];
        if(!dayObj)continue;
        const dayKey='rl_vocab_day_'+state.deck.id+'_'+dayObj.id;
        try{
            const words=JSON.parse(RL_STORE.get(dayKey)||'[]');
            if(words&&words.length>0)dayGroups.push(words);
        }catch(e){}
    }
    
    if(dayGroups.length===0){
        alert('주간평가에 사용할 단어가 없습니다.');
        return;
    }
    
    // 2) 전체 단어 풀 (distractor 풀로 사용)
    const allWords=dayGroups.flat();
    if(allWords.length<4){
        alert('주간평가에 사용할 단어가 부족합니다 (최소 4개 필요)');
        return;
    }
    
    const total=we.total;
    const r=we.ratio;
    
    // 3) DAY 균등 분배 — total ÷ DAY 수, 나머지는 앞 DAY부터 1개씩
    const numDays=dayGroups.length;
    const basePerDay=Math.floor(total/numDays);
    const remainder=total-basePerDay*numDays;
    
    // 4) 각 DAY 내에서 30/30/40 비율 적용
    const questions=[];
    dayGroups.forEach((dayWords,dayIdx)=>{
        const dayCount=basePerDay+(dayIdx<remainder?1:0);
        if(dayCount===0)return;
        const cMeaning=Math.round(dayCount*r.meaning/100);
        const cWord=Math.round(dayCount*r.word/100);
        const cBlank=dayCount-cMeaning-cWord;
        
        const shuffled=_shuffle(dayWords);
        let pickIdx=0;
        const nextWord=()=>{const w=shuffled[pickIdx%shuffled.length];pickIdx++;return w;};
        
        for(let i=0;i<cMeaning;i++){const q=_makeMeaningQ(nextWord(),allWords);if(q)questions.push(q);}
        for(let i=0;i<cWord;i++){const q=_makeWordQ(nextWord(),allWords);if(q)questions.push(q);}
        for(let i=0;i<cBlank;i++){const q=_makeBlankQ(nextWord(),allWords);if(q)questions.push(q);}
    });
    
    state.weeklyExam={
        mode:mode,
        questions:_shuffle(questions),
        idx:0,
        answers:[],
        startTime:Date.now()
    };
    renderWeeklyExam();
}

function renderWeeklyExam(){
    const we=state.weeklyExam;
    if(!we)return;
    if(we.idx>=we.questions.length){renderWeeklyExamResult();return;}
    
    const q=we.questions[we.idx];
    const progress=Math.round((we.idx/we.questions.length)*100);
    
    let promptHTML='';
    if(q.type==='meaning')promptHTML=`<div class="dc-prompt-word">${q.prompt}</div>`;
    else if(q.type==='word')promptHTML=`<div class="dc-prompt-meaning">"${q.prompt}"</div>`;
    else if(q.type==='blank'){
        promptHTML=`<div class="dc-prompt-example">${q.prompt}</div>
            ${q.promptKo?`<div class="dc-prompt-example-ko">↳ ${q.promptKo}</div>`:''}`;
    }
    
    const typeLabel={meaning:'단어 → 뜻',word:'뜻 → 단어',blank:'예문 빈칸'}[q.type];
    const typeColor={meaning:'#3B82F6',word:'#A855F7',blank:'#F59E0B'}[q.type];
    const modeLabel=we.mode==='train'?'🟠 주간평가 (훈련)':'🟠 주간평가 (실전)';
    
    document.getElementById('app').innerHTML=`
    <div class="dc-screen">
        <div style="text-align:center;margin-bottom:6px;font-size:13px;color:#F59E0B;font-weight:700">${modeLabel}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;background:${typeColor}"></div></div>
        <div class="dc-header">
            <span class="dc-progress-text">${we.idx+1} / ${we.questions.length}</span>
            <span class="dc-type-badge" style="background:${typeColor}">${typeLabel}</span>
        </div>
        <div class="dc-card">
            <div class="dc-question">${q.question}</div>
            ${promptHTML}
        </div>
        <div class="dc-choices">
            ${q.choices.map((c,i)=>`
                <button class="dc-choice" onclick="answerWeeklyExam(${i})">
                    <span class="dc-choice-num">${i+1}</span>
                    <span class="dc-choice-text">${c}</span>
                </button>
            `).join('')}
        </div>
    </div>`;
    window.scrollTo({top:0,behavior:'smooth'});
}

function answerWeeklyExam(choiceIdx){
    const we=state.weeklyExam;
    if(!we)return;
    const q=we.questions[we.idx];
    const isCorrect=choiceIdx===q.correctIndex;
    we.answers.push({questionIdx:we.idx,choiceIdx,correct:isCorrect,question:q});
    saveWeeklyExamProgress();
    
    const buttons=document.querySelectorAll('.dc-choice');
    buttons.forEach((btn,i)=>{
        btn.disabled=true;
        if(i===q.correctIndex)btn.classList.add('dc-choice-correct');
        if(i===choiceIdx&&!isCorrect)btn.classList.add('dc-choice-wrong');
    });
    
    if(isCorrect){playCorrectSound&&playCorrectSound();}
    else{playWrongSound&&playWrongSound();}
    
    setTimeout(()=>{
        we.idx++;
        if(we.idx>=we.questions.length)renderWeeklyExamResult();
        else renderWeeklyExam();
    },isCorrect?700:1200);
}

function renderWeeklyExamResult(){
    const we=state.weeklyExam;
    const vfs=getVocabFlowSettings();
    const total=we.questions.length;
    const correct=we.answers.filter(a=>a.correct).length;
    const score=Math.round(correct/total*100);
    const passed=score>=vfs.weeklyExam.target;
    const isTrain=we.mode==='train';
    
    saveWeeklyExamScore(we.mode,score,passed);
    clearWeeklyExamProgress(we.mode);
    
    const wrongs=we.answers.filter(a=>!a.correct);
    
    document.getElementById('app').innerHTML=`<div class="summary-screen">
        <div class="summary-emoji">${passed?'🏆':'📝'}</div>
        <div class="summary-title">주간평가 ${isTrain?'훈련':'실전'} 완료!</div>
        <div class="summary-sub">${score}점 · 목표 ${vfs.weeklyExam.target}점 ${passed?'· 통과':''}</div>
        <div class="summary-stats">
            <div class="summary-stat"><div class="summary-stat-num">${total}</div><div class="summary-stat-label">전체</div></div>
            <div class="summary-stat"><div class="summary-stat-num" style="color:var(--green-d)">${correct}</div><div class="summary-stat-label">정답</div></div>
            <div class="summary-stat"><div class="summary-stat-num" style="color:var(--orange)">${total-correct}</div><div class="summary-stat-label">오답</div></div>
        </div>
        
        ${isTrain&&passed?`<div style="margin-top:20px;padding:18px;background:#FEF3C7;border:1px solid #F59E0B;border-radius:12px;text-align:center">
            <div style="font-size:14px;font-weight:700;color:#92400E;margin-bottom:6px">🟠 주간평가 실전 잠금해제!</div>
            <div style="font-size:13px;color:#B45309">학습일정의 평가일 단어 <b>실전</b> 칸에 자동으로 활성화됩니다.<br>같은 범위로 새 문제 ${vfs.weeklyExam.total}개를 풀어보세요.</div>
        </div>`:''}
        
        ${wrongs.length>0?`
        <div class="word-list-section" style="border-color:#EF4444;background:#FEF2F2;text-align:left">
            <div class="word-list-header"><span style="color:#991B1B">❌ 틀린 문제 (${wrongs.length}개)</span></div>
            <div style="padding:0 4px">
                ${wrongs.map(a=>{
                    const q=a.question;
                    const myAnswer=q.choices[a.choiceIdx];
                    const correctAnswer=q.choices[q.correctIndex];
                    let promptText='';
                    if(q.type==='meaning')promptText=`<b>${q.prompt}</b> = ?`;
                    else if(q.type==='word')promptText=`"${q.prompt}" = ?`;
                    else promptText=`<i>${q.prompt}</i>`;
                    return `<div style="padding:10px;border-bottom:1px solid #FCA5A5;font-size:13px">
                        <div style="margin-bottom:6px">${promptText}</div>
                        <div style="color:#991B1B">내 답: ${myAnswer}</div>
                        <div style="color:#10B981">정답: ${correctAnswer} <span style="color:var(--gray);font-weight:400">(${q.word.en} = ${q.word.ko})</span></div>
                    </div>`;
                }).join('')}
            </div>
        </div>`:''}
        
        <div class="summary-cta" style="margin-top:20px;flex-direction:column;gap:8px">
            ${!passed?`<button class="nav-btn nav-btn-primary" onclick="startWeeklyExam('${we.mode}')" style="background:#F59E0B;border-color:#F59E0B;width:100%">↺ 다시 도전</button>`:''}
            <button class="nav-btn" onclick="goBack()" style="width:100%">📅 학습일정으로</button>
        </div>
    </div>`;
    window.scrollTo({top:0,behavior:'smooth'});
}

// 📋 종합 학습 요약 화면 — 셀프체크 통과 후 점수 클릭 시 표시

// 시도별 점수 히스토리 렌더링 (재사용 헬퍼)
function _renderScoreHistory(rec,targetScore){
    if(!rec||!rec.history||rec.history.length<2)return '';
    // 마지막 5개만 표시
    const hist=rec.history.slice(-5);
    const startIdx=rec.history.length-hist.length+1;
    const items=hist.map((h,i)=>{
        const passed=h.passed!==undefined?h.passed:(targetScore?h.score>=targetScore:true);
        const color=passed?'#10B981':'#F59E0B';
        const ordinal=startIdx+i;
        return `<span style="color:${color};font-weight:600">${ordinal}차 ${h.score}점</span>`;
    });
    return `<div style="font-size:11px;color:var(--gray);margin-top:6px;line-height:1.7">📊 시도 기록: ${items.join(' → ')}</div>`;
}

                <div class="summary-day-item">
                    <div class="summary-day-label">최고 점수</div>
                    <div class="summary-day-value" style="color:var(--green-d);font-size:22px">${reRec.bestScore}점</div>
                </div>
                <div class="summary-day-item">
                    <div class="summary-day-label">시도 횟수 · 목표</div>
                    <div class="summary-day-value">${reRec.attempts}회 · ${vfs.realExam.target}점</div>
                </div>
            </div>
            ${_renderScoreHistory(reRec,vfs.realExam.target)}
            <div style="margin-top:10px;padding-top:10px;border-top:1px dashed #FDE68A">
                <button class="nav-btn nav-btn-primary" style="background:#F59E0B;border-color:#F59E0B;width:100%;font-size:13px;padding:8px" onclick="relearnRealExam()">↺ 실전평가 다시 풀기</button>
            </div>
        </div>
        `:''}
        
        <div class="summary-cta" style="margin-top:24px;flex-direction:column;gap:8px">
            <button class="nav-btn" onclick="goBack()" style="width:100%">📅 학습일정으로</button>
        </div>
    </div>`;
    window.scrollTo({top:0,behavior:'smooth'});
}

// ════════════════════════════════════════════════════════════════════════
// 🔄 재학습 — 학습 기록 화면에서 클릭한 항목으로 재진입
// ────────────────────────────────────────────────────────────────────────
// 점수/통과 상태는 보존하고 새 시도로 누적됨 (덮어쓰기 X)
// ════════════════════════════════════════════════════════════════════════

// 해당 DAY의 단어를 로드하고 state.day/state.words 설정
function _switchToDay(dayNum){
    const dayObj=state.deck.days[dayNum-1];
    if(!dayObj){alert('DAY를 찾을 수 없습니다.');return null;}
    const dayKey='rl_vocab_day_'+state.deck.id+'_'+dayObj.id;
    let words=[];
    try{words=JSON.parse(RL_STORE.get(dayKey)||'[]');}catch(e){}
    if(!words||words.length===0){alert('단어가 없습니다.');return null;}
    state.day={id:dayObj.id,name:dayObj.name,words:words};
    state.words=words.slice();
    return state.day;
}

// 플래시카드부터 다시 시작 (단어 한 장씩 넘기기)
function relearnFlash(dayNum){
    if(!_switchToDay(dayNum))return;
    // 학습 진도 초기화 (외운 단어 카운트는 그대로 유지하고 싶다면 progress는 안 건드림)
    state.idx=0;state.stage=1;
    state.knew=0;state.didntKnow=0;
    state.knewSet=new Set();state.didntKnowSet=new Set();
    state.reviewQueue=[];
    state.currentRound=1;
    state.roundKnewWords=[];
    state.done=false;
    state.gamesCompleted=new Set(); // 게임 완료 플래그 리셋 (다시 게임도 가능)
    render();
}

// 게임 화면 진입 (단어를 모두 외운 상태로 → 게임 선택 화면)
function relearnGames(dayNum){
    if(!_switchToDay(dayNum))return;
    // 모든 단어 외운 상태로 설정 → 게임 화면 진입
    state.idx=0;state.stage=1;
    state.knew=state.words.length;
    state.knewSet=new Set(state.words.map(w=>w.en));
    state.didntKnow=0;
    state.didntKnowSet=new Set();
    state.reviewQueue=[];
    state.currentRound=1;
    state.roundKnewWords=[];
    state.done=true; // 학습 완료 결과 화면 → 게임 버튼 노출
    state.gamesCompleted=new Set();
    // 기존 게임 완료 기록 복원 (게임 버튼 ✓ 표시용)
    try{
        const gs=JSON.parse(RL_STORE.get('rl_vocab_game_scores')||'{}');
        const dk=state.deck.id+'/'+state.day.id;
        if(gs[dk])Object.keys(gs[dk]).forEach(g=>state.gamesCompleted.add(g));
    }catch(e){}
    renderSummary();
}

// 데이체크 바로 시작
function relearnDayCheck(dayNum){
    if(!_switchToDay(dayNum))return;
    // 데이체크 진입 조건: 게임 N개 완료. 재학습은 우회 (이미 진행한 게임 기록 있을 것)
    try{
        const gs=JSON.parse(RL_STORE.get('rl_vocab_game_scores')||'{}');
        const dk=state.deck.id+'/'+state.day.id;
        if(gs[dk])Object.keys(gs[dk]).forEach(g=>state.gamesCompleted.add(g));
    }catch(e){}
    // 데이체크 진행 기록 초기화 (새로 출제)
    clearDayCheckProgress();
    startDayCheck();
}

// 셀프체크 다시 풀기 (새로 출제)
function relearnSelfCheck(){
    // 진행 기록 초기화 → 새 문제 생성
    try{
        const key=_selfCheckProgressKey();
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        delete all[_selfCheckKey()];
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){}
    startSelfCheck();
}

// 실전평가 다시 풀기 (새로 출제)
function relearnRealExam(){
    try{
        const key=_realExamProgressKey();
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        delete all[_selfCheckKey()];
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){}
    startRealExam();
}

// RLStorage 준비를 기다린 후 데이터 로드 (IndexedDB가 활성화된 후 정상 작동)
async function initVocabLearn(){
    try{await RLStorage.init();}catch(e){console.error('RLStorage init failed:',e);}
    
    // 📦 GitHub의 curriculum.json 자동 동기화
    if(window.syncCurriculum){
        try{await window.syncCurriculum();}catch(e){console.warn('Curriculum sync failed:',e);}
    }
    
    loaded=loadDay();
    if(loaded.error){
        document.getElementById('app').innerHTML=`<div class="error-box"><div style="font-size:36px;margin-bottom:10px">⚠️</div><div style="font-size:16px;font-weight:700;margin-bottom:6px">${loaded.error}</div><div style="font-size:13px">관리자에게 문의하세요.</div></div>`;
        document.getElementById('topbarMeta').textContent='오류';
        return;
    }
    
    // 🟠 주간평가 모드 (그 주 학습 DAY 누적 평가 — train/exam)
    if(weeklyMode==='train'||weeklyMode==='exam'){
        state.deck=loaded.deck;
        state.day=loaded.day;
        state.words=loaded.day.words.slice();
        const labelMode=weeklyMode==='train'?'훈련':'실전';
        document.getElementById('topbarTitle').textContent=`🟠 주간평가 (${labelMode})`;
        document.getElementById('topbarMeta').textContent=loaded.deck.name+` · DAY${weekStart}${weekEnd>weekStart?'~'+weekEnd:''} · ${getVocabFlowSettings().weeklyExam.total}문제`;
        startWeeklyExam(weeklyMode);
        return;
    }
    
    // 실전평가 모드면 바로 실전평가 시작 (플래시/게임/데이체크 건너뜀)
    if(isExamMode){
        state.deck=loaded.deck;
        state.day=loaded.day;
        state.words=loaded.day.words.slice();
        document.getElementById('topbarTitle').textContent='🏆 실전평가';
        document.getElementById('topbarMeta').textContent=loaded.deck.name+` · DAY${startDayNum}${homeworkSize>1?'~'+(startDayNum+homeworkSize-1):''} · ${getVocabFlowSettings().realExam.total}문제`;
        startRealExam();
        return;
    }
    
    // 종합 요약 모드 (셀프체크 점수 클릭 시) — DAY1·DAY2·게임·셀프체크·실전평가 모두 표시
    if(isSummaryMode){
        state.deck=loaded.deck;
        state.day=loaded.day;
        document.getElementById('topbarTitle').textContent='📋 학습 기록';
        document.getElementById('topbarMeta').textContent=loaded.deck.name+` · DAY${startDayNum}${homeworkSize>1?'~'+(startDayNum+homeworkSize-1):''}`;
        renderLearningSummary();
        return;
    }
    
    // 일반 학습 모드 — 진도 복원 분기
    state.deck=loaded.deck;
    state.day=loaded.day;
    state.words=loaded.day.words.slice();
    document.getElementById('topbarTitle').textContent=loaded.day.name+' · 학습';
    document.getElementById('topbarMeta').textContent=loaded.deck.name+' · '+loaded.day.words.length+'단어';
    
    // 1) 게임 완료 정보 복원 (게임 점수 있으면 완료한 것으로)
    try{
        const gameScores=JSON.parse(RL_STORE.get('rl_vocab_game_scores')||'{}');
        const dayKey=state.deck.id+'/'+state.day.id;
        if(gameScores[dayKey]){
            Object.keys(gameScores[dayKey]).forEach(g=>state.gamesCompleted.add(g));
        }
    }catch(e){}
    
    // 2) 데이체크 통과 결과 화면 분기 — 제거됨
    //    학생 본인이든 어드민 미리보기든 진입 시 항상 플래시모드 시작.
    //    결과 화면은 학습 종료 직후에만 표시 (옛 데이터로 인한 오인식 방지).
    
    // 3) 학습 진도 (knewSet) 복원 — 진행 중 데이터만 사용
    //    외운 단어 있으면 그 단어들은 건너뛰고 나머지 단어부터 학습 (진도 유지)
    //    모든 단어 외운 상태로 저장돼 있어도 결과 화면 안 보이고 처음부터 다시 학습
    //    어드민 미리보기는 진도 무시하고 항상 처음부터
    const progress=isPreview?null:loadLearningProgress();
    
    if(progress&&progress.knew&&progress.knew.length>0){
        const knewSet=new Set(progress.knew);
        const remaining=state.words.filter(w=>!knewSet.has(w.en));
        if(remaining.length>0){
            // 일부만 외움 → 안 외운 단어부터 다시 학습
            startLearning(loaded.deck,loaded.day);
            state.knewSet=knewSet;
            state.knew=knewSet.size;
            state.didntKnowSet=new Set(progress.didntKnow||[]);
            state.didntKnow=state.didntKnowSet.size;
            state.words=remaining;
            state.idx=0;
            state.stage=1;
            render();
            return;
        }
        // 모든 단어 외운 상태 → 결과 화면 대신 처음부터 다시 플래시모드 시작 (학생이 자연스럽게 복습)
    }
    
    // 4) 처음 시작
    startLearning(loaded.deck,loaded.day);
}
initVocabLearn();
</script>
