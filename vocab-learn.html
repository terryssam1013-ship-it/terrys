<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>단어 학습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}
:root{
  --green:#10B981;--green-l:#D1FAE5;--green-d:#065F46;
  --orange:#F59E0B;--orange-l:#FEF3C7;
  --purple:#A855F7;--purple-l:#E9D5FF;
  --gray:#6B7280;--bg:#F5F5F0;--border:#E5E7EB;
}

.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar-back{padding:6px 12px;background:none;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--gray);font-weight:600}
.topbar-back:hover{background:var(--bg)}
.topbar-title{font-size:15px;font-weight:800}
.topbar-meta{font-size:12px;color:var(--gray)}
.preview-banner{background:linear-gradient(90deg,#F59E0B,#F97316);color:#fff;text-align:center;padding:6px 12px;font-size:12px;font-weight:700;letter-spacing:.3px}

.app{flex:1;display:flex;flex-direction:column;max-width:600px;width:100%;margin:0 auto;padding:0 16px}

.progress-bar{margin-top:16px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--gray)}
.progress-bar-inner{flex:1;height:6px;background:var(--border);border-radius:99px;margin:0 12px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--green);transition:width .3s}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:var(--green-l);color:var(--green-d);padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700}

.card{margin-top:24px;background:#fff;border:2px solid var(--green);border-radius:18px;padding:32px 24px;min-height:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.04)}

.card-word{font-size:42px;font-weight:800;margin-bottom:12px;letter-spacing:-.02em}
.card-meaning{font-size:24px;font-weight:700;color:var(--green-d);margin-bottom:24px}
.card-divider{width:60%;height:1px;background:var(--border);margin:16px 0}
.card-example-label{font-size:12px;color:var(--gray);margin-bottom:8px}
.card-example{font-size:17px;font-style:italic;font-weight:500;line-height:1.6;color:#374151;margin-bottom:8px;max-width:100%}
.card-example mark{background:var(--orange-l);color:#92400E;padding:1px 4px;border-radius:3px;font-style:normal}
.card-example-ko{font-size:14px;color:var(--gray);line-height:1.6}
.card-example-ko mark{background:var(--purple-l);color:#7C3AED;padding:1px 4px;border-radius:3px}
.card-stage-btn{background:var(--green);color:#fff;border:none;padding:12px 28px;border-radius:99px;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px}
.card-stage-btn:hover{background:var(--green-d)}

/* ========== 발음 버튼 (TTS) ========== */
.tts-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;background:#fff;border:2px solid var(--green);border-radius:50%;cursor:pointer;font-size:16px;margin-left:10px;transition:all .15s;vertical-align:middle;color:var(--green-d);padding:0}
.tts-btn:hover{background:var(--green-l);transform:scale(1.05)}
.tts-btn:active{transform:scale(0.95)}
.tts-btn.tts-sm{width:28px;height:28px;font-size:13px;margin-left:6px}
.tts-btn.tts-orange{border-color:var(--orange);color:#92400E}
.tts-btn.tts-orange:hover{background:var(--orange-l)}

.choices{margin-top:18px;display:flex;gap:10px;justify-content:center}
.choice-btn{flex:1;max-width:220px;padding:14px;border-radius:14px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:14px;font-weight:700;transition:all .15s}
.choice-not-know{color:var(--orange);border-color:var(--orange-l)}
.choice-not-know:hover{background:var(--orange-l)}
.choice-know{color:var(--green-d);border-color:var(--green-l)}
.choice-know:hover{background:var(--green-l)}

.nav-row{margin-top:16px;display:flex;justify-content:space-between;align-items:center;padding-bottom:20px}
.nav-btn{padding:10px 18px;border:1px solid var(--border);background:#fff;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray)}
.nav-btn:hover:not(:disabled){background:var(--bg)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.nav-btn-primary{background:var(--green);color:#fff;border-color:var(--green)}
.nav-btn-primary:hover:not(:disabled){background:var(--green-d)}

.summary-screen{text-align:center;padding:40px 24px;background:#fff;border-radius:18px;margin-top:24px;border:2px solid var(--green-l)}
.summary-emoji{font-size:56px;margin-bottom:16px}
.summary-title{font-size:22px;font-weight:800;margin-bottom:8px}
.summary-sub{font-size:14px;color:var(--gray);margin-bottom:20px}
.summary-stats{display:flex;justify-content:center;gap:24px;margin:24px 0;flex-wrap:wrap}
.summary-stat{text-align:center}
.summary-stat-num{font-size:28px;font-weight:800;color:var(--green-d)}
.summary-stat-label{font-size:12px;color:var(--gray)}
.summary-cta{margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ========== 단어 리스트 (완료 화면) ========== */
.word-list-section{margin-top:20px;padding:14px;background:#fff;border:1px solid var(--border);border-radius:14px;text-align:left}
.word-list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14px;font-weight:700}
.word-chip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px}
.word-chip{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;transition:all .1s;border:1px solid;font-family:inherit;text-align:center;min-height:54px;line-height:1.2}
.word-chip:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.word-chip:active{transform:scale(.97)}
.word-chip-orange{background:var(--orange-l);border-color:var(--orange);color:#92400E}
.word-chip-green{background:var(--green-l);border-color:var(--green);color:var(--green-d)}
.word-chip-ko{font-size:10px;font-weight:500;opacity:.75;margin-top:2px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ========== 두더지 게임 ========== */
.mole-target{margin-top:20px;background:#fff;border:2px solid #8B4513;border-radius:18px;padding:18px;text-align:center}
.mole-target-label{font-size:12px;color:var(--gray);margin-bottom:6px}
.mole-target-ko{font-size:28px;font-weight:800;color:#5C2C0C}
.mole-grid{margin-top:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:480px;margin-left:auto;margin-right:auto}
.mole-hole{aspect-ratio:1.2/1;background:#5C2C0C;border-radius:14px;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;position:relative;overflow:hidden;font-family:inherit;border:none;transition:background .2s;min-height:90px}
.mole-hole.empty{cursor:default}
.mole-hole.mole{background:#D97706;animation:moleBoxPop .25s}
.mole-hole:active.mole{transform:scale(0.95)}
/* 두더지 캐릭터 (평소 표시) — 박스 안 적당한 크기 */
.mole-hole .mole-char{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:75%;height:75%;display:flex;align-items:center;justify-content:center;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .15s;pointer-events:none}
.mole-hole.mole .mole-char{transform:translate(-50%,-180%);opacity:0}
.mole-hole .mole-char svg{width:100%;height:100%;display:block}
/* 단어 텍스트 (활성 시) */
.mole-hole .mole-word{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;line-height:1.1;text-align:center;padding:8px;opacity:0;transform:translateY(20px);transition:opacity .2s,transform .25s cubic-bezier(.34,1.56,.64,1)}
.mole-hole.mole .mole-word{opacity:1;transform:translateY(0);transition-delay:.05s}
.mole-hole.correct-flash{background:#10B981 !important;animation:correctPulse .4s}
.mole-hole.wrong-flash{background:#7C2D12 !important;animation:wrongShake .4s}
/* 떠오르는 점수 텍스트 */
.score-float{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;pointer-events:none;z-index:10;animation:scoreFloat 1s ease-out forwards;text-shadow:0 2px 4px rgba(0,0,0,.3);white-space:nowrap}
.score-float.plus{color:#FCD34D}
.score-float.minus{color:#FCA5A5}
@keyframes scoreFloat{
    0%{transform:translate(-50%,-50%) scale(.5);opacity:0}
    20%{transform:translate(-50%,-90%) scale(1.2);opacity:1}
    100%{transform:translate(-50%,-200%) scale(.9);opacity:0}
}
@keyframes moleBoxPop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes correctPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@media(max-width:480px){
  .mole-grid{gap:8px}
  .mole-hole{min-height:80px}
  .mole-hole .mole-word{font-size:15px}
  .mole-target-ko{font-size:22px}
}

.error-box{margin-top:40px;padding:30px;background:#FEF2F2;border:1px solid #FECACA;border-radius:14px;text-align:center;color:#991B1B}

@media(max-width:480px){
  .card{padding:24px 18px;min-height:300px}
  .card-word{font-size:32px}
  .card-meaning{font-size:20px}
  .card-example{font-size:15px}
}

/* ========== 게임 모드 — 공통 ========== */
.game-header{margin-top:16px;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.game-stat{padding:6px 12px;background:#fff;border:1px solid var(--border);border-radius:99px;font-weight:700}
.game-stat.timer{background:#FEF3C7;color:#92400E;border-color:#FCD34D}
.game-stat.score{background:var(--green-l);color:var(--green-d);border-color:var(--green)}
.game-stat.combo{background:#FEE2E2;color:#991B1B;border-color:#FCA5A5}

/* ========== 속도전 ========== */
.speed-card{margin-top:24px;background:#fff;border:2px solid var(--orange);border-radius:18px;padding:36px 24px;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.speed-word{font-size:44px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.speed-prompt{font-size:13px;color:var(--gray);margin-bottom:20px}
.speed-options{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:560px;margin-left:auto;margin-right:auto}
.speed-opt{padding:18px 16px;border:2px solid var(--border);border-radius:12px;background:#fff;cursor:pointer;font-size:16px;font-weight:600;transition:all .1s;text-align:left}
.speed-opt:hover:not(:disabled){border-color:var(--orange);background:#FFF7ED}
.speed-opt.correct{background:#DCFCE7;border-color:#16A34A;color:#166534}
.speed-opt.wrong{background:#FEE2E2;border-color:#DC2626;color:#991B1B;animation:shake .3s}
.speed-opt:disabled{cursor:not-allowed}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.time-bar{height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:8px}
.time-bar-fill{height:100%;background:linear-gradient(90deg,#10B981 0%,#10B981 60%,#F59E0B 80%,#EF4444 100%);transition:width .1s linear}

/* ========== 매칭게임 (2-컬럼 매칭 / 타이머 / 4라운드) ========== */
.match-game{background:#0F0F12;border-radius:20px;padding:16px 14px;margin-top:16px;color:#E4E4E7;font-family:inherit}
.match-game-header{display:flex;justify-content:space-between;align-items:center;padding:4px 6px 10px}
.match-timer{display:flex;align-items:center;gap:8px;font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.match-timer.warning{color:var(--purple);animation:matchPulse 1s infinite}
@keyframes matchPulse{0%,100%{opacity:1}50%{opacity:.55}}
.match-score-wrap{display:flex;align-items:baseline;gap:8px}
.match-score-label{font-size:12px;font-weight:700;color:#A1A1AA;letter-spacing:.04em}
.match-score{font-size:28px;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.match-round-info{display:flex;justify-content:space-between;padding:0 6px 10px;font-size:12px;color:#A1A1AA;font-weight:600}
.match-round-info .round-name{color:var(--purple)}
.match-board{background:#1A1A20;border-radius:16px;padding:14px 10px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-tile{background:#fff;border-radius:12px;padding:14px 10px;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;position:relative;transition:all .18s;min-height:66px;user-select:none;border:2px solid transparent;font-family:inherit;width:100%;color:#1A1A1A}
.match-tile-pts{position:absolute;top:5px;right:8px;font-size:10px;font-weight:600;color:#9CA3AF;opacity:.55}
.match-tile-en{font-size:18px;font-weight:700;letter-spacing:-.005em}
.match-tile-ko{font-size:12.5px;font-weight:500;color:#3F3F46;line-height:1.4}
.match-tile:hover:not(.match-done){background:#FAFAFC;transform:translateY(-1px)}
.match-tile.match-selected{background:#F3E8FF;border-color:var(--purple);box-shadow:0 0 0 4px rgba(168,85,247,.18)}
.match-tile.match-done{background:rgba(16,185,129,.12);border-color:transparent;pointer-events:none;opacity:0;transform:scale(.92);transition:opacity .35s ease .12s,transform .35s ease .12s}
.match-tile.match-flash{background:rgba(16,185,129,.2);border-color:var(--green);box-shadow:0 0 0 4px rgba(16,185,129,.4)}
.match-tile.match-wrong{background:rgba(239,68,68,.16);border-color:#EF4444;box-shadow:0 0 0 4px rgba(239,68,68,.4);animation:matchShake .35s}
@keyframes matchShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.match-progress-wrap{display:flex;align-items:center;gap:10px;padding:12px 6px 4px}
.match-progress-bar{flex:1;height:8px;background:#27272A;border-radius:99px;overflow:hidden}
.match-progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),#D8B4FE);border-radius:99px;transition:width .35s;box-shadow:0 0 12px rgba(168,85,247,.5)}
.match-progress-text{font-size:12px;color:#A1A1AA;font-weight:600;min-width:38px;text-align:right}
.match-flash-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:72px;font-weight:900;pointer-events:none;z-index:1000;text-shadow:0 4px 24px rgba(0,0,0,.3)}
.match-flash-popup.show{animation:matchFlashPop .7s ease}
@keyframes matchFlashPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.2);opacity:1}70%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.4);opacity:0}}
.match-flash-popup.green{color:var(--green)}
.match-flash-popup.red{color:#EF4444}
@media(max-width:480px){
  .match-board{padding:10px 8px;gap:8px}
  .match-tile{padding:12px 8px;min-height:60px}
  .match-tile-en{font-size:16px}
  .match-tile-ko{font-size:11.5px}
  .match-col{gap:6px}
}

/* ========== 빈칸 채우기 ========== */
.fill-card{margin-top:24px;background:#fff;border:2px solid #3B82F6;border-radius:18px;padding:32px 24px;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.fill-example{font-size:22px;font-weight:600;line-height:1.6;margin-bottom:10px;color:#1F2937}
.fill-example-ko{font-size:14px;color:var(--gray);line-height:1.6;margin-bottom:14px}
.fill-prompt{font-size:13px;color:var(--gray);margin-top:8px}
.fill-blank{display:inline-block;min-width:60px;color:#3B82F6;font-weight:800;border-bottom:2px solid #3B82F6;padding:0 8px}

@media(max-width:480px){
  .fill-card{padding:24px 18px}
  .fill-example{font-size:18px}
}
/* ========== 데이체크 (단어 체크 시험) ========== */
.dc-screen{max-width:680px;margin:0 auto;padding:20px}
.dc-header{display:flex;justify-content:space-between;align-items:center;margin:12px 0 20px}
.dc-progress-text{font-size:14px;color:var(--gray);font-weight:600}
.dc-type-badge{padding:5px 11px;border-radius:12px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.3px}
.dc-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:28px 22px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dc-question{font-size:14px;color:var(--gray);font-weight:600;margin-bottom:18px;text-align:center}
.dc-prompt-word{font-size:34px;font-weight:800;text-align:center;color:#1A1A1A;letter-spacing:.5px;padding:8px 0}
.dc-prompt-meaning{font-size:22px;font-weight:700;text-align:center;color:#1A1A1A;line-height:1.5;padding:8px 0}
.dc-prompt-example{font-size:18px;line-height:1.7;color:#1A1A1A;font-weight:500;padding:6px 0;text-align:center}
.dc-prompt-example-ko{font-size:14px;color:var(--gray);text-align:center;margin-top:8px}
.dc-ko-hint{background:#F3E8FF;color:#7C3AED;padding:1px 6px;border-radius:4px;font-weight:700}

/* 종합 학습 기록 카드 */
.summary-day-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:14px;text-align:left}
.summary-day-title{font-size:15px;font-weight:700;color:#1A1A1A;margin-bottom:10px}
.summary-day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.summary-day-item{padding:8px 10px;background:#F9FAFB;border-radius:8px}
.summary-day-label{font-size:11px;color:var(--gray);font-weight:600;margin-bottom:3px}
.summary-day-value{font-size:16px;font-weight:700;color:#1A1A1A}
.dc-choices{display:flex;flex-direction:column;gap:10px}
.dc-choice{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;text-align:left;color:#1A1A1A}
.dc-choice:hover:not(:disabled){border-color:#3B82F6;background:#EFF6FF}
.dc-choice:disabled{cursor:not-allowed;opacity:.7}
.dc-choice-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#F3F4F6;color:#6B7280;border-radius:50%;font-size:13px;font-weight:700;flex-shrink:0}
.dc-choice-text{flex:1}
.dc-choice-correct{background:#D1FAE5!important;border-color:#10B981!important;color:#065F46}
.dc-choice-correct .dc-choice-num{background:#10B981;color:#fff}
.dc-choice-wrong{background:#FEE2E2!important;border-color:#EF4444!important;color:#991B1B}
.dc-choice-wrong .dc-choice-num{background:#EF4444;color:#fff}

/* ============ 📱 모바일 화면 전반 최적화 ============ */
@media(max-width:768px){
  body{font-size:14px}
  .topbar{padding:10px 12px;gap:8px}
  .topbar-back{padding:6px 12px;font-size:13px}
  .topbar-title{font-size:14px}
  .topbar-meta{font-size:11px}
  .app{padding:14px 12px}
  .card{padding:14px;border-radius:10px}
  h1{font-size:19px!important}
  h2{font-size:17px!important}
  h3{font-size:15px!important}
  button{min-height:42px;padding:10px 14px;font-size:14px}
  .word-en{font-size:30px!important}
  .word-ko{font-size:18px!important}
  .word-example{font-size:13px!important;line-height:1.6}
  .flash-card{padding:24px 16px;min-height:280px}
  .dc-choice{padding:12px 14px;font-size:14px;gap:10px}
  .dc-choice-num{width:24px;height:24px;font-size:12px}
  .preview-banner{padding:8px 12px;font-size:12px}
}
@media(max-width:480px){
  .app{padding:10px 8px}
  .topbar{padding:8px 10px}
  .card{padding:11px}
  .word-en{font-size:26px!important}
  .word-ko{font-size:16px!important}
  .flash-card{padding:18px 12px;min-height:240px}
  .dc-choice{padding:10px 12px;font-size:13px}
  h1{font-size:17px!important}
  h2{font-size:15px!important}
  button{padding:8px 12px;font-size:13px}
}
</style>
</head>
<body>
<div id="previewBanner" class="preview-banner" style="display:none">👁 미리보기 모드 · 관리자가 학습 화면을 확인 중입니다</div>
<div class="topbar">
    <button class="topbar-back" onclick="goBack()">← 뒤로</button>
    <div style="flex:1">
        <div class="topbar-title" id="topbarTitle">단어 학습</div>
        <div class="topbar-meta" id="topbarMeta">로딩 중...</div>
    </div>
</div>

<div class="app" id="app"></div>

<script src="rl-storage.js"></script>
<script src="curriculum-sync.js"></script>
<script>
// ========== Phase 2: IndexedDB 통합 ==========
RLStorage.init().then(()=>{
    console.log('✅ IndexedDB 준비 완료');
    // RLStorage 준비 완료 후 페이지 재초기화 (데이터 새로 로드)
    if(typeof reloadAfterStorageReady === 'function') reloadAfterStorageReady();
}).catch(e=>{
    console.error('⚠️ IndexedDB 초기화 실패, localStorage로 폴백:',e);
});

const RL_STORE = {
    get(k){
        if(window.RLStorage && RLStorage.isReady()){
            const v = RLStorage.getItem(k);
            if(v !== null) return v;
        }
        return localStorage.getItem(k);
    },
    set(k, v){
        if(window.RLStorage && RLStorage.isReady()){
            RLStorage.setItem(k, v);
            return;
        }
        localStorage.setItem(k, v);
    }
};

// ========== URL 파라미터 ==========
const params=new URLSearchParams(location.search);
const deckId=params.get('deck');
const dayId=params.get('day');
const isPreview=params.get('preview')==='1';
const studentId=params.get('student')||'pv'; // 미리보기 모드의 학생 ID
function getPreviewId(){return studentId;}
// 숙제량 (한 수업에서 진행할 DAY 수) + 현재 진행 인덱스
const homeworkSize=Math.max(1,parseInt(params.get('homework'))||1);
const homeworkIdx=Math.max(1,parseInt(params.get('idx'))||1); // 1-indexed
const startDayNum=Math.max(1,parseInt(params.get('startDay'))||1); // 첫 DAY 번호
const isExamMode=params.get('exam')==='1'; // 실전평가 모드
const isSummaryMode=params.get('summary')==='1'; // 종합 요약 모드 (셀프체크 통과 후)
// 🟠 주간평가 모드 — weekly=train(주간 훈련) 또는 weekly=exam(주간 실전)
const weeklyMode=params.get('weekly')||''; // '' | 'train' | 'exam'
const weekStart=Math.max(1,parseInt(params.get('weekStart'))||1); // 그 주 첫 DAY 번호
const weekEnd=Math.max(weekStart,parseInt(params.get('weekEnd'))||weekStart); // 그 주 마지막 DAY 번호

if(isPreview){document.getElementById('previewBanner').style.display='block';}

// ========== 단어장 로드 (v2 — 분할 저장 구조 + 옛 구조 폴백) ==========
const VOCAB_INDEX_KEY='rl_vocab_index';
const VOCAB_DAY_PREFIX='rl_vocab_day_';

function loadDay(){
    try{
        // 1) 신 구조 (인덱스 + DAY별 분리) 우선 시도
        const indexRaw=RL_STORE.get(VOCAB_INDEX_KEY);
        if(indexRaw){
            const index=JSON.parse(indexRaw);
            const meta=index[deckId];
            if(!meta)return {error:'단어장을 찾을 수 없어요.'};
            const dayMeta=(meta.days||[]).find(d=>d.id===dayId);
            if(!dayMeta)return {error:'DAY를 찾을 수 없어요.'};
            const dayKey=VOCAB_DAY_PREFIX+deckId+'_'+dayId;
            const words=JSON.parse(RL_STORE.get(dayKey)||'[]');
            if(!words||words.length===0)return {error:'단어가 없는 DAY입니다.'};
            return {
                deck:{id:meta.id,name:meta.name,createdAt:meta.createdAt,days:meta.days},
                day:{id:dayMeta.id,name:dayMeta.name,words:words}
            };
        }
        
        // 2) 옛 구조 (rl_vocab_decks 단일 키) 폴백
        const oldRaw=RL_STORE.get('rl_vocab_decks');
        if(oldRaw){
            const decks=JSON.parse(oldRaw);
            const deck=decks[deckId];
            if(!deck)return {error:'단어장을 찾을 수 없어요.'};
            const day=(deck.days||[]).find(d=>d.id===dayId);
            if(!day)return {error:'DAY를 찾을 수 없어요.'};
            if(!day.words||day.words.length===0)return {error:'단어가 없는 DAY입니다.'};
            return {deck,day};
        }
        
        return {error:'단어장 데이터가 없어요. 관리자 페이지에서 단어장을 만들어주세요.'};
    }catch(e){return {error:'데이터 로드 실패: '+e.message};}
}

let loaded=null;  // RLStorage 준비 후 실제 로드 (페이지 하단에서 처리)
// 실제 학습 시작은 페이지 하단 (함수 정의 후) 에서 처리

// ========== 학습 상태 ==========
let state={
    deck:null,day:null,words:[],
    idx:0,stage:1, // stage 1: 단어만, 4: 모든 정보 표시
    knew:0,didntKnow:0,
    knewSet:new Set(),didntKnowSet:new Set(),
    reviewQueue:[], // "모르겠어요" 누른 단어들 — 인터미션 후 다음 라운드 단어들
    currentRound:1, // 1차, 2차(복습), 3차(복습)...
    roundKnewWords:[], // 이번 라운드에서 외운 단어 (인터미션 표시용)
    done:false,
    gamesCompleted:new Set(), // 완료한 게임 종류: 'speed','match','mole'
    dayCheck:null, // 데이체크 진행 중일 때만 { questions, idx, answers, ... }
    selfCheck:null, // 셀프체크 진행 중일 때만
    realExam:null, // 실전평가 진행 중일 때만
    weeklyExam:null // 주간평가 진행 중일 때만 ({mode:'train'|'exam', questions, idx, answers})
};

// ========== vocabFlow 설정 가져오기 (admin 설정 반영) ==========
function getVocabFlowSettings(){
    const defaults={
        gamesRequired:1,
        dayCheck:{target:80, ratio:{meaning:30,word:30,blank:40}},
        selfCheck:{total:30, target:80, ratio:{meaning:30,word:30,blank:40}},
        realExam:{total:30, target:80, ratio:{meaning:30,word:30,blank:40}},
        weeklyExam:{total:60, target:80, ratio:{meaning:30,word:30,blank:40}}
    };
    try{
        const settings=JSON.parse(RL_STORE.get('rl_settings')||'{}');
        const vf=settings.vocabFlow||{};
        return {
            gamesRequired: vf.gamesRequired!==undefined?vf.gamesRequired:defaults.gamesRequired,
            dayCheck:{
                target: vf.dayCheck?.target!==undefined?vf.dayCheck.target:defaults.dayCheck.target,
                ratio: vf.dayCheck?.ratio||defaults.dayCheck.ratio
            },
            selfCheck:{
                total: vf.selfCheck?.total!==undefined?vf.selfCheck.total:defaults.selfCheck.total,
                target: vf.selfCheck?.target!==undefined?vf.selfCheck.target:defaults.selfCheck.target,
                ratio: vf.selfCheck?.ratio||defaults.selfCheck.ratio
            },
            realExam:{
                total: vf.realExam?.total!==undefined?vf.realExam.total:defaults.realExam.total,
                target: vf.realExam?.target!==undefined?vf.realExam.target:defaults.realExam.target,
                ratio: vf.realExam?.ratio||defaults.realExam.ratio
            },
            weeklyExam:{
                total: vf.weeklyExam?.total!==undefined?vf.weeklyExam.total:defaults.weeklyExam.total,
                target: vf.weeklyExam?.target!==undefined?vf.weeklyExam.target:defaults.weeklyExam.target,
                ratio: vf.weeklyExam?.ratio||defaults.weeklyExam.ratio
            }
        };
    }catch(e){return defaults;}
}

function startLearning(deck,day){
    state.deck=deck;
    state.day=day;
    state.words=day.words.slice(); // 원본 보호 위해 복사
    state.idx=0;state.stage=1;
    state.knew=0;state.didntKnow=0;
    state.knewSet=new Set();state.didntKnowSet=new Set();
    state.reviewQueue=[];
    state.currentRound=1;
    state.roundKnewWords=[];
    state.done=false;
    render();
}

function escapeRegExp(str){return (str||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

// ========== TTS 발음 재생 ==========
// 브라우저 기본 SpeechSynthesis API (별도 API 키 불필요)
function speak(text,opts){
    if(!window.speechSynthesis||!text)return;
    try{
        speechSynthesis.cancel(); // 이전 발화 취소
        const utter=new SpeechSynthesisUtterance(text);
        utter.lang='en-US';
        utter.rate=(opts&&opts.rate)||0.9; // 살짝 느리게
        utter.pitch=1.0;
        speechSynthesis.speak(utter);
    }catch(e){console.warn('TTS failed:',e);}
}
// 첫 카드 진입 시 자동 발음용 (한 단어당 한 번만)
let lastAutoSpoken=null;
function autoSpeak(text){
    if(text&&text!==lastAutoSpoken){
        lastAutoSpoken=text;
        setTimeout(()=>speak(text),300);
    }
}

function render(){
    if(state.done){
        renderSummary();
        return;
    }
    const w=state.words[state.idx];
    const total=state.words.length;
    const progress=Math.round((state.idx/total)*100);
    const hl=escapeRegExp(w.highlight||w.en);
    const hlKo=escapeRegExp(w.highlightKo||w.ko);
    const exampleWithMark=w.example?w.example.replace(new RegExp('\\b('+hl+')\\b','gi'),'<mark>$1</mark>'):'';
    const exampleBlank=w.example?w.example.replace(new RegExp('\\b('+hl+')\\b','gi'),'<mark>______</mark>'):'';
    const exampleKoWithMark=w.exampleKo?w.exampleKo.replace(new RegExp('('+hlKo+')'),'<mark>$1</mark>'):'';
    
    let cardHTML='';
    const ttsBtn=`<button class="tts-btn" data-w="${(w.en||'').replace(/"/g,'&quot;')}" onclick="speak(this.dataset.w)" title="발음 듣기">🔊</button>`;
    
    if(state.stage===1){
        // 단어만 표시 — 한글 뜻 떠올려보기 + 자동 발음
        // 카드 클릭 or 버튼 or 스페이스 → 모든 정보 표시 (stage 4)
        cardHTML=`<div class="card-word" onclick="state.stage=4;render()" style="cursor:pointer" title="클릭해서 정답 보기">${w.en}${ttsBtn}</div>
            <button class="card-stage-btn" onclick="state.stage=4;render()">정답 확인 →</button>`;
        autoSpeak(w.en); // 1단계 진입 시 자동 발음
    } else {
        // 모든 정보 표시 (한글뜻 + 예문 + 정답 강조)
        cardHTML=`<div class="card-word">${w.en}${ttsBtn}</div>
            <div class="card-meaning">${w.ko}</div>
            ${w.example?`<div class="card-divider"></div>
            <div class="card-example-label">예문</div>
            <div class="card-example">${exampleWithMark}</div>
            <div class="card-example-ko">↳ ${exampleKoWithMark}</div>`:''}
            <div class="choices" style="width:100%">
                <button class="choice-btn choice-not-know" onclick="markWord(false)">😅 모르겠어요</button>
                <button class="choice-btn choice-know" onclick="markWord(true)">😄 외웠어요</button>
            </div>`;
    }
    
    const totalOrig=state.day.words.length;
    const roundLabel=state.currentRound===1?'':`<span style="color:var(--orange);font-weight:700">(${state.currentRound}차 복습)</span>`;
    document.getElementById('app').innerHTML=`
        <div class="progress-bar">
            <span>${state.idx+1} / ${total} ${roundLabel}</span>
            <div class="progress-bar-inner"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
            <span class="streak-badge"><span style="color:var(--green-d)">😄 ${state.knew}</span> · <span style="color:var(--orange)">😅 ${state.didntKnow}</span></span>
        </div>
        <div class="card">${cardHTML}</div>
        <div class="nav-row">
            <button class="nav-btn" onclick="prev()" ${state.idx===0?'disabled':''}>← 이전</button>
            <div style="font-size:12px;color:var(--gray)">${state.reviewQueue.length>0?`🔄 복습 대기: ${state.reviewQueue.length}개`:'끝까지 화이팅!'}</div>
        </div>`;
}

function markWord(knew){
    const w=state.words[state.idx];
    // 첫 학습 라운드에서만 전체 knew/didntKnow 카운트
    if(state.currentRound===1){
        if(!state.knewSet.has(w.en)&&!state.didntKnowSet.has(w.en)){
            if(knew){state.knew++;state.knewSet.add(w.en);}
            else{state.didntKnow++;state.didntKnowSet.add(w.en);}
        }
    }
    
    if(knew){
        // 이번 라운드 외운 단어 기록 (인터미션 표시용)
        state.roundKnewWords.push(w);
    } else {
        // "모르겠어요" → 복습 큐에 추가
        state.reviewQueue.push(w);
    }
    
    // 학습 진도 저장 (영구)
    saveLearningProgress();
    
    // 다음 단어로
    if(state.idx<state.words.length-1){
        state.idx++;
        state.stage=1;
        render();
        window.scrollTo({top:0,behavior:'smooth'});
    } else {
        // 라운드 끝
        if(state.reviewQueue.length>0){
            // 모르는 단어 있음 → 인터미션 화면 (자동 진행 X)
            renderRoundComplete();
        } else {
            // 모든 단어 외움 → 최종 완료
            state.done=true;
            saveLearningProgress(); // 완료 상태도 저장
            render();
        }
    }
}

// ========================================================================
// 💾 학습 진도 저장/복원 — 학생이 도중에 나가도 이어서 학습 가능
// ========================================================================
function _progressStorageKey(){
    if(isPreview){
        const pid=typeof getPreviewId==='function'?getPreviewId():'pv';
        return 'rl_pv_'+pid+'_vocab_progress';
    }
    return 'rl_vocab_progress';
}

function saveLearningProgress(){
    if(isPreview) return; // 어드민 미리보기 모드는 데이터 저장 차단 (학생 실 데이터 보호)
    if(!state.deck||!state.day)return;
    try{
        const key=_progressStorageKey();
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        const k=state.deck.id+'/'+state.day.id;
        all[k]={
            knew:[...state.knewSet],
            didntKnow:[...state.didntKnowSet],
            currentRound:state.currentRound,
            done:state.done,
            timestamp:Date.now()
        };
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){console.error('진도 저장 실패:',e);}
}

function loadLearningProgress(){
    if(!state.deck||!state.day)return null;
    try{
        const key=_progressStorageKey();
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        return all[state.deck.id+'/'+state.day.id]||null;
    }catch(e){return null;}
}

function prev(){
    if(state.idx>0){
        state.idx--;state.stage=1;
        render();
        window.scrollTo({top:0,behavior:'smooth'});
    }
}

// 라운드 사이 인터미션 화면 — 학생이 [다시 학습] 또는 [끝내기] 선택
function renderRoundComplete(){
    const roundLabel=state.currentRound===1?'1차 학습':`${state.currentRound}차 복습`;
    const nextRoundLabel=`${state.currentRound+1}차 복습`;
    const knewWords=state.roundKnewWords;
    const dontKnowWords=state.reviewQueue;
    
    document.getElementById('app').innerHTML=`<div class="summary-screen">
        <div class="summary-emoji">${state.currentRound===1?'📊':'🔄'}</div>
        <div class="summary-title">${roundLabel} 완료!</div>
        <div class="summary-sub">아직 ${dontKnowWords.length}개 단어를 더 봐야 해요!</div>
        <div class="summary-stats">
            <div class="summary-stat">
                <div class="summary-stat-num" style="color:var(--green-d)">${knewWords.length}</div>
                <div class="summary-stat-label">😄 외운 단어</div>
            </div>
            <div class="summary-stat">
                <div class="summary-stat-num" style="color:var(--orange)">${dontKnowWords.length}</div>
                <div class="summary-stat-label">😅 모르는 단어</div>
            </div>
        </div>
        
        ${dontKnowWords.length>0?`
        <div class="word-list-section">
            <div class="word-list-header">
                <span>😅 다시 학습할 단어 (${dontKnowWords.length}개)</span>
                <span style="font-size:11px;color:var(--gray);font-weight:400">클릭하면 미리 볼 수 있어요</span>
            </div>
            <div class="word-chip-grid">
                ${dontKnowWords.map(w=>`<button class="word-chip word-chip-orange" onclick="showWordDetail('${encodeURIComponent(w.en)}')">${w.en}<span class="word-chip-ko">${w.ko}</span></button>`).join('')}
            </div>
        </div>`:''}
        
        ${knewWords.length>0?`
        <div class="word-list-section">
            <div class="word-list-header">
                <span>😄 ${roundLabel}에서 외운 단어 (${knewWords.length}개)</span>
            </div>
            <div class="word-chip-grid">
                ${knewWords.map(w=>`<button class="word-chip word-chip-green" onclick="showWordDetail('${encodeURIComponent(w.en)}')">${w.en}<span class="word-chip-ko">${w.ko}</span></button>`).join('')}
            </div>
        </div>`:''}
        
        <div class="summary-cta" style="margin-top:24px">
            <button class="nav-btn nav-btn-primary" onclick="continueReview()" style="background:var(--orange);border-color:var(--orange);font-size:15px;padding:14px 24px">🔄 모르는 단어 다시 학습하기 (${dontKnowWords.length}개)</button>
        </div>
        <div class="summary-cta" style="margin-top:8px">
            <button class="nav-btn" onclick="finishEarly()">지금 끝내기</button>
        </div>
    </div>`;
    window.scrollTo({top:0,behavior:'smooth'});
}

// 인터미션에서 "다시 학습" 클릭 → 다음 라운드 시작
function continueReview(){
    state.currentRound++;
    state.words=state.reviewQueue.slice();
    state.reviewQueue=[];
    state.roundKnewWords=[];
    state.idx=0;
    state.stage=1;
    render();
    window.scrollTo({top:0,behavior:'smooth'});
}

// 인터미션에서 "지금 끝내기" 클릭 → 최종 완료 화면
function finishEarly(){
    state.done=true;
    render();
}

// 게임 결과 화면 하단에 다른 게임으로 이동하는 공용 버튼 모음
function renderGameSwitcher(){
    return `<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-size:12px;color:var(--gray);margin-bottom:8px">🎮 다른 게임도 도전해보세요</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
            <button class="nav-btn" onclick="startSpeedGame()" style="background:#F59E0B;color:#fff;border-color:#F59E0B;font-size:12px">⚡ 속도전</button>
            <button class="nav-btn" onclick="startMatchGame()" style="background:#A855F7;color:#fff;border-color:#A855F7;font-size:12px">🃏 매칭게임</button>
            <button class="nav-btn" onclick="startMoleGame()" style="background:#8B4513;color:#fff;border-color:#8B4513;font-size:12px">🔨 두더지</button>
        </div>
        <button class="nav-btn" onclick="state.done=true;render()" style="width:100%;margin-top:8px;font-size:12px">📋 결과 화면으로 돌아가기</button>
    </div>`;
}

function renderSummary(){
    const totalOrig=state.day.words.length;
    const knewPct=Math.round(state.knew/totalOrig*100);
    if(!isPreview){
        // 어드민 미리보기 모드에서는 학생 실 데이터에 저장 안 함
        try{
            const completed=JSON.parse(RL_STORE.get('rl_vocab_completed')||'{}');
            const key=state.deck.id+'/'+state.day.id;
            completed[key]={pct:knewPct,date:new Date().toISOString().slice(0,10)};
            RL_STORE.set('rl_vocab_completed',JSON.stringify(completed));
        }catch(e){}
    }
    
    // 단어 분류:
    //  - knewWords: 한번에 외운 단어 (1차에 외움, 한 번도 모른다고 안 함)
    //  - didntKnowWords: 처음 몰랐던 단어들 (1차에 모른다고 함)

// ========== 단어 상세 모달 ==========
function showWordDetail(enEncoded){
    const en=decodeURIComponent(enEncoded);
    const w=state.day.words.find(x=>x.en===en);
    if(!w)return;
    
    const hl=escapeRegExp(w.highlight||w.en);
    const hlKo=escapeRegExp(w.highlightKo||w.ko);
    const exampleWithMark=w.example?w.example.replace(new RegExp('\\b('+hl+')\\b','gi'),'<mark>$1</mark>'):'';
    const exampleKoWithMark=w.exampleKo?w.exampleKo.replace(new RegExp('('+hlKo+')'),'<mark>$1</mark>'):'';
    
    // 이 단어가 아직 모르는 단어 풀(reviewQueue)에 있으면 "외웠어요!" 버튼 표시
    const isReviewWord=state.reviewQueue.some(x=>x.en===en);
    
    // 기존 모달 제거
    const existing=document.getElementById('wordDetailModal');
    if(existing)existing.remove();
    
    const modal=document.createElement('div');
    modal.id='wordDetailModal';
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;cursor:pointer;animation:fadeIn .2s';
    modal.onclick=(e)=>{if(e.target===modal)closeWordDetail();};
    
    const buttons=isReviewWord?`
        <div style="display:flex;gap:8px;margin-top:20px">
            <button class="nav-btn" onclick="closeWordDetail()" style="flex:1">닫기</button>
            <button class="nav-btn nav-btn-primary" onclick="markKnownFromModal('${encodeURIComponent(en)}')" style="flex:1.5;background:var(--green);border-color:var(--green);font-weight:700">😄 이제 외웠어요!</button>
        </div>
    `:`
        <button class="nav-btn nav-btn-primary" onclick="closeWordDetail()" style="width:100%;margin-top:20px">닫기</button>
    `;
    
    modal.innerHTML=`
        <div style="background:#fff;border-radius:18px;padding:32px 24px;max-width:480px;width:100%;cursor:default;border:3px solid var(--green);max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()">
            <div style="text-align:center;margin-bottom:16px">
                <div style="font-size:36px;font-weight:800;margin-bottom:8px">${w.en} <button class="tts-btn" data-w="${(w.en||'').replace(/"/g,'&quot;')}" onclick="speak(this.dataset.w)" title="발음">🔊</button></div>
                <div style="font-size:22px;font-weight:700;color:var(--green-d)">${w.ko}</div>
            </div>
            ${w.example?`
                <div class="card-divider" style="margin:16px auto"></div>
                <div class="card-example-label">예문</div>
                <div class="card-example" style="text-align:center">${exampleWithMark}</div>
                <div class="card-example-ko" style="text-align:center">↳ ${exampleKoWithMark}</div>
            `:''}
            ${buttons}
        </div>
    `;
    document.body.appendChild(modal);
    setTimeout(()=>speak(w.en),250);
}

function closeWordDetail(){
    const m=document.getElementById('wordDetailModal');
    if(m)m.remove();
}

// 모달에서 "이제 외웠어요" 클릭 → reviewQueue에서 제거 + 외운 단어로 추가
function markKnownFromModal(enEncoded){
    const en=decodeURIComponent(enEncoded);
    const w=state.day.words.find(x=>x.en===en);
    if(!w)return;
    
    // reviewQueue에서 제거
    state.reviewQueue=state.reviewQueue.filter(x=>x.en!==en);
    
    // 이번 라운드 외운 단어 리스트에 추가 (중복 방지)
    if(!state.roundKnewWords.some(x=>x.en===en)){
        state.roundKnewWords.push(w);
    }
    
    closeWordDetail();
    
    // 인터미션 또는 완료 화면 다시 렌더 (단어 리스트 업데이트)
    if(state.done){
        // 최종 완료 화면 → 다시 렌더 (게임 모드 잠금해제 가능)
        render();
    } else if(state.reviewQueue.length>0){
        // 인터미션 화면 → 다시 렌더
        renderRoundComplete();
    } else {
        // reviewQueue가 비었으면 최종 완료
        state.done=true;
        render();
    }
}

// ========== 유틸 ==========
function shuffle(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

// ========================================================================
// ⚡ 속도전 — 한 단어당 8초 안에 4지선다 맞히기. 연속 정답 콤보 점수
// ========================================================================
let speedState=null;

function startSpeedGame(){
    const words=state.day.words;
    if(words.length<4){alert('속도전은 최소 4단어 이상 필요해요.');return;}
    // 랜덤 20문제 (단어가 20개 미만이면 전부 사용)
    const picked=shuffle(words).slice(0,Math.min(20,words.length));
    speedState={
        words:picked,
        idx:0,
        score:0,
        combo:0,
        maxCombo:0,
        right:0,wrong:0,
        timeLeft:0,
        timerInterval:null,
        locked:false
    };
    renderSpeed();
}

function renderSpeed(){
    if(speedState.idx>=speedState.words.length){
        endSpeedGame();
        return;
    }
    const w=speedState.words[speedState.idx];
    // 정답 보기 + 오답 3개 (다른 단어들에서 선택)
    const others=state.day.words.filter(x=>x.en!==w.en);
    const wrongs=shuffle(others).slice(0,3).map(x=>x.ko);
    const options=shuffle([w.ko,...wrongs]);
    
    speedState.timeLeft=80; // 0.1초 단위, 8초
    speedState.locked=false;
    
    document.getElementById('app').innerHTML=`
        <div class="game-header">
            <div class="game-stat">${speedState.idx+1} / ${speedState.words.length}</div>
            <div class="game-stat combo">🔥 ${speedState.combo}</div>
            <div class="game-stat score">⭐ ${speedState.score}</div>
        </div>
        <div class="time-bar"><div class="time-bar-fill" id="timeBar" style="width:100%"></div></div>
        <div class="speed-card">
            <div class="speed-word">${w.en} <button class="tts-btn tts-orange" data-w="${(w.en||'').replace(/"/g,'&quot;')}" onclick="speak(this.dataset.w)" title="발음">🔊</button></div>
            <div class="speed-prompt">한글 뜻을 골라보세요</div>
        </div>
        <div class="speed-options">
            ${options.map((opt,i)=>`<button class="speed-opt" data-idx="${i}" onclick="pickSpeed(${i},'${encodeURIComponent(opt)}','${encodeURIComponent(w.ko)}')">${opt}</button>`).join('')}
        </div>`;
    autoSpeak(w.en); // 단어 노출 시 자동 발음
    
    // 시간 바
    if(speedState.timerInterval)clearInterval(speedState.timerInterval);
    speedState.timerInterval=setInterval(()=>{
        speedState.timeLeft--;
        const bar=document.getElementById('timeBar');
        if(bar)bar.style.width=(speedState.timeLeft/80*100)+'%';
        if(speedState.timeLeft<=0){
            clearInterval(speedState.timerInterval);
            if(!speedState.locked)timeOutSpeed();
        }
    },100);
}

function pickSpeed(idx,picked,correct){
    if(speedState.locked)return;
    speedState.locked=true;
    clearInterval(speedState.timerInterval);
    const pickedKo=decodeURIComponent(picked);
    const correctKo=decodeURIComponent(correct);
    const isCorrect=pickedKo===correctKo;
    
    // 정답/오답 시각 표시
    document.querySelectorAll('.speed-opt').forEach((btn,i)=>{
        btn.disabled=true;
        const txt=btn.textContent;
        if(txt===correctKo)btn.classList.add('correct');
        else if(i===idx&&!isCorrect)btn.classList.add('wrong');
    });
    
    if(isCorrect){
        speedState.right++;
        speedState.combo++;
        speedState.maxCombo=Math.max(speedState.maxCombo,speedState.combo);
        // 점수: 기본 10 + 콤보 보너스 (2씩 추가) + 빠를수록 보너스 (남은 시간 0.1초당 1점)
        const comboBonus=Math.min(speedState.combo*2,20);
        const speedBonus=Math.floor(speedState.timeLeft/8);
        speedState.score+=10+comboBonus+speedBonus;
    } else {
        speedState.wrong++;
        speedState.combo=0;
    }
    
    setTimeout(()=>{
        speedState.idx++;
        renderSpeed();
    },800);
}

function timeOutSpeed(){
    speedState.locked=true;
    speedState.wrong++;
    speedState.combo=0;
    // 정답 강조
    const w=speedState.words[speedState.idx];
    document.querySelectorAll('.speed-opt').forEach(btn=>{
        btn.disabled=true;
        if(btn.textContent===w.ko)btn.classList.add('correct');
    });
    setTimeout(()=>{
        speedState.idx++;
        renderSpeed();
    },1200);
}

function endSpeedGame(){
    if(speedState.timerInterval)clearInterval(speedState.timerInterval);
    const total=speedState.right+speedState.wrong;
    const accuracy=total>0?Math.round(speedState.right/total*100):0;
    const grade=speedState.score>=300?'⭐⭐⭐':speedState.score>=200?'⭐⭐':speedState.score>=100?'⭐':'';
    saveGameScore('speed',speedState.score,accuracy);
    document.getElementById('app').innerHTML=`<div class="summary-screen" style="border-color:#F59E0B">
        <div class="summary-emoji">⚡</div>
        <div class="summary-title">속도전 완료!</div>
        <div class="summary-sub">${grade||'다음에 더 잘할 수 있어요!'}</div>
        <div class="summary-stats">
            <div class="summary-stat"><div class="summary-stat-num">${speedState.score}</div><div class="summary-stat-label">점수</div></div>
            <div class="summary-stat"><div class="summary-stat-num">${accuracy}%</div><div class="summary-stat-label">정답률</div></div>
            <div class="summary-stat"><div class="summary-stat-num">🔥${speedState.maxCombo}</div><div class="summary-stat-label">최고 콤보</div></div>
        </div>
        <div class="summary-cta">
            <button class="nav-btn nav-btn-primary" onclick="startSpeedGame()" style="background:#F59E0B;border-color:#F59E0B">↺ 다시 도전</button>
        </div>
        ${renderGameSwitcher()}
    </div>`;
}

// ========================================================================
// 🃏 매칭게임 — 2-컬럼 매칭 (4라운드 × 5쌍 = 20단어, 타이머/점수/페널티/사운드)
// ========================================================================
let matchState=null;
const MATCH_PAIRS_PER_ROUND=5;
const MATCH_TIME_LIMIT=180; // 3분
const MATCH_POINTS_CORRECT=100;
const MATCH_POINTS_WRONG=-10;

function startMatchGame(){
    const words=state.day.words;
    if(words.length<MATCH_PAIRS_PER_ROUND){
        alert(`매칭게임은 최소 ${MATCH_PAIRS_PER_ROUND}단어 이상 필요해요.`);
        return;
    }
    const totalRounds=Math.min(4,Math.floor(words.length/MATCH_PAIRS_PER_ROUND));
    const pool=shuffle(words).slice(0,totalRounds*MATCH_PAIRS_PER_ROUND);
    matchState={
        round:1,
        totalRounds:totalRounds,
        pool:pool,
        roundPairs:[],
        shuffledEn:[],
        shuffledKo:[],
        selectedEn:null,
        selectedKo:null,
        matched:new Set(),
        score:0,
        totalMatched:0,
        wrongCount:0,
        totalCards:totalRounds*MATCH_PAIRS_PER_ROUND,
        startTime:Date.now(),
        timeLeft:MATCH_TIME_LIMIT,
        timerId:null,
        locked:false
    };
    loadMatchRound();
    renderMatch();
    matchState.timerId=setInterval(()=>{
        matchState.timeLeft--;
        if(matchState.timeLeft<=0){
            matchState.timeLeft=0;
            clearInterval(matchState.timerId);
            endMatchGame();
            return;
        }
        updateMatchTimer();
    },1000);
    ensureAudio(); // 사용자 인터랙션으로 오디오 컨텍스트 활성화
}

function loadMatchRound(){
    const startIdx=(matchState.round-1)*MATCH_PAIRS_PER_ROUND;
    matchState.roundPairs=matchState.pool.slice(startIdx,startIdx+MATCH_PAIRS_PER_ROUND);
    matchState.matched=new Set();
    matchState.selectedEn=null;
    matchState.selectedKo=null;
    matchState.locked=false;
    matchState.shuffledEn=shuffle(matchState.roundPairs.map((p,i)=>({...p,idx:i})));
    matchState.shuffledKo=shuffle(matchState.roundPairs.map((p,i)=>({...p,idx:i})));
}

function renderMatch(){
    const tot=matchState.totalMatched, all=matchState.totalCards;
    const pct=(tot/all)*100;
    const mm=String(Math.floor(matchState.timeLeft/60)).padStart(2,'0');
    const ss=String(matchState.timeLeft%60).padStart(2,'0');
    document.getElementById('app').innerHTML=`
        <div class="match-game">
            <div class="match-game-header">
                <div class="match-timer ${matchState.timeLeft<=30?'warning':''}">
                    <span style="opacity:.8">⏱</span>
                    <span class="match-timer-time">${mm}:${ss}</span>
                </div>
                <div class="match-score-wrap">
                    <span class="match-score-label">Score</span>
                    <span class="match-score">${matchState.score}</span>
                </div>
            </div>
            <div class="match-round-info">
                <span class="round-name">Round ${matchState.round} / ${matchState.totalRounds}</span>
                <span class="round-progress">매칭 ${matchState.matched.size} / ${MATCH_PAIRS_PER_ROUND}</span>
            </div>
            <div class="match-board">
                <div class="match-col">
                    ${matchState.shuffledEn.map(w=>{
                        const done=matchState.matched.has(w.idx);
                        return `<button class="match-tile ${done?'match-done':''}" data-side="en" data-idx="${w.idx}" onclick="selectMatchTile('en',${w.idx})">
                            <span class="match-tile-pts">+${MATCH_POINTS_CORRECT}</span>
                            <span class="match-tile-en">${w.en}</span>
                        </button>`;
                    }).join('')}
                </div>
                <div class="match-col">
                    ${matchState.shuffledKo.map(w=>{
                        const done=matchState.matched.has(w.idx);
                        return `<button class="match-tile ${done?'match-done':''}" data-side="ko" data-idx="${w.idx}" onclick="selectMatchTile('ko',${w.idx})">
                            <span class="match-tile-pts">+${MATCH_POINTS_CORRECT}</span>
                            <span class="match-tile-ko">${w.ko}</span>
                        </button>`;
                    }).join('')}
                </div>
            </div>
            <div class="match-progress-wrap">

function updateMatchTimer(){
    const t=document.querySelector('.match-timer-time');
    if(!t)return;
    t.textContent=`${String(Math.floor(matchState.timeLeft/60)).padStart(2,'0')}:${String(matchState.timeLeft%60).padStart(2,'0')}`;
    const wrap=document.querySelector('.match-timer');
    if(wrap)wrap.classList.toggle('warning',matchState.timeLeft<=30);
}

function selectMatchTile(side,idx){
    if(!matchState||matchState.locked)return;
    if(matchState.matched.has(idx))return;
    const tile=document.querySelector(`[data-side="${side}"][data-idx="${idx}"]`);
    if(!tile)return;
    if(side==='en'){
        document.querySelectorAll('[data-side="en"]').forEach(t=>t.classList.remove('match-selected'));
        if(matchState.selectedEn===idx){matchState.selectedEn=null;return;}
        matchState.selectedEn=idx;
        tile.classList.add('match-selected');
    }else{
        document.querySelectorAll('[data-side="ko"]').forEach(t=>t.classList.remove('match-selected'));
        if(matchState.selectedKo===idx){matchState.selectedKo=null;return;}
        matchState.selectedKo=idx;
        tile.classList.add('match-selected');
    }
    if(matchState.selectedEn!==null&&matchState.selectedKo!==null){
        matchState.locked=true;
        setTimeout(checkMatchPair,220);
    }
}

function checkMatchPair(){
    const enIdx=matchState.selectedEn, koIdx=matchState.selectedKo;
    const enTile=document.querySelector(`[data-side="en"][data-idx="${enIdx}"]`);
    const koTile=document.querySelector(`[data-side="ko"][data-idx="${koIdx}"]`);
    if(enIdx===koIdx){
        // 정답
        matchState.matched.add(enIdx);
        matchState.score+=MATCH_POINTS_CORRECT;
        matchState.totalMatched++;
        playCorrectSound();
        showMatchFlash('+'+MATCH_POINTS_CORRECT,'green');
        if(enTile){enTile.classList.remove('match-selected');enTile.classList.add('match-flash');}
        if(koTile){koTile.classList.remove('match-selected');koTile.classList.add('match-flash');}
        setTimeout(()=>{
            updateMatchScore();
            updateMatchProgress();
            if(enTile)enTile.classList.add('match-done');
            if(koTile)koTile.classList.add('match-done');
            matchState.selectedEn=null;
            matchState.selectedKo=null;
            matchState.locked=false;
            checkMatchRoundComplete();
        },380);
    }else{
        // 오답 + 페널티
        matchState.score=Math.max(0,matchState.score+MATCH_POINTS_WRONG);
        matchState.wrongCount++;
        playWrongSound();
        showMatchFlash(MATCH_POINTS_WRONG.toString(),'red');
        if(enTile){enTile.classList.remove('match-selected');enTile.classList.add('match-wrong');}
        if(koTile){koTile.classList.remove('match-selected');koTile.classList.add('match-wrong');}
        setTimeout(()=>{
            if(enTile)enTile.classList.remove('match-wrong');
            if(koTile)koTile.classList.remove('match-wrong');
            updateMatchScore();
            matchState.selectedEn=null;
            matchState.selectedKo=null;
            matchState.locked=false;
        },450);
    }
}

function checkMatchRoundComplete(){
    if(matchState.matched.size>=MATCH_PAIRS_PER_ROUND){
        if(matchState.round<matchState.totalRounds){
            setTimeout(()=>{
                matchState.round++;
                loadMatchRound();
                renderMatch();
            },600);
        }else{
            setTimeout(endMatchGame,600);
        }
    }
}

function showMatchFlash(text,color){
    const flash=document.getElementById('matchFlash');
    if(!flash)return;
    flash.textContent=text;
    flash.className='match-flash-popup '+color;
    void flash.offsetWidth;
    flash.classList.add('show');
    setTimeout(()=>flash.classList.remove('show'),700);
}

function updateMatchScore(){
    const el=document.querySelector('.match-score');
    if(el)el.textContent=matchState.score;
}

function updateMatchProgress(){
    const pct=(matchState.totalMatched/matchState.totalCards)*100;
    const fill=document.querySelector('.match-progress-fill');
    if(fill)fill.style.width=pct+'%';
    const text=document.querySelector('.match-progress-text');
    if(text)text.textContent=`${matchState.totalMatched}/${matchState.totalCards}`;
    const rp=document.querySelector('.round-progress');
    if(rp)rp.textContent=`매칭 ${matchState.matched.size} / ${MATCH_PAIRS_PER_ROUND}`;
}

function endMatchGame(){
    if(matchState.timerId)clearInterval(matchState.timerId);
    const timeUsed=MATCH_TIME_LIMIT-matchState.timeLeft;
    const attempts=matchState.totalMatched+matchState.wrongCount;
    const accuracy=attempts===0?0:Math.round((matchState.totalMatched/attempts)*100);
    const isPerfect=matchState.totalMatched===matchState.totalCards;
    const isTimeOut=matchState.timeLeft===0&&!isPerfect;
    let stars='';
    if(isPerfect&&timeUsed<=90&&matchState.wrongCount<=2)stars='⭐⭐⭐';
    else if(isPerfect&&timeUsed<=150)stars='⭐⭐';
    else if(isPerfect)stars='⭐';
    saveGameScore('match',matchState.score,accuracy);
    const mm=String(Math.floor(timeUsed/60)).padStart(2,'0');
    const ss=String(timeUsed%60).padStart(2,'0');
    document.getElementById('app').innerHTML=`<div class="summary-screen" style="border-color:var(--purple)">
        <div class="summary-emoji">${isPerfect?'🏆':(isTimeOut?'⏱️':'🃏')}</div>
        <div class="summary-title">${isPerfect?'완벽 클리어!':(isTimeOut?'시간 종료!':'매칭게임 종료')}</div>
        <div class="summary-sub">${stars||(isPerfect?'잘했어요!':'')}</div>
        <div style="margin:18px 0;font-size:44px;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;letter-spacing:-0.03em">${matchState.score}</div>
        <div class="summary-stats">
            <div class="summary-stat"><div class="summary-stat-num">${matchState.totalMatched}/${matchState.totalCards}</div><div class="summary-stat-label">매칭</div></div>
            <div class="summary-stat"><div class="summary-stat-num">${accuracy}%</div><div class="summary-stat-label">정확도</div></div>
            <div class="summary-stat"><div class="summary-stat-num">${mm}:${ss}</div><div class="summary-stat-label">소요 시간</div></div>
        </div>
        ${matchState.wrongCount>0?`<div style="margin-top:10px;font-size:12px;color:var(--gray)">오답 ${matchState.wrongCount}회 (${MATCH_POINTS_WRONG}점씩 차감)</div>`:''}
        <div class="summary-cta">
            <button class="nav-btn nav-btn-primary" onclick="startMatchGame()" style="background:var(--purple);border-color:var(--purple)">↺ 다시 도전</button>
        </div>
        ${renderGameSwitcher()}
    </div>`;
}

// ========== 사운드 효과 (Web Audio API) ==========
let audioCtx=null;
function ensureAudio(){
    if(!audioCtx){
        try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}
        catch(e){console.warn('AudioContext create failed:',e);return null;}
    }
    // 브라우저 정책상 suspended 상태로 만들어질 수 있음 → 사용자 인터랙션 시 resume
    if(audioCtx&&audioCtx.state==='suspended'){
        audioCtx.resume().catch(e=>console.warn('Resume failed:',e));
    }
    return audioCtx;
}

function playCorrectSound(){
    const ctx=ensureAudio();if(!ctx)return;
    try{
        // 경쾌한 벨 사운드 — 3음 빠른 상승 (800Hz → 1200Hz → 1600Hz)
        const now=ctx.currentTime;
        [800,1200,1600].forEach((freq,i)=>{
            const osc=ctx.createOscillator();
            const gain=ctx.createGain();
            osc.type='sine';
            osc.frequency.value=freq;
            gain.gain.setValueAtTime(0,now+i*0.05);
            gain.gain.linearRampToValueAtTime(0.18,now+i*0.05+0.01);
            gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.05+0.25);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(now+i*0.05);
            osc.stop(now+i*0.05+0.25);
        });
    }catch(e){}
}

function playWrongSound(){
    const ctx=ensureAudio();if(!ctx)return;
    try{
        const now=ctx.currentTime;
        
        // 1) 메인 베이스: 180Hz → 70Hz (모바일 스피커도 잘 내는 범위)
        const osc1=ctx.createOscillator();
        const gain1=ctx.createGain();
        osc1.type='sine';
        osc1.frequency.setValueAtTime(180,now);
        osc1.frequency.exponentialRampToValueAtTime(70,now+0.15);
        gain1.gain.setValueAtTime(0.6,now);
        gain1.gain.exponentialRampToValueAtTime(0.001,now+0.35);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now+0.35);
        
        // 2) 보강 삼각파: 220Hz → 90Hz (몸체 톤, 좀 더 들리게)
        const osc2=ctx.createOscillator();
        const gain2=ctx.createGain();
        osc2.type='triangle';
        osc2.frequency.setValueAtTime(220,now);
        osc2.frequency.exponentialRampToValueAtTime(90,now+0.15);
        gain2.gain.setValueAtTime(0.35,now);
        gain2.gain.exponentialRampToValueAtTime(0.001,now+0.3);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now);
        osc2.stop(now+0.3);
        
        // 3) 어택 노이즈: 0.08초, "퍽" 느낌 (저주파 필터)
        const bufferSize=Math.floor(ctx.sampleRate*0.08);
        const buffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate);
        const data=buffer.getChannelData(0);
        for(let i=0;i<bufferSize;i++){
            data[i]=(Math.random()*2-1)*Math.pow(1-i/bufferSize,2);
        }
        const noise=ctx.createBufferSource();
        noise.buffer=buffer;
        const noiseGain=ctx.createGain();
        noiseGain.gain.value=0.5;
        const lp=ctx.createBiquadFilter();
        lp.type='lowpass';
        lp.frequency.value=500; // 500Hz 이하 통과 (둔탁함 + 들림)
        noise.connect(lp);
        lp.connect(noiseGain);
        noiseGain.connect(ctx.destination);
        noise.start(now);
    }catch(e){console.warn('Wrong sound failed:',e);}
}

function startMoleGame(){
    const words=state.day.words;
    if(words.length<4){alert('두더지 게임은 최소 4단어 이상 필요해요.');return;}
    moleState={
        timeLeft:MOLE_GAME_TIME*10, // 0.1초 단위
        score:0,
        right:0,
        wrong:0,
        currentWord:null, // 현재 정답 단어 {en,ko}
        holes:Array(MOLE_HOLES).fill(null), // 각 구멍: null 또는 {en, lifeTicks}
        tickInterval:null,
        gameOver:false
    };
    pickNewMoleTarget();
    renderMoleScreen();
    // 게임 루프 — 200ms마다 갱신
    moleState.tickInterval=setInterval(moleTick,200);
}

function pickNewMoleTarget(){
    // 현재 정답과 다른 단어 무작위 선택
    const prevEn=moleState.currentWord?moleState.currentWord.en:null;
    const pool=state.day.words.filter(w=>w.en!==prevEn);
    moleState.currentWord=pool[Math.floor(Math.random()*pool.length)];
    // 화면에 있는 정답 단어 제거 (새 정답이 다른 단어니까)
    moleState.holes=moleState.holes.map(h=>(h&&h.en===prevEn)?null:h);
}

function moleTick(){
    if(moleState.gameOver)return;
    moleState.timeLeft-=2; // 200ms = 0.2초 = 2 (0.1초 단위)
    if(moleState.timeLeft<=0){
        endMoleGame();
        return;
    }
    // 구멍별 lifeTicks 감소
    for(let i=0;i<MOLE_HOLES;i++){
        const h=moleState.holes[i];
        if(h){
            h.lifeTicks--;
            if(h.lifeTicks<=0)moleState.holes[i]=null;
        }
    }
    // 새 단어 등장 (확률적)
    const emptyHoles=moleState.holes.map((h,i)=>h===null?i:-1).filter(i=>i>=0);
    const visibleCount=moleState.holes.filter(h=>h).length;
    if(emptyHoles.length>0&&visibleCount<3&&Math.random()<0.6){
        const holeIdx=emptyHoles[Math.floor(Math.random()*emptyHoles.length)];
        const hasCorrectOnScreen=moleState.holes.some(h=>h&&h.en===moleState.currentWord.en);
        let spawnEn;
        if(!hasCorrectOnScreen&&Math.random()<0.55){
            // 정답 등장
            spawnEn=moleState.currentWord.en;
        } else {
            // 오답 등장 (다른 단어)
            const others=state.day.words.filter(w=>w.en!==moleState.currentWord.en);
            const otherWord=others[Math.floor(Math.random()*others.length)];
            spawnEn=otherWord.en;
        }
        moleState.holes[holeIdx]={en:spawnEn,lifeTicks:9+Math.floor(Math.random()*5)}; // 1.8~2.6초 표시
    }
    updateMoleDOM();
}

function updateMoleDOM(){
    // 시간 바
    const bar=document.getElementById('moleTimeBar');
    if(bar)bar.style.width=(moleState.timeLeft/(MOLE_GAME_TIME*10)*100)+'%';
    // 점수
    const scoreEl=document.getElementById('moleScore');
    if(scoreEl)scoreEl.textContent='⭐ '+moleState.score;
    // 시간 텍스트
    const timeText=document.getElementById('moleTimeText');
    if(timeText)timeText.textContent='⏱ '+Math.ceil(moleState.timeLeft/10)+'초';
    // 구멍 내용
    for(let i=0;i<MOLE_HOLES;i++){
        const el=document.getElementById('moleHole_'+i);
        if(!el)continue;
        const h=moleState.holes[i];
        const wordEl=el.querySelector('.mole-word');
        if(h){
            if(!el.classList.contains('mole')){
                el.classList.remove('empty');
                el.classList.add('mole');
            }
            if(wordEl&&wordEl.textContent!==h.en)wordEl.textContent=h.en;
        } else {
            if(!el.classList.contains('empty')){
                el.classList.remove('mole');
                el.classList.add('empty');
            }
        }
    }
}

function renderMoleScreen(){
    document.getElementById('app').innerHTML=`
        <div class="game-header">
            <div class="game-stat" id="moleTimeText" style="background:#FEF3C7;color:#92400E">⏱ 60초</div>

        </div>
        <div class="time-bar"><div class="time-bar-fill" id="moleTimeBar" style="width:100%;background:linear-gradient(90deg,#10B981 0%,#10B981 60%,#F59E0B 80%,#EF4444 100%)"></div></div>
        <div class="mole-target">

            <div class="mole-target-ko" id="moleTargetKo">${moleState.currentWord.ko}</div>
        </div>

            ${Array(MOLE_HOLES).fill(0).map((_,i)=>`

function clickMoleHole(i){
    if(moleState.gameOver)return;
    const h=moleState.holes[i];
    if(!h)return; // 빈 구멍 무시
    
    const el=document.getElementById('moleHole_'+i);
    if(h.en===moleState.currentWord.en){
        // 정답!
        playCorrectSound();
        const speedBonus=Math.floor(moleState.timeLeft/60); // 0~10점 빠를수록 보너스
        const earned=10+speedBonus;
        moleState.score+=earned;
        moleState.right++;
        if(el){
            el.classList.add('correct-flash');
            showFloatingScore(el,'+'+earned,'plus');
            setTimeout(()=>el&&el.classList.remove('correct-flash'),400);
        }
        // 다음 정답 단어로 (잠깐 후 — 두더지가 사라지는 모션 보이게)
        setTimeout(()=>{
            moleState.holes[i]=null;
            pickNewMoleTarget();
            const targetEl=document.getElementById('moleTargetKo');
            if(targetEl){
                targetEl.textContent=moleState.currentWord.ko;
                targetEl.style.animation='none';
                void targetEl.offsetWidth;
                targetEl.style.animation='moleUp .3s';
            }
            updateMoleDOM();
        },300);
    } else {
        // 오답
        playWrongSound();
        const lost=Math.min(5,moleState.score); // 0 이하로는 안 내려가도록 표시도 조정
        moleState.score=Math.max(0,moleState.score-5);
        moleState.wrong++;
        if(el){
            el.classList.add('wrong-flash');
            showFloatingScore(el,'-'+lost,'minus');
            setTimeout(()=>el&&el.classList.remove('wrong-flash'),400);
        }
        setTimeout(()=>{
            moleState.holes[i]=null;
            updateMoleDOM();
        },400);
    }
    updateMoleDOM();
}

// 점수 떠오르는 텍스트 — 부모 박스에 잠깐 추가했다 자동 제거
function showFloatingScore(parent,text,cls){
    const span=document.createElement('span');
    span.className='score-float '+cls;
    span.textContent=text;
    parent.appendChild(span);
    setTimeout(()=>span.remove(),1000);
}

    moleState.gameOver=true;

    try{
        const ctx=ensureAudio();
        if(ctx){
            const now=ctx.currentTime;
            [523.25,659.25,783.99].forEach((freq,i)=>{
                const osc=ctx.createOscillator();
                const gain=ctx.createGain();
                osc.type='triangle';
                osc.frequency.value=freq;
                gain.gain.setValueAtTime(0,now+i*0.12);
                gain.gain.linearRampToValueAtTime(0.18,now+i*0.12+0.04);
                gain.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.4);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now+i*0.12);
                osc.stop(now+i*0.12+0.4);
            });
        }
    }catch(e){}
    const total=moleState.right+moleState.wrong;
    const accuracy=total>0?Math.round(moleState.right/total*100):0;
    const stars=moleState.score>=300?'⭐⭐⭐':moleState.score>=200?'⭐⭐':moleState.score>=100?'⭐':'';
    saveGameScore('mole',moleState.score,accuracy);
    document.getElementById('app').innerHTML=`<div class="summary-screen" style="border-color:#8B4513">
        <div class="summary-emoji">🔨</div>
        <div class="summary-title">두더지 게임 완료!</div>
        <div class="summary-sub">${stars||'다음에 더 잘할 수 있어요!'}</div>
        <div class="summary-stats">

// ========== 게임 점수 저장 (학생별, 단어장-DAY별) ==========
function saveGameScore(gameType,score,accuracy){
    // 게임 완료 추적 (데이체크 잠금해제 조건)
    state.gamesCompleted.add(gameType);
    try{
        const key='rl_vocab_game_scores';
        const all=JSON.parse(RL_STORE.get(key)||'{}');
        const dayKey=state.deck.id+'/'+state.day.id;
        if(!all[dayKey])all[dayKey]={};
        const prev=all[dayKey][gameType];
        const hist=(prev&&prev.history)?prev.history.slice():[];
        hist.push({score:score,accuracy:accuracy,date:Date.now()});
        if(hist.length>10)hist.splice(0,hist.length-10);
        // 최고 점수 갱신 + 히스토리 누적
        if(!prev||score>prev.score){
            all[dayKey][gameType]={score,accuracy,date:new Date().toISOString().slice(0,10),attempts:(prev?prev.attempts||1:0)+1,history:hist};
        }else{
            // 최고 점수 갱신 안 됐지만 히스토리는 누적
            all[dayKey][gameType]={...prev,attempts:(prev.attempts||1)+1,history:hist};
        }
        RL_STORE.set(key,JSON.stringify(all));
    }catch(e){}
}
